<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL Librería</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;500&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#010608;--s:#071220;--s2:#0c1c30;--b:#0d2a4a;--b2:#1a3a5c;--bl:#0088ff;--bl2:#00ccff;--gr:#00ff88;--gd:#ffd700;--rd:#ff4466;--tx:#ddeeff;--mu:#4a7a9b;--orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--exo:'Exo 2',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--exo);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,136,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(0,136,255,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.notif{position:fixed;top:.8rem;right:.8rem;z-index:999;padding:.55rem 1rem;background:rgba(4,14,28,.97);border:1px solid var(--bl2);border-radius:8px;font-family:var(--orb);font-size:.6rem;color:var(--bl2);transform:translateX(130%);transition:transform .3s;}
.notif.show{transform:translateX(0);}
.admin-bar{display:none;background:rgba(255,215,0,.05);border-bottom:1px solid rgba(255,215,0,.15);padding:.5rem 1.3rem;font-family:var(--orb);font-size:.56rem;color:var(--gd);align-items:center;gap:.5rem;}
.admin-bar.show{display:flex;}
.toolbar{display:flex;align-items:center;gap:.7rem;padding:.85rem 1.3rem;background:var(--s);border-bottom:1px solid var(--b);flex-wrap:wrap;position:sticky;top:0;z-index:10;}
.search-box{display:flex;align-items:center;gap:.4rem;background:rgba(0,0,0,.35);border:1px solid var(--b2);border-radius:7px;padding:.32rem .7rem;flex:1;max-width:280px;}
.search-box input{background:transparent;border:none;color:var(--tx);font-family:var(--exo);font-size:.75rem;outline:none;width:100%;}
.search-box input::placeholder{color:var(--mu);}
.filter-btns{display:flex;gap:.3rem;}
.fbtn{padding:.28rem .65rem;background:transparent;border:1px solid var(--b2);border-radius:5px;color:var(--mu);font-family:var(--orb);font-size:.52rem;cursor:pointer;transition:all .2s;}
.fbtn.on{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);}
.btn{padding:.32rem .75rem;border:none;border-radius:6px;font-family:var(--orb);font-size:.55rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-pri{background:linear-gradient(135deg,#003388,var(--bl));color:#fff;}
.btn-pri:hover{transform:translateY(-1px);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center;gap:1.2rem;min-height:55vh;}
.empty-icon{font-size:3.5rem;opacity:.4;}
.empty-title{font-family:var(--orb);font-size:.95rem;color:var(--mu);}
.empty-desc{font-size:.74rem;color:var(--mu);max-width:380px;line-height:1.75;opacity:.7;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.95rem;padding:1.3rem;max-width:1200px;margin:0 auto;width:100%;}
.card{background:var(--s);border:1px solid var(--b);border-radius:12px;padding:1.1rem;cursor:pointer;transition:all .3s;text-align:center;position:relative;animation:fu .4s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card:hover{border-color:rgba(0,136,255,.5);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,136,255,.1);}
.card-type-badge{position:absolute;top:.65rem;right:.65rem;padding:.1rem .35rem;border-radius:4px;font-family:var(--orb);font-size:.46rem;}
.t-pdf{background:rgba(255,68,102,.12);color:#ff8899;border:1px solid rgba(255,68,102,.3);}
.t-video{background:rgba(0,255,136,.1);color:var(--gr);border:1px solid rgba(0,255,136,.3);}
.t-nb{background:rgba(0,136,255,.15);color:var(--bl2);border:1px solid rgba(0,136,255,.3);}
.card-icon{font-size:2rem;margin-bottom:.65rem;}
.card-title{font-family:var(--orb);font-size:.66rem;color:var(--tx);margin-bottom:.3rem;}
.card-desc{font-size:.62rem;color:var(--mu);line-height:1.5;margin-bottom:.65rem;}
.card-open{width:100%;padding:.4rem;background:rgba(0,136,255,.1);border:1px solid rgba(0,136,255,.3);border-radius:6px;color:var(--bl2);font-family:var(--orb);font-size:.52rem;cursor:pointer;transition:all .2s;}
.card-open:hover{background:rgba(0,136,255,.2);}
.card-del{position:absolute;bottom:.65rem;right:.65rem;background:transparent;border:none;color:#ff8899;cursor:pointer;font-size:.75rem;display:none;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--s);border:1px solid rgba(0,136,255,.35);border-radius:14px;padding:1.7rem;width:min(480px,92vw);animation:su .3s ease;}
@keyframes su{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-family:var(--orb);font-size:.88rem;color:var(--bl2);margin-bottom:1.2rem;}
.fg{margin-bottom:.8rem;}
.fl{font-family:var(--orb);font-size:.52rem;color:var(--mu);letter-spacing:.1em;display:block;margin-bottom:.25rem;}
.fi{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--b2);border-radius:7px;padding:.5rem .8rem;color:var(--tx);font-family:var(--exo);font-size:.78rem;outline:none;}
.fi:focus{border-color:rgba(0,136,255,.7);}
select.fi{cursor:pointer;}
.btn-row{display:flex;gap:.5rem;margin-top:.8rem;}
.btn-cancel{padding:.45rem .9rem;background:transparent;border:1px solid var(--b2);border-radius:7px;color:var(--mu);font-family:var(--orb);font-size:.58rem;cursor:pointer;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="admin-bar" id="admin-bar">
  👑 Modo administrador — Gestiona el contenido de la librería
  <button class="btn btn-pri" style="margin-left:auto;" onclick="openAdd()">+ AGREGAR RECURSO</button>
</div>
<div class="toolbar">
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#4a7a9b" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#4a7a9b" stroke-width="2" stroke-linecap="round"/></svg>
    <input id="search" placeholder="Buscar..." oninput="render()">
  </div>
  <div class="filter-btns">
    <button class="fbtn on" onclick="setF('all',this)">Todo</button>
    <button class="fbtn" onclick="setF('video',this)">Videos</button>
    <button class="fbtn" onclick="setF('pdf',this)">PDFs</button>
    <button class="fbtn" onclick="setF('nb',this)">Notebooks</button>
  </div>
</div>
<div id="content"></div>

<!-- MODAL AGREGAR -->
<div class="modal-ov" id="add-modal">
  <div class="modal">
    <div class="modal-title">➕ Agregar a la Librería</div>
    <div class="fg"><label class="fl">TIPO DE RECURSO</label>
      <select class="fi" id="a-type">
        <option value="pdf">📄 PDF / Documento</option>
        <option value="video">🎬 Video</option>
        <option value="nb">📓 Notebook</option>
      </select>
    </div>
    <div class="fg"><label class="fl">ÍCONO (emoji)</label><input class="fi" id="a-icon" placeholder="📘" style="width:80px;text-align:center;font-size:1.2rem;"></div>
    <div class="fg"><label class="fl">TÍTULO</label><input class="fi" id="a-title" placeholder="Nombre del recurso"></div>
    <div class="fg"><label class="fl">DESCRIPCIÓN</label><input class="fi" id="a-desc" placeholder="Breve descripción"></div>
    <div class="fg"><label class="fl">URL (YouTube, PDF directo, etc.)</label><input class="fi" id="a-url" placeholder="https://..."></div>
    <div class="btn-row">
      <button class="btn btn-pri" onclick="addItem()">✅ Agregar</button>
      <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
    </div>
  </div>
</div>

<script>
let curUser=null,isAdmin=false,cfg={},filt='all';
function postCore(t,d={}){window.parent.postMessage({type:t,...d},'*');}
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');clearTimeout(n._t);n._t=setTimeout(()=>n.classList.remove('show'),3000);}
window.addEventListener('message',e=>{
  const d=e.data;if(!d?.type)return;
  if(d.type==='QCOL_CONFIG'){cfg=d;}
  if(d.type==='QCOL_USER_UPDATE'){
    curUser=d.user;isAdmin=curUser?.role==='admin'||curUser?.role==='founder';
    document.getElementById('admin-bar').classList.toggle('show',isAdmin);
    document.querySelectorAll('.card-del').forEach(b=>b.style.display=isAdmin?'block':'none');
  }
});
postCore('QCOL_GET_CONFIG');
function getItems(){return JSON.parse(localStorage.getItem('qcol_library')||'[]');}
function saveItems(i){localStorage.setItem('qcol_library',JSON.stringify(i));}
const TYPE_ICONS={pdf:'📄',video:'🎬',nb:'📓'};
const TYPE_LABELS={pdf:'PDF',video:'VIDEO',nb:'NOTEBOOK'};
const TYPE_CLS={pdf:'t-pdf',video:'t-video',nb:'t-nb'};
function setF(f,el){filt=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));el.classList.add('on');render();}
function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const all=getItems().filter(i=>{
    const mf=filt==='all'||i.type===filt;
    const mq=!q||i.title.toLowerCase().includes(q)||(i.desc||'').toLowerCase().includes(q);
    return mf&&mq;
  });
  const c=document.getElementById('content');
  if(all.length===0){
    c.innerHTML=`<div class="empty"><div class="empty-icon">📚</div>
      <div class="empty-title">${q?'Sin resultados':'Librería vacía'}</div>
      <div class="empty-desc">${q?'Sin recursos con "'+q+'"':isAdmin?'Usa el botón + AGREGAR RECURSO para publicar el primer material.':'El administrador aún no ha publicado contenido en la librería.'}</div>
    </div>`;return;
  }
  c.innerHTML='<div class="grid">'+all.map((item,i)=>{
    const del=isAdmin?`<button class="card-del" style="display:block;" onclick="event.stopPropagation();delItem(${i})">🗑</button>`:'';
    const icon=item.icon||TYPE_ICONS[item.type]||'📄';
    return`<div class="card" onclick="openItem(${i})">
      <span class="card-type-badge ${TYPE_CLS[item.type]||'t-pdf'}">${TYPE_LABELS[item.type]||'PDF'}</span>
      <div class="card-icon">${icon}</div>
      <div class="card-title">${item.title}</div>
      <p class="card-desc">${item.desc||''}</p>
      <button class="card-open" onclick="event.stopPropagation();openItem(${i})">
        ${item.type==='video'?'▶ VER VIDEO':item.type==='nb'?'▶ ABRIR':'📖 VER'}
      </button>
      ${del}
    </div>`;
  }).join('')+'</div>';
}
function openItem(i){
  const items=getItems(),item=items[i];if(!item)return;
  if(item.url){window.open(item.url,'_blank');}
  else{notify('Sin URL configurada para: '+item.title);}
}
function delItem(i){
  if(!isAdmin||!confirm('¿Eliminar?'))return;
  const items=getItems();items.splice(i,1);saveItems(items);render();notify('Eliminado');
}
function openAdd(){document.getElementById('add-modal').classList.add('open');}
function closeAdd(){document.getElementById('add-modal').classList.remove('open');}
function addItem(){
  const type=document.getElementById('a-type').value,icon=document.getElementById('a-icon').value.trim(),title=document.getElementById('a-title').value.trim(),desc=document.getElementById('a-desc').value.trim(),url=document.getElementById('a-url').value.trim();
  if(!title){notify('El título es obligatorio');return;}
  const items=getItems();
  items.push({type,icon:icon||TYPE_ICONS[type],title,desc,url,added:new Date().toLocaleDateString()});
  saveItems(items);closeAdd();notify('✅ Recurso agregado: '+title);render();
  ['a-icon','a-title','a-desc','a-url'].forEach(k=>document.getElementById(k).value='');
}
document.getElementById('add-modal').addEventListener('click',e=>{if(e.target===document.getElementById('add-modal'))closeAdd();});
render();
</script>
</body>
</html>
