<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Quantum Puzzle · Laboratorio de Apps Cuánticas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
    --bg: #010608;
    --s: #071220;
    --s2: #0c1c30;
    --b: #0d2a4a;
    --b2: #1a3a5c;
    --bl: #0088ff;
    --bl2: #00ccff;
    --gr: #00ff88;
    --gd: #ffd700;
    --rd: #ff4466;
    --pu: #c084fc;
    --tx: #ddeeff;
    --mu: #4a7a9b;
    --orb: 'Orbitron', monospace;
    --mono: 'JetBrains Mono', monospace;
    --exo: 'Exo 2', sans-serif;
}
body{
    background: var(--bg);
    color: var(--tx);
    font-family: var(--exo);
    min-height: 100vh;
}
body::before{
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(0,200,255,.05) 0.8px, transparent 0.8px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index:0;
}
.notif{
    position:fixed;
    top:.8rem;
    right:.8rem;
    z-index:1000;
    padding:.6rem 1.2rem;
    background:rgba(4,14,28,.98);
    border-left:3px solid var(--bl2);
    border-radius:10px;
    font-family:var(--orb);
    font-size:.65rem;
    color:var(--bl2);
    backdrop-filter:blur(10px);
    transform:translateX(130%);
    transition:transform .25s;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
}
.notif.show{transform:translateX(0);}
.admin-bar{
    display:none;
    background:rgba(0,20,50,.75);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--gd);
    padding:.6rem 1.5rem;
    font-family:var(--orb);
    font-size:.58rem;
    color:var(--gd);
    align-items:center;
    gap:.8rem;
    z-index:20;
}
.admin-bar.show{display:flex;}
.toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.8rem;
    padding:.9rem 1.5rem;
    background:linear-gradient(135deg, rgba(7,18,32,0.85), rgba(12,28,48,0.9));
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--b);
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:15;
}
.search-box{
    display:flex;
    align-items:center;
    gap:.45rem;
    background:rgba(0,0,0,.45);
    border:1px solid var(--b2);
    border-radius:40px;
    padding:.38rem 1rem;
    flex:1;
    max-width:300px;
}
.search-box input{
    background:transparent;
    border:none;
    color:var(--tx);
    font-size:.78rem;
    outline:none;
    width:100%;
}
.filter-tag{
    display:flex;
    gap:.5rem;
    flex-wrap:wrap;
}
.tag-chip{
    background:transparent;
    border:1px solid var(--b2);
    padding:.28rem .85rem;
    border-radius:40px;
    color:var(--mu);
    font-family:var(--orb);
    font-size:.55rem;
    cursor:pointer;
    transition:all .2s;
}
.tag-chip.active{
    background:linear-gradient(135deg, rgba(0,136,255,0.2), rgba(0,200,255,0.1));
    border-color:var(--bl);
    color:var(--bl2);
}
.btn{
    padding:.4rem .9rem;
    border:none;
    border-radius:40px;
    font-family:var(--orb);
    font-size:.55rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
}
.btn-pri{
    background:linear-gradient(125deg, #0055aa, var(--bl));
    color:white;
}
.btn-pri:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(0,136,255,0.5);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:1.4rem;
    padding:1.8rem;
    max-width:1400px;
    margin:0 auto;
}
.card{
    background:linear-gradient(145deg, var(--s), #081828);
    border:1px solid rgba(0,136,255,0.25);
    border-radius:24px;
    overflow:hidden;
    transition:all 0.3s;
    animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
}
.card:hover{
    border-color:rgba(0,200,255,0.6);
    transform:translateY(-3px);
}
.card-header{
    padding:.9rem 1.2rem;
    background:rgba(0,40,65,0.5);
    border-bottom:1px solid var(--b);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.badge-app{
    background:linear-gradient(95deg, #7c3aed, #c084fc);
    padding:.2rem .65rem;
    border-radius:40px;
    font-family:var(--orb);
    font-size:.5rem;
    font-weight:bold;
    color:#f0e6ff;
}
.card-body{padding:1.1rem 1.2rem 1.2rem;}
.card-title{
    font-family:var(--orb);
    font-size:.85rem;
    font-weight:700;
    letter-spacing:-0.2px;
    color:var(--bl2);
    margin-bottom:.45rem;
}
.card-desc{
    font-size:.7rem;
    color:var(--mu);
    line-height:1.55;
    margin-bottom:.9rem;
}
.card-meta{
    display:flex;
    gap:1rem;
    font-size:.6rem;
    font-family:var(--mono);
    color:#5f8ab0;
    margin-bottom:.9rem;
}
.tags{
    display:flex;
    flex-wrap:wrap;
    gap:.35rem;
    margin-bottom:1rem;
}
.tag{
    background:rgba(100,100,200,0.1);
    border-radius:12px;
    padding:.18rem .6rem;
    font-size:.55rem;
    font-family:var(--mono);
    color:var(--bl2);
}
.card-actions{
    display:flex;
    gap:.6rem;
    margin-top:.5rem;
}
.btn-execute{
    flex:1;
    background:linear-gradient(95deg, rgba(0,136,255,0.2), rgba(0,200,255,0.05));
    border:1px solid rgba(0,136,255,0.5);
    border-radius:40px;
    padding:.55rem 0;
    font-family:var(--orb);
    font-size:.6rem;
    font-weight:bold;
    color:var(--bl2);
    cursor:pointer;
    text-align:center;
}
.btn-execute:hover{
    background:rgba(0,136,255,0.4);
}
.btn-icon{
    background:rgba(255,68,102,0.1);
    border:1px solid rgba(255,68,102,0.3);
    border-radius:40px;
    padding:.5rem .9rem;
    font-size:.6rem;
    cursor:pointer;
    color:#ff99aa;
}
.btn-icon.edit{
    background:rgba(0,255,136,0.08);
    border-color:rgba(0,255,136,0.3);
    color:#aaffcc;
}
.empty-state{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:4rem 1.5rem;
    text-align:center;
}
.empty-icon{font-size:4rem;opacity:0.5;margin-bottom:1rem;}
.empty-title{font-family:var(--orb);font-size:1rem;color:var(--mu);}
.modal-ov{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.96);
    backdrop-filter:blur(8px);
    z-index:500;
    align-items:center;
    justify-content:center;
}
.modal-ov.open{display:flex;}
.modal{
    background:linear-gradient(145deg, #0a1428, #030a14);
    border:1px solid var(--bl);
    border-radius:28px;
    padding:1.8rem;
    width:min(520px, 92vw);
    max-height:90vh;
    overflow-y:auto;
}
.modal-title{
    font-family:var(--orb);
    font-size:.95rem;
    color:var(--bl2);
    margin-bottom:1.4rem;
    border-left:3px solid var(--bl);
    padding-left:.8rem;
}
.fg{margin-bottom:1rem;}
.fl{
    font-family:var(--orb);
    font-size:.52rem;
    letter-spacing:1px;
    color:var(--mu);
    display:block;
    margin-bottom:.3rem;
}
.fi{
    width:100%;
    background:rgba(0,0,0,0.6);
    border:1px solid var(--b2);
    border-radius:14px;
    padding:.6rem .9rem;
    color:var(--tx);
    font-family:var(--exo);
    font-size:.8rem;
    outline:none;
}
.fi:focus{border-color:var(--bl);}
.btn-row{display:flex;gap:.7rem;margin-top:1.2rem;}
.btn-cancel{
    background:transparent;
    border:1px solid var(--b2);
    border-radius:40px;
    padding:.5rem 1rem;
    color:var(--mu);
    font-family:var(--orb);
    cursor:pointer;
}
.pending-grid {
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 0.8rem;
    margin: 0 1rem 1rem 1rem;
}
.pending-title {
    font-family: var(--orb);
    font-size: 0.7rem;
    color: var(--gd);
    margin-bottom: 0.5rem;
}
/* Estilos para el modal del estudio (iframe) */
.studio-modal .modal {
    width: min(1200px, 95vw);
    height: 90vh;
    padding: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.studio-modal .modal-title {
    padding: 0.8rem 1rem;
    margin: 0;
    border-left: none;
    border-bottom: 1px solid var(--b);
}
.studio-iframe {
    flex: 1;
    width: 100%;
    border: none;
    background: #0a0e1a;
}
</style>
</head>
<body>

<div class="notif" id="notifMsg"></div>
<div class="admin-bar" id="adminBar">
    ⚛️ MODO FUNDADOR/ADMIN · GESTIÓN DE APPS
    <button class="btn btn-pri" style="margin-left:auto;" onclick="openPendingManager()">📋 PENDIENTES</button>
    <button class="btn btn-pri" onclick="openQuantumAppStudio()">🎛️ QUANTUM APP STUDIO</button>
</div>

<div class="toolbar">
    <div class="search-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#4a7a9b" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#4a7a9b" stroke-width="2"/></svg>
        <input id="searchInput" placeholder="Buscar app cuántica..." oninput="renderPublishedApps()">
    </div>
    <div class="filter-tag" id="filterTagsContainer"></div>
    <div>
        <button class="btn btn-pri" onclick="openQuantumAppStudio()" style="background: #6d28d9;">🎛️ QUANTUM APP STUDIO</button>
    </div>
</div>

<div id="puzzleGrid"></div>

<!-- MODAL PARA EL STUDIO REAL (iframe) -->
<div class="modal-ov" id="studioModalReal">
    <div class="modal" style="width: min(1200px, 95vw); height: 90vh; padding: 0; display: flex; flex-direction: column;">
        <div class="modal-title" style="padding: 0.8rem 1rem; margin: 0; border-left: none; border-bottom: 1px solid var(--b); display: flex; justify-content: space-between; align-items: center;">
            <span>🌀 QUANTUM APP STUDIO · Editor de aplicaciones cuánticas</span>
            <button class="btn-cancel" onclick="closeStudioModal()" style="margin:0;">CERRAR</button>
        </div>
        <iframe id="studioIframe" class="studio-iframe" src="deepseek_html_20260424_9be28d(1).html" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-same-origin"></iframe>
    </div>
</div>

<!-- MODAL: PENDIENTES (solo admin/founder) -->
<div class="modal-ov" id="pendingModal">
    <div class="modal" style="max-width:680px;">
        <div class="modal-title">📋 APPS PENDIENTES DE APROBACIÓN</div>
        <div id="pendingListContainer" style="max-height: 60vh; overflow-y: auto;"></div>
        <div class="btn-row"><button class="btn-cancel" onclick="closePendingModal()">CERRAR</button></div>
    </div>
</div>

<script>
// ---------- GLOBALS ----------
let currentUser = null;
let isAdmin = false;
let isFounder = false;
let activeTagFilter = "all";
let studioIframeReady = false;

// ----- DATA STORES (repositorio vacío por defecto) -----
function getPublishedApps() {
    const stored = localStorage.getItem('qcol_published_quantum_apps');
    if(stored) return JSON.parse(stored);
    return [];
}
function savePublishedApps(apps) {
    localStorage.setItem('qcol_published_quantum_apps', JSON.stringify(apps));
}
function getPendingApps() {
    const stored = localStorage.getItem('qcol_pending_quantum_apps');
    if(stored) return JSON.parse(stored);
    return [];
}
function savePendingApps(apps) {
    localStorage.setItem('qcol_pending_quantum_apps', JSON.stringify(apps));
}

if(!localStorage.getItem('qcol_published_quantum_apps')) savePublishedApps([]);
if(!localStorage.getItem('qcol_pending_quantum_apps')) savePendingApps([]);

function extractUniqueTags(apps) {
    const tagsSet = new Set();
    apps.forEach(app => {
        (app.tags || '').split(',').forEach(t => { let tt = t.trim().toLowerCase(); if(tt) tagsSet.add(tt); });
    });
    return Array.from(tagsSet);
}

function renderTagFilters() {
    const apps = getPublishedApps();
    const allTags = extractUniqueTags(apps);
    const container = document.getElementById('filterTagsContainer');
    if(!container) return;
    let html = `<span class="tag-chip ${activeTagFilter === 'all' ? 'active' : ''}" data-tag="all" onclick="setTagFilter('all')">🎲 TODAS</span>`;
    allTags.forEach(tag => {
        html += `<span class="tag-chip ${activeTagFilter === tag ? 'active' : ''}" data-tag="${tag}" onclick="setTagFilter('${tag}')">#${tag}</span>`;
    });
    container.innerHTML = html;
}

function setTagFilter(tag) {
    activeTagFilter = tag;
    renderTagFilters();
    renderPublishedApps();
}

function renderPublishedApps() {
    const apps = getPublishedApps();
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || "";
    let filtered = apps.filter(app => {
        const matchSearch = app.title.toLowerCase().includes(searchTerm) || (app.desc || "").toLowerCase().includes(searchTerm) || (app.tags || "").toLowerCase().includes(searchTerm);
        let matchTag = true;
        if(activeTagFilter !== 'all') {
            const appTags = (app.tags || "").toLowerCase().split(',').map(t => t.trim());
            matchTag = appTags.includes(activeTagFilter);
        }
        return matchSearch && matchTag;
    });
    
    const container = document.getElementById('puzzleGrid');
    if(!filtered.length){
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚛️📦</div>
        <div class="empty-title">Repositorio cuántico vacío</div>
        <p style="font-size:0.7rem;color:#4a7a9b;margin-top:0.5rem;">Usa "QUANTUM APP STUDIO" para crear nuevas aplicaciones.<br>Los fundadores/admins pueden publicarlas tras revisión.</p></div>`;
        return;
    }
    
    let gridHtml = `<div class="grid">`;
    filtered.forEach(app => {
        const tagsArray = (app.tags || "").split(',').map(t => t.trim()).filter(t => t);
        const tagsHtml = tagsArray.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');
        const canDelete = isFounder;
        const delBtn = canDelete ? `<button class="btn-icon" onclick="deletePublishedApp('${app.id}')">🗑️</button>` : '';
        gridHtml += `
            <div class="card">
                <div class="card-header"><span class="badge-app">⚛️ APP CUÁNTICA</span></div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(app.title)}</div>
                    <div class="card-desc">${escapeHtml(app.desc || 'Sin descripción')}</div>
                    <div class="card-meta"><span>⏱️ ${app.duration || 8} min</span></div>
                    <div class="tags">${tagsHtml}</div>
                    <div class="card-actions">
                        <button class="btn-execute" onclick="executeQuantumApp('${app.id}')">▶ EJECUTAR PROGRAMA</button>
                        ${delBtn}
                    </div>
                </div>
            </div>
        `;
    });
    gridHtml += `</div>`;
    container.innerHTML = gridHtml;
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

function executeQuantumApp(appId) {
    const apps = getPublishedApps();
    const app = apps.find(a => a.id === appId);
    if(!app) { showNotification('⚠️ App no encontrada'); return; }
    window.parent.postMessage({
        type: "QCOL_LAUNCH_QUANTUM_APP",
        appId: app.id,
        appTitle: app.title,
        appMetadata: { tags: app.tags, description: app.desc, duration: app.duration }
    }, '*');
    // Notificación silenciosa (se puede eliminar si se quiere completamente sin avisos)
    // showNotification(`🌀 Ejecutando ${app.title}...`);
}

// ---------- COMUNICACIÓN DIRECTA CON EL QUANTUM APP STUDIO (iframe) ----------
let studioModal = document.getElementById('studioModalReal');
let studioIframe = document.getElementById('studioIframe');

function openQuantumAppStudio() {
    // Abrir el modal con el iframe del estudio
    studioModal.classList.add('open');
    // Si el iframe aún no se ha cargado, esperar a que envíe el mensaje de ready
    if (!studioIframeReady) {
        // El iframe enviará un mensaje "QCOL_STUDIO_READY" cuando esté listo
        // Nosotros ya tenemos un listener global
    }
}

function closeStudioModal() {
    studioModal.classList.remove('open');
}

// Escuchar mensajes del iframe del estudio
window.addEventListener('message', (e) => {
    const data = e.data;
    if (!data || typeof data !== 'object') return;
    
    // Cuando el estudio está listo, enviarle la solicitud de conexión y también pasarle las apps actuales si se quiere
    if (data.type === 'QCOL_STUDIO_READY' && e.source === studioIframe?.contentWindow) {
        studioIframeReady = true;
        // Enviar mensaje de conexión para que el estudio sepa que está embebido
        studioIframe.contentWindow.postMessage({ type: 'QCOL_REQUEST_STUDIO_CONNECTION', source: 'quantum-puzzle' }, '*');
        // Opcional: enviar lista de apps actuales para que el estudio pueda mostrarlas
        // studioIframe.contentWindow.postMessage({ type: 'QCOL_GET_APPS' }, '*');
    }
    
    // Cuando el estudio guarda una app, actualizar el repositorio del puzzle
    if (data.type === 'QCOL_APP_SAVED' && data.appId) {
        // Recargar las apps del localStorage (el estudio ya las guardó en el mismo localStorage)
        // Pero como el puzzle y el estudio comparten el mismo origen, el localStorage es común.
        // Simplemente refrescamos la vista
        renderTagFilters();
        renderPublishedApps();
        // No mostramos notificación para mantenerlo limpio
    }
    
    // Cuando el estudio elimina una app
    if (data.type === 'QCOL_APP_DELETED' && data.appId) {
        renderTagFilters();
        renderPublishedApps();
    }
    
    // Mensajes desde el padre (QCOL contenedor)
    if(data.type === 'QCOL_USER_UPDATE') {
        currentUser = data.user;
        isAdmin = (currentUser?.role === 'admin' || currentUser?.role === 'founder');
        isFounder = (currentUser?.role === 'founder');
        const adminBar = document.getElementById('adminBar');
        if(adminBar) adminBar.classList.toggle('show', isFounder);
        renderTagFilters();
        renderPublishedApps();
    }
    if(data.type === 'QCOL_CONFIG') {
        // configuración adicional
    }
});

// Inicializar pidiendo la configuración al padre (si existe)
function postCore(type, data={}) {
    if(window.parent !== window) window.parent.postMessage({type, ...data}, '*');
}
postCore('QCOL_GET_CONFIG');

// ---------- FUNCIONES DE ADMINISTRACIÓN (pendientes, eliminación) ----------
function openPendingManager() {
    if(!isFounder && !isAdmin) { showNotification("Acceso solo para fundadores/admins"); return; }
    renderPendingList();
    document.getElementById('pendingModal').classList.add('open');
}
function closePendingModal() {
    document.getElementById('pendingModal').classList.remove('open');
}
function renderPendingList() {
    const pending = getPendingApps();
    const container = document.getElementById('pendingListContainer');
    if(!container) return;
    if(pending.length === 0) {
        container.innerHTML = `<div style="padding:2rem; text-align:center; color:var(--mu);">📭 No hay apps pendientes de aprobación.</div>`;
        return;
    }
    let html = `<div class="pending-grid">`;
    pending.forEach(app => {
        html += `
            <div style="background: #0a1222; border-radius: 16px; margin-bottom: 12px; padding: 12px; border-left: 3px solid var(--gd);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-family:var(--orb); color:var(--bl2);">${escapeHtml(app.title)}</strong>
                    <span style="font-size:0.55rem; background:#1f2a44; padding:2px 8px; border-radius:20px;">${escapeHtml(app.id)}</span>
                </div>
                <div style="font-size:0.6rem; margin:6px 0;">📝 ${escapeHtml(app.desc || '')}</div>
                <div style="font-size:0.55rem; color:#aaa; display:flex; gap:12px; flex-wrap:wrap;">🏷️ ${escapeHtml(app.tags)} | ⏱️ ${app.duration} min | 👤 creado por ${escapeHtml(app.createdBy || 'anon')}</div>
                <div style="margin-top:8px; display:flex; gap:8px;">
                    <button class="btn" style="background: #00aa66; padding:4px 12px;" onclick="publishPendingApp('${app.id}')">✅ PUBLICAR</button>
                    <button class="btn" style="background: #aa3355;" onclick="rejectPendingApp('${app.id}')">🗑️ RECHAZAR</button>
                </div>
            </div>
        `;
    });
    html += `</div>`;
    container.innerHTML = html;
}
function publishPendingApp(appId) {
    const pending = getPendingApps();
    const index = pending.findIndex(p => p.id === appId);
    if(index === -1) return;
    const appToPublish = { ...pending[index] };
    delete appToPublish.status;
    delete appToPublish.createdBy;
    const published = getPublishedApps();
    if(published.find(p => p.id === appToPublish.id)) {
        showNotification("⚠️ Ya existe una app con este ID publicada, elimina la pendiente.");
        return;
    }
    published.push(appToPublish);
    savePublishedApps(published);
    pending.splice(index,1);
    savePendingApps(pending);
    showNotification(`✅ App "${appToPublish.title}" publicada en el repositorio.`);
    renderPendingList();
    renderTagFilters();
    renderPublishedApps();
}
function rejectPendingApp(appId) {
    if(!confirm("Eliminar esta app pendiente permanentemente?")) return;
    let pending = getPendingApps();
    pending = pending.filter(p => p.id !== appId);
    savePendingApps(pending);
    showNotification("App rechazada y eliminada.");
    renderPendingList();
}
function deletePublishedApp(appId) {
    if(!isFounder) { showNotification("Solo fundador puede eliminar apps publicadas"); return; }
    if(!confirm(`Eliminar app del repositorio permanentemente?`)) return;
    let published = getPublishedApps();
    published = published.filter(p => p.id !== appId);
    savePublishedApps(published);
    showNotification("App eliminada del catálogo público.");
    renderTagFilters();
    renderPublishedApps();
}
function showNotification(msg) {
    const n = document.getElementById('notifMsg');
    n.textContent = msg;
    n.classList.add('show');
    if(n._timeout) clearTimeout(n._timeout);
    n._timeout = setTimeout(() => n.classList.remove('show'), 2800);
}

// Inicialización
renderTagFilters();
renderPublishedApps();
document.getElementById('studioModalReal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('studioModalReal')) closeStudioModal(); });
document.getElementById('pendingModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('pendingModal')) closePendingModal(); });
</script>
