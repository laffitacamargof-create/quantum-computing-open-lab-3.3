<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Quantum App Studio · Laboratorio de Apps Cuánticas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=JetBrains+Mono:wght@400;500&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
    --bg: #010608;
    --s: #071220;
    --s2: #0c1c30;
    --b: #0d2a4a;
    --b2: #1a3a5c;
    --bl: #0088ff;
    --bl2: #00ccff;
    --gr: #00ff88;
    --gd: #ffd700;
    --rd: #ff4466;
    --pu: #c084fc;
    --tx: #ddeeff;
    --mu: #4a7a9b;
    --orb: 'Orbitron', monospace;
    --mono: 'JetBrains Mono', monospace;
    --exo: 'Exo 2', sans-serif;
}
body{
    background: var(--bg);
    color: var(--tx);
    font-family: var(--exo);
    min-height: 100vh;
}
body::before{
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(0,200,255,.05) 0.8px, transparent 0.8px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index:0;
}
.notif{
    position:fixed;
    top:.8rem;
    right:.8rem;
    z-index:1000;
    padding:.6rem 1.2rem;
    background:rgba(4,14,28,.98);
    border-left:3px solid var(--bl2);
    border-radius:10px;
    font-family:var(--orb);
    font-size:.65rem;
    color:var(--bl2);
    backdrop-filter:blur(10px);
    transform:translateX(130%);
    transition:transform .25s;
    box-shadow:0 4px 15px rgba(0,0,0,0.5);
}
.notif.show{transform:translateX(0);}
.admin-bar{
    display:none;
    background:rgba(0,20,50,.75);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--gd);
    padding:.6rem 1.5rem;
    font-family:var(--orb);
    font-size:.58rem;
    color:var(--gd);
    align-items:center;
    gap:.8rem;
    z-index:20;
}
.admin-bar.show{display:flex;}
.toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.8rem;
    padding:.9rem 1.5rem;
    background:linear-gradient(135deg, rgba(7,18,32,0.85), rgba(12,28,48,0.9));
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--b);
    flex-wrap:wrap;
    position:sticky;
    top:0;
    z-index:15;
}
.search-box{
    display:flex;
    align-items:center;
    gap:.45rem;
    background:rgba(0,0,0,.45);
    border:1px solid var(--b2);
    border-radius:40px;
    padding:.38rem 1rem;
    flex:1;
    max-width:300px;
}
.search-box input{
    background:transparent;
    border:none;
    color:var(--tx);
    font-size:.78rem;
    outline:none;
    width:100%;
}
.filter-tag{
    display:flex;
    gap:.5rem;
    flex-wrap:wrap;
}
.tag-chip{
    background:transparent;
    border:1px solid var(--b2);
    padding:.28rem .85rem;
    border-radius:40px;
    color:var(--mu);
    font-family:var(--orb);
    font-size:.55rem;
    cursor:pointer;
    transition:all .2s;
}
.tag-chip.active{
    background:linear-gradient(135deg, rgba(0,136,255,0.2), rgba(0,200,255,0.1));
    border-color:var(--bl);
    color:var(--bl2);
}
.btn{
    padding:.4rem .9rem;
    border:none;
    border-radius:40px;
    font-family:var(--orb);
    font-size:.55rem;
    font-weight:600;
    cursor:pointer;
    transition:all .2s;
}
.btn-pri{
    background:linear-gradient(125deg, #0055aa, var(--bl));
    color:white;
}
.btn-pri:hover{
    transform:translateY(-1px);
    box-shadow:0 6px 14px rgba(0,136,255,0.5);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:1.4rem;
    padding:1.8rem;
    max-width:1400px;
    margin:0 auto;
}
.card{
    background:linear-gradient(145deg, var(--s), #081828);
    border:1px solid rgba(0,136,255,0.25);
    border-radius:24px;
    overflow:hidden;
    transition:all 0.3s;
    animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{
    from{opacity:0; transform:translateY(16px);}
    to{opacity:1;transform:translateY(0);}
}
.card:hover{
    border-color:rgba(0,200,255,0.6);
    transform:translateY(-3px);
}
.card-header{
    padding:.9rem 1.2rem;
    background:rgba(0,40,65,0.5);
    border-bottom:1px solid var(--b);
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.badge-app{
    background:linear-gradient(95deg, #7c3aed, #c084fc);
    padding:.2rem .65rem;
    border-radius:40px;
    font-family:var(--orb);
    font-size:.5rem;
    font-weight:bold;
    color:#f0e6ff;
}
.card-body{padding:1.1rem 1.2rem 1.2rem;}
.card-title{
    font-family:var(--orb);
    font-size:.85rem;
    font-weight:700;
    letter-spacing:-0.2px;
    color:var(--bl2);
    margin-bottom:.45rem;
}
.card-desc{
    font-size:.7rem;
    color:var(--mu);
    line-height:1.55;
    margin-bottom:.9rem;
}
.card-meta{
    display:flex;
    gap:1rem;
    font-size:.6rem;
    font-family:var(--mono);
    color:#5f8ab0;
    margin-bottom:.9rem;
}
.tags{
    display:flex;
    flex-wrap:wrap;
    gap:.35rem;
    margin-bottom:1rem;
}
.tag{
    background:rgba(100,100,200,0.1);
    border-radius:12px;
    padding:.18rem .6rem;
    font-size:.55rem;
    font-family:var(--mono);
    color:var(--bl2);
}
.card-actions{
    display:flex;
    gap:.6rem;
    margin-top:.5rem;
}
.btn-execute{
    flex:1;
    background:linear-gradient(95deg, rgba(0,136,255,0.2), rgba(0,200,255,0.05));
    border:1px solid rgba(0,136,255,0.5);
    border-radius:40px;
    padding:.55rem 0;
    font-family:var(--orb);
    font-size:.6rem;
    font-weight:bold;
    color:var(--bl2);
    cursor:pointer;
    text-align:center;
}
.btn-execute:hover{
    background:rgba(0,136,255,0.4);
}
.btn-icon{
    background:rgba(255,68,102,0.1);
    border:1px solid rgba(255,68,102,0.3);
    border-radius:40px;
    padding:.5rem .9rem;
    font-size:.6rem;
    cursor:pointer;
    color:#ff99aa;
}
.btn-icon.edit{
    background:rgba(0,255,136,0.08);
    border-color:rgba(0,255,136,0.3);
    color:#aaffcc;
}
.empty-state{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:4rem 1.5rem;
    text-align:center;
}
.empty-icon{font-size:4rem;opacity:0.5;margin-bottom:1rem;}
.empty-title{font-family:var(--orb);font-size:1rem;color:var(--mu);}
.modal-ov{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.96);
    backdrop-filter:blur(8px);
    z-index:500;
    align-items:center;
    justify-content:center;
}
.modal-ov.open{display:flex;}
.modal{
    background:linear-gradient(145deg, #0a1428, #030a14);
    border:1px solid var(--bl);
    border-radius:28px;
    padding:1.8rem;
    width:min(520px, 92vw);
    max-height:90vh;
    overflow-y:auto;
}
.modal-title{
    font-family:var(--orb);
    font-size:.95rem;
    color:var(--bl2);
    margin-bottom:1.4rem;
    border-left:3px solid var(--bl);
    padding-left:.8rem;
}
.fg{margin-bottom:1rem;}
.fl{
    font-family:var(--orb);
    font-size:.52rem;
    letter-spacing:1px;
    color:var(--mu);
    display:block;
    margin-bottom:.3rem;
}
.fi{
    width:100%;
    background:rgba(0,0,0,0.6);
    border:1px solid var(--b2);
    border-radius:14px;
    padding:.6rem .9rem;
    color:var(--tx);
    font-family:var(--exo);
    font-size:.8rem;
    outline:none;
}
.fi:focus{border-color:var(--bl);}
.btn-row{display:flex;gap:.7rem;margin-top:1.2rem;}
.btn-cancel{
    background:transparent;
    border:1px solid var(--b2);
    border-radius:40px;
    padding:.5rem 1rem;
    color:var(--mu);
    font-family:var(--orb);
    cursor:pointer;
}
.pending-grid {
    background: rgba(0,0,0,0.3);
    border-radius: 20px;
    padding: 0.8rem;
    margin: 0 1rem 1rem 1rem;
}
.pending-title {
    font-family: var(--orb);
    font-size: 0.7rem;
    color: var(--gd);
    margin-bottom: 0.5rem;
}
</style>
</head>
<body>

<div class="notif" id="notifMsg"></div>
<div class="admin-bar" id="adminBar">
    ⚛️ MODO FUNDADOR/ADMIN · GESTIÓN DE APPS
    <button class="btn btn-pri" style="margin-left:auto;" onclick="openPendingManager()">📋 PENDIENTES</button>
    <button class="btn btn-pri" onclick="openStudio(true)">🎛️ QUANTUM APP STUDIO</button>
</div>

<div class="toolbar">
    <div class="search-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="#4a7a9b" stroke-width="2"/><path d="M21 21l-4.35-4.35" stroke="#4a7a9b" stroke-width="2"/></svg>
        <input id="searchInput" placeholder="Buscar app cuántica..." oninput="renderPublishedApps()">
    </div>
    <div class="filter-tag" id="filterTagsContainer"></div>
    <div>
        <button class="btn btn-pri" onclick="openStudio(false)" style="background: #6d28d9;">🎛️ QUANTUM APP STUDIO</button>
    </div>
</div>

<div id="puzzleGrid"></div>

<!-- MODAL: QUANTUM APP STUDIO (crear app, cualquiera puede crear) -->
<div class="modal-ov" id="studioModal">
    <div class="modal">
        <div class="modal-title">🌀 QUANTUM APP STUDIO · Crear programa cuántico</div>
        <div class="fg"><label class="fl">TÍTULO</label><input class="fi" id="studioTitle" placeholder="Ej: Quantum Entanglement Puzzle"></div>
        <div class="fg"><label class="fl">ID ÚNICA (sin espacios)</label><input class="fi" id="studioId" placeholder="quantum_entangler"></div>
        <div class="fg"><label class="fl">DESCRIPCIÓN</label><textarea class="fi" id="studioDesc" rows="2" placeholder="Describe la mecánica cuántica / juego"></textarea></div>
        <div class="fg"><label class="fl">TAGS (separados por coma)</label><input class="fi" id="studioTags" placeholder="entrelazamiento, juego, algoritmo"></div>
        <div class="fg"><label class="fl">DURACIÓN ESTIMADA (min)</label><input class="fi" id="studioDuration" type="number" value="8"></div>
        <div id="adminPublishOption" style="display:none;" class="fg">
            <label class="fl"><input type="checkbox" id="publishNowCheckbox"> PUBLICAR INMEDIATAMENTE (solo fundador/admin)</label>
        </div>
        <div class="btn-row">
            <button class="btn btn-pri" onclick="submitQuantumApp()">📡 ENVIAR APP</button>
            <button class="btn-cancel" onclick="closeStudio()">CANCELAR</button>
        </div>
        <p style="font-size:0.55rem; color:#4a7a9b; margin-top:12px;">* Cualquier usuario puede crear apps. Solo fundadores/admins pueden publicarlas abiertamente.</p>
    </div>
</div>

<!-- MODAL: PENDIENTES (solo admin/founder) -->
<div class="modal-ov" id="pendingModal">
    <div class="modal" style="max-width:680px;">
        <div class="modal-title">📋 APPS PENDIENTES DE APROBACIÓN</div>
        <div id="pendingListContainer" style="max-height: 60vh; overflow-y: auto;"></div>
        <div class="btn-row"><button class="btn-cancel" onclick="closePendingModal()">CERRAR</button></div>
    </div>
</div>

<script>
// ---------- GLOBALS ----------
let currentUser = null;
let isAdmin = false;
let isFounder = false;
let activeTagFilter = "all";

// ----- DATA STORES -----
// publishedApps: array de apps visibles en el grid (solo publicadas)
function getPublishedApps() {
    const stored = localStorage.getItem('qcol_published_quantum_apps');
    if(stored) return JSON.parse(stored);
    return []; // VACÍO, sin apps por defecto
}
function savePublishedApps(apps) {
    localStorage.setItem('qcol_published_quantum_apps', JSON.stringify(apps));
}

// pendingApps: apps creadas por cualquier usuario (esperando aprobación)
function getPendingApps() {
    const stored = localStorage.getItem('qcol_pending_quantum_apps');
    if(stored) return JSON.parse(stored);
    return [];
}
function savePendingApps(apps) {
    localStorage.setItem('qcol_pending_quantum_apps', JSON.stringify(apps));
}

// Inicializar sin datos predefinidos (vacío)
if(!localStorage.getItem('qcol_published_quantum_apps')) {
    savePublishedApps([]);
}
if(!localStorage.getItem('qcol_pending_quantum_apps')) {
    savePendingApps([]);
}

// Helper: tags únicos desde publicadas
function extractUniqueTags(apps) {
    const tagsSet = new Set();
    apps.forEach(app => {
        (app.tags || '').split(',').forEach(t => { let tt = t.trim().toLowerCase(); if(tt) tagsSet.add(tt); });
    });
    return Array.from(tagsSet);
}

function renderTagFilters() {
    const apps = getPublishedApps();
    const allTags = extractUniqueTags(apps);
    const container = document.getElementById('filterTagsContainer');
    if(!container) return;
    let html = `<span class="tag-chip ${activeTagFilter === 'all' ? 'active' : ''}" data-tag="all" onclick="setTagFilter('all')">🎲 TODAS</span>`;
    allTags.forEach(tag => {
        html += `<span class="tag-chip ${activeTagFilter === tag ? 'active' : ''}" data-tag="${tag}" onclick="setTagFilter('${tag}')">#${tag}</span>`;
    });
    container.innerHTML = html;
}

function setTagFilter(tag) {
    activeTagFilter = tag;
    renderTagFilters();
    renderPublishedApps();
}

// Renderizar SOLO apps publicadas
function renderPublishedApps() {
    const apps = getPublishedApps();
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || "";
    let filtered = apps.filter(app => {
        const matchSearch = app.title.toLowerCase().includes(searchTerm) || (app.desc || "").toLowerCase().includes(searchTerm) || (app.tags || "").toLowerCase().includes(searchTerm);
        let matchTag = true;
        if(activeTagFilter !== 'all') {
            const appTags = (app.tags || "").toLowerCase().split(',').map(t => t.trim());
            matchTag = appTags.includes(activeTagFilter);
        }
        return matchSearch && matchTag;
    });
    
    const container = document.getElementById('puzzleGrid');
    if(!filtered.length){
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚛️📦</div>
        <div class="empty-title">Repositorio cuántico vacío</div>
        <p style="font-size:0.7rem;color:#4a7a9b;margin-top:0.5rem;">Usa "QUANTUM APP STUDIO" para crear nuevas aplicaciones.<br>Los fundadores/admins pueden publicarlas tras revisión.</p></div>`;
        return;
    }
    
    let gridHtml = `<div class="grid">`;
    filtered.forEach(app => {
        const tagsArray = (app.tags || "").split(',').map(t => t.trim()).filter(t => t);
        const tagsHtml = tagsArray.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');
        const canDelete = isFounder; // solo fundador puede borrar publicadas
        const delBtn = canDelete ? `<button class="btn-icon" onclick="deletePublishedApp('${app.id}')">🗑️</button>` : '';
        
        gridHtml += `
            <div class="card">
                <div class="card-header">
                    <span class="badge-app">⚛️ APP CUÁNTICA</span>
                </div>
                <div class="card-body">
                    <div class="card-title">${escapeHtml(app.title)}</div>
                    <div class="card-desc">${escapeHtml(app.desc || 'Sin descripción')}</div>
                    <div class="card-meta">
                        <span>⏱️ ${app.duration || 8} min</span>
                        <span>🔖 v${app.version || 1}</span>
                    </div>
                    <div class="tags">${tagsHtml}</div>
                    <div class="card-actions">
                        <button class="btn-execute" onclick="executeQuantumApp('${app.id}')">▶ EJECUTAR PROGRAMA</button>
                        ${delBtn}
                    </div>
                </div>
            </div>
        `;
    });
    gridHtml += `</div>`;
    container.innerHTML = gridHtml;
}

function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if(m === '&') return '&amp;';
        if(m === '<') return '&lt;';
        if(m === '>') return '&gt;';
        return m;
    });
}

// Ejecutar app cuántica real (comunicación con el servidor / core)
function executeQuantumApp(appId) {
    const apps = getPublishedApps();
    const app = apps.find(a => a.id === appId);
    if(!app) { showNotification('⚠️ App no encontrada'); return; }
    
    // Enviar mensaje al padre (Quantum Open Lab) para lanzar el programa cuántico.
    window.parent.postMessage({
        type: "QCOL_LAUNCH_QUANTUM_APP",
        appId: app.id,
        appTitle: app.title,
        appMetadata: {
            tags: app.tags,
            description: app.desc,
            duration: app.duration
        }
    }, '*');
    showNotification(`🌀 Ejecutando ${app.title} en el laboratorio cuántico...`);
}

// ----- QUANTUM APP STUDIO (cualquier usuario) -----
function openStudio(isAdminFlag = false) {
    // siempre abrir el studio para cualquier usuario
    document.getElementById('studioTitle').value = '';
    document.getElementById('studioId').value = '';
    document.getElementById('studioDesc').value = '';
    document.getElementById('studioTags').value = '';
    document.getElementById('studioDuration').value = '8';
    // mostrar opción de publicar solo si es admin/founder
    const publishOpt = document.getElementById('adminPublishOption');
    if(publishOpt) publishOpt.style.display = (isFounder || isAdmin) ? 'block' : 'none';
    document.getElementById('studioModal').classList.add('open');
}
function closeStudio() {
    document.getElementById('studioModal').classList.remove('open');
}

function submitQuantumApp() {
    const title = document.getElementById('studioTitle').value.trim();
    let id = document.getElementById('studioId').value.trim().toLowerCase().replace(/\s+/g, '_');
    const desc = document.getElementById('studioDesc').value.trim();
    let tags = document.getElementById('studioTags').value.trim();
    const duration = parseInt(document.getElementById('studioDuration').value) || 8;
    
    if(!title || !id) { showNotification("Título e ID son obligatorios"); return; }
    // comprobar si ya existe publicada o pendiente con mismo id
    const published = getPublishedApps();
    const pending = getPendingApps();
    if(published.find(a => a.id === id) || pending.find(a => a.id === id)) {
        showNotification("⚠️ Ya existe una app con este ID (publicada o pendiente). Elige otro.");
        return;
    }
    
    const newApp = {
        id: id,
        title: title,
        desc: desc || "App cuántica creada desde Quantum App Studio",
        tags: tags || "cuántica",
        duration: duration,
        createdBy: currentUser?.username || currentUser?.uid || "anonymous",
        createdAt: new Date().toISOString(),
        version: 1
    };
    
    // Si el usuario es fundador/admin y marcó "publicar inmediatamente"
    const publishNow = (isFounder || isAdmin) && document.getElementById('publishNowCheckbox')?.checked === true;
    if(publishNow) {
        const pubApps = getPublishedApps();
        pubApps.push(newApp);
        savePublishedApps(pubApps);
        showNotification(`✅ App "${title}" publicada directamente en el repositorio.`);
        renderTagFilters();
        renderPublishedApps();
    } else {
        // Enviar a pendientes
        const pendingApps = getPendingApps();
        pendingApps.push({ ...newApp, status: "pending" });
        savePendingApps(pendingApps);
        showNotification(`📝 App "${title}" enviada a revisión. Fundador/Admin podrá publicarla.`);
    }
    closeStudio();
}

// ----- ADMIN / FOUNDER: gestión de pendientes -----
function openPendingManager() {
    if(!isFounder && !isAdmin) { showNotification("Acceso solo para fundadores/admins"); return; }
    renderPendingList();
    document.getElementById('pendingModal').classList.add('open');
}
function closePendingModal() {
    document.getElementById('pendingModal').classList.remove('open');
}

function renderPendingList() {
    const pending = getPendingApps();
    const container = document.getElementById('pendingListContainer');
    if(!container) return;
    if(pending.length === 0) {
        container.innerHTML = `<div style="padding:2rem; text-align:center; color:var(--mu);">📭 No hay apps pendientes de aprobación.</div>`;
        return;
    }
    let html = `<div class="pending-grid">`;
    pending.forEach(app => {
        html += `
            <div style="background: #0a1222; border-radius: 16px; margin-bottom: 12px; padding: 12px; border-left: 3px solid var(--gd);">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-family:var(--orb); color:var(--bl2);">${escapeHtml(app.title)}</strong>
                    <span style="font-size:0.55rem; background:#1f2a44; padding:2px 8px; border-radius:20px;">${escapeHtml(app.id)}</span>
                </div>
                <div style="font-size:0.6rem; margin:6px 0;">📝 ${escapeHtml(app.desc || '')}</div>
                <div style="font-size:0.55rem; color:#aaa; display:flex; gap:12px; flex-wrap:wrap;">🏷️ ${escapeHtml(app.tags)} | ⏱️ ${app.duration} min | 👤 creado por ${escapeHtml(app.createdBy || 'anon')}</div>
                <div style="margin-top:8px; display:flex; gap:8px;">
                    <button class="btn" style="background: #00aa66; padding:4px 12px;" onclick="publishPendingApp('${app.id}')">✅ PUBLICAR</button>
                    <button class="btn" style="background: #aa3355;" onclick="rejectPendingApp('${app.id}')">🗑️ RECHAZAR</button>
                </div>
            </div>
        `;
    });
    html += `</div>`;
    container.innerHTML = html;
}

function publishPendingApp(appId) {
    const pending = getPendingApps();
    const index = pending.findIndex(p => p.id === appId);
    if(index === -1) return;
    const appToPublish = { ...pending[index] };
    delete appToPublish.status;
    delete appToPublish.createdBy; // opcional, se mantiene pero no molesta
    const published = getPublishedApps();
    if(published.find(p => p.id === appToPublish.id)) {
        showNotification("⚠️ Ya existe una app con este ID publicada, elimina la pendiente.");
        return;
    }
    published.push(appToPublish);
    savePublishedApps(published);
    // eliminar de pendientes
    pending.splice(index,1);
    savePendingApps(pending);
    showNotification(`✅ App "${appToPublish.title}" publicada en el repositorio.`);
    renderPendingList();
    renderTagFilters();
    renderPublishedApps();
}

function rejectPendingApp(appId) {
    if(!confirm("Eliminar esta app pendiente permanentemente?")) return;
    let pending = getPendingApps();
    pending = pending.filter(p => p.id !== appId);
    savePendingApps(pending);
    showNotification("App rechazada y eliminada.");
    renderPendingList();
}

function deletePublishedApp(appId) {
    if(!isFounder) { showNotification("Solo fundador puede eliminar apps publicadas"); return; }
    if(!confirm(`Eliminar app del repositorio permanentemente?`)) return;
    let published = getPublishedApps();
    published = published.filter(p => p.id !== appId);
    savePublishedApps(published);
    showNotification("App eliminada del catálogo público.");
    renderTagFilters();
    renderPublishedApps();
}

// Notificaciones
function showNotification(msg) {
    const n = document.getElementById('notifMsg');
    n.textContent = msg;
    n.classList.add('show');
    if(n._timeout) clearTimeout(n._timeout);
    n._timeout = setTimeout(() => n.classList.remove('show'), 2800);
}

// ----- Comunicación con el padre para roles (QCOL) -----
function postCore(type, data={}) {
    if(window.parent !== window) window.parent.postMessage({type, ...data}, '*');
}

window.addEventListener('message', (e) => {
    const data = e.data;
    if(!data || !data.type) return;
    if(data.type === 'QCOL_CONFIG') {
        // capturar configuración
    }
    if(data.type === 'QCOL_USER_UPDATE') {
        currentUser = data.user;
        isAdmin = (currentUser?.role === 'admin' || currentUser?.role === 'founder');
        isFounder = (currentUser?.role === 'founder');
        const adminBar = document.getElementById('adminBar');
        if(adminBar) adminBar.classList.toggle('show', isFounder);
        renderTagFilters();
        renderPublishedApps();
    }
});
postCore('QCOL_GET_CONFIG');

// Inicializar
renderTagFilters();
renderPublishedApps();

// Cerrar modales clicks overlay
document.getElementById('studioModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('studioModal')) closeStudio(); });
document.getElementById('pendingModal')?.addEventListener('click', (e) => { if(e.target === document.getElementById('pendingModal')) closePendingModal(); });
</script>
