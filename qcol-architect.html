<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Arquitecto Cuántico</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════
   ARQUITECTO CUÁNTICO — Iconos estándar + click para eliminar
══════════════════════════════════════════════════ */
:root {
  --bg:#0a0e1a; --bg2:#0d1220; --bg3:#111827; --bg4:#060912;
  --p:#0f1626;  --p2:#141e30;  --p3:#1a2640;
  --bd:#1a2a48; --bd2:#1e3058;
  --bl:#0088ff; --bl2:#00aaff; --cy:#00ffdd;
  --gr:#00ff88; --yw:#ffd700;  --rd:#ff4466; --pu:#bd93f9;
  --tx:#dce8ff; --tx2:#8aa0c4; --mu:#3d5a8a; --mu2:#1e2e4a;
  --kw:#ff79c6; --fn:#50fa7b; --st:#f1fa8c;
  --nm:#bd93f9; --cm:#4a5a7a; --cl:#8be9fd;
  --orb:'Orbitron',monospace;
  --mono:'JetBrains Mono',monospace;
  --ex:'Exo 2',sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--tx); font-family:var(--ex); }

.notif {
  position:fixed; top:.6rem; right:.6rem; z-index:9999;
  padding:.45rem .85rem; background:rgba(6,9,18,.97);
  border:1px solid var(--cy); border-radius:7px;
  font-family:var(--orb); font-size:.55rem; color:var(--cy);
  transform:translateX(130%); transition:transform .28s;
  backdrop-filter:blur(20px); max-width:240px; pointer-events:none;
}
.notif.show { transform:translateX(0); }

.titlebar {
  height:32px; display:flex; align-items:center;
  background:#060912; border-bottom:1px solid var(--bd);
  flex-shrink:0; padding:0 .8rem;
}
.tb-brand { display:flex; align-items:center; gap:.5rem; }
.tb-q { display:none; }
.tb-col { display:none; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.badge {
  padding:.2rem .5rem; border-radius:4px;
  font-family:var(--orb); font-size:.5rem;
}
.badge-eng-off { background:rgba(50,70,110,.15); border:1px solid var(--bd2); color:var(--mu); }
.badge-eng-on { background:rgba(0,255,136,.1); border:1px solid var(--gr); color:var(--gr); }
.user-chip {
  display:flex; align-items:center; gap:.3rem;
  padding:.2rem .5rem; background:rgba(0,136,255,.1);
  border:1px solid var(--bl); border-radius:16px;
  font-family:var(--orb); font-size:.5rem; cursor:pointer;
}
.u-dot { width:6px; height:6px; border-radius:50%; background:var(--mu); }
.u-dot.on { background:var(--gr); box-shadow:0 0 4px var(--gr); }

.toolbar {
  height:38px; display:flex; align-items:center; gap:.4rem;
  padding:0 .8rem; background:var(--bg2);
  border-bottom:1px solid var(--bd); flex-shrink:0;
  overflow-x:auto; flex-wrap:wrap;
}
.toolbar::-webkit-scrollbar { display:none; }
.btn-run {
  display:flex; align-items:center; gap:.4rem;
  padding:.25rem .9rem; border:none; border-radius:6px;
  background:linear-gradient(135deg,#003a9e,var(--bl));
  color:#fff; font-family:var(--orb); font-size:.6rem;
  font-weight:700; cursor:pointer;
}
.bsm {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(30,48,88,.5); border:1px solid var(--bd2);
  color:var(--tx2); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.bsm:hover { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.lib-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.lib-btn.on { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.mode-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.mode-btn.on { background:rgba(0,255,221,.1); border-color:var(--cy); color:var(--cy); }
.sep { width:1px; height:20px; background:var(--bd2); margin:0 .1rem; }

.body-layout {
  display:flex; height:calc(100vh - 70px);
  overflow:hidden;
}

.palette {
  width:160px; flex-shrink:0;
  background:var(--p); border-right:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.palette-hdr {
  padding:.4rem .6rem; background:#060912;
  border-bottom:1px solid var(--bd);
  font-family:var(--orb); font-size:.5rem; color:var(--mu);
}
.palette-body { flex:1; overflow-y:auto; padding:.5rem; }
.pal-sec { margin-bottom:.6rem; }
.pal-sec-lbl {
  font-family:var(--orb); font-size:.45rem; color:var(--mu);
  padding:.2rem; border-left:2px solid var(--bd2); margin-bottom:.3rem;
}
.pal-grid { display:grid; grid-template-columns:1fr 1fr; gap:.3rem; }
.pal-gate {
  width:100%; aspect-ratio:1; border-radius:8px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:grab;
  border:1px solid rgba(255,255,255,.1);
  transition:transform .1s;
}
.pal-gate:active { cursor:grabbing; }
.pal-gate:hover { transform:scale(1.05); filter:brightness(1.1); }
.pal-gate-sym { font-family:var(--mono); font-size:.75rem; font-weight:700; }
.pal-gate-lbl { font-family:var(--orb); font-size:.4rem; color:rgba(255,255,255,.6); margin-top:.05rem; }

.center-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.circuit-section {
  flex-shrink:0; height:200px;
  border-bottom:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.circuit-hdr {
  display:flex; align-items:center; gap:.6rem;
  padding:.3rem .7rem; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.circuit-hdr-lbl { font-family:var(--orb); font-size:.5rem; color:var(--cy); }
.qcount-badge {
  font-family:var(--mono); font-size:.5rem;
  padding:.1rem .5rem; background:rgba(0,255,221,.1);
  border:1px solid rgba(0,255,221,.3); border-radius:4px;
  color:var(--cy);
}
.circuit-body {
  flex:1; overflow:auto; padding:.5rem;
  background:var(--bg4);
}
.circuit-body::-webkit-scrollbar { width:8px; height:8px; }
.circuit-body::-webkit-scrollbar-track { background:var(--bg2); border-radius:4px; }
.circuit-body::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:4px; }

.resize-handle-h {
  height:4px; cursor:ns-resize; background:var(--bd);
  flex-shrink:0;
}
.resize-handle-h:hover { background:var(--bl); }
.resize-handle-v {
  width:4px; cursor:ew-resize; background:var(--bd);
  flex-shrink:0;
}
.resize-handle-v:hover { background:var(--bl); }

.code-section {
  flex:1; display:flex; flex-direction:column; min-height:0;
}
.code-hdr {
  display:flex; align-items:center; gap:.5rem;
  padding:.3rem .7rem; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.code-hdr-lbl { font-family:var(--orb); font-size:.5rem; color:var(--mu); }
.code-hdr-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.compiler-status {
  font-family:var(--mono);
  font-size:.45rem;
  padding:.15rem .4rem;
  border-radius:12px;
  background:rgba(0,0,0,.4);
  color:var(--mu);
}
.compiler-status.active { color:var(--gr); border-left:2px solid var(--gr); background:rgba(0,255,136,.1); }
.compiler-status.waiting { color:var(--yw); border-left:2px solid var(--yw); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

.code-wrap { flex:1; position:relative; display:flex; min-height:0; }
.lnums {
  width:35px; flex-shrink:0; padding:.6rem .2rem;
  background:var(--bg4); text-align:right;
  font-family:var(--mono); font-size:.7rem; color:var(--mu2);
  line-height:1.6; overflow:hidden; user-select:none;
  border-right:1px solid var(--bd);
}
.editor-body { flex:1; position:relative; overflow:hidden; }
.syn-lay {
  position:absolute; inset:0; padding:.6rem .8rem;
  font-family:var(--mono); font-size:.7rem; line-height:1.6;
  pointer-events:none; z-index:1; overflow:auto;
  white-space:pre; background:var(--bg4); tab-size:4;
}
.code-ta {
  position:absolute; inset:0;
  background:transparent; color:transparent;
  caret-color:var(--cy);
  padding:.6rem .8rem;
  font-family:var(--mono); font-size:.7rem;
  border:none; outline:none; resize:none;
  line-height:1.6; z-index:2;
  white-space:pre; overflow:auto; tab-size:4;
}
.code-ta::-webkit-scrollbar { width:6px; }
.code-ta::-webkit-scrollbar-thumb { background:var(--bd2); }

.statusbar {
  display:flex; align-items:center; gap:.5rem;
  padding:0 .7rem; height:22px;
  background:#060912; border-top:1px solid var(--bd);
  font-family:var(--mono); font-size:.45rem; color:var(--mu);
  flex-shrink:0;
}
.sb-dot { width:6px; height:6px; border-radius:50%; background:var(--gr); }

.right-panel {
  width:320px; display:flex; flex-direction:column;
  background:var(--p); border-left:1px solid var(--bd);
  flex-shrink:0;
}
.rtabs {
  display:flex; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.rtab {
  flex:1; padding:.4rem .2rem; background:transparent; border:none;
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer; border-bottom:2px solid transparent;
}
.rtab.on { color:var(--bl2); border-bottom-color:var(--bl2); }

.output-panel { flex:1; display:flex; flex-direction:column; min-height:0; }
.out-hdr {
  padding:.3rem .6rem; background:#060912;
  border-bottom:1px solid var(--bd);
  font-family:var(--orb); font-size:.5rem; color:var(--mu);
  flex-shrink:0;
}
.out-body {
  flex:1; padding:.6rem; background:#040810;
  font-family:var(--mono); font-size:.7rem; color:var(--tx2);
  line-height:1.6; overflow-y:auto; white-space:pre-wrap;
}
.out-body::-webkit-scrollbar { width:4px; }
.ok { color:#3fb950; }
.er { color:#f85149; }
.inf { color:#58a6ff; }
.wa { color:#d29922; }
.pb { color:#bc8cff; }
.out-bar {
  padding:.3rem .6rem; background:#060912;
  border-top:1px solid var(--bd);
  display:flex; gap:.3rem; align-items:center;
  flex-shrink:0;
}

.bloch-panel { flex:1; display:flex; flex-direction:column; align-items:center; padding:1rem; gap:1rem; overflow:auto; background:radial-gradient(circle at center, #0a0e1a, #060912); }
.bloch-container { position:relative; width:100%; max-width:280px; margin:0 auto; }
#bloch-canvas { width:100%; aspect-ratio:1; background:radial-gradient(circle at 30% 30%, #0d1424, #040810); border-radius:50%; box-shadow:0 0 30px rgba(0,136,255,0.2); cursor:grab; }
.bloch-q-select { background:var(--bg3); border:1px solid var(--bd2); color:var(--bl2); padding:.2rem .5rem; border-radius:4px; font-family:var(--mono); font-size:.6rem; }
.bloch-info { text-align:center; font-family:var(--mono); font-size:.65rem; color:var(--tx2); background:rgba(0,0,0,.3); padding:.5rem; border-radius:8px; width:100%; }
.gate-btns { display:flex; flex-wrap:wrap; gap:.3rem; justify-content:center; margin-top:.5rem; }
.gb { padding:.25rem .6rem; border:none; border-radius:5px; background:rgba(0,136,255,.2); color:var(--bl2); font-family:var(--orb); font-size:.5rem; cursor:pointer; }

.save-panel { flex:1; overflow-y:auto; padding:.6rem; }
.save-sec { margin-bottom:.8rem; }
.save-title { font-family:var(--orb); font-size:.5rem; color:var(--bl2); margin-bottom:.4rem; }
.fi { width:100%; padding:.3rem .5rem; background:rgba(20,30,50,.7); border:1px solid var(--bd2); color:var(--tx); font-family:var(--mono); font-size:.6rem; border-radius:4px; }
.circ-item { display:flex; align-items:center; gap:.4rem; padding:.3rem .5rem; background:rgba(20,30,50,.5); border:1px solid var(--bd); border-radius:5px; margin-bottom:.2rem; cursor:pointer; }
.circ-item:hover { border-color:var(--bl); background:rgba(0,136,255,.1); }
.ci-name { font-family:var(--mono); font-size:.6rem; color:var(--tx); flex:1; }
.ci-del { background:transparent; border:none; color:var(--rd); cursor:pointer; font-size:.7rem; }

.q-row { display:flex; align-items:center; height:56px; position:relative; }
.q-label { width:40px; text-align:right; padding-right:.5rem; font-family:var(--mono); font-size:.55rem; color:var(--mu); flex-shrink:0; }
.q-wire { flex:1; position:relative; height:56px; min-width:200px; background:transparent; }
.q-wire::before { content:''; position:absolute; left:0; right:0; top:50%; height:2px; background:linear-gradient(90deg, rgba(0,136,255,0.3), rgba(0,136,255,0.1)); transform:translateY(-50%); pointer-events:none; }
.placed-gate { position:absolute; top:50%; transform:translateY(-50%); z-index:5; cursor:pointer; }
.pg-box { width:38px; height:38px; border-radius:6px; display:flex; align-items:center; justify-content:center; border:1.5px solid rgba(255,255,255,.2); }
.pg-sym { font-family:var(--mono); font-size:.8rem; font-weight:700; color:#fff; }
.multi-gate-container, .triple-gate-container { position:absolute; top:0; left:0; z-index:5; cursor:pointer; }
.multi-gate-svg, .triple-gate-svg { cursor:pointer; }

@media(max-width:700px){
  .palette { width:120px; }
  .right-panel { width:280px; }
  .bloch-container { max-width:220px; }
  .code-hdr-lbl { font-size:.45rem; }
  .compiler-status { font-size:.4rem; }
}
@media(max-width:480px){
  .toolbar { gap:.2rem; padding:0 .4rem; }
  .btn-run { padding:.2rem .6rem; font-size:.55rem; }
  .bsm, .lib-btn, .mode-btn { padding:.15rem .35rem; font-size:.45rem; }
}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<div class="titlebar">
  <div class="tb-brand"><span class="tb-q"></span><span class="tb-col"></span></div>
  <div class="tb-right">
    <div class="badge badge-eng-off" id="eng-badge"></div>
    <div class="user-chip" id="user-chip"><div class="u-dot" id="udot"></div><span id="uname"></span></div>
  </div>
</div>

<div class="toolbar">
  <button class="btn-run" id="btn-run">▶ EJECUTAR</button>
  <button class="bsm" id="btn-sync">⟳ SINCRONIZAR</button>
  <button class="bsm" id="btn-clear">🗑 Limpiar</button>
  <div class="sep"></div>
  <button class="bsm" id="btn-addqb">+ Qubit</button>
  <button class="bsm" id="btn-remqb">- Qubit</button>
  <div class="sep"></div>
  <button class="lib-btn on" data-lib="qiskit">Qiskit</button>
  <div class="sep"></div>
  <button class="mode-btn on" data-mode="circ">⚛ Circuito</button>
  <button class="mode-btn" data-mode="code">{ } Código</button>
</div>

<div class="body-layout">
  <div class="palette" id="palette">
    <div class="palette-hdr">🔲 PUERTAS</div>
    <div class="palette-body" id="palette-body"></div>
  </div>

  <div class="center-area">
    <div class="circuit-section" id="circuit-section">
      <div class="circuit-hdr">
        <span class="circuit-hdr-lbl">⚛ CIRCUITO</span>
        <span class="qcount-badge" id="qcount-badge">2 qubits · 0 puertas</span>
      </div>
      <div class="circuit-body" id="circuit-canvas"></div>
    </div>
    <div class="resize-handle-h" id="resize-h"></div>
    <div class="code-section" id="code-section">
      <div class="code-hdr">
        <span class="code-hdr-lbl">{ } EDITOR PYTHON</span>
        <div class="code-hdr-right">
          <span class="compiler-status" id="compiler-status">● SIN COMPILADOR</span>
          <button class="bsm" id="btn-copy" style="padding:.15rem .4rem;">COPIAR</button>
          <button class="bsm" id="btn-clear-code" style="padding:.15rem .4rem;">LIMPIAR</button>
        </div>
      </div>
      <div class="code-wrap">
        <div class="lnums" id="lnums"></div>
        <div class="editor-body">
          <div class="syn-lay" id="syn-lay"></div>
          <textarea class="code-ta" id="code-ta" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="statusbar">
        <div class="sb-dot" id="sb-dot"></div>
        <span id="sb-txt">Listo</span>
        <span id="sb-lib">Qiskit</span>
        <span id="sb-cur" style="margin-left:auto;">Ln 1, Col 1</span>
      </div>
    </div>
  </div>

  <div class="resize-handle-v" id="resize-v"></div>

  <div class="right-panel" id="right-panel">
    <div class="rtabs">
      <button class="rtab on" data-tab="out">📤 OUTPUT</button>
      <button class="rtab" data-tab="bloch">🌐 BLOCH</button>
      <button class="rtab" data-tab="save">💾 GUARDAR</button>
    </div>
    
    <div class="output-panel" id="p-out">
      <div class="out-hdr">TERMINAL</div>
      <div class="out-body" id="out-body"><span class="inf">╔══════════════════════════╗<br>║  Listo                   ║<br>╚══════════════════════════╝<br><br>✅ Listo</span></div>
      <div class="out-bar"><button class="bsm" id="btn-clear-out">LIMPIAR</button><button class="btn-run" id="btn-run2">▶ EJECUTAR</button><span id="out-elapsed" style="margin-left:auto;font-size:.45rem;"></span></div>
    </div>
    
    <div class="bloch-panel" id="p-bloch" style="display:none;">
      <div class="bloch-container">
        <canvas id="bloch-canvas" width="280" height="280"></canvas>
        <div class="bloch-controls"><select id="bloch-q-select" class="bloch-q-select"></select></div>
      </div>
      <div class="bloch-info" id="bloch-info"></div>
      <div class="gate-btns">
        <button class="gb" data-gate="H">H</button><button class="gb" data-gate="X">X</button>
        <button class="gb" data-gate="Y">Y</button><button class="gb" data-gate="Z">Z</button>
        <button class="gb" data-gate="SX">√X</button><button class="gb" data-gate="RX">Rx</button>
        <button class="gb" data-gate="RY">Ry</button><button class="gb" data-gate="RZ">Rz</button>
        <button class="gb rst" data-gate="reset">⟳ RESET</button>
      </div>
    </div>
    
    <div class="save-panel" id="p-save" style="display:none;">
      <div class="save-sec"><div class="save-title">💾 GUARDAR</div><input class="fi" id="save-name" placeholder="nombre_circuito"><button class="bsm" id="btn-save" style="margin-top:.3rem;">Guardar circuito</button><button class="bsm" id="btn-dlpy" style="margin-top:.3rem;">📥 Descargar .py</button><button class="bsm" id="btn-dlnb" style="margin-top:.3rem;">📥 .ipynb</button></div>
      <div class="save-sec" id="queue-sec" style="display:none;"><div class="save-title">⏱ Cola (>10 qubits)</div><div id="queue-list"></div><button class="bsm" id="btn-run-queue" style="margin-top:.3rem;">▶ Ejecutar cola</button></div>
      <div class="save-sec"><div class="save-title">📂 MIS CIRCUITOS</div><div id="circ-list"></div></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// ARQUITECTO CUÁNTICO — Compatible con Qiskit 1.0+ y servidor real
// ═══════════════════════════════════════════════════════════

let circuit = { qubits: 2, gates: [] };
let curLib = 'qiskit';
let curMode = 'circ';
let curUser = null;
let engineURL = '', engineOK = false;
let running = false;
let dragGate = null;
let nextId = 1;
let isUpdatingFromCode = false;
let isUpdatingFromCircuit = false;
let syncTimeout = null;
const ROW_HEIGHT = 56;
const MAX_QUBITS = 20;

let blochStates = {};
let currentBlochQubit = 0;

const GATES = {
  '1q': [
    { id: 'H', sym: 'H', bg: '#1a5fb4', glow:'rgba(26,95,180,.6)', desc: 'Hadamard', code: 'qc.h({q})', regex: /qc\.h\((\d+)\)/ },
    { id: 'X', sym: 'X', bg: '#c01c28', glow:'rgba(192,28,40,.6)', desc: 'Pauli-X', code: 'qc.x({q})', regex: /qc\.x\((\d+)\)/ },
    { id: 'Y', sym: 'Y', bg: '#7a3e99', glow:'rgba(122,62,153,.6)', desc: 'Pauli-Y', code: 'qc.y({q})', regex: /qc\.y\((\d+)\)/ },
    { id: 'Z', sym: 'Z', bg: '#1c71d8', glow:'rgba(28,113,216,.6)', desc: 'Pauli-Z', code: 'qc.z({q})', regex: /qc\.z\((\d+)\)/ },
    { id: 'S', sym: 'S', bg: '#c64600', glow:'rgba(198,70,0,.6)', desc: 'Fase π/2', code: 'qc.s({q})', regex: /qc\.s\((\d+)\)/ },

function onDragStart(e) { dragGate = e.target.closest('.pal-gate')?.dataset.gate; if (dragGate) e.dataTransfer.setData('text/plain', dragGate); }
function onDragEnd() { dragGate = null; }
function onWireDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dh'); }
function onWireDragLeave(e) { e.currentTarget.classList.remove('dh'); }
function onWireDrop(e, qubit) { e.preventDefault(); e.currentTarget.classList.remove('dh'); const gateId = dragGate || e.dataTransfer.getData('text/plain'); if (gateId) placeGate(gateId, qubit); dragGate = null; }

function findGateDef(id) { for (const cat of Object.values(GATES)) { const g = cat.find(g => g.id === id); if (g) return g; } return null; }

function placeGate(gateId, qubit) {
  if (isUpdatingFromCode) return;
  isUpdatingFromCircuit = true;
  const def = findGateDef(gateId);
  if (!def) { isUpdatingFromCircuit = false; return; }
  if (def.triple) {
    if (circuit.qubits < 3) { notify('Necesitas al menos 3 qubits'); isUpdatingFromCircuit = false; return; }
    let qCtrl = qubit;
    let qSwap1 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1;
    let qSwap2 = qubit + 2 < circuit.qubits ? qubit + 2 : qubit - 2;
    if (qSwap1 < 0) qSwap1 = 0;
    if (qSwap2 < 0) qSwap2 = 0;
    if (qCtrl === qSwap1) qSwap1 = (qSwap1 + 1) % circuit.qubits;
    if (qCtrl === qSwap2) qSwap2 = (qSwap2 + 1) % circuit.qubits;
    if (qSwap1 === qSwap2) qSwap2 = (qSwap2 + 1) % circuit.qubits;
    const qs = [qCtrl, qSwap1, qSwap2].sort((a, b) => a - b);
    circuit.gates.push({ id: gateId, q: qs[0], q2: qs[1], q3: qs[2], def: def, uid: nextId++ });
  } else if (def.multi) {
    if (circuit.qubits < 2) { notify('Necesitas al menos 2 qubits'); isUpdatingFromCircuit = false; return; }
    const q2 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1;
    circuit.gates.push({ id: gateId, q: Math.min(qubit, q2), q2: Math.max(qubit, q2), def: def, uid: nextId++ });
  } else {
    circuit.gates.push({ id: gateId, q: qubit, def: def, uid: nextId++ });
  }
  renderCircuit();
  updateCircuitInfo();
  updateCodeFromCircuit();
  isUpdatingFromCircuit = false;
  notify(`${gateId} → q[${qubit}]`);
  if (engineOK && engineURL) setTimeout(() => runCode(), 900);
}

function removeGate(uid) {
  if (isUpdatingFromCode) return;
  isUpdatingFromCircuit = true;
  circuit.gates = circuit.gates.filter(g => g.uid !== uid);
  renderCircuit();
  updateCircuitInfo();
  updateCodeFromCircuit();
  isUpdatingFromCircuit = false;
}

    else if (g.q2 !== undefined) { col = Math.max(depth[g.q], depth[g.q2]); depth[g.q] = col + 1; depth[g.q2] = col + 1; }
    else { col = depth[g.q]; depth[g.q]++; }
    return { ...g, col };

function updateCircuitInfo() {
  const ng = circuit.gates.length;
  document.getElementById('qcount-badge').textContent = `${circuit.qubits} qubits · ${ng} puertas`;
  updateBlochSelector();
  const qs = document.getElementById('queue-sec');
  if (qs) qs.style.display = circuit.qubits > 10 ? 'block' : 'none';
}

function updateBlochSelector() {
  const sel = document.getElementById('bloch-q-select');
  if (!sel) return;
  sel.innerHTML = '';
  for (let i = 0; i < circuit.qubits; i++) {
    let state = blochStates[i] || { theta: 0, phi: 0 };
    let label = state.theta < 0.1 ? '|0⟩' : state.theta > Math.PI - 0.1 ? '|1⟩' : 'sup';
    sel.innerHTML += `<option value="${i}">Qubit ${i} (${label})</option>`;
  }
  if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits - 1;
  if (sel.value !== currentBlochQubit.toString()) sel.value = currentBlochQubit;
}

// ═══════════════════════════════════════════════════════════
// GENERACIÓN DE CÓDIGO COMPATIBLE CON QISKIT 1.0+
// ═══════════════════════════════════════════════════════════
function updateCodeFromCircuit() {
  if (isUpdatingFromCode) return;
  let code = `from qiskit import QuantumCircuit\nimport numpy as np\nfrom qiskit_aer import AerSimulator\n\nqc = QuantumCircuit(${circuit.qubits}, ${circuit.qubits})\n\n`;
  circuit.gates.forEach(g => {
    let line = g.def.code.replace('{q}', g.q).replace('{q2}', g.q2 !== undefined ? g.q2 : 0).replace('{q3}', g.q3 !== undefined ? g.q3 : 0);
    code += line + '\n';
  });
  code += `\nqc.measure(range(${circuit.qubits}), range(${circuit.qubits}))\nprint(qc.draw(output='text'))\n\nsimulator = AerSimulator()\nresult = simulator.run(qc, shots=1024).result()\ncounts = result.get_counts()\nprint("Resultados:", counts)`;
  const ta = document.getElementById('code-ta');
  if (ta && ta.value !== code) { ta.value = code; updateSyntaxHighlight(); }
}

// ══════════════════════════════════════════════════════════════
// PARSER UNIVERSAL — Lee cualquier código Qiskit/Python válido
// ══════════════════════════════════════════════════════════════
function normalizeQiskitCode(code) {
  const circNameMatch = code.match(/(\w+)\s*=\s*QuantumCircuit\s*\(/);
  const circName = circNameMatch ? circNameMatch[1] : 'qc';

  const vars = {};
  const varRe = /^(\w+)\s*=\s*([\d.]+(?:\s*[\+\-\*\/]\s*[\d.]+)*)\s*$/;
  code.split('\n').forEach(line => {
    const m = line.trim().match(varRe);
    if (m && !isNaN(parseFloat(m[2]))) vars[m[1]] = parseFloat(eval(m[2].replace(/\s/g,'')));
  });
  vars['pi'] = Math.PI; vars['np.pi'] = Math.PI;

  const qrMap = {};
  let offset = 0;
  const qrRe = /(\w+)\s*=\s*QuantumRegister\s*\(\s*(\d+|\w+)/g;
  let qrMatch;
  while ((qrMatch = qrRe.exec(code)) !== null) {
    const regName = qrMatch[1];
    const size = parseInt(qrMatch[2]) || (vars[qrMatch[2]] ? parseInt(vars[qrMatch[2]]) : 8);
    qrMap[regName] = offset;
    offset += size;
  }
  if (offset > 0 && offset !== circuit.qubits && offset <= 20) {
    circuit.qubits = offset;
  }

  function resolveQubit(arg) {
    arg = arg.trim();
    if (/^\d+$/.test(arg)) return parseInt(arg);
    if (vars[arg] !== undefined) return Math.floor(vars[arg]);
    const regIdxMatch = arg.match(/^(\w+)\[(.+)\]$/);
    if (regIdxMatch) {
      const regName = regIdxMatch[1];
      const idxExpr = regIdxMatch[2].trim();
      let idx = NaN;
      if (/^\d+$/.test(idxExpr)) idx = parseInt(idxExpr);
      else if (vars[idxExpr] !== undefined) idx = Math.floor(vars[idxExpr]);
      else {
        try {
          const safeExpr = idxExpr.replace(/[a-z_]\w*/gi, match => {
            if (vars[match] !== undefined) return vars[match];
            return 'NaN';
          });
          idx = Math.floor(Function('"use strict"; return (' + safeExpr + ')')());
        } catch(e) { idx = NaN; }
      }
      if (!isNaN(idx) && qrMap[regName] !== undefined) return qrMap[regName] + idx;
      if (!isNaN(idx)) return idx;
    }
    return NaN;
  }

  function expandLoops(lines) {
    const result = [];
    let i = 0;
    while (i < lines.length) {
      const line = lines[i].trim();
      const forMatch = line.match(/^for\s+(\w+)\s+in\s+range\s*\((\d+|\w+)(?:\s*,\s*(\d+|\w+))?(?:\s*,\s*(\d+|\w+))?\s*\)\s*:/);
      if (forMatch) {
        const varName = forMatch[1];
        let start = 0, end = 0, step = 1;
        if (forMatch[3] !== undefined) {
          start = parseInt(forMatch[2]) || parseInt(vars[forMatch[2]]) || 0;
          end   = parseInt(forMatch[3]) || parseInt(vars[forMatch[3]]) || 0;
        } else {
          end = parseInt(forMatch[2]) || parseInt(vars[forMatch[2]]) || 0;
        }
        if (forMatch[4]) step = parseInt(forMatch[4]) || 1;
        const body = [];
        i++;
        while (i < lines.length && (lines[i].startsWith('  ') || lines[i].startsWith('\t') || lines[i].trim() === '')) {
          body.push(lines[i]);
          i++;
        }
        for (let v = start; v < end; v += step) {
          body.forEach(bl => {
            const expanded = bl.replace(new RegExp('\\b' + varName + '\\b', 'g'), v);
            result.push(expanded);
          });
        }
        continue;
      }
      result.push(lines[i]);
      i++;
    }
    return result;
  }

  return { expandLoops, resolveQubit, circName, qrMap, vars };
}

function updateCircuitFromCode() {
  if (isUpdatingFromCircuit) return;
  const code = document.getElementById('code-ta').value;
  const newGates = [];

  const { expandLoops, resolveQubit, circName } = normalizeQiskitCode(code);
  let lines = expandLoops(code.split('\n'));

  lines.forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;

    function tryQ(op, str) {
      const q = resolveQubit(str);
      return isNaN(q) ? null : q;
    }

    // 3-qubit
    const m3 = line.match(/\w+\.(?:ccx|toffoli)\s*\(([^,]+),([^,]+),([^)]+)\)/i) ||
                line.match(/\w+\.append\s*\(MCXGate\(\d+\)\s*,\s*\[([^\]]*)\]/i);
    if (m3) {
      let qs;
      if (line.includes('append')) {
        const qlist = m3[1].split(',').map(s => resolveQubit(s)).filter(q => !isNaN(q));
        if (qlist.length >= 3) qs = [qlist[0], qlist[1], qlist[qlist.length-1]].sort((a,b)=>a-b);
      } else {
        qs = [resolveQubit(m3[1]), resolveQubit(m3[2]), resolveQubit(m3[3])].filter(q=>!isNaN(q)).sort((a,b)=>a-b);
      }
      if (qs && qs.length >= 3 && qs[2] < circuit.qubits) {
        const gDef = GATES['3q'][0];
        newGates.push({ id:'CCX', q:qs[0], q2:qs[1], q3:qs[2], def:gDef, uid:nextId++ });
        return;
      }
    }

    const mcsw = line.match(/\w+\.cswap\s*\(([^,]+),([^,]+),([^)]+)\)/i);
    if (mcsw) {
      const qs = [resolveQubit(mcsw[1]),resolveQubit(mcsw[2]),resolveQubit(mcsw[3])].filter(q=>!isNaN(q)).sort((a,b)=>a-b);
      if (qs.length===3 && qs[2]<circuit.qubits) {
        const gDef = GATES['3q'][1] || GATES['3q'][0];
        newGates.push({id:'CSW',q:qs[0],q2:qs[1],q3:qs[2],def:gDef,uid:nextId++});
        return;
      }
    }

    // 2-qubit
    const g2map = [
      {id:'CX',  re:/\w+\.cx\s*\(([^,]+),([^)]+)\)/i},
      {id:'CZ',  re:/\w+\.cz\s*\(([^,]+),([^)]+)\)/i},
      {id:'SWAP',re:/\w+\.swap\s*\(([^,]+),([^)]+)\)/i},
      {id:'CX',  re:/\w+\.cnot\s*\(([^,]+),([^)]+)\)/i},
      {id:'CZ',  re:/\w+\.cp\s*\([^,]+,\s*([^,]+),([^)]+)\)/i},
      {id:'CX',  re:/\w+\.ch\s*\(([^,]+),([^)]+)\)/i},
      {id:'CX',  re:/\w+\.cy\s*\(([^,]+),([^)]+)\)/i},
    ];
    for (const {id, re} of g2map) {
      const m = line.match(re);
      if (m) {
        const q1 = resolveQubit(m[1]), q2 = resolveQubit(m[2]);
        if (!isNaN(q1) && !isNaN(q2) && q1 !== q2 && Math.max(q1,q2) < circuit.qubits) {
          const gDef = findGateDef(id) || GATES['2q'][0];
          newGates.push({id, q:Math.min(q1,q2), q2:Math.max(q1,q2), def:gDef, uid:nextId++});
          return;
        }
      }
    }

    // 1-qubit
    const g1map = [
      {id:'H',  re:/\w+\.h\s*\(([^)]+)\)/i},
      {id:'X',  re:/\w+\.x\s*\(([^)]+)\)/i},
      {id:'Y',  re:/\w+\.y\s*\(([^)]+)\)/i},
      {id:'Z',  re:/\w+\.z\s*\(([^)]+)\)/i},
      {id:'S',  re:/\w+\.s\s*\(([^)]+)\)/i},
      {id:'T',  re:/\w+\.t\s*\(([^)]+)\)/i},
      {id:'SX', re:/\w+\.sx\s*\(([^)]+)\)/i},
      {id:'RX', re:/\w+\.rx\s*\([^,]+,\s*([^)]+)\)/i},
      {id:'RY', re:/\w+\.ry\s*\([^,]+,\s*([^)]+)\)/i},
      {id:'RZ', re:/\w+\.rz\s*\([^,]+,\s*([^)]+)\)/i},
      {id:'RZ', re:/\w+\.p\s*\([^,]+,\s*([^)]+)\)/i},
      {id:'H',  re:/\w+\.initialize\s*\([^,]+,\s*([^)]+)\)/i},
      {id:'M',  re:/\w+\.measure\s*\(([^,)]+)/i},
    ];
    for (const {id, re} of g1map) {
      const m = line.match(re);
      if (m) {
        const q = resolveQubit(m[1]);
        if (!isNaN(q) && q < circuit.qubits) {
          const gDef = findGateDef(id) || GATES['1q'][0];
          newGates.push({id, q, def:gDef, uid:nextId++});
          return;
        }
      }
    }

    if (/\w+\.measure_all\s*\(\s*\)/.test(line)) {
      const gDef = findGateDef('M') || GATES['meas'][0];
      for (let qi=0; qi<circuit.qubits; qi++)
        newGates.push({id:'M', q:qi, def:gDef, uid:nextId++});
      return;
    }

    const qcMatch = line.match(/\w+\s*=\s*QuantumCircuit\s*\(\s*(\d+|\w+)/);
    if (qcMatch) {
      const n = parseInt(qcMatch[1]) || 2;
      if (n > 0 && n <= 20 && n !== circuit.qubits) {
        circuit.qubits = n;
      }
    }
  });

  const currJSON = JSON.stringify(circuit.gates.map(g => ({ id: g.id, q: g.q, q2: g.q2, q3: g.q3 })));
  const newJSON  = JSON.stringify(newGates.map(g => ({ id: g.id, q: g.q, q2: g.q2, q3: g.q3 })));
  if (currJSON !== newJSON) {
    isUpdatingFromCode = true;
    circuit.gates = newGates;
    renderCircuit();
    updateCircuitInfo();
    isUpdatingFromCode = false;
  }
}

function escapeHtml(str) {
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function highlightSyntax(plainCode) {
  const lines = plainCode.split('\n');
  const resultLines = [];
  const rules = [
    { regex: /(#.*$)/g, color: '#6272a4' },
    { regex: /(".*?"|'.*?')/g, color: '#f1fa8c' },
    { regex: /\b(from|import|def|class|return|if|elif|else|for|while|in|not|and|or|True|False|None|as|print)\b/g, color: '#ff79c6' },
    { regex: /\b(QuantumCircuit|AerSimulator|np|pi)\b/g, color: '#8be9fd' },
    { regex: /\b(\d+)\b/g, color: '#bd93f9' }
  ];
  for (let line of lines) {
    let tokens = [];
    for (const rule of rules) {
      let match;
      rule.regex.lastIndex = 0;
      while ((match = rule.regex.exec(line)) !== null) {
        tokens.push({ start: match.index, end: match.index + match[0].length, color: rule.color, text: match[0] });
      }
    }
    tokens.sort((a, b) => a.start - b.start);
    const uniqueTokens = [];
    let lastEnd = -1;
    for (const token of tokens) {
      if (token.start >= lastEnd) { uniqueTokens.push(token); lastEnd = token.end; }
    }
    let htmlLine = '';
    let pos = 0;
    for (const token of uniqueTokens) {
      if (token.start > pos) htmlLine += escapeHtml(line.substring(pos, token.start));
      htmlLine += `<span style="color:${token.color};">${escapeHtml(token.text)}</span>`;
      pos = token.end;
    }
    if (pos < line.length) htmlLine += escapeHtml(line.substring(pos));
    resultLines.push(htmlLine);
  }
  return resultLines.join('\n');
}

function updateSyntaxHighlight() {

function formatError(errText, code) {
  const lines = code ? code.split('\n') : [];
  let html = '';
  const lineMatch = errText.match(/line[^\d]*(\d+)/i) || errText.match(/línea[^\d]*(\d+)/i);
  const errLine = lineMatch ? parseInt(lineMatch[1]) : null;
  if (errLine && errLine > 0) highlightErrorLine(errLine);
  const typeMatch = errText.match(/(SyntaxError|NameError|TypeError|ValueError|ImportError|AttributeError|IndexError|KeyError|ZeroDivisionError|IndentationError)[:\s]/);
  const errType = typeMatch ? typeMatch[1] : 'Error';
  const explanations = {
    'SyntaxError': '💡 Error de sintaxis — revisa paréntesis, dos puntos o indentación.',
    'NameError': '💡 Variable o función no definida — ¿escribiste bien el nombre?',
    'TypeError': '💡 Tipo incorrecto — estás usando un tipo de dato que no corresponde.',
    'ValueError': '💡 Valor incorrecto — el valor no es válido para esta operación.',
    'ImportError': '💡 No se pudo importar — la librería no está disponible.',
    'IndentationError': '💡 Error de indentación — verifica los espacios al inicio de la línea.',
  };
  const explanation = explanations[errType] || '💡 Revisa el código en la línea indicada.';
  html += `❌ ${errType}` + (errLine ? ` en línea ${errLine}` : '') + '\n';
  if (errLine && lines[errLine - 1]) html += `\n<span class="err-line"><span class="err-arrow">→ L${errLine}:</span> ${escapeHtml(lines[errLine - 1])}</span>\n`;
  const msgLines = errText.split('\n').filter(l => l.trim());
  html += `<span class="err-msg">${escapeHtml(msgLines[msgLines.length - 1] || errText)}</span>\n\n<span class="wa">${explanation}</span>`;
  return html;
}

function highlightErrorLine(lineNum) {
  const ta = document.getElementById('code-ta');
  if (!ta) return;
  const lines = ta.value.split('\n');
  let pos = 0;
  for (let i = 0; i < lineNum - 1 && i < lines.length; i++) pos += lines[i].length + 1;
  ta.focus();
  ta.setSelectionRange(pos, pos + (lines[lineNum - 1] || '').length);
  const lineHeight = parseInt(getComputedStyle(ta).lineHeight) || 19;
  ta.scrollTop = (lineNum - 3) * lineHeight;
  updCur();
}

async function fetchWithRetry(url, options, retries = 3, delay = 30000) {
  let lastError;
  for (let attempt = 1; attempt <= retries; attempt++) {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), delay);
      const res = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timeoutId);
      if (res.ok) return res;
      lastError = new Error(`HTTP ${res.status}`);
      if (attempt < retries) {
        notify(`⏳ Intento ${attempt}/${retries} falló, reintentando en ${delay/1000}s...`);
        await new Promise(r => setTimeout(r, delay));
      }
    } catch (e) {
      lastError = e;
      if (attempt < retries) {
        notify(`⚠️ Timeout/Error (${e.message}) - Reintento ${attempt}/${retries}`);
        await new Promise(r => setTimeout(r, delay));
      }
    }
  }
  throw lastError;
}

async function runCode() {
  if (running) return;
  const code = document.getElementById('code-ta').value.trim();
  if (!code) { notify('Escribe código primero'); return; }
  
  if (!engineOK || !engineURL) {
    notify('❌ No hay compilador configurado. Configura la URL en el panel Fundador.');
    const out = document.getElementById('out-body');
    out.innerHTML = `<span class="er">⚠️ No se ha configurado ningún compilador en la nube.\n\nVe al panel Fundador → 🤗 Compilador HuggingFace y guarda la URL de tu Space.</span>`;
    return;
  }
  
  running = true;
  setRunSt('run', 'Ejecutando...');
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> EJECUTANDO';
  setTab('out');
  const t0 = Date.now();
  const out = document.getElementById('out-body');
  out.innerHTML = `<span class="inf">Enviando código al compilador cuántico (Qiskit 1.0+)...\n</span>`;

  const isHF = engineURL.includes('hf.space') || engineURL.includes('huggingface');
  try {
    let res, d;
    if (isHF) {
      res = await fetchWithRetry(engineURL + '/run/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [code] })
      }, 3, 30000);
      const raw = await res.json();
      d = raw.data ? raw.data[0] : raw;
    } else {
      res = await fetchWithRetry(engineURL + '/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, lib: curLib })
      }, 3, 30000);
      d = await res.json();
    }
    const el = ((Date.now() - t0) / 1000).toFixed(2);
    document.getElementById('out-elapsed').textContent = el + 's';
    if (d.success) {
      out.innerHTML = `<span class="inf">╔════════════════════════════╗\n║  Compilador · ${el}s\n╚════════════════════════════╝\n\n</span><span class="ok">${escapeHtml(d.output)}</span>`;
      if (d.bloch?.probabilities) updateBlochFromProbs(d.bloch.probabilities);
      setRunSt('idle', 'Listo');
      logMonitorRun({ success: true, lib: curLib, qubits: circuit.qubits, time: parseFloat(el) });
    } else {
      out.innerHTML += `<span class="er">${formatError(d.output, code)}</span>`;
      setRunSt('err', 'Error');
    }
  } catch (e) {
    out.innerHTML += `<span class="er">❌ ${e.name === 'AbortError' ? 'Tiempo agotado tras 3 intentos (30s c/u)' : e.message}</span>`;
    setRunSt('err', 'Error');
    engineOK = false;
    document.getElementById('compiler-status').textContent = '● SIN COMPILADOR';
    document.getElementById('compiler-status').classList.remove('active', 'waiting');
  }
  running = false;
  btn.disabled = false;
  btn.innerHTML = '<span>▶</span> EJECUTAR';
  out.scrollTop = out.scrollHeight;
}

function drawBloch() {
  const canvas = document.getElementById('bloch-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  const r = Math.min(w, h) * 0.38;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, w, h);
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,136,255,0.4)';
  ctx.stroke();
  for (let i = 1; i <= 3; i++) {
    const yr = r * Math.sin(i * Math.PI / 4);
    ctx.beginPath();
    ctx.ellipse(cx, cy, yr, yr * 0.35, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(0,136,255,0.15)`;
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(cx - r * 1.1, cy);
  ctx.lineTo(cx + r * 1.1, cy);
  ctx.moveTo(cx, cy - r * 1.1);
  ctx.lineTo(cx, cy + r * 1.1);
  ctx.strokeStyle = 'rgba(0,200,255,0.2)';
  ctx.stroke();
  const state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
  const theta = state.theta, phi = state.phi;
  const x = r * Math.sin(theta) * Math.cos(phi);
  const y = -r * Math.cos(theta);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + x, cy + y);
  ctx.strokeStyle = '#00ffdd';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx + x, cy + y, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#00ffdd';
  ctx.fill();
  ctx.font = '10px monospace';
  ctx.fillStyle = '#8aa0c4';
  ctx.fillText('|0⟩', cx + 5, cy - r - 5);
  ctx.fillText('|1⟩', cx + 5, cy + r + 12);
  ctx.fillText('|+⟩', cx + r + 10, cy);
  const prob0 = Math.cos(theta / 2) ** 2, prob1 = Math.sin(theta / 2) ** 2;
  document.getElementById('bloch-info').innerHTML = `<span>Qubit ${currentBlochQubit}</span><br>θ=${Math.round(theta * 180 / Math.PI)}° φ=${Math.round(phi * 180 / Math.PI)}°<br>P0=${(prob0 * 100).toFixed(1)}% P1=${(prob1 * 100).toFixed(1)}%`;
}

function updateBlochFromProbs(probs) {
  const n = circuit.qubits;
  for (let qi = 0; qi < n; qi++) {
    let p0 = 0;
    Object.entries(probs).forEach(([s, p]) => {
      const bit = s.length > qi ? s[s.length - 1 - qi] : '0';
      if (bit === '0') p0 += p;
    });
    const th = 2 * Math.acos(Math.min(1, Math.sqrt(Math.max(0, p0))));
    blochStates[qi] = { theta: th, phi: blochStates[qi]?.phi || 0 };
    if (qi === currentBlochQubit) drawBloch();
  }
  updateBlochSelector();
}

function applyBlochGate(gate) {
  let state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
  switch (gate) {
    case 'H': state.theta = Math.PI / 2; state.phi = 0; break;
    case 'X': state.theta = Math.PI - state.theta; break;
    case 'Y': state.theta = Math.PI - state.theta; state.phi = (state.phi + Math.PI) % (2 * Math.PI); break;
    case 'Z': state.phi = (state.phi + Math.PI) % (2 * Math.PI); break;
    case 'SX': state.theta = Math.PI / 2; state.phi = 0; break;
    case 'RX': state.theta = Math.PI / 4; state.phi = 0; break;
    case 'RY': state.theta = Math.PI / 4; state.phi = Math.PI / 2; break;
    case 'RZ': state.phi = (state.phi + Math.PI / 4) % (2 * Math.PI); break;
    case 'reset': state.theta = 0; state.phi = 0; break;
  }
  blochStates[currentBlochQubit] = state;
  drawBloch();
  updateBlochSelector();
}

function addQubit() { if (circuit.qubits < MAX_QUBITS) { circuit.qubits++; if (!blochStates[circuit.qubits - 1]) blochStates[circuit.qubits - 1] = { theta: 0, phi: 0 }; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } else notify(`Máximo ${MAX_QUBITS} qubits`); }
function removeQubit() { if (circuit.qubits > 1) { circuit.gates = circuit.gates.filter(g => g.q < circuit.qubits - 1 && (!g.q2 || g.q2 < circuit.qubits - 1) && (!g.q3 || g.q3 < circuit.qubits - 1)); circuit.qubits--; if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits - 1; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } }
function clearCircuit() { circuit.gates = []; for (let i = 0; i < circuit.qubits; i++) blochStates[i] = { theta: 0, phi: 0 }; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); drawBloch(); notify('Circuito limpiado'); }

  a.download = name.replace(/\.ipynb$/, '') + '.ipynb';
  a.click();
  URL.revokeObjectURL(a.href);
  notify('📥 Descargado .ipynb');
}

function saveAndSchedule() {
  if (!curUser) { notify('Inicia sesión para usar la cola'); return; }
  const name = document.getElementById('save-name').value.trim() || 'circuito_' + Date.now();
  const code = document.getElementById('code-ta').value;
  const key = 'qcol_queue_' + curUser.username;
  const queue = JSON.parse(localStorage.getItem(key) || '[]');
  queue.push({ name, code, lib: curLib, circ: JSON.stringify(circuit), added: new Date().toLocaleString(), status: 'pendiente' });
  localStorage.setItem(key, JSON.stringify(queue.slice(0, 50)));
  renderQueue();
  notify('⏱ "' + name + '" añadido a la cola');
  setTab('save');
}

function renderQueue() {
  const el = document.getElementById('queue-list');
  if (!el) return;
  if (!curUser) { el.innerHTML = '<div style="color:var(--mu);">Inicia sesión para usar la cola</div>'; return; }
  const key = 'qcol_queue_' + curUser.username;
  const queue = JSON.parse(localStorage.getItem(key) || '[]');
  if (queue.length === 0) { el.innerHTML = '<div style="color:var(--mu);">Sin circuitos en cola</div>'; return; }
  el.innerHTML = queue.map((c, i) => `<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem .5rem;background:rgba(0,0,0,.2);border:1px solid var(--bd);border-radius:6px;margin-bottom:.2rem;"><span style="flex:1;">${c.name}</span><span style="font-size:.45rem;color:${c.status === 'completado' ? 'var(--gr)' : c.status === 'error' ? 'var(--rd)' : 'var(--yw)'};">${c.status}</span><button class="ci-del" onclick="removeFromQueue(${i})">✕</button></div>`).join('');
}

async function runQueue() {
  if (!curUser) { notify('Inicia sesión primero'); return; }
  const key = 'qcol_queue_' + curUser.username;
  const queue = JSON.parse(localStorage.getItem(key) || '[]');
  const pending = queue.filter(c => c.status === 'pendiente');
  if (pending.length === 0) { notify('Sin circuitos pendientes'); return; }
  notify('▶ Ejecutando cola: ' + pending.length + ' circuito(s)...', 5000);
  for (let i = 0; i < queue.length; i++) {
    if (queue[i].status !== 'pendiente') continue;
    queue[i].status = 'ejecutando';
    localStorage.setItem(key, JSON.stringify(queue));
    renderQueue();
    document.getElementById('code-ta').value = queue[i].code;
    document.getElementById('save-name').value = queue[i].name;
    onCodeEdit();
    await runCode();
    queue[i].status = 'completado';
    localStorage.setItem(key, JSON.stringify(queue));
    renderQueue();
    await new Promise(r => setTimeout(r, 500));
  }
  notify('✅ Cola completada');
}

function removeFromQueue(i) {
  if (!curUser) return;
  const key = 'qcol_queue_' + curUser.username;
  const queue = JSON.parse(localStorage.getItem(key) || '[]');
  queue.splice(i, 1);
  localStorage.setItem(key, JSON.stringify(queue));
  renderQueue();
}

function setTab(tab) {
  document.querySelectorAll('.rtab').forEach(btn => btn.classList.toggle('on', btn.dataset.tab === tab));
  document.getElementById('p-out').style.display = tab === 'out' ? 'flex' : 'none';
  document.getElementById('p-bloch').style.display = tab === 'bloch' ? 'flex' : 'none';
  document.getElementById('p-save').style.display = tab === 'save' ? 'flex' : 'none';
  if (tab === 'bloch') setTimeout(drawBloch, 50);
  if (tab === 'save') { renderSaveList(); renderQueue(); }
}

function setMode(mode) {
  curMode = mode;
  const cs = document.getElementById('circuit-section'), pal = document.getElementById('palette'), rh = document.getElementById('resize-h');
  if (mode === 'circ') { cs.style.display = 'flex'; pal.style.display = 'flex'; if (rh) rh.style.display = 'flex'; }
  else { cs.style.display = 'none'; pal.style.display = 'none'; if (rh) rh.style.display = 'none'; }
  document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('on', btn.dataset.mode === mode));
}

function setLib(lib) { curLib = lib; document.querySelectorAll('.lib-btn').forEach(btn => btn.classList.toggle('on', btn.dataset.lib === lib)); updateCodeFromCircuit(); notify('Librería: ' + lib); }

function notify(msg, dur = 2000) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(n._t);
  n._t = setTimeout(() => n.classList.remove('show'), dur);
}

let resizingH = false, startY, startHeight;
let resizingV = false, startX, startWidth;

function initResize() {
  const resizeH = document.getElementById('resize-h');
  const resizeV = document.getElementById('resize-v');
  const circuitSec = document.getElementById('circuit-section');
  const rightPanel = document.getElementById('right-panel');
  if (resizeH) resizeH.onmousedown = (e) => { resizingH = true; startY = e.clientY; startHeight = circuitSec.offsetHeight; document.body.style.cursor = 'ns-resize'; e.preventDefault(); };
  if (resizeV) resizeV.onmousedown = (e) => { resizingV = true; startX = e.clientX; startWidth = rightPanel.offsetWidth; document.body.style.cursor = 'ew-resize'; e.preventDefault(); };
  document.onmousemove = (e) => {
    if (resizingH) { let nh = startHeight + (e.clientY - startY); if (nh > 80 && nh < window.innerHeight * 0.7) circuitSec.style.height = nh + 'px'; }
    if (resizingV) { let nw = startWidth + (startX - e.clientX); if (nw > 200 && nw < window.innerWidth * 0.4) rightPanel.style.width = nw + 'px'; }
  };
  document.onmouseup = () => { resizingH = false; resizingV = false; document.body.style.cursor = ''; };
}

function init() {
  for (let i = 0; i < circuit.qubits; i++) blochStates[i] = { theta: 0, phi: 0 };
  buildPalette();
  renderCircuit();
  updateCircuitInfo();
  updateCodeFromCircuit();
  initResize();

  document.getElementById('btn-run').onclick = runCode;
  document.getElementById('btn-run2').onclick = runCode;
  document.getElementById('btn-sync').onclick = forceSync;
  document.getElementById('btn-clear').onclick = clearCircuit;
  document.getElementById('btn-clear-code').onclick = clearCode;
  document.getElementById('btn-addqb').onclick = addQubit;
  document.getElementById('btn-remqb').onclick = removeQubit;
  document.getElementById('btn-copy').onclick = copyCode;
  document.getElementById('btn-clear-out').onclick = () => document.getElementById('out-body').innerHTML = '<span class="inf">Terminal limpiada</span>';
  document.getElementById('btn-save').onclick = saveCircuit;
  document.getElementById('btn-dlpy').onclick = dlPy;
  document.getElementById('btn-dlnb').onclick = dlNb;
  document.getElementById('btn-run-queue').onclick = runQueue;

  document.querySelectorAll('.lib-btn').forEach(btn => btn.onclick = () => setLib(btn.dataset.lib));
  document.querySelectorAll('.mode-btn').forEach(btn => btn.onclick = () => setMode(btn.dataset.mode));
  document.querySelectorAll('.rtab').forEach(btn => btn.onclick = () => setTab(btn.dataset.tab));
  document.querySelectorAll('.gb').forEach(btn => btn.onclick = () => applyBlochGate(btn.dataset.gate));

  document.getElementById('bloch-q-select').onchange = (e) => { currentBlochQubit = parseInt(e.target.value); drawBloch(); };

  const ta = document.getElementById('code-ta');
  ta.onscroll = onCodeScroll;
  ta.oninput = onCodeEdit;
  ta.onkeyup = updCur;
  ta.onclick = updCur;
  ta.onkeydown = (e) => {
    if (e.key === 'Tab') { e.preventDefault(); const s = ta.selectionStart; ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd); ta.selectionStart = ta.selectionEnd = s + 4; onCodeEdit(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveCircuit(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault(); runCode(); }
  };

  drawBloch();
  renderSaveList();
  renderQueue();
}

window.onDragStart = onDragStart;
window.onDragEnd = onDragEnd;
window.onWireDragOver = onWireDragOver;
window.onWireDragLeave = onWireDragLeave;
window.onWireDrop = onWireDrop;
window.removeGate = removeGate;
window.loadCircuit = loadCircuit;
window.deleteCircuit = deleteCircuit;
window.removeFromQueue = removeFromQueue;

// ECOSISTEMA — Comunicación con index.html
// ══════════════════════════════════════════════════
function postCore(type, data={}) {
  try { window.parent.postMessage({type, ...data}, '*'); } catch(e) {}
}

async function checkEngine() {
  if (!engineURL) return;
  engineURL = engineURL.trim().replace(/\/+$/, '');
  const badge = document.getElementById('eng-badge');
  const status = document.getElementById('compiler-status');
  const setStatus = (txt, cls) => {
    if (badge) { badge.textContent = txt; badge.className = 'badge ' + cls; }
    if (status) { status.textContent = txt; status.className = 'compiler-status ' + (cls==='badge-on'?'active':'waiting'); }
  };
  setStatus('⏳ Conectando...', 'badge-warn');
  notify('🔄 Conectando al compilador...', 4000);

  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      setStatus(`⏳ Intento ${attempt}/3...`, 'badge-warn');
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 30000);
      const res = await fetch(engineURL + '/health/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: [''] }),
        signal: controller.signal
      });
      clearTimeout(tid);
      if (res.ok) {
        const raw = await res.json();
        const d = raw.data ? raw.data[0] : raw;
        engineOK = true;
        setStatus('● COMPILADOR ACTIVO', 'badge-on');
        const libs = (d.libs || []).slice(0,4).join(', ');
        notify('✅ Compilador conectado' + (libs ? ' · ' + libs : ''));
        postCore('QCOL_SAVE', {key:'qcol_colab_url', val:engineURL});
        return;
      }
      throw new Error('HTTP ' + res.status);
    } catch(e) {
      if (e.name === 'AbortError') {
        notify(`⏱ Intento ${attempt}/3: timeout 30s`);
      } else {
        notify(`⚠️ Intento ${attempt}/3: ${e.message}`);
      }
      if (attempt < 3) await new Promise(r => setTimeout(r, 4000));
    }
  }
  engineOK = false;
  setStatus('● SIN COMPILADOR', 'badge-off');
  notify('❌ No se pudo conectar después de 3 intentos');
}

window.addEventListener('message', e => {
  const d = e.data || {};
  if (d.type === 'QCOL_USER') {
    curUser = d.user;
    const pill = document.getElementById('user-pill');
    if (pill && curUser) {
      const role = curUser.role || 'guest';
      const ico = role==='founder'?'👑 ':role==='admin'?'🔑 ':'';
      pill.textContent = ico + (curUser.name||curUser.username||'—').split(' ')[0];
      const dot = document.getElementById('udot');
      if (dot) { dot.className = 'u-dot on'; }
    }
    renderSaveList();
  }
  if (d.type === 'QCOL_CONFIG' || d.type === 'QCOL_CONFIG_UPDATED') {
    const url = localStorage.getItem('qcol_colab_url') || '';
    if (url && url !== engineURL) { engineURL = url; checkEngine(); }
  }
  if (d.type === 'QCOL_USER_UPDATE') {
    curUser = d.user; renderSaveList();
  }
});

// Al cargar: pedir usuario y config del ecosistema
postCore('QCOL_GET_USER');
postCore('QCOL_GET_CONFIG');
setTimeout(() => {
  const stored = localStorage.getItem('qcol_cur_user');
  if (stored && !curUser) { try { curUser = JSON.parse(stored); renderSaveList(); } catch(e){} }
  const url = localStorage.getItem('qcol_colab_url') || '';
  if (url) { engineURL = url; checkEngine(); }
}, 800);

init();
