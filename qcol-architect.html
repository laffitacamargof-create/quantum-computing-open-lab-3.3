function drawBloch() {
    const canvas = document.getElementById('bloch-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w / 2, cy = h / 2;
    const r = Math.min(w, h) * 0.38;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, w, h);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.strokeStyle = 'rgba(0,136,255,0.4)'; ctx.stroke();
    for (let i = 1; i <= 3; i++) {
        const yr = r * Math.sin(i * Math.PI/4);
        ctx.beginPath(); ctx.ellipse(cx, cy, yr, yr*0.35, 0, 0, Math.PI*2); ctx.strokeStyle = `rgba(0,136,255,0.15)`; ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(cx - r*1.1, cy); ctx.lineTo(cx + r*1.1, cy); ctx.moveTo(cx, cy - r*1.1); ctx.lineTo(cx, cy + r*1.1); ctx.strokeStyle = 'rgba(0,200,255,0.2)'; ctx.stroke();
    const state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
    const theta = state.theta, phi = state.phi;
    const x = r * Math.sin(theta) * Math.cos(phi);
    const y = -r * Math.cos(theta);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + x, cy + y); ctx.strokeStyle = '#00ffdd'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + x, cy + y, 6, 0, Math.PI*2); ctx.fillStyle = '#00ffdd'; ctx.fill();
    ctx.font = '10px monospace'; ctx.fillStyle = '#8aa0c4';
    ctx.fillText('|0⟩', cx+5, cy-r-5); ctx.fillText('|1⟩', cx+5, cy+r+12); ctx.fillText('|+⟩', cx+r+10, cy);
    const prob0 = Math.cos(theta/2)**2, prob1 = Math.sin(theta/2)**2;
    document.getElementById('bloch-info').innerHTML = `<span>Qubit ${currentBlochQubit}</span><br>θ=${Math.round(theta*180/Math.PI)}° φ=${Math.round(phi*180/Math.PI)}°<br>P0=${(prob0*100).toFixed(1)}% P1=${(prob1*100).toFixed(1)}%`;
}

function updateBlochFromProbs(probs) {
    const n = circuit.qubits;
    for (let qi = 0; qi < n; qi++) {
        let p0 = 0;
        Object.entries(probs).forEach(([s, p]) => {
            const bit = s.length > qi ? s[s.length - 1 - qi] : '0';
            if (bit === '0') p0 += p;
        });
        const th = 2 * Math.acos(Math.min(1, Math.sqrt(Math.max(0, p0))));
        blochStates[qi] = { theta: th, phi: blochStates[qi]?.phi || 0 };
        if (qi === currentBlochQubit) drawBloch();
    }
    updateBlochSelector();
}

function applyBlochGate(gate) {
    let state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
    switch (gate) {
        case 'H': state.theta = Math.PI/2; state.phi = 0; break;
        case 'X': state.theta = Math.PI - state.theta; break;
        case 'Y': state.theta = Math.PI - state.theta; state.phi = (state.phi + Math.PI) % (2*Math.PI); break;
        case 'Z': state.phi = (state.phi + Math.PI) % (2*Math.PI); break;
        case 'SX': state.theta = Math.PI/2; state.phi = 0; break;
        case 'RX': state.theta = Math.PI/4; state.phi = 0; break;
        case 'RY': state.theta = Math.PI/4; state.phi = Math.PI/2; break;
        case 'RZ': state.phi = (state.phi + Math.PI/4) % (2*Math.PI); break;
        case 'reset': state.theta = 0; state.phi = 0; break;
    }
    blochStates[currentBlochQubit] = state;
    drawBloch();
    updateBlochSelector();
}

function addQubit() { if (circuit.qubits < MAX_QUBITS) { circuit.qubits++; if (!blochStates[circuit.qubits-1]) blochStates[circuit.qubits-1] = { theta: 0, phi: 0 }; initWireLibs(); renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } else notify(`Máximo ${MAX_QUBITS} qubits`); }
function removeQubit() { if (circuit.qubits > 1) { circuit.gates = circuit.gates.filter(g => g.q < circuit.qubits-1 && (!g.q2 || g.q2 < circuit.qubits-1) && (!g.q3 || g.q3 < circuit.qubits-1)); circuit.qubits--; if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits-1; initWireLibs(); if (selectedWire >= circuit.qubits) selectedWire = -1; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } }

        localStorage.setItem(key, JSON.stringify(queue));

        queue[i].status = 'completado';

        await new Promise(r => setTimeout(r, 500));

    // Usa syncFromServer (que ya existe en el arquitecto) si hay motor disponible
    // o intenta parsear localmente con normalizeQiskitCode
    const ta = document.getElementById('code-ta');
    const code = ta ? ta.value.trim() : '';
    if(!code) return;
    if(engineOK && engineURL){
        syncFromServer('from-notebook').catch(e=>console.warn('sync failed',e));
    } else {
        // Sin motor: intentar parsear con normalizeQiskitCode si existe
        if(typeof normalizeQiskitCode === 'function'){
            try{
                const nc = normalizeQiskitCode(code);
                if(nc && nc.gates){ circuit.gates=nc.gates; circuit.qubits=nc.qubits||circuit.qubits; renderCircuit(); updateCircuitInfo(); }
            } catch(e){ console.warn('parse failed',e); }
        }
    }
}

function returnToNotebook(){
    if(!_notebookMode || !_notebookCellId){
        // No estamos en modo edición — comportamiento normal (ir al home)
        postCore('QCOL_NAV', {screen:'home'});
        return;
    }
    // Obtener código actual del editor
    const ta   = document.getElementById('code-ta');
    const code = ta ? ta.value.trim() : '';
    // Serializar la estructura interna del circuito
    // Incluir def simplificado (solo lo necesario para dibujar)
    const circuitData = {
        qubits: circuit.qubits,
        gates:  circuit.gates.map(g => ({
            id:  g.id,
            q:   g.q,
            q2:  g.q2,
            q3:  g.q3,
            uid: g.uid,
            def: {
                bg:   g.def?.bg   || '#1a4a8a',
                sym:  g.def?.sym  || g.id || '?',
                code: g.def?.code || ''
            }
        }))
    };
    // Enviar al notebook
    window.parent.postMessage({
        type:        'QCOL_CIRCUIT_RETURN',
        cellId:       _notebookCellId,
        code:         code,
        circuitData:  circuitData
    }, '*');
    notify('⚛ Circuito guardado — volviendo al Notebook...');
    // Pequeño delay para que el mensaje llegue antes de navegar
    setTimeout(()=>{ postCore('QCOL_NAV', {screen:'architect-pro'}); }, 400);
}

async function checkEngine() {
    if (!engineURL) return;
    engineURL = engineURL.trim().replace(/\/+$/, '');
    const badge = document.getElementById('eng-badge');
    const status = document.getElementById('compiler-status');
    const setStatus = (txt, cls) => {
        if (badge) { badge.textContent = txt; badge.className = 'badge ' + cls; }
        if (status) { status.textContent = txt; status.className = 'compiler-status ' + (cls==='badge-on'?'active':'waiting'); }
    };
    setStatus('⏳ Conectando...', 'badge-warn');
    notify('🔄 Conectando al compilador...', 4000);

    for (let attempt = 1; attempt <= 3; attempt++) {
        try {
            setStatus(`⏳ Intento ${attempt}/3...`, 'badge-warn');
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), 30000);
            const res = await fetch(engineURL + '/health/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [''] }),
                signal: controller.signal
            });
            clearTimeout(tid);
            if (res.ok) {
                const raw = await res.json();
                const d = raw.data ? raw.data[0] : raw;
                engineOK = true;
                setStatus('● COMPILADOR ACTIVO', 'badge-on');
                const libs = (d.libs || []).slice(0,4).join(', ');
                notify('✅ Compilador conectado' + (libs ? ' · ' + libs : ''));
                postCore('QCOL_SAVE', {key:'qcol_colab_url', val:engineURL});
                return;
            }
            throw new Error('HTTP ' + res.status);
        } catch(e) {
            if (e.name === 'AbortError') {
                notify(`⏱ Intento ${attempt}/3: timeout 30s`);
            } else {
                notify(`⚠️ Intento ${attempt}/3: ${e.message}`);
            }
            if (attempt < 3) await new Promise(r => setTimeout(r, 4000));
        }
    }
    engineOK = false;
    setStatus('● SIN COMPILADOR', 'badge-off');
    notify('❌ No se pudo conectar después de 3 intentos');
}

window.addEventListener('message', e => {
    const d = e.data || {};

    // ── NOTEBOOK envía celda circuit para editar ──────────────
    if(d.type === 'QCOL_OPEN_ARCHITECT_EDIT'){
        _notebookCellId = d.cellId || null;
        _notebookMode   = true;
        // Mostrar botón ← GUARDAR Y VOLVER
        const btnBack = document.getElementById('btn-back-nb');
        const sepBack = document.getElementById('sep-back-nb');
        if(btnBack){ btnBack.style.display=''; }
        if(sepBack){ sepBack.style.display=''; }
        // Si viene con código, cargarlo en el editor
        if(d.code && d.code.trim()){
            const ta = document.getElementById('code-ta');
            if(ta){
                ta.value = d.code;
                onCodeEdit(); // actualiza highlight y circuito
                updateCircuitFromCode();
            }
        } else if(d.circuitData && d.circuitData.gates){
            // Si no hay código pero sí estructura, reconstruir circuito
            circuit.qubits = d.circuitData.qubits || 2;
            circuit.gates  = d.circuitData.gates  || [];
            if (!circuit.wireLibs) circuit.wireLibs = [];
            if (d.circuitData.wireLibs) circuit.wireLibs = d.circuitData.wireLibs;
            initWireLibs();
            circuit.gates.forEach(g => { if (!g.lib) g.lib = curLib; });
            renderCircuit();
            updateCircuitInfo();
            updateCodeFromCircuit();
        } else {
            // Celda vacía — limpiar y empezar fresco
            clearCircuit();
        }
        notify('⚛ Editando celda del Notebook — presiona ← GUARDAR Y VOLVER al terminar');
        return;
    }

    if (d.type === 'QCOL_USER') {
        curUser = d.user;
        const pill = document.getElementById('user-pill');
        if (pill && curUser) {
            const role = curUser.role || 'guest';
            const ico = role==='founder'?'👑 ':role==='admin'?'🔑 ':'';
            pill.textContent = ico + (curUser.name||curUser.username||'—').split(' ')[0];
            const dot = document.getElementById('udot');
            if (dot) { dot.className = 'u-dot on'; }
        }
        renderSaveList();
    }
    if (d.type === 'QCOL_CONFIG' || d.type === 'QCOL_CONFIG_UPDATED') {
        const url = localStorage.getItem('qcol_colab_url') || '';
        if (url && url !== engineURL) { engineURL = url; checkEngine(); }
    }
    if (d.type === 'QCOL_USER_UPDATE') {
        curUser = d.user; renderSaveList();
    }
});

postCore('QCOL_GET_USER');
postCore('QCOL_GET_CONFIG');
setTimeout(() => {
    const stored = localStorage.getItem('qcol_cur_user');
    if (stored && !curUser) { try { curUser = JSON.parse(stored); renderSaveList(); } catch(e){} }
    const url = localStorage.getItem('qcol_colab_url') || '';
    if (url) { engineURL = url; checkEngine(); }
}, 800);

init();
</script>
