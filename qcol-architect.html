<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Arquitecto Cuántico</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
:root {
  --bg:#0a0e1a; --bg2:#0d1220; --bg3:#111827; --bg4:#060912;
  --p:#0f1626;  --p2:#141e30;  --p3:#1a2640;
  --bd:#1a2a48; --bd2:#1e3058;
  --bl:#0088ff; --bl2:#00aaff; --cy:#00ffdd;
  --gr:#00ff88; --yw:#ffd700;  --rd:#ff4466; --pu:#bd93f9;
  --tx:#dce8ff; --tx2:#8aa0c4; --mu:#3d5a8a; --mu2:#1e2e4a;
  --kw:#ff79c6; --fn:#50fa7b; --st:#f1fa8c;
  --nm:#bd93f9; --cm:#4a5a7a; --cl:#8be9fd;
  --orb:'Orbitron',monospace;
  --mono:'JetBrains Mono',monospace;
  --ex:'Exo 2',sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--tx); font-family:var(--ex); }

.notif {
  position:fixed; top:.6rem; right:.6rem; z-index:9999;
  padding:.45rem .85rem; background:rgba(6,9,18,.97);
  border:1px solid var(--cy); border-radius:7px;
  font-family:var(--orb); font-size:.55rem; color:var(--cy);
  transform:translateX(130%); transition:transform .28s;
  backdrop-filter:blur(20px); max-width:240px; pointer-events:none;
}
.notif.show { transform:translateX(0); }

.titlebar {
  height:32px; display:flex; align-items:center;
  background:#060912; border-bottom:1px solid var(--bd);
  flex-shrink:0; padding:0 .8rem;
}
.tb-brand { display:flex; align-items:center; gap:.5rem; }
.tb-q { display:none; }
.tb-col { display:none; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.badge {
  padding:.2rem .5rem; border-radius:4px;
  font-family:var(--orb); font-size:.5rem;
}
.badge-eng-off { background:rgba(50,70,110,.15); border:1px solid var(--bd2); color:var(--mu); }
.badge-eng-on { background:rgba(0,255,136,.1); border:1px solid var(--gr); color:var(--gr); }
.user-chip {
  display:flex; align-items:center; gap:.3rem;
  padding:.2rem .5rem; background:rgba(0,136,255,.1);
  border:1px solid var(--bl); border-radius:16px;
  font-family:var(--orb); font-size:.5rem; cursor:pointer;
}
.u-dot { width:6px; height:6px; border-radius:50%; background:var(--mu); }
.u-dot.on { background:var(--gr); }

.toolbar {
  height:38px; display:flex; align-items:center; gap:.4rem;
  padding:0 .8rem; background:var(--bg2);
  border-bottom:1px solid var(--bd); flex-shrink:0;
  overflow-x:auto; flex-wrap:wrap;
}
.toolbar::-webkit-scrollbar { display:none; }
.btn-run {
  display:flex; align-items:center; gap:.4rem;
  padding:.25rem .9rem; border:none; border-radius:6px;
  background:linear-gradient(135deg,#003a9e,var(--bl));
  color:#fff; font-family:var(--orb); font-size:.6rem;
  font-weight:700; cursor:pointer;
}
.btn-parse {
  background:linear-gradient(135deg,#8b5cf6,var(--pu));
}
.bsm {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(30,48,88,.5); border:1px solid var(--bd2);
  color:var(--tx2); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.bsm:hover { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.lib-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.lib-btn.on { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.mode-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.mode-btn.on { background:rgba(0,255,221,.1); border-color:var(--cy); color:var(--cy); }
.sep { width:1px; height:20px; background:var(--bd2); margin:0 .1rem; }

.body-layout {
  display:flex; height:calc(100vh - 70px);
  overflow:hidden;
}

.palette {
  width:160px; flex-shrink:0;
  background:var(--p); border-right:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.palette-hdr {
  padding:.4rem .6rem; background:#060912;
  border-bottom:1px solid var(--bd);
  font-family:var(--orb); font-size:.5rem; color:var(--mu);
}
.palette-body { flex:1; overflow-y:auto; padding:.5rem; }
.pal-sec { margin-bottom:.6rem; }
.pal-sec-lbl {
  font-family:var(--orb); font-size:.45rem; color:var(--mu);
  padding:.2rem; border-left:2px solid var(--bd2); margin-bottom:.3rem;
}
.pal-grid { display:grid; grid-template-columns:1fr 1fr; gap:.3rem; }
.pal-gate {
  width:100%; aspect-ratio:1; border-radius:8px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:grab;
  border:1px solid rgba(255,255,255,.1);
  transition:transform .1s;
}
.pal-gate:active { cursor:grabbing; }
.pal-gate:hover { transform:scale(1.05); filter:brightness(1.1); }
.pal-gate-sym { font-family:var(--mono); font-size:.75rem; font-weight:700; }
.pal-gate-lbl { font-family:var(--orb); font-size:.4rem; color:rgba(255,255,255,.6); margin-top:.05rem; }

.center-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.circuit-section {
  flex-shrink:0; height:200px;
  border-bottom:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.circuit-hdr {
  display:flex; align-items:center; gap:.6rem;
  padding:.3rem .7rem; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.circuit-hdr-lbl { font-family:var(--orb); font-size:.5rem; color:var(--cy); }
.qcount-badge {
  font-family:var(--mono); font-size:.5rem;
  padding:.1rem .5rem; background:rgba(0,255,221,.1);
  border:1px solid rgba(0,255,221,.3); border-radius:4px;
  color:var(--cy);
}
.circuit-body {
  flex:1; overflow:auto; padding:.5rem;
  background:var(--bg4);
}
.circuit-body::-webkit-scrollbar { width:8px; height:8px; }
.circuit-body::-webkit-scrollbar-track { background:var(--bg2); border-radius:4px; }
.circuit-body::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:4px; }

.resize-handle-h {
  height:4px; cursor:ns-resize; background:var(--bd);
  flex-shrink:0;
}
.resize-handle-h:hover { background:var(--bl); }
.resize-handle-v {
  width:4px; cursor:ew-resize; background:var(--bd);

.resize-handle-v:hover { background:var(--bl); }

.code-hdr-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.compiler-status {
  font-family:var(--mono);
  font-size:.45rem;
  padding:.15rem .4rem;
  border-radius:12px;
  background:rgba(0,0,0,.4);
  color:var(--mu);
}
.compiler-status.active { color:var(--gr); border-left:2px solid var(--gr); background:rgba(0,255,136,.1); }
.compiler-status.waiting { color:var(--yw); border-left:2px solid var(--yw); animation:pulse 1.5s infinite; }

.code-wrap { flex:1; position:relative; display:flex; min-height:0; }
.lnums {

.code-ta {

  background:transparent; color:transparent;
  caret-color:var(--cy);

  font-family:var(--mono); font-size:.7rem;

.ok { color:#3fb950; }
.er { color:#f85149; }
.inf { color:#58a6ff; }
.wa { color:#d29922; }
.out-bar {
  padding:.3rem .6rem; background:#060912;
  border-top:1px solid var(--bd);
  display:flex; gap:.3rem; align-items:center;
  flex-shrink:0;

#bloch-canvas { width:100%; aspect-ratio:1; background:radial-gradient(circle at 30% 30%, #0d1424, #040810); border-radius:50%; box-shadow:0 0 30px rgba(0,136,255,0.2); }
.bloch-q-select { background:var(--bg3); border:1px solid var(--bd2); color:var(--bl2); padding:.2rem .5rem; border-radius:4px; font-family:var(--mono); font-size:.6rem; }

.gate-btns { display:flex; flex-wrap:wrap; gap:.3rem; justify-content:center; margin-top:.5rem; }

.ci-del { background:transparent; border:none; color:var(--rd); cursor:pointer; font-size:.7rem; }

.q-row { display:flex; align-items:center; height:56px; position:relative; }
.q-label { width:40px; text-align:right; padding-right:.5rem; font-family:var(--mono); font-size:.55rem; color:var(--mu); flex-shrink:0; }

.placed-gate { position:absolute; top:50%; transform:translateY(-50%); z-index:5; cursor:pointer; }
.pg-box { width:38px; height:38px; border-radius:6px; display:flex; align-items:center; justify-content:center; border:1.5px solid rgba(255,255,255,.2); background:#0088ff; }

@media(max-width:700px){
  .palette { width:120px; }
  .right-panel { width:280px; }
  .bloch-container { max-width:220px; }
}
</style>

<script>
// ═══════════════════════════════════════════════════════════
// ARQUITECTO CUÁNTICO — Con Pyodide (ejecución real de Python)
// Módulo qiskit mock UNIVERSAL + scipy DINÁMICO (acepta cualquier importación)
// ═══════════════════════════════════════════════════════════

let circuit = { qubits: 2, gates: [] };
let curLib = 'qiskit';
let curMode = 'circ';
let curUser = null;
let engineURL = '', engineOK = false;
let running = false;
let aiCfg = {};        // Config de AI (provider, apiKey, model)
let aiFixing = false;  // Prevenir llamadas simultáneas
let dragGate = null;
let nextId = 1;
let isUpdatingFromCircuit = false;
let isUpdatingFromCode = false;
let syncTimeout = null;
const ROW_HEIGHT = 56;
const MAX_QUBITS = 20;

let blochStates = {};
let currentBlochQubit = 0;

let pyodide = null;
let pyodideLoading = false;

// ═══════════════════════════════════════════════════════════
// MOCK DE QISKIT UNIVERSAL + SCIPY DINÁMICO
// ═══════════════════════════════════════════════════════════
const QISKIT_MOCK_CODE = `
import sys, types

# ── 1. DynamicModule ──────────────────────────────────────
class DynamicModule(types.ModuleType):
    """Módulo que acepta cualquier atributo y devuelve un stub."""
    def __getattr__(self, name):
        if name.startswith('_'):
            raise AttributeError(name)
        class Stub:
            def __init__(self, *args, **kwargs):
                self.name = name
            def __call__(self, *args, **kwargs):
                return Stub(name)
            def __getattr__(self, attr):
                return Stub(f"{name}.{attr}")
        setattr(self, name, Stub)
        return Stub

# ── 2. Import hook universal para qiskit.* ────────────────
def _create_dynamic_module(fullname):
    if fullname in sys.modules:
        return sys.modules[fullname]
    mod = DynamicModule(fullname)
    sys.modules[fullname] = mod
    parent, _, child = fullname.rpartition('.')
    if parent and parent in sys.modules:
        setattr(sys.modules[parent], child, mod)
    return mod

class QiskitMetaFinder:
    def find_spec(self, fullname, path, target=None):
        if not fullname.startswith('qiskit.'):
            return None
        if fullname in sys.modules:
            return None
        _create_dynamic_module(fullname)
        return None

sys.meta_path.insert(0, QiskitMetaFinder())

# ── 3. Módulo raíz qiskit como DynamicModule ──────────────
qiskit_mod = DynamicModule('qiskit')
sys.modules['qiskit'] = qiskit_mod

# Aseguramos que los submódulos que definiremos más adelante se creen como DynamicModule
for _sub in ['qiskit.circuit.library', 'qiskit.providers.aer', 'qiskit.visualization', 'qiskit.extensions']:
    if _sub not in sys.modules:
        sys.modules[_sub] = DynamicModule(_sub)

# ── 4. Clases reales (QuantumRegister, ClassicalRegister, QuantumCircuit) ──
class QuantumRegister:
    def __init__(self, size, name=None):
        self.size = int(size)
        self.name = name or 'q'
    def __getitem__(self, idx):
        if isinstance(idx, int): return idx
        try: return int(idx)
        except: return 0
    def __len__(self): return self.size
    def __iter__(self): return iter(range(self.size))

class ClassicalRegister:
    def __init__(self, size, name=None):
        self.size = int(size)
        self.name = name or 'c'
    def __getitem__(self, idx):
        if isinstance(idx, int): return idx
        try: return int(idx)
        except: return 0
    def __len__(self): return self.size
    def __iter__(self): return iter(range(self.size))

class Operation:
    __slots__ = ('name', 'qubits', 'params')
    def __init__(self, name, qubits, params=None):
        self.name = name
        self.qubits = qubits
        self.params = params or []

class QuantumCircuit:
    def __init__(self, *args):
        self.data = []
        self.num_qubits = 2
        self.num_clbits = 0
        try:
            if len(args) == 0:
                self.num_qubits = 2
            elif len(args) == 1:
                a = args[0]
                if isinstance(a, int): self.num_qubits = a
                elif hasattr(a, 'size'): self.num_qubits = a.size
            elif len(args) >= 2:
                a0, a1 = args[0], args[1]
                if isinstance(a0, int) and isinstance(a1, int):
                    self.num_qubits, self.num_clbits = a0, a1
                elif hasattr(a0, 'size') and hasattr(a1, 'size'):
                    self.num_qubits = a0.size
                    self.num_clbits = a1.size
                elif isinstance(a0, int):
                    self.num_qubits = a0
                    if hasattr(a1, 'size'): self.num_clbits = a1.size
                    elif isinstance(a1, int): self.num_clbits = a1
        except Exception:
            self.num_qubits = 2
        self.qubits = self.num_qubits
        self.n_qubits = self.num_qubits

    def _to_int(self, q):
        if isinstance(q, int): return q
        if isinstance(q, bool): return int(q)
        if isinstance(q, float): return int(q)
        try: return int(q)
        except: return 0

    def _expand(self, qubits):
        clean = []
        for q in qubits:
            if isinstance(q, range):
                clean.extend(list(q))
            elif isinstance(q, (list, tuple)):
                for sq in q:
                    if isinstance(sq, range): clean.extend(list(sq))
                    else:
                        try: clean.append(self._to_int(sq))
                        except: pass
            else:
                try: clean.append(self._to_int(q))
                except: pass
        return clean

    def _add(self, name, qubits, params=None):
        clean = self._expand(qubits)
        if clean:
            op = Operation(name, clean, params or [])
            self.data.append(op)
        return self

    # Puertas 1-qubit
    def h(self, q): return self._add('h', [q])
    def x(self, q): return self._add('x', [q])
    def y(self, q): return self._add('y', [q])
    def z(self, q): return self._add('z', [q])
    def s(self, q): return self._add('s', [q])
    def sdg(self, q): return self._add('sdg', [q])
    def t(self, q): return self._add('t', [q])
    def tdg(self, q): return self._add('tdg', [q])
    def sx(self, q): return self._add('sx', [q])
    def id(self, q): return self._add('id', [q])
    def rx(self, theta, q): return self._add('rx', [q], [theta])
    def ry(self, theta, q): return self._add('ry', [q], [theta])
    def rz(self, theta, q): return self._add('rz', [q], [theta])
    def p(self, theta, q): return self._add('p', [q], [theta])
    def u(self, t, p, l, q): return self._add('u', [q], [t,p,l])
    def u1(self, theta, q): return self._add('u1', [q], [theta])
    def u2(self, phi, lam, q): return self._add('u2', [q], [phi,lam])
    def u3(self, t, p, l, q): return self._add('u3', [q], [t,p,l])
    def initialize(self, sv, q): return self._add('h', [q])
    def reset(self, q): return self._add('reset', [q])

    # Puertas 2-qubit
    def cx(self, c, t): return self._add('cx', [c,t])
    def cnot(self, c, t): return self._add('cx', [c,t])
    def cz(self, c, t): return self._add('cz', [c,t])
    def cy(self, c, t): return self._add('cy', [c,t])
    def ch(self, c, t): return self._add('ch', [c,t])
    def swap(self, a, b): return self._add('swap', [a,b])
    def iswap(self, a, b): return self._add('swap', [a,b])
    def cp(self, theta, c, t): return self._add('cp', [c,t], [theta])
    def crx(self, theta, c, t): return self._add('crx', [c,t], [theta])
    def cry(self, theta, c, t): return self._add('cry', [c,t], [theta])
    def crz(self, theta, c, t): return self._add('crz', [c,t], [theta])
    def cu(self, t,p,l,g,c,tgt): return self._add('cu', [c,tgt], [t,p,l])

    # Puertas 3-qubit
    def ccx(self, a, b, t): return self._add('ccx', [a,b,t])
    def toffoli(self, a, b, t): return self._add('ccx', [a,b,t])
    def cswap(self, a, b, t): return self._add('cswap', [a,b,t])
    def fredkin(self, a, b, t): return self._add('cswap', [a,b,t])
    def ccz(self, a, b, t): return self._add('ccz', [a,b,t])

    # Multi-control
    def mcx(self, controls, target, ancilla=None):
        qs = (list(controls) if hasattr(controls,'__iter__') else [controls]) + [target]
        return self._add('mcx', qs)
    def mct(self, controls, target, ancilla=None):
        return self.mcx(controls, target, ancilla)
    def append(self, gate, qubits, clbits=None):
        name = getattr(gate, 'name', 'unknown')
        return self._add(name, list(qubits) if hasattr(qubits,'__iter__') else [qubits])

    # Medición
    def measure(self, q, c):
        qs = list(q) if hasattr(q,'__iter__') and not isinstance(q,int) else [q]
        cs = list(c) if hasattr(c,'__iter__') and not isinstance(c,int) else [c]
        for qi, ci in zip(qs, cs):
            self._add('measure', [qi], [ci])
        return self
    def measure_all(self):
        for i in range(self.num_qubits):
            self._add('measure', [i], [i])
        return self

    # Utilidades
    def barrier(self, *args): return self
    def delay(self, dt, q, unit='dt'): return self
    def compose(self, other, qubits=None, **kw): return self
    def inverse(self): return self
    def draw(self, output='text', **kw):
        return f"QuantumCircuit({self.num_qubits}q, {self.num_clbits}c) - {len(self.data)} ops"
    def depth(self): return len(self.data)
    def size(self): return len(self.data)
    def num_parameters(self): return 0
    def copy(self):
        import copy; return copy.deepcopy(self)

class _ScipyModule(types.ModuleType):
    """Módulo scipy universal — nunca lanza ImportError ni AttributeError."""
    _stub = _UniversalStub()

    def __getattr__(self, name):
        # NO lanzar AttributeError para nombres especiales (_path_, _spec_, etc.)
        # Python los necesita internamente para el sistema de importación
        stub = _UniversalStub()

// Funciones de resaltado de sintaxis (texto plano -> HTML) - igual que antes
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

const SYNTAX_RULES = [
    { regex: /#.*$/gm, type: 'comment' },
    { regex: /"""[\s\S]*?"""/g, type: 'string' },
    { regex: /'''[\s\S]*?'''/g, type: 'string' },
    { regex: /"(?:\\.|[^"\\])*"/g, type: 'string' },
    { regex: /'(?:\\.|[^'\\])*'/g, type: 'string' },
    { regex: /\b\d+(?:\.\d+)?(?:[eE][+-]?\d+)?\b/g, type: 'number' },
    { regex: /\b(and|or|not|if|elif|else|for|while|break|continue|import|from|as|def|class|return|yield|try|except|finally|raise|with|assert|lambda|pass|del|global|nonlocal|is|in|None|True|False)\b/g, type: 'keyword' },
    { regex: /\b(print|len|range|type|isinstance|map|filter|zip|enumerate|sum|min|max|sorted|open)\b/g, type: 'builtin' },
    { regex: /\b(qiskit|QuantumCircuit|QuantumRegister|ClassicalRegister|AerSimulator|transpile|plot_histogram|MCXGate|QFT|GroverOperator|execute|np|numpy|random|math|scipy)\b/g, type: 'qiskit' },
    { regex: /\b([a-zA-Z_][a-zA-Z0-9_]*)\s*(?=\()/g, type: 'function' },
];

const COLOR_MAP = {
    'keyword': '#ff79c6', 'string': '#f1fa8c', 'comment': '#6272a4',
    'number': '#bd93f9', 'qiskit': '#50fa7b', 'builtin': '#8be9fd',
    'function': '#ffb86c'
};

function tokenizeLine(line, rules) {
    const tokens = [];
    for (const rule of rules) {
        let match;
        rule.regex.lastIndex = 0;
        while ((match = rule.regex.exec(line)) !== null) {
            tokens.push({ start: match.index, end: match.index + match[0].length, type: rule.type });
        }
    }
    tokens.sort((a, b) => { if (a.start !== b.start) return a.start - b.start; return b.end - a.end; });
    const filtered = []; let lastEnd = -1;
    for (const token of tokens) {
        if (token.start >= lastEnd) { filtered.push(token); lastEnd = token.end; }
    }
    return filtered;
}

function lineToHtml(line, tokens) {
    let pos = 0, html = '';
    for (const token of tokens) {
        if (token.start > pos) html += escapeHtml(line.substring(pos, token.start));
        const fragment = line.substring(token.start, token.end);
        const color = COLOR_MAP[token.type] || '#ffffff';
        html += `<span style="color:${color};">${escapeHtml(fragment)}</span>`;
        pos = token.end;
    }
    if (pos < line.length) html += escapeHtml(line.substring(pos));
    return html;
}

function updateSyntaxHighlight() {
    const ta = document.getElementById('code-ta');
    const syn = document.getElementById('syn-lay');
    const lnums = document.getElementById('lnums');
    if (!ta || !syn) return;
    const lines = ta.value.split('\n');
    if (lnums) lnums.innerHTML = lines.map((_, i) => `<div>${i + 1}</div>`).join('');
    const highlighted = lines.map(line => lineToHtml(line, tokenizeLine(line, SYNTAX_RULES))).join('\n');
    syn.innerHTML = highlighted + '\n';
    syn.scrollTop = ta.scrollTop;
    syn.scrollLeft = ta.scrollLeft;
}

function onWireDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dh'); }
function onWireDragLeave(e) { e.currentTarget.classList.remove('dh'); }
function onWireDrop(e, qubit) { e.preventDefault(); e.currentTarget.classList.remove('dh'); const gateId = dragGate || e.dataTransfer.getData('text/plain'); if (gateId) placeGate(gateId, qubit); dragGate = null; }

function findGateDef(id) { for (const cat of Object.values(GATES)) { const g = cat.find(g => g.id === id); if (g) return g; } return null; }

function placeGate(gateId, qubit) {
    if (isUpdatingFromCode) return;
    isUpdatingFromCircuit = true;
    const def = findGateDef(gateId);
    if (!def) { isUpdatingFromCircuit = false; return; }
    if (def.triple) {
        if (circuit.qubits < 3) { notify('Necesitas al menos 3 qubits'); isUpdatingFromCircuit = false; return; }
        let q1 = qubit, q2 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1, q3 = qubit + 2 < circuit.qubits ? qubit + 2 : qubit - 2;
        if (q2 < 0) q2 = 0; if (q3 < 0) q3 = 0;
        if (q1 === q2) q2 = (q2 + 1) % circuit.qubits;
        if (q1 === q3) q3 = (q3 + 1) % circuit.qubits;
        if (q2 === q3) q3 = (q3 + 1) % circuit.qubits;
        const qs = [q1, q2, q3].sort((a, b) => a - b);
        circuit.gates.push({ id: gateId, q: qs[0], q2: qs[1], q3: qs[2], def: def, uid: nextId++ });
    } else if (def.multi) {
        if (circuit.qubits < 2) { notify('Necesitas al menos 2 qubits'); isUpdatingFromCircuit = false; return; }
        const q2 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1;
        circuit.gates.push({ id: gateId, q: Math.min(qubit, q2), q2: Math.max(qubit, q2), def: def, uid: nextId++ });
    } else {
        circuit.gates.push({ id: gateId, q: qubit, def: def, uid: nextId++ });
    }
    renderCircuit();
    updateCircuitInfo();
    updateCodeFromCircuit();
    isUpdatingFromCircuit = false;
    notify(`${gateId} → q[${qubit}]`);
}

function removeGate(uid) {
    if (isUpdatingFromCode) return;
    isUpdatingFromCircuit = true;
    circuit.gates = circuit.gates.filter(g => g.uid !== uid);
    renderCircuit();
    updateCircuitInfo();
    updateCodeFromCircuit();
    isUpdatingFromCircuit = false;
}

function renderCircuit() {
    const container = document.getElementById('circuit-canvas');
    if (!container) return;
    const depth = Array(circuit.qubits).fill(0);
    const placed = circuit.gates.map(g => {
        let col;
        if (g.q3 !== undefined) { col = Math.max(depth[g.q], depth[g.q2], depth[g.q3]); depth[g.q] = col + 1; depth[g.q2] = col + 1; depth[g.q3] = col + 1; }
        else if (g.q2 !== undefined) { col = Math.max(depth[g.q], depth[g.q2]); depth[g.q] = col + 1; depth[g.q2] = col + 1; }
        else { col = depth[g.q]; depth[g.q]++; }
        return { ...g, col };
    });
    const totalCols = Math.max(...depth, 1);
    const step = 52;
    const wireWidth = totalCols * step + 70;
    let html = `<div style="min-width:${wireWidth}px; position:relative;">`;
    for (let q = 0; q < circuit.qubits; q++) {
        html += `<div class="q-row" style="height:${ROW_HEIGHT}px;"><div class="q-label">q[${q}]</div><div class="q-wire" ondragover="onWireDragOver(event)" ondragleave="onWireDragLeave(event)" ondrop="onWireDrop(event, ${q})" style="position:relative; height:${ROW_HEIGHT}px;"></div></div>`;
    }
    placed.forEach(g => {
        const left = g.col * step + 15;
        if (g.q3 !== undefined) {
            const qs = [g.q, g.q2, g.q3].sort((a, b) => a - b);
            const topY = qs[0] * ROW_HEIGHT;
            const height = (qs[2] - qs[0]) * ROW_HEIGHT;
            const gCol = g.def?.bg || '#0088ff';
            let svg = '';
            if (g.id === 'CCX') {
                svg = `<svg width="52" height="${ROW_HEIGHT + height}" viewBox="0 0 52 ${ROW_HEIGHT + height}" style="cursor:pointer;" onclick="removeGate(${g.uid})"><line x1="26" y1="0" x2="26" y2="${ROW_HEIGHT + height}" stroke="${gCol}" stroke-width="2.5"/><circle cx="26" cy="${ROW_HEIGHT/2}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/><circle cx="26" cy="${ROW_HEIGHT/2 + (qs[1]-qs[0])*ROW_HEIGHT}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/><circle cx="26" cy="${ROW_HEIGHT/2 + height}" r="14" fill="none" stroke="${gCol}" stroke-width="2.5"/><line x1="18" y1="${ROW_HEIGHT/2 + height}" x2="34" y2="${ROW_HEIGHT/2 + height}" stroke="${gCol}" stroke-width="2"/><line x1="26" y1="${ROW_HEIGHT/2 + height - 10}" x2="26" y2="${ROW_HEIGHT/2 + height + 10}" stroke="${gCol}" stroke-width="2"/></svg>`;
            } else if (g.id === 'CSW') {
                svg = `<svg width="52" height="${ROW_HEIGHT + height}" viewBox="0 0 52 ${ROW_HEIGHT + height}" style="cursor:pointer;" onclick="removeGate(${g.uid})"><line x1="26" y1="0" x2="26" y2="${ROW_HEIGHT + height}" stroke="${gCol}" stroke-width="2.5"/><circle cx="26" cy="${ROW_HEIGHT/2}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/><line x1="18" y1="${ROW_HEIGHT/2 + (qs[1]-qs[0])*ROW_HEIGHT - 6}" x2="34" y2="${ROW_HEIGHT/2 + (qs[1]-qs[0])*ROW_HEIGHT + 6}" stroke="${gCol}" stroke-width="2"/><line x1="34" y1="${ROW_HEIGHT/2 + (qs[1]-qs[0])*ROW_HEIGHT - 6}" x2="18" y2="${ROW_HEIGHT/2 + (qs[1]-qs[0])*ROW_HEIGHT + 6}" stroke="${gCol}" stroke-width="2"/><line x1="18" y1="${ROW_HEIGHT/2 + height - 6}" x2="34" y2="${ROW_HEIGHT/2 + height + 6}" stroke="${gCol}" stroke-width="2"/><line x1="34" y1="${ROW_HEIGHT/2 + height - 6}" x2="18" y2="${ROW_HEIGHT/2 + height + 6}" stroke="${gCol}" stroke-width="2"/></svg>`;
            }
            html += `<div style="position:absolute; left:${left}px; top:${topY}px;">${svg}</div>`;
        } else if (g.q2 !== undefined) {
            const topY = g.q * ROW_HEIGHT;
            const height = (g.q2 - g.q) * ROW_HEIGHT;
            const gCol = g.def?.bg || '#0088ff';
            let svg = '';
            if (g.id === 'CX') {
                svg = `<svg width="48" height="${ROW_HEIGHT + height}" viewBox="0 0 48 ${ROW_HEIGHT + height}" style="cursor:pointer;" onclick="removeGate(${g.uid})"><line x1="24" y1="0" x2="24" y2="${ROW_HEIGHT + height}" stroke="${gCol}" stroke-width="2.5"/><circle cx="24" cy="${ROW_HEIGHT/2}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/><circle cx="24" cy="${ROW_HEIGHT/2 + height}" r="14" fill="none" stroke="${gCol}" stroke-width="2.5"/><line x1="16" y1="${ROW_HEIGHT/2 + height}" x2="32" y2="${ROW_HEIGHT/2 + height}" stroke="${gCol}" stroke-width="2"/><line x1="24" y1="${ROW_HEIGHT/2 + height - 10}" x2="24" y2="${ROW_HEIGHT/2 + height + 10}" stroke="${gCol}" stroke-width="2"/></svg>`;
            } else if (g.id === 'CZ') {
                svg = `<svg width="48" height="${ROW_HEIGHT + height}" viewBox="0 0 48 ${ROW_HEIGHT + height}" style="cursor:pointer;" onclick="removeGate(${g.uid})"><line x1="24" y1="0" x2="24" y2="${ROW_HEIGHT + height}" stroke="${gCol}" stroke-width="2.5"/><circle cx="24" cy="${ROW_HEIGHT/2}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/><circle cx="24" cy="${ROW_HEIGHT/2 + height}" r="8" fill="${gCol}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/></svg>`;
            } else if (g.id === 'SWAP') {
                svg = `<svg width="48" height="${ROW_HEIGHT + height}" viewBox="0 0 48 ${ROW_HEIGHT + height}" style="cursor:pointer;" onclick="removeGate(${g.uid})"><line x1="24" y1="0" x2="24" y2="${ROW_HEIGHT + height}" stroke="${gCol}" stroke-width="2.5"/><line x1="16" y1="${ROW_HEIGHT/2 - 6}" x2="32" y2="${ROW_HEIGHT/2 + 6}" stroke="${gCol}" stroke-width="2"/><line x1="32" y1="${ROW_HEIGHT/2 - 6}" x2="16" y2="${ROW_HEIGHT/2 + 6}" stroke="${gCol}" stroke-width="2"/><line x1="16" y1="${ROW_HEIGHT/2 + height - 6}" x2="32" y2="${ROW_HEIGHT/2 + height + 6}" stroke="${gCol}" stroke-width="2"/><line x1="32" y1="${ROW_HEIGHT/2 + height - 6}" x2="16" y2="${ROW_HEIGHT/2 + height + 6}" stroke="${gCol}" stroke-width="2"/></svg>`;
            }
            html += `<div style="position:absolute; left:${left}px; top:${topY}px;">${svg}</div>`;
        } else {
            const yPos = g.q * ROW_HEIGHT;
            html += `<div class="placed-gate" style="left:${left}px; top:${yPos + ROW_HEIGHT/2}px; transform:translateY(-50%);" onclick="removeGate(${g.uid})"><div class="pg-box" style="background:${g.bg};box-shadow:0 0 8px ${g.glow||'rgba(0,136,255,.3)'}"><span class="pg-sym">${g.def.sym}</span></div></div>`;
        }
    });
    html += `</div>`;
    container.innerHTML = html;
}

function updateCircuitInfo() {
    document.getElementById('qcount-badge').textContent = `${circuit.qubits} qubits · ${circuit.gates.length} puertas`;
    updateBlochSelector();
}

function updateBlochSelector() {
    const sel = document.getElementById('bloch-q-select');
    if (!sel) return;
    sel.innerHTML = '';
    for (let i = 0; i < circuit.qubits; i++) {
        let state = blochStates[i] || { theta: 0, phi: 0 };
        let label = state.theta < 0.1 ? '|0⟩' : state.theta > Math.PI - 0.1 ? '|1⟩' : 'sup';
        sel.innerHTML += `<option value="${i}">Qubit ${i} (${label})</option>`;
    }
    if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits - 1;
}

function updateCodeFromCircuit() {
    if (isUpdatingFromCode) return;
    let code = `from qiskit import QuantumCircuit\nimport numpy as np\n\nqc = QuantumCircuit(${circuit.qubits}, ${circuit.qubits})\n\n`;
    circuit.gates.forEach(g => {
        let line = g.def.code.replace('{q}', g.q).replace('{q2}', g.q2 !== undefined ? g.q2 : 0).replace('{q3}', g.q3 !== undefined ? g.q3 : 0);
        code += line + '\n';
    });
    code += `\nqc.measure(range(${circuit.qubits}), range(${circuit.qubits}))\nprint(qc.draw(output='text'))`;
    const ta = document.getElementById('code-ta');
    if (ta && ta.value !== code) { ta.value = code; updateSyntaxHighlight(); }
}

async function initPyodide() {
    if (pyodide !== null) return pyodide;
    if (pyodideLoading) {
        await new Promise(resolve => { const check = setInterval(() => { if (pyodide !== null) { clearInterval(check); resolve(); } }, 100); });
        return pyodide;
    }
    pyodideLoading = true;
    const out = document.getElementById('out-body');
    out.innerHTML = '<span class="inf">🔄 Cargando Pyodide (ejecución Python en navegador)...</span>\n';
    try {
        pyodide = await loadPyodide();
        await pyodide.runPythonAsync(QISKIT_MOCK_CODE);
        await pyodide.loadPackage('numpy');
        out.innerHTML = '<span class="ok">✅ Pyodide cargado correctamente. Ahora puedes sincronizar código Qiskit avanzado.</span>\n';
        notify('✅ Pyodide listo');
        const statusSpan = document.getElementById('compiler-status');
        if (statusSpan) {
            statusSpan.textContent = '● PYODIDE ACTIVO';
            statusSpan.classList.remove('waiting');
            statusSpan.classList.add('active');
        }
    } catch (err) {
        out.innerHTML = `<span class="er">❌ Error cargando Pyodide: ${err.message}</span>\n`;
        notify('❌ Error cargando Pyodide');
        console.error(err);
    }
    pyodideLoading = false;
    return pyodide;
}

function mapOpNameToGateId(opName) {
    const map = {
        'h': 'H', 'x': 'X', 'y': 'Y', 'z': 'Z', 's': 'S', 't': 'T', 'sx': 'SX',
        'rx': 'RX', 'ry': 'RY', 'rz': 'RZ', 'p': 'RZ',
        'cx': 'CX', 'cz': 'CZ', 'swap': 'SWAP', 'cp': 'CZ',
        'ccx': 'CCX', 'cswap': 'CSW', 'mcx': 'CCX',
        'measure': 'M'
    };
    return map[opName] || 'H';
}

function highlightErrorLine(lineNum) {
    const ta = document.getElementById('code-ta');
    if (!ta) return;
    const lines = ta.value.split('\n');
    let pos = 0;
    for (let i = 0; i < lineNum - 1 && i < lines.length; i++) {
        pos += lines[i].length + 1;
    }
    ta.focus();
    ta.setSelectionRange(pos, pos + (lines[lineNum - 1] || '').length);
    const lineHeight = parseInt(getComputedStyle(ta).lineHeight) || 19;
    ta.scrollTop = (lineNum - 3) * lineHeight;
    updCur();
}

async function syncWithPyodide() {
    if (isUpdatingFromCircuit) return;
    isUpdatingFromCircuit = true;
    
    const code = document.getElementById('code-ta').value;
    if (!code.trim()) { notify('Escribe código primero'); isUpdatingFromCircuit = false; return; }
    
    const out = document.getElementById('out-body');
    out.innerHTML = '<span class="inf">🔄 Ejecutando código con Pyodide...</span>\n';
    
    try {
        const py = await initPyodide();
        if (!py) throw new Error('Pyodide no disponible');
        
        py.globals.set('_pending_user_code', code);
        
        const result = await py.runPythonAsync(`
import json, traceback, sys

_user_code = globals().get('_pending_user_code', '')
_ns = {}
_error = None
_circuit = None
_num_qubits = 0
_data = []

try:
    exec(_user_code, _ns)
except Exception as _e:
    _error = traceback.format_exc()

if _error is None:
    for _name in ['circuit','qc','circ','qcirc','quantum_circuit']:
        _obj = _ns.get(_name)
        if _obj is not None and hasattr(_obj, 'data'):
            _circuit = _obj
            break
    if _circuit is None:
        for _v in _ns.values():
            if hasattr(_v, 'data') and hasattr(_v, 'num_qubits'):
                _circuit = _v
                break
    if _circuit is None:
        _error = "No se encontró ningún circuito (usa: qc = QuantumCircuit(n))"
    else:
        _num_qubits = getattr(_circuit, 'num_qubits', getattr(_circuit, 'qubits', 0))
        _data = getattr(_circuit, 'data', [])

json.dumps({
    "success": _error is None,
    "error": _error,
    "num_qubits": _num_qubits,
    "gates": [(op.name, op.qubits, op.params) for op in _data] if _data else [],
    "circuit_exists": _circuit is not None
})
        `);
        
        const data = JSON.parse(result);
        
        if (data.success && data.circuit_exists) {
            circuit.qubits = Math.min(data.num_qubits, MAX_QUBITS);
            
            const newGates = [];
            for (const gate of data.gates) {
                const gateId = mapOpNameToGateId(gate[0]);
                const def = findGateDef(gateId);
                if (!def) continue;
                
                const qubits = gate[1];
                const uid = nextId++;
                
                if (qubits.length === 1) {
                    newGates.push({ id: gateId, q: qubits[0], def: def, uid: uid });
                } else if (qubits.length === 2) {
                    newGates.push({ id: gateId, q: Math.min(qubits[0], qubits[1]), q2: Math.max(qubits[0], qubits[1]), def: def, uid: uid });
                } else if (qubits.length >= 3) {
                    const sorted = [...qubits].sort((a,b) => a-b);
                    newGates.push({ id: gateId, q: sorted[0], q2: sorted[1], q3: sorted[2], def: def, uid: uid });
                }
            }
            
            circuit.gates = newGates;
            renderCircuit();
            updateCircuitInfo();
            updateCodeFromCircuit();
            
            out.innerHTML = `<span class="ok">✅ Código sincronizado correctamente.</span><br>
                            <span class="inf">📊 ${newGates.length} puertas registradas</span><br>
                            <span class="inf">🎯 Qubits: ${circuit.qubits}</span><br>`;
            notify(`✅ Sincronizado: ${newGates.length} puertas`);
        } else {
            showErrorWithAI(data.error, code);
            notify('❌ Error en el código — Quantum Chat puede ayudar');
        }
        
    } catch (err) {
        console.error('Error:', err);
        out.innerHTML = `<span class="er">❌ Error ejecutando Pyodide:<br>${escapeHtml(err.message)}</span>`;
        notify('Error de ejecución');
    } finally {
        isUpdatingFromCircuit = false;
    }
}

// Funciones de Bloch, Run, Save, etc. (igual que antes)
function drawBloch() {
    const canvas = document.getElementById('bloch-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2;
    const r = Math.min(w, h) * 0.38;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, w, h);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.strokeStyle = 'rgba(0,136,255,0.4)'; ctx.stroke();
    for (let i = 1; i <= 3; i++) {
        const yr = r * Math.sin(i * Math.PI/4);
        ctx.beginPath(); ctx.ellipse(cx, cy, yr, yr*0.35, 0, 0, Math.PI*2); ctx.strokeStyle = `rgba(0,136,255,0.15)`; ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(cx - r*1.1, cy); ctx.lineTo(cx + r*1.1, cy); ctx.moveTo(cx, cy - r*1.1); ctx.lineTo(cx, cy + r*1.1); ctx.strokeStyle = 'rgba(0,200,255,0.2)'; ctx.stroke();
    const state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
    const x = r * Math.sin(state.theta) * Math.cos(state.phi);
    const y = -r * Math.cos(state.theta);
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + x, cy + y); ctx.strokeStyle = '#00ffdd'; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + x, cy + y, 6, 0, Math.PI*2); ctx.fillStyle = '#00ffdd'; ctx.fill();
    ctx.font = '10px monospace'; ctx.fillStyle = '#8aa0c4';
    ctx.fillText('|0⟩', cx+5, cy-r-5); ctx.fillText('|1⟩', cx+5, cy+r+12); ctx.fillText('|+⟩', cx+r+10, cy);
    document.getElementById('bloch-info').innerHTML = `<span>Qubit ${currentBlochQubit}</span><br>θ=${Math.round(state.theta*180/Math.PI)}° φ=${Math.round(state.phi*180/Math.PI)}°<br>P0=${(Math.cos(state.theta/2)**2*100).toFixed(1)}% P1=${(Math.sin(state.theta/2)**2*100).toFixed(1)}%`;
}

function applyBlochGate(gate) {
    let state = blochStates[currentBlochQubit] || { theta: 0, phi: 0 };
    switch(gate) {
        case 'H': state.theta = Math.PI/2; state.phi = 0; break;
        case 'X': state.theta = Math.PI - state.theta; break;
        case 'Y': state.theta = Math.PI - state.theta; state.phi = (state.phi + Math.PI) % (2*Math.PI); break;
        case 'Z': state.phi = (state.phi + Math.PI) % (2*Math.PI); break;
        case 'SX': state.theta = Math.PI/2; state.phi = 0; break;
        case 'RX': state.theta = Math.PI/4; state.phi = 0; break;
        case 'RY': state.theta = Math.PI/4; state.phi = Math.PI/2; break;
        case 'RZ': state.phi = (state.phi + Math.PI/4) % (2*Math.PI); break;
        case 'reset': state.theta = 0; state.phi = 0; break;
    }
    blochStates[currentBlochQubit] = state;
    drawBloch();
    updateBlochSelector();
}

async function runCode() {
    if (running) return;
    const code = document.getElementById('code-ta').value.trim();
    if (!code) { notify('Escribe código primero'); return; }
    running = true;
    const btn = document.getElementById('btn-run');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span>⏳</span> EJECUTANDO'; }
    setRunSt('run', 'Ejecutando...');
    setTab('out');
    const out = document.getElementById('out-body');
    const t0 = Date.now();

    syncWithPyodide().catch(() => {});

    if (engineOK && engineURL) {
        out.innerHTML = '<span class="inf">⏳ Enviando al compilador cuántico...\n</span>';
        const isHF = engineURL.includes('hf.space') || engineURL.includes('huggingface');
        try {
            let res, d;
            if (isHF) {
                res = await fetchWithRetry(engineURL + '/run/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [code] })
                }, 3, 30000);
                const raw = await res.json();
                d = raw.data ? raw.data[0] : raw;
            } else {
                res = await fetchWithRetry(engineURL + '/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, lib: 'qiskit' })
                }, 3, 30000);
                d = await res.json();
            }
            const el = ((Date.now()-t0)/1000).toFixed(2);
            document.getElementById('out-elapsed').textContent = el + 's';
            if (d.success) {
                out.innerHTML = `<span class="inf">╔═══════════════════════╗\n║  Compilador · ${el}s\n╚═══════════════════════╝\n\n</span><span class="ok">${escapeHtml(d.output)}</span>`;
                if (d.bloch?.probabilities) updateBlochFromProbs(d.bloch.probabilities);
                setRunSt('idle','Listo');

                out.innerHTML += `<span class="er">❌ ${escapeHtml(d.output||'Error')}</span>`;

                aiBtn.onclick = () => aiFixCode(d.output, code);
                out.appendChild(aiBtn);

                setRunSt('err','Error');
            }
        } catch(e) {
            out.innerHTML += `<span class="er">❌ ${e.message}\nVerifica que el compilador esté activo.</span>`;
            setRunSt('err','Error');
        }
    } else {
        out.innerHTML = '<span class="inf">⚠️ Sin compilador externo — usando Pyodide local\n</span>';
        try {
            const py = await initPyodide();
            if (py) {
                py.globals.set('_pending_user_code', code);
                const result = await py.runPythonAsync(`
import json, traceback, io, sys
_user_code = globals().get('_pending_user_code','')

function addQubit() { if (circuit.qubits < MAX_QUBITS) { circuit.qubits++; if (!blochStates[circuit.qubits-1]) blochStates[circuit.qubits-1] = { theta: 0, phi: 0 }; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } else notify(`Máximo ${MAX_QUBITS} qubits`); }
function removeQubit() { if (circuit.qubits > 1) { circuit.gates = circuit.gates.filter(g => g.q < circuit.qubits-1 && (!g.q2 || g.q2 < circuit.qubits-1) && (!g.q3 || g.q3 < circuit.qubits-1)); circuit.qubits--; if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits-1; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); notify(`${circuit.qubits} qubits`); } }
function clearCircuit() { circuit.gates = []; for (let i = 0; i < circuit.qubits; i++) blochStates[i] = { theta: 0, phi: 0 }; renderCircuit(); updateCircuitInfo(); updateCodeFromCircuit(); drawBloch(); notify('Circuito limpiado'); }

let resizingH = false, startY, startHeight;
let resizingV = false, startX, startWidth;
function initResize() {
    const resizeH = document.getElementById('resize-h');
    const resizeV = document.getElementById('resize-v');
    const circuitSec = document.getElementById('circuit-section');
    const rightPanel = document.getElementById('right-panel');
    if (resizeH) resizeH.onmousedown = (e) => { resizingH = true; startY = e.clientY; startHeight = circuitSec.offsetHeight; document.body.style.cursor = 'ns-resize'; e.preventDefault(); };
    if (resizeV) resizeV.onmousedown = (e) => { resizingV = true; startX = e.clientX; startWidth = rightPanel.offsetWidth; document.body.style.cursor = 'ew-resize'; e.preventDefault(); };
    document.onmousemove = (e) => {
        if (resizingH) { let nh = startHeight + (e.clientY - startY); if (nh > 80 && nh < window.innerHeight * 0.7) circuitSec.style.height = nh + 'px'; }
        if (resizingV) { let nw = startWidth + (startX - e.clientX); if (nw > 200 && nw < window.innerWidth * 0.4) rightPanel.style.width = nw + 'px'; }
    };
    document.onmouseup = () => { resizingH = false; resizingV = false; document.body.style.cursor = ''; };
}

async function fetchWithRetry(url, options, retries=3, timeout=30000) {
    let lastErr;
    for (let attempt=1; attempt<=retries; attempt++) {
        try {
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), timeout);
            const res  = await fetch(url, { ...options, signal: ctrl.signal });
            clearTimeout(tid);
            if (res.ok) return res;
            lastErr = new Error('HTTP ' + res.status);
            if (attempt < retries) {
                notify(`⚠️ Intento ${attempt}/${retries} falló. Reintentando...`);
                await new Promise(r => setTimeout(r, 3000));
            }
        } catch(e) {
            lastErr = e;
            if (e.name === 'AbortError') lastErr = new Error(`Timeout (${timeout/1000}s)`);
            if (attempt < retries) {
                notify(`⚠️ Intento ${attempt}/${retries}: ${lastErr.message}`);
                await new Promise(r => setTimeout(r, 3000));
            }
        }
    }
    throw lastErr;
}

async function checkEngine() {
    if (!engineURL) return;
    engineURL = engineURL.trim().replace(/\/+$/, '');
    const badge  = document.getElementById('eng-badge');
    const status = document.getElementById('compiler-status');
    const setS   = (txt, cls) => {
        if (badge)  { badge.textContent = txt; badge.className = 'badge ' + cls; }
        if (status) { status.textContent = txt; }
    };
    setS('⏳ Conectando...', 'badge-warn');
    for (let attempt=1; attempt<=3; attempt++) {
        try {
            setS(`⏳ Intento ${attempt}/3...`, 'badge-warn');
            const ctrl = new AbortController();
            const tid  = setTimeout(() => ctrl.abort(), 30000);
            const res  = await fetch(engineURL + '/health/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [''] }),
                signal: ctrl.signal
            });
            clearTimeout(tid);
            if (res.ok) {
                const raw = await res.json();
                const d   = raw.data ? raw.data[0] : raw;
                engineOK  = true;
                const libs = (d.libs||[]).slice(0,4).join(', ');
                setS('● COMPILADOR ACTIVO', 'badge-on');
                notify('✅ Compilador conectado' + (libs ? ' · '+libs : ''));
                try { window.parent.postMessage({type:'QCOL_SAVE',key:'qcol_colab_url',val:engineURL},'*'); } catch(e){}
                return;
            }
            throw new Error('HTTP ' + res.status);
        } catch(e) {
            if (attempt < 3) {
                notify(`⚠️ Intento ${attempt}/3: ${e.message}`);
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    }
    engineOK = false;
    setS('● SIN COMPILADOR', 'badge-off');
    notify('❌ No se pudo conectar al compilador (3 intentos)');
}

(function(){
    function postCore(type, data={}) {
        try { window.parent.postMessage({type,...data},'*'); } catch(e){}
    }

    // ── Mensaje del ecosistema ────────────────────────────────
    window.addEventListener('message', e => {
        const d = e.data||{};
        if (d.type==='QCOL_USER' || d.type==='QCOL_USER_UPDATE') {
            curUser = d.user;
            const pill = document.getElementById('user-pill') ||
                         document.getElementById('uname');
            if (pill && curUser) {
                const role = curUser.role||'guest';
                const ico  = role==='founder'?'👑 ':role==='admin'?'🔑 ':'';
                pill.textContent = ico + (curUser.name||curUser.username||'—').split(' ')[0];
                const dot = document.getElementById('udot');
                if (dot) dot.className = 'u-dot on';
            }
        }
        if (d.type==='QCOL_CONFIG'||d.type==='QCOL_CONFIG_UPDATED') {
            const url = localStorage.getItem('qcol_colab_url')||'';
            if (url && url.trim()!==engineURL) {
                engineURL = url.trim().replace(/\/+$/, '');
                checkEngine();
            }
        }
        // Recibir API key de AI desde el ecosistema
        if (d.type==='QCOL_SAVE' && d.key==='qcol_ai') {
            try { aiCfg = typeof d.val==='string' ? JSON.parse(d.val) : d.val; } catch(e){}
        }
    });

    // ── Carga inicial ─────────────────────────────────────────
    postCore('QCOL_GET_USER');
    postCore('QCOL_GET_CONFIG');

    // Intento inmediato desde localStorage (el más rápido)
    (function tryLoadEngine() {
        const stored = localStorage.getItem('qcol_cur_user');
        if (stored && !curUser) {
            try { curUser = JSON.parse(stored); } catch(e){}
        }
        // Cargar AI config
        try {
            const aiStored = localStorage.getItem('qcol_ai');
            if (aiStored) aiCfg = JSON.parse(aiStored);
        } catch(e){}

        const url = (localStorage.getItem('qcol_colab_url')||'').trim().replace(/\/+$/, '');
        if (url) {
            engineURL = url;
            checkEngine();
        } else {
            // Si no hay URL en localStorage, esperar mensaje del ecosistema
            // y reintentar cada 3 segundos hasta 5 veces
            let retries = 0;
            const poll = setInterval(() => {
                retries++;
                const u = (localStorage.getItem('qcol_colab_url')||'').trim().replace(/\/+$/, '');
                if (u) {
                    clearInterval(poll);
                    engineURL = u;
                    checkEngine();
                } else if (retries >= 5) {
                    clearInterval(poll);
                    const badge = document.getElementById('eng-badge');
                    if (badge) {
                        badge.textContent = '⚙️ Configura compilador';
                        badge.className = 'badge badge-warn';
                    }
                }
            }, 3000);
        }
    })();
})();

// Llamar a la AI configurada (Mistral, Groq, etc.)
async function askAI(systemPrompt, userMessage) {
    // Leer config actualizada
    try {
        const stored = localStorage.getItem('qcol_ai');
        if (stored) aiCfg = JSON.parse(stored);
    } catch(e) {}

    const provider = aiCfg.provider || 'mistral';
    const apiKey   = aiCfg.key || aiCfg.apiKey || '';
    const model    = aiCfg.model || 'mistral-large-latest';

    if (!apiKey) {
        return '⚠️ No hay API key configurada. Ve a Configuración → IA para añadir tu clave Mistral.';
    }

    const endpoints = {
        mistral: 'https://api.mistral.ai/v1/chat/completions',
        groq:    'https://api.groq.com/openai/v1/chat/completions',
        openai:  'https://api.openai.com/v1/chat/completions',
    };
    const url = endpoints[provider] || endpoints.mistral;
    const mdl = provider === 'groq' ? (aiCfg.model || 'llama-3.3-70b-versatile')
              : provider === 'openai' ? (aiCfg.model || 'gpt-4o-mini')
              : model;

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: mdl,
                max_tokens: 1200,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user',   content: userMessage }
                ]
            }),
            signal: AbortSignal.timeout(30000)
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            return `⚠️ Error AI (${res.status}): ${err.error?.message || res.statusText}`;
        }
        const data = await res.json();
        return data.choices?.[0]?.message?.content || '⚠️ Sin respuesta de la AI';
    } catch(e) {
        return `⚠️ Error conectando con la AI: ${e.message}`;
    }
}
