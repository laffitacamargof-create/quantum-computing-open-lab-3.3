<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Arquitecto Cuántico</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
/* ══════════════════════════════════════════════════
   ARQUITECTO CUÁNTICO — Híbrido automático
══════════════════════════════════════════════════ */
:root {
  --bg:#0a0e1a; --bg2:#0d1220; --bg3:#111827; --bg4:#060912;
  --p:#0f1626;  --p2:#141e30;  --p3:#1a2640;
  --bd:#1a2a48; --bd2:#1e3058;
  --bl:#0088ff; --bl2:#00aaff; --cy:#00ffdd;
  --gr:#00ff88; --yw:#ffd700;  --rd:#ff4466; --pu:#bd93f9;
  --tx:#dce8ff; --tx2:#8aa0c4; --mu:#3d5a8a; --mu2:#1e2e4a;
  --kw:#ff79c6; --fn:#50fa7b; --st:#f1fa8c;
  --nm:#bd93f9; --cm:#4a5a7a; --cl:#8be9fd;
  --orb:'Orbitron',monospace;
  --mono:'JetBrains Mono',monospace;
  --ex:'Exo 2',sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--tx); font-family:var(--ex); }

.notif {
  position:fixed; top:.6rem; right:.6rem; z-index:9999;
  padding:.45rem .85rem; background:rgba(6,9,18,.97);
  border:1px solid var(--cy); border-radius:7px;
  font-family:var(--orb); font-size:.55rem; color:var(--cy);
  transform:translateX(130%); transition:transform .28s;
  backdrop-filter:blur(20px); max-width:240px; pointer-events:none;
}
.notif.show { transform:translateX(0); }

.titlebar {
  height:32px; display:flex; align-items:center;
  background:#060912; border-bottom:1px solid var(--bd);
  flex-shrink:0; padding:0 .8rem;
}
.tb-brand { display:flex; align-items:center; gap:.5rem; }
.tb-q { display:none; }
.tb-col { display:none; }
.tb-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.badge {
  padding:.2rem .5rem; border-radius:4px;
  font-family:var(--orb); font-size:.5rem;
}
.badge-eng-off { background:rgba(50,70,110,.15); border:1px solid var(--bd2); color:var(--mu); }
.badge-eng-on { background:rgba(0,255,136,.1); border:1px solid var(--gr); color:var(--gr); }
.user-chip {
  display:flex; align-items:center; gap:.3rem;
  padding:.2rem .5rem; background:rgba(0,136,255,.1);
  border:1px solid var(--bl); border-radius:16px;
  font-family:var(--orb); font-size:.5rem; cursor:pointer;
}
.u-dot { width:6px; height:6px; border-radius:50%; background:var(--mu); }
.u-dot.on { background:var(--gr); box-shadow:0 0 4px var(--gr); }

.toolbar {
  height:38px; display:flex; align-items:center; gap:.4rem;
  padding:0 .8rem; background:var(--bg2);
  border-bottom:1px solid var(--bd); flex-shrink:0;
  overflow-x:auto; flex-wrap:wrap;
}
.toolbar::-webkit-scrollbar { display:none; }
.btn-run {
  display:flex; align-items:center; gap:.4rem;
  padding:.25rem .9rem; border:none; border-radius:6px;
  background:linear-gradient(135deg,#003a9e,var(--bl));
  color:#fff; font-family:var(--orb); font-size:.6rem;
  font-weight:700; cursor:pointer;
}
.bsm {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(30,48,88,.5); border:1px solid var(--bd2);
  color:var(--tx2); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.bsm:hover { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.lib-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.lib-btn.on { background:rgba(0,136,255,.2); border-color:var(--bl); color:var(--bl2); }
.mode-btn {
  padding:.2rem .5rem; border-radius:5px;
  background:rgba(20,30,50,.6); border:1px solid var(--bd);
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer;
}
.mode-btn.on { background:rgba(0,255,221,.1); border-color:var(--cy); color:var(--cy); }
.sep { width:1px; height:20px; background:var(--bd2); margin:0 .1rem; }

.body-layout {
  display:flex; height:calc(100vh - 70px);
  overflow:hidden;
}

.palette {
  width:160px; flex-shrink:0;
  background:var(--p); border-right:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.palette-hdr {
  padding:.4rem .6rem; background:#060912;
  border-bottom:1px solid var(--bd);
  font-family:var(--orb); font-size:.5rem; color:var(--mu);
}
.palette-body { flex:1; overflow-y:auto; padding:.5rem; }
.pal-sec { margin-bottom:.6rem; }
.pal-sec-lbl {
  font-family:var(--orb); font-size:.45rem; color:var(--mu);
  padding:.2rem; border-left:2px solid var(--bd2); margin-bottom:.3rem;
}
.pal-grid { display:grid; grid-template-columns:1fr 1fr; gap:.3rem; }
.pal-gate {
  width:100%; aspect-ratio:1; border-radius:8px;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:grab;
  border:1px solid rgba(255,255,255,.1);
  transition:transform .1s;
}
.pal-gate:active { cursor:grabbing; }
.pal-gate:hover { transform:scale(1.05); filter:brightness(1.1); }
.pal-gate-sym { font-family:var(--mono); font-size:.75rem; font-weight:700; }
.pal-gate-lbl { font-family:var(--orb); font-size:.4rem; color:rgba(255,255,255,.6); margin-top:.05rem; }

.center-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

.circuit-section {
  flex-shrink:0; height:200px;
  border-bottom:1px solid var(--bd);
  display:flex; flex-direction:column; overflow:hidden;
}
.circuit-hdr {
  display:flex; align-items:center; gap:.6rem;
  padding:.3rem .7rem; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.circuit-hdr-lbl { font-family:var(--orb); font-size:.5rem; color:var(--cy); }
.qcount-badge {
  font-family:var(--mono); font-size:.5rem;
  padding:.1rem .5rem; background:rgba(0,255,221,.1);
  border:1px solid rgba(0,255,221,.3); border-radius:4px;
  color:var(--cy);
}
.circuit-body {
  flex:1; overflow:auto; padding:.5rem;
  background:var(--bg4);
}
.circuit-body::-webkit-scrollbar { width:8px; height:8px; }
.circuit-body::-webkit-scrollbar-track { background:var(--bg2); border-radius:4px; }
.circuit-body::-webkit-scrollbar-thumb { background:var(--bd2); border-radius:4px; }

.resize-handle-h {
  height:4px; cursor:ns-resize; background:var(--bd);
  flex-shrink:0;
}
.resize-handle-h:hover { background:var(--bl); }
.resize-handle-v {
  width:4px; cursor:ew-resize; background:var(--bd);
  flex-shrink:0;
}
.resize-handle-v:hover { background:var(--bl); }

.code-section {
  flex:1; display:flex; flex-direction:column; min-height:0;
}
.code-hdr {
  display:flex; align-items:center; gap:.5rem;
  padding:.3rem .7rem; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.code-hdr-lbl { font-family:var(--orb); font-size:.5rem; color:var(--mu); }
.code-hdr-right { margin-left:auto; display:flex; align-items:center; gap:.5rem; }
.compiler-status {
  font-family:var(--mono);
  font-size:.45rem;
  padding:.15rem .4rem;
  border-radius:12px;
  background:rgba(0,0,0,.4);
  color:var(--mu);
}
.compiler-status.active { color:var(--gr); border-left:2px solid var(--gr); background:rgba(0,255,136,.1); }
.compiler-status.waiting { color:var(--yw); border-left:2px solid var(--yw); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }

.code-wrap { flex:1; position:relative; display:flex; min-height:0; }
.lnums {
  width:35px; flex-shrink:0; padding:.6rem .2rem;
  background:var(--bg4); text-align:right;
  font-family:var(--mono); font-size:.7rem; color:var(--mu2);
  line-height:1.6;
  overflow-y:auto;
  overflow-x:hidden;
  scrollbar-width:none;
  user-select:none;
  border-right:1px solid var(--bd);
}
.lnums::-webkit-scrollbar { display:none; }
.editor-body { flex:1; position:relative; overflow:hidden; }
.syn-lay {
  position:absolute; inset:0; padding:.6rem .8rem;
  font-family:var(--mono); font-size:.7rem; line-height:1.6;
  pointer-events:none; z-index:1; overflow:auto;
  white-space:pre; background:var(--bg4); tab-size:4;
}
.code-ta {
  position:absolute; inset:0;
  background:transparent; color:transparent;
  caret-color:var(--cy);
  padding:.6rem .8rem;
  font-family:var(--mono); font-size:.7rem;
  border:none; outline:none; resize:none;
  line-height:1.6; z-index:2;
  white-space:pre; overflow:auto; tab-size:4;
}
.code-ta::-webkit-scrollbar { width:6px; }
.code-ta::-webkit-scrollbar-thumb { background:var(--bd2); }

.statusbar {
  display:flex; align-items:center; gap:.5rem;
  padding:0 .7rem; height:22px;
  background:#060912; border-top:1px solid var(--bd);
  font-family:var(--mono); font-size:.45rem; color:var(--mu);
  flex-shrink:0;
}
.sb-dot { width:6px; height:6px; border-radius:50%; background:var(--gr); }

.right-panel {
  width:320px; display:flex; flex-direction:column;
  background:var(--p); border-left:1px solid var(--bd);
  flex-shrink:0;
}
.rtabs {
  display:flex; background:#060912;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.rtab {
  flex:1; padding:.4rem .2rem; background:transparent; border:none;
  color:var(--mu); font-family:var(--orb); font-size:.5rem;
  cursor:pointer; border-bottom:2px solid transparent;
}
.rtab.on { color:var(--bl2); border-bottom-color:var(--bl2); }

.output-panel { flex:1; display:flex; flex-direction:column; min-height:0; }
.out-hdr {
  padding:.3rem .6rem; background:#060912;
  border-bottom:1px solid var(--bd);
  font-family:var(--orb); font-size:.5rem; color:var(--mu);
  flex-shrink:0;
}
.out-body {
  flex:1; padding:.6rem; background:#040810;
  font-family:var(--mono); font-size:.7rem; color:var(--tx2);
  line-height:1.6; overflow-y:auto; white-space:pre-wrap;
}
.out-body::-webkit-scrollbar { width:4px; }
.ok { color:#3fb950; }
.er { color:#f85149; }
.inf { color:#58a6ff; }
.wa { color:#d29922; }
.pb { color:#bc8cff; }
.out-bar {
  padding:.3rem .6rem; background:#060912;
  border-top:1px solid var(--bd);
  display:flex; gap:.3rem; align-items:center;
  flex-shrink:0;
}

.bloch-panel { flex:1; display:flex; flex-direction:column; align-items:center; padding:1rem; gap:1rem; overflow:auto; background:radial-gradient(circle at center, #0a0e1a, #060912); }
.bloch-container { position:relative; width:100%; max-width:280px; margin:0 auto; }
#bloch-canvas { width:100%; aspect-ratio:1; background:radial-gradient(circle at 30% 30%, #0d1424, #040810); border-radius:50%; box-shadow:0 0 30px rgba(0,136,255,0.2); cursor:grab; }
.bloch-q-select { background:var(--bg3); border:1px solid var(--bd2); color:var(--bl2); padding:.2rem .5rem; border-radius:4px; font-family:var(--mono); font-size:.6rem; }
.bloch-info { text-align:center; font-family:var(--mono); font-size:.65rem; color:var(--tx2); background:rgba(0,0,0,.3); padding:.5rem; border-radius:8px; width:100%; }
.gate-btns { display:flex; flex-wrap:wrap; gap:.3rem; justify-content:center; margin-top:.5rem; }
.gb { padding:.25rem .6rem; border:none; border-radius:5px; background:rgba(0,136,255,.2); color:var(--bl2); font-family:var(--orb); font-size:.5rem; cursor:pointer; }

.save-panel { flex:1; overflow-y:auto; padding:.6rem; }
.save-sec { margin-bottom:.8rem; }
.save-title { font-family:var(--orb); font-size:.5rem; color:var(--bl2); margin-bottom:.4rem; }
.fi { width:100%; padding:.3rem .5rem; background:rgba(20,30,50,.7); border:1px solid var(--bd2); color:var(--tx); font-family:var(--mono); font-size:.6rem; border-radius:4px; }
.circ-item { display:flex; align-items:center; gap:.4rem; padding:.3rem .5rem; background:rgba(20,30,50,.5); border:1px solid var(--bd); border-radius:5px; margin-bottom:.2rem; cursor:pointer; }
.circ-item:hover { border-color:var(--bl); background:rgba(0,136,255,.1); }
.ci-name { font-family:var(--mono); font-size:.6rem; color:var(--tx); flex:1; }
.ci-del { background:transparent; border:none; color:var(--rd); cursor:pointer; font-size:.7rem; }

.q-row { display:flex; align-items:center; height:56px; position:relative; }
.q-label { width:48px; text-align:right; padding-right:.5rem; font-family:var(--mono); font-size:.5rem; color:var(--mu); flex-shrink:0; cursor:pointer; user-select:none; transition:color .15s, opacity .15s; }
.q-label:hover { opacity:.75; }
.q-label.qiskit-label { color:var(--bl2); }
.q-label.cirq-label   { color:var(--gr);  }
.q-wire { flex:1; position:relative; height:56px; min-width:200px; background:transparent; }
.q-wire::before { content:''; position:absolute; left:0; right:0; top:50%; height:2px; background:linear-gradient(90deg, rgba(0,136,255,0.3), rgba(0,136,255,0.1)); transform:translateY(-50%); pointer-events:none; }
.q-wire.qiskit-wire::before { background:linear-gradient(90deg, rgba(0,136,255,0.45), rgba(0,136,255,0.12)); }
.q-wire.cirq-wire::before   { background:linear-gradient(90deg, rgba(0,255,136,0.45), rgba(0,255,136,0.12)); }
.q-row.wire-selected { background:rgba(255,255,255,0.035); border-radius:6px; }
.pal-lib-badge { font-family:var(--orb); font-size:.42rem; font-weight:700; text-align:center; padding:.18rem .4rem; border-radius:4px; margin-bottom:.35rem; letter-spacing:.06em; }
.pal-lib-badge.qiskit { background:rgba(0,136,255,.15); color:var(--bl2); border:1px solid rgba(0,136,255,.28); }
.pal-lib-badge.cirq   { background:rgba(0,255,136,.15); color:var(--gr);  border:1px solid rgba(0,255,136,.28); }
.placed-gate { position:absolute; top:50%; transform:translateY(-50%); z-index:5; cursor:pointer; }
.pg-box { width:38px; height:38px; border-radius:6px; display:flex; align-items:center; justify-content:center; border:1.5px solid rgba(255,255,255,.2); }
.pg-sym { font-family:var(--mono); font-size:.8rem; font-weight:700; color:#fff; }
.multi-gate-container, .triple-gate-container { position:absolute; top:0; left:0; z-index:5; cursor:pointer; }
.multi-gate-svg, .triple-gate-svg { cursor:pointer; }

@media(max-width:700px){
  .palette { width:120px; }
  .right-panel { width:280px; }
  .bloch-container { max-width:220px; }
  .code-hdr-lbl { font-size:.45rem; }
  .compiler-status { font-size:.4rem; }
}
@media(max-width:480px){
  .toolbar { gap:.2rem; padding:0 .4rem; }
  .btn-run { padding:.2rem .6rem; font-size:.55rem; }
  .bsm, .lib-btn, .mode-btn { padding:.15rem .35rem; font-size:.45rem; }
}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<div class="titlebar">
  <div class="tb-brand"><span class="tb-q"></span><span class="tb-col"></span></div>
  <div class="tb-right">
    <div class="badge badge-eng-off" id="eng-badge"></div>
    <div class="user-chip" id="user-chip"><div class="u-dot" id="udot"></div><span id="uname"></span></div>
  </div>
</div>

<div class="toolbar">
  <button class="bsm" id="btn-back-nb" style="display:none;background:rgba(0,255,136,.1);border-color:rgba(0,255,136,.4);color:#00ff88;font-weight:700;" onclick="returnToNotebook()">← GUARDAR Y VOLVER</button>
  <div class="sep" id="sep-back-nb" style="display:none;"></div>
  <button class="btn-run" id="btn-run">▶ EJECUTAR</button>
  <button class="bsm" id="btn-sync">⟳ SINCRONIZAR</button>
  <button class="bsm" id="btn-clear">🗑 Limpiar</button>
  <div class="sep"></div>
  <button class="bsm" id="btn-addqb">+ Qubit</button>
  <button class="bsm" id="btn-remqb">- Qubit</button>
  <div class="sep"></div>
  <button class="lib-btn on" data-lib="qiskit">Qiskit</button>
  <div class="sep"></div>
  <button class="mode-btn on" data-mode="circ">⚛ Circuito</button>
  <button class="mode-btn" data-mode="code">{ } Código</button>
</div>

<div class="body-layout">
  <div class="palette" id="palette">
    <div class="palette-hdr">🔲 PUERTAS</div>
    <div class="palette-body" id="palette-body"></div>
  </div>

  <div class="center-area">
    <div class="circuit-section" id="circuit-section">
      <div class="circuit-hdr">
        <span class="circuit-hdr-lbl">⚛ CIRCUITO</span>
        <span class="qcount-badge" id="qcount-badge">2 qubits · 0 puertas</span>
      </div>
      <div class="circuit-body" id="circuit-canvas"></div>
    </div>
    <div class="resize-handle-h" id="resize-h"></div>
    <div class="code-section" id="code-section">
      <div class="code-hdr">
        <span class="code-hdr-lbl">{ } EDITOR PYTHON</span>
        <div class="code-hdr-right">
          <span class="compiler-status" id="compiler-status">● SIN COMPILADOR</span>
          <button class="bsm" id="btn-ver-todo" onclick="deselectWire()" style="padding:.15rem .4rem;" title="Ver código completo de todos los cables">VER TODO</button>
          <button class="bsm" id="btn-copy" style="padding:.15rem .4rem;">COPIAR</button>
          <button class="bsm" id="btn-clear-code" style="padding:.15rem .4rem;">LIMPIAR</button>
        </div>
      </div>
      <div class="code-wrap">
        <div class="lnums" id="lnums"></div>
        <div class="editor-body">
          <div class="syn-lay" id="syn-lay"></div>
          <textarea class="code-ta" id="code-ta" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="statusbar">
        <div class="sb-dot" id="sb-dot"></div>
        <span id="sb-txt">Listo</span>
        <span id="sb-lib">Qiskit</span>
        <span id="sb-cur" style="margin-left:auto;">Ln 1, Col 1</span>
      </div>
    </div>
  </div>

  <div class="resize-handle-v" id="resize-v"></div>

  <div class="right-panel" id="right-panel">
    <div class="rtabs">
      <button class="rtab on" data-tab="out">📤 OUTPUT</button>
      <button class="rtab" data-tab="bloch">🌐 BLOCH</button>
      <button class="rtab" data-tab="save">💾 GUARDAR</button>
    </div>
    
    <div class="output-panel" id="p-out">
      <div class="out-hdr">TERMINAL</div>
      <div class="out-body" id="out-body"><span class="inf">╔══════════════════════════╗<br>║  Listo                   ║<br>╚══════════════════════════╝<br><br>✅ Listo</span></div>
      <div class="out-bar"><button class="bsm" id="btn-clear-out">LIMPIAR</button><button class="btn-run" id="btn-run2">▶ EJECUTAR</button><span id="out-elapsed" style="margin-left:auto;font-size:.45rem;"></span></div>
    </div>
    
    <div class="bloch-panel" id="p-bloch" style="display:none;">
      <div class="bloch-container">
        <canvas id="bloch-canvas" width="280" height="280"></canvas>
        <div class="bloch-controls"><select id="bloch-q-select" class="bloch-q-select"></select></div>
      </div>
      <div class="bloch-info" id="bloch-info"></div>
      <div class="gate-btns">
        <button class="gb" data-gate="H">H</button><button class="gb" data-gate="X">X</button>
        <button class="gb" data-gate="Y">Y</button><button class="gb" data-gate="Z">Z</button>
        <button class="gb" data-gate="SX">√X</button><button class="gb" data-gate="RX">Rx</button>
        <button class="gb" data-gate="RY">Ry</button><button class="gb" data-gate="RZ">Rz</button>
        <button class="gb rst" data-gate="reset">⟳ RESET</button>
      </div>
    </div>
    
    <div class="save-panel" id="p-save" style="display:none;">
      <div class="save-sec"><div class="save-title">💾 GUARDAR</div><input class="fi" id="save-name" placeholder="nombre_circuito"><button class="bsm" id="btn-save" style="margin-top:.3rem;">Guardar circuito</button><button class="bsm" id="btn-dlpy" style="margin-top:.3rem;">📥 Descargar .py</button><button class="bsm" id="btn-dlnb" style="margin-top:.3rem;">📥 .ipynb</button></div>
      <div class="save-sec" id="queue-sec" style="display:none;"><div class="save-title">⏱ Cola (>10 qubits)</div><div id="queue-list"></div><button class="bsm" id="btn-run-queue" style="margin-top:.3rem;">▶ Ejecutar cola</button></div>
      <div class="save-sec"><div class="save-title">📂 MIS CIRCUITOS</div><div id="circ-list"></div></div>
    </div>
  </div>
</div>

<script>

let circuit = { qubits: 2, gates: [], wireLibs: [] };

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
let QCOL_IGNORED_ATTRS = new Set();

async function loadIgnoredAttrs() {
    const local = localStorage.getItem('qcol_ignored_attrs');
    if (local) {
        try {
            const arr = JSON.parse(local);
            QCOL_IGNORED_ATTRS = new Set(arr);
        } catch(e) {}
    }
    if (engineURL && engineURL.trim()) {
        try {
            const base = engineURL.replace(/\/+$/, '');
            const res = await fetch(base + '/run/get_ignored_attrs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [] })
            });
            if (res.ok) {
                const raw = await res.json();
                const cloudList = raw.data ? raw.data[0] : raw;
                if (Array.isArray(cloudList)) {
                    cloudList.forEach(attr => QCOL_IGNORED_ATTRS.add(attr));
                    localStorage.setItem('qcol_ignored_attrs', JSON.stringify([...QCOL_IGNORED_ATTRS]));
                }
            }
        } catch(e) { /* silencioso */ }
    }
}

window.addEventListener('storage', (e) => {
    if (e.key === 'qcol_ignored_attrs') {
        loadIgnoredAttrs().then(() => {
            if (pyodide) injectIgnoredAttrsIntoPython(pyodide);
        });
    }
});

async function saveIgnoredAttrLocal(attr, reason) {
    QCOL_IGNORED_ATTRS.add(attr);
    localStorage.setItem('qcol_ignored_attrs', JSON.stringify([...QCOL_IGNORED_ATTRS]));
    if (engineURL && engineURL.trim()) {
        try {
            const base = engineURL.replace(/\/+$/, '');

                }]

                method: 'POST',

// ═══════════════════════════════════════════════════════════════════════
// FUNCIÓN CLASIFICADORA CON DEEPSEEK (en lugar de Mistral) — MODIFICADA PARA MANEJAR CORS Y SANITIZAR API KEY
// ═══════════════════════════════════════════════════════════════════════
async function callMistralClassifier(errorPayload) {
    let apiKey = localStorage.getItem('qcol_mistral_key') || '';
    apiKey = apiKey.replace(/[\s"'\n\r\t]/g, '').trim();
    const enabled = localStorage.getItem('qcol_mistral_enabled') === 'true';
    if (!enabled || !apiKey) return null;
    
    const url = 'https://api.deepseek.com/v1/chat/completions';
    const model = 'deepseek-chat';
    const timeoutSec = parseInt(localStorage.getItem('qcol_mistral_timeout') || '10');
    const timeoutMs = timeoutSec * 1000;
    const customPrompt = localStorage.getItem('qcol_mistral_prompt') || '';

    const defaultPrompt = `Eres un clasificador de errores de Qiskit. Tu tarea es responder ÚNICAMENTE con una línea en el formato exacto:

- Si el error es por un atributo o método que NO es necesario para dibujar el circuito (por ejemplo, métodos de simulación, visualización, metadatos, o errores de lógica del usuario), responde exactamente: "NO_ESENCIAL:nombre_del_atributo"
- Si el error es crítico y el atributo es necesario para la estructura del circuito (puertas, qubits, conexiones), responde exactamente: "CRITICO:nombre_del_atributo"

Ejemplos:
- Para "AttributeError: 'QuantumCircuit' object has no attribute 'draw'", responde: "NO_ESENCIAL:draw"
- Para "NameError: name 'q' is not defined", responde: "NO_ESENCIAL:q"
- Para "AttributeError: 'QuantumCircuit' object has no attribute 'cx'", responde: "CRITICO:cx"

NO añadas nada más. Solo esa línea.`;

    const systemPrompt = customPrompt || defaultPrompt;
    const userMessage = `Error: ${errorPayload.error_msg || ''}\nAtributo sospechoso: ${errorPayload.attribute_name || 'desconocido'}`;

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: model,
                messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userMessage }
                ],
                temperature: 0.0,
                max_tokens: 20
            }),
            signal: controller.signal
        });
        clearTimeout(timeoutId);

        const rawText = await response.text();
        if (rawText.trim().startsWith('<') || rawText.trim().startsWith('<!')) {
            const out = document.getElementById('out-body');
            if (out) out.innerHTML += `<span class="er">❌ DeepSeek bloqueado por CORS — la API no acepta llamadas directas desde el navegador (GitHub Pages).<br><small>Esto es esperado. El sistema IA no puede funcionar sin un proxy. El error original se mostrará.</small></span>\n`;
            return null;
        }

        if (!response.ok) {
            let errorMsg = '';
            try {
                const errData = JSON.parse(rawText);
                errorMsg = errData.error?.message || rawText.slice(0, 200);
            } catch(e) {
                errorMsg = rawText.slice(0, 200);
            }
            const out = document.getElementById('out-body');
            if (response.status === 401 || response.status === 403) {
                console.warn('DeepSeek auth error:', response.status, errorMsg);
                if (!window._deepseekAuthWarnShown) {
                    window._deepseekAuthWarnShown = true;
                    if (out) out.innerHTML += `<span class="er" style="font-size:.6rem;">⚠️ DeepSeek sin acceso (${response.status}) — verifica saldo en platform.deepseek.com. Usando clasificador local.</span>\n`;
                }
            } else {
                if (out) out.innerHTML += `<span class="er">❌ Error de DeepSeek (${response.status}): ${errorMsg}</span>\n`;
            }
            return null;
        }

        let data;
        try {
            data = JSON.parse(rawText);
        } catch(parseErr) {
            const out = document.getElementById('out-body');
            if (out) out.innerHTML += `<span class="er">❌ Respuesta no válida de DeepSeek: ${rawText.slice(0, 100)}</span>\n`;
            return null;
        }

        const content = data.choices?.[0]?.message?.content?.trim() || '';
        console.log('DeepSeek respuesta cruda:', content);

        const match = content.match(/^(NO_ESENCIAL|CRITICO):([a-zA-Z_][a-zA-Z0-9_]*)/i);
        if (match) {
            const classification = match[1].toUpperCase() === 'NO_ESENCIAL' ? 'unnecessary' : 'critical';
            const attribute = match[2];
            return { classification, attribute, reason: 'Clasificado por DeepSeek' };
        }

        if (content.toUpperCase() === 'NO') {
            return { classification: 'unnecessary', attribute: errorPayload.attribute_name || 'unknown', reason: 'Respuesta "NO"' };
        }
        if (content.toUpperCase() === 'SI') {
            return { classification: 'critical', attribute: errorPayload.attribute_name || 'unknown', reason: 'Respuesta "SI"' };
        }

        console.warn('Respuesta no reconocida:', content);
        const out = document.getElementById('out-body');
        if (out) out.innerHTML += `<span class="er">⚠️ Respuesta inesperada de DeepSeek: ${content}</span>\n`;
        return null;
    } catch (err) {
        console.error('DeepSeek fetch error:', err);
        const out = document.getElementById('out-body');
        if (out) out.innerHTML += `<span class="er">❌ Error de red al consultar DeepSeek: ${err.message}</span>\n`;
        return null;
    } finally {
        clearTimeout(timeoutId);
    }
}

async function injectIgnoredAttrsIntoPython(py) {
    if (!py) return;
    const attrsList = JSON.stringify([...QCOL_IGNORED_ATTRS]);
    await py.runPythonAsync(`
import sys
_IGNORED_ATTRS = set(${attrsList})
if 'QuantumCircuit' in globals():
    _orig_getattr = QuantumCircuit.__getattr__
    def _patched_getattr(self, name):
        if name in _IGNORED_ATTRS:
            return self
        return _orig_getattr(self, name)
    QuantumCircuit.__getattr__ = _patched_getattr
`);
}

// Definición de puertas (colores originales)
const GATES = {

    { id: 'X',  sym: 'X',   bg: '#c01c28', glow:'#c01c28', desc: 'Pauli-X',    code: 'qc.x({q})',              cirqCode: 'circuit_cirq.append(cirq.X(qubits[{q}]))',                        regex: /qc\.x\((\d+)\)/ },
    { id: 'Y',  sym: 'Y',   bg: '#7a3e99', glow:'#7a3e99', desc: 'Pauli-Y',    code: 'qc.y({q})',              cirqCode: 'circuit_cirq.append(cirq.Y(qubits[{q}]))',                        regex: /qc\.y\((\d+)\)/ },
    { id: 'Z',  sym: 'Z',   bg: '#1c71d8', glow:'#1c71d8', desc: 'Pauli-Z',    code: 'qc.z({q})',              cirqCode: 'circuit_cirq.append(cirq.Z(qubits[{q}]))',                        regex: /qc\.z\((\d+)\)/ },
    { id: 'S',  sym: 'S',   bg: '#c64600', glow:'#c64600', desc: 'Fase π/2',   code: 'qc.s({q})',              cirqCode: 'circuit_cirq.append(cirq.S(qubits[{q}]))',                        regex: /qc\.s\((\d+)\)/ },
    { id: 'T',  sym: 'T',   bg: '#26a269', glow:'#26a269', desc: 'Fase π/4',   code: 'qc.t({q})',              cirqCode: 'circuit_cirq.append(cirq.T(qubits[{q}]))',                        regex: /qc\.t\((\d+)\)/ },
    { id: 'SX', sym: '√X',  bg: '#c01c28', glow:'#c01c28', desc: 'Raíz X',     code: 'qc.sx({q})',             cirqCode: 'circuit_cirq.append(cirq.X(qubits[{q}])**0.5)',                   regex: /qc\.sx\((\d+)\)/ },
    { id: 'RX', sym: 'Rx',  bg: '#0077c2', glow:'#0077c2', desc: 'Rotación X', code: 'qc.rx(np.pi/4, {q})',   cirqCode: 'circuit_cirq.append(cirq.rx(rads=np.pi/4)(qubits[{q}]))',         regex: /qc\.rx\([^,]+,\s*(\d+)\)/ },
    { id: 'RY', sym: 'Ry',  bg: '#005f6a', glow:'#005f6a', desc: 'Rotación Y', code: 'qc.ry(np.pi/4, {q})',   cirqCode: 'circuit_cirq.append(cirq.ry(rads=np.pi/4)(qubits[{q}]))',         regex: /qc\.ry\([^,]+,\s*(\d+)\)/ },
    { id: 'RZ', sym: 'Rz',  bg: '#5e35b1', glow:'#5e35b1', desc: 'Rotación Z', code: 'qc.rz(np.pi/4, {q})',   cirqCode: 'circuit_cirq.append(cirq.rz(rads=np.pi/4)(qubits[{q}]))',         regex: /qc\.rz\([^,]+,\s*(\d+)\)/ }
  ],
  '2q': [
    { id: 'CX',   sym: 'CX',  bg: '#007070', glow:'#007070', desc: 'CNOT',  code: 'qc.cx({q},{q2})',    cirqCode: 'circuit_cirq.append(cirq.CNOT(qubits[{q}], qubits[{q2}]))',  regex: /qc\.cx\((\d+),\s*(\d+)\)/,   multi: true },
    { id: 'CZ',   sym: 'CZ',  bg: '#00695c', glow:'#00695c', desc: 'CZ',    code: 'qc.cz({q},{q2})',    cirqCode: 'circuit_cirq.append(cirq.CZ(qubits[{q}], qubits[{q2}]))',   regex: /qc\.cz\((\d+),\s*(\d+)\)/,   multi: true },
    { id: 'SWAP', sym: 'SW',  bg: '#1565c0', glow:'#1565c0', desc: 'SWAP',  code: 'qc.swap({q},{q2})',  cirqCode: 'circuit_cirq.append(cirq.SWAP(qubits[{q}], qubits[{q2}]))', regex: /qc\.swap\((\d+),\s*(\d+)\)/, multi: true }
  ],
  '3q': [
    { id: 'CCX', sym: 'CCX', bg: '#005f6a', glow:'#005f6a', desc: 'Toffoli',       code: 'qc.ccx({q},{q2},{q3})',   cirqCode: 'circuit_cirq.append(cirq.CCX(qubits[{q}], qubits[{q2}], qubits[{q3}]))',   regex: /qc\.ccx\((\d+),\s*(\d+),\s*(\d+)\)/,   triple: true },
    { id: 'CSW', sym: 'CSW', bg: '#283593', glow:'#283593', desc: 'Fredkin (CSWAP)', code: 'qc.cswap({q},{q2},{q3})', cirqCode: 'circuit_cirq.append(cirq.CSWAP(qubits[{q}], qubits[{q2}], qubits[{q3}]))', regex: /qc\.cswap\((\d+),\s*(\d+),\s*(\d+)\)/, triple: true }

  ]
};

function buildPalette() {
  const container = document.getElementById('palette-body');
  if (!container) return;
  const wLib    = selectedWire >= 0 ? getWireLib(selectedWire) : curLib;
  const libLbl  = wLib === 'cirq' ? '● CIRQ ACTIVO' : '○ QISKIT ACTIVO';
  const libCls  = wLib === 'cirq' ? 'cirq' : 'qiskit';
  let html = `<div class="pal-lib-badge ${libCls}">${libLbl}</div>`;
  html += '<div class="pal-sec"><div class="pal-sec-lbl">1 QUBIT</div><div class="pal-grid">';
  GATES['1q'].forEach(g => { html += `<div class="pal-gate" draggable="true" data-gate="${g.id}" style="background:${g.bg};box-shadow:0 0 6px ${g.glow}" ondragstart="onDragStart(event)" ondragend="onDragEnd()"><span class="pal-gate-sym">${g.sym}</span><span class="pal-gate-lbl">${g.id}</span></div>`; });
  html += '</div></div><div class="pal-sec"><div class="pal-sec-lbl">2 QUBITS</div><div class="pal-grid">';
  GATES['2q'].forEach(g => { html += `<div class="pal-gate" draggable="true" data-gate="${g.id}" style="background:${g.bg};box-shadow:0 0 6px ${g.glow}" ondragstart="onDragStart(event)" ondragend="onDragEnd()"><span class="pal-gate-sym">${g.sym}</span><span class="pal-gate-lbl">${g.id}</span></div>`; });
  html += '</div></div><div class="pal-sec"><div class="pal-sec-lbl">3 QUBITS</div><div class="pal-grid">';
  GATES['3q'].forEach(g => { html += `<div class="pal-gate" draggable="true" data-gate="${g.id}" style="background:${g.bg};box-shadow:0 0 6px ${g.glow}" ondragstart="onDragStart(event)" ondragend="onDragEnd()"><span class="pal-gate-sym">${g.sym}</span><span class="pal-gate-lbl">${g.id}</span></div>`; });
  html += '</div></div><div class="pal-sec"><div class="pal-sec-lbl">MEDICIÓN</div><div class="pal-grid">';
  GATES['meas'].forEach(g => { html += `<div class="pal-gate" draggable="true" data-gate="${g.id}" style="background:${g.bg};box-shadow:0 0 6px ${g.glow}" ondragstart="onDragStart(event)" ondragend="onDragEnd()"><span class="pal-gate-sym">${g.sym}</span><span class="pal-gate-lbl">${g.id}</span></div>`; });
  html += '</div></div>';
  container.innerHTML = html;
}

function onDragStart(e) { dragGate = e.target.closest('.pal-gate')?.dataset.gate; if (dragGate) e.dataTransfer.setData('text/plain', dragGate); }
function onDragEnd() { dragGate = null; }
function onWireDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dh'); }
function onWireDragLeave(e) { e.currentTarget.classList.remove('dh'); }
function onWireDrop(e, qubit) { e.preventDefault(); e.currentTarget.classList.remove('dh'); const gateId = dragGate || e.dataTransfer.getData('text/plain'); if (gateId) placeGate(gateId, qubit); dragGate = null; }

function findGateDef(id) { for (const cat of Object.values(GATES)) { const g = cat.find(g => g.id === id); if (g) return g; } return null; }

function placeGate(gateId, qubit) {
  if (isUpdatingFromCode) return;
  isUpdatingFromCircuit = true;
  const def = findGateDef(gateId);
  if (!def) { isUpdatingFromCircuit = false; return; }

  if (circuit.gates.length >= MAX_GATES) {
    notify(`⛔ Límite de ${MAX_GATES} puertas alcanzado`);
    isUpdatingFromCircuit = false;
    return;
  }

  if (def.triple) {
    if (circuit.qubits < 3) { notify('Necesitas al menos 3 qubits'); isUpdatingFromCircuit = false; return; }
    let qCtrl = qubit;
    let qSwap1 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1;
    let qSwap2 = qubit + 2 < circuit.qubits ? qubit + 2 : qubit - 2;
    if (qSwap1 < 0) qSwap1 = 0;
    if (qSwap2 < 0) qSwap2 = 0;
    if (qCtrl === qSwap1) qSwap1 = (qSwap1 + 1) % circuit.qubits;
    if (qCtrl === qSwap2) qSwap2 = (qSwap2 + 1) % circuit.qubits;
    if (qSwap1 === qSwap2) qSwap2 = (qSwap2 + 1) % circuit.qubits;
    const qs = [qCtrl, qSwap1, qSwap2].sort((a, b) => a - b);
    circuit.gates.push({ id: gateId, q: qs[0], q2: qs[1], q3: qs[2], def: def, uid: nextId++, lib: getWireLib(qubit) });
  } else if (def.multi) {
    if (circuit.qubits < 2) { notify('Necesitas al menos 2 qubits'); isUpdatingFromCircuit = false; return; }
    const q2 = qubit + 1 < circuit.qubits ? qubit + 1 : qubit - 1;
    circuit.gates.push({ id: gateId, q: Math.min(qubit, q2), q2: Math.max(qubit, q2), def: def, uid: nextId++, lib: getWireLib(qubit) });
  } else {
    if (gateId === 'M') {
      // Medición: quitar M existente en este qubit y añadir al final
      circuit.gates = circuit.gates.filter(g => !(g.id === 'M' && g.q === qubit));
      circuit.gates.push({ id: gateId, q: qubit, def: def, uid: nextId++, lib: getWireLib(qubit) });
    } else {
      // Puerta normal: insertar antes de las mediciones de este qubit
      const firstM = circuit.gates.findIndex(g => g.id === 'M' && g.q === qubit);
      if (firstM >= 0) {
        circuit.gates.splice(firstM, 0, { id: gateId, q: qubit, def: def, uid: nextId++, lib: getWireLib(qubit) });
      } else {
        circuit.gates.push({ id: gateId, q: qubit, def: def, uid: nextId++, lib: getWireLib(qubit) });
      }
    }
  }
  renderCircuit();
  updateCircuitInfo();
  updateCodeFromCircuit();
  isUpdatingFromCircuit = false;
  notify(`${gateId} → q[${qubit}]`);
}

function removeGate(uid) {
  if (isUpdatingFromCode) return;
  isUpdatingFromCircuit = true;
  circuit.gates = circuit.gates.filter(g => g.uid !== uid);
  renderCircuit();
  updateCircuitInfo();
  updateCodeFromCircuit();
  isUpdatingFromCircuit = false;
}

// ═══════════════════════════════════════════════════════════
// SISTEMA DE LIBRERÍA POR CABLE (HÍBRIDO QISKIT + CIRQ)
// ═══════════════════════════════════════════════════════════

function initWireLibs() {
  if (!circuit.wireLibs) circuit.wireLibs = [];
  while (circuit.wireLibs.length < circuit.qubits) circuit.wireLibs.push(curLib);
  circuit.wireLibs = circuit.wireLibs.slice(0, circuit.qubits);
}

function getWireLib(q) {
  return (circuit.wireLibs && circuit.wireLibs[q]) || curLib;
}

function setWireLib(q, lib) {
  if (!circuit.wireLibs) circuit.wireLibs = [];
  circuit.wireLibs[q] = lib;
  circuit.gates.forEach(g => {
    if (g.q === q || g.q2 === q || g.q3 === q) g.lib = lib;
  });
  renderCircuit();
  buildPalette();
  updateCodeFromCircuit();
}

function toggleWireLib(q) {
  const newLib = getWireLib(q) === 'qiskit' ? 'cirq' : 'qiskit';
  setWireLib(q, newLib);
  selectedWire = q;
  document.querySelectorAll('.lib-btn').forEach(b => b.classList.toggle('on', b.dataset.lib === newLib));
  notify(`q[${q}] → ${newLib}`);
}

function selectWire(q) {
  selectedWire = q;
  const wLib = getWireLib(q);
  document.querySelectorAll('.lib-btn').forEach(b => b.classList.toggle('on', b.dataset.lib === wLib));
  renderCircuit();
  buildPalette();
  updateCodeFromCircuit();
}

function deselectWire() {
  selectedWire = -1;
  document.querySelectorAll('.lib-btn').forEach(b => b.classList.toggle('on', b.dataset.lib === curLib));
  renderCircuit();
  buildPalette();
  updateCodeFromCircuit();
}

function getGateCode(gate) {
  const lib = gate.lib || getWireLib(gate.q);
  const tmpl = lib === 'cirq' ? (gate.def.cirqCode || gate.def.code) : gate.def.code;
  return tmpl
    .replace(/\{q\}/g,  String(gate.q))
    .replace(/\{q2\}/g, String(gate.q2 !== undefined ? gate.q2 : 0))
    .replace(/\{q3\}/g, String(gate.q3 !== undefined ? gate.q3 : 0));
}

function generateQiskitCode(gates) {
  let c = `from qiskit import QuantumCircuit\nimport numpy as np\nfrom qiskit_aer import AerSimulator\n\nqc = QuantumCircuit(${circuit.qubits}, ${circuit.qubits})\n\n`;
  gates.forEach(g => { c += getGateCode(g) + '\n'; });
  const hasMeasure = gates.some(g => g.id === 'M');
  if (!hasMeasure) c += `\nqc.measure(range(${circuit.qubits}), range(${circuit.qubits}))\n`;
  c += `\nprint(qc.draw(output='text'))\n\nsimulator = AerSimulator()\nresult = simulator.run(qc, shots=1024).result()\ncounts = result.get_counts()\nprint("Resultados:", counts)`;
  return c;
}

function generateCirqCode(gates) {
  let c = `import cirq\nimport numpy as np\n\nqubits = [cirq.GridQubit(0, i) for i in range(${circuit.qubits})]\ncircuit_cirq = cirq.Circuit()\n\n`;
  gates.forEach(g => { c += getGateCode(g) + '\n'; });
  c += `\nprint(circuit_cirq)`;
  return c;
}

function generateHybridCode() {
  const qGates = circuit.gates.filter(g => (g.lib || getWireLib(g.q)) === 'qiskit');
  const cGates = circuit.gates.filter(g => (g.lib || getWireLib(g.q)) === 'cirq');
  let c = `# QUANTUM OPEN LAB — CIRCUITO HÍBRIDO\n`;
  if (qGates.length > 0) {
    c += `\n# ── Parte Qiskit ──────────────────────────────────\n`;
    c += `from qiskit import QuantumCircuit\nimport numpy as np\nfrom qiskit_aer import AerSimulator\n\n`;
    c += `qc = QuantumCircuit(${circuit.qubits}, ${circuit.qubits})\n`;
    qGates.forEach(g => { c += getGateCode(g) + '\n'; });
    c += `qc.measure(range(${circuit.qubits}), range(${circuit.qubits}))\n`;
    c += `print("--- Qiskit ---")\nprint(qc.draw(output='text'))\n`;
    c += `simulator = AerSimulator()\nresult = simulator.run(qc, shots=1024).result()\ncounts = result.get_counts()\nprint("Resultados Qiskit:", counts)\n`;
  }
  if (cGates.length > 0) {
    c += `\n# ── Parte Cirq ────────────────────────────────────\n`;
    c += `import cirq\n\n`;
    c += `qubits = [cirq.GridQubit(0, i) for i in range(${circuit.qubits})]\ncircuit_cirq = cirq.Circuit()\n`;
    cGates.forEach(g => { c += getGateCode(g) + '\n'; });
    c += `print("--- Cirq ---")\nprint(circuit_cirq)\n`;
  }
  return c;
}

    else if (g.q2 !== undefined) { col = Math.max(depth[g.q], depth[g.q2]); depth[g.q] = col + 1; depth[g.q2] = col + 1; }
    else { col = depth[g.q]; depth[g.q]++; }

function updateCircuitInfo() {
  const _mCount = circuit.gates.filter(g => g.id === 'M').length;
  const ng = circuit.gates.length - _mCount;
  const _badge = `${circuit.qubits} qubits · ${ng} puertas${_mCount > 0 ? ' · ' + _mCount + ' medic.' : ''}`;
  document.getElementById('qcount-badge').textContent = _badge;
  updateBlochSelector();
  const qs = document.getElementById('queue-sec');
  if (qs) qs.style.display = circuit.qubits > 10 ? 'block' : 'none';
}

function updateBlochSelector() {
  const sel = document.getElementById('bloch-q-select');
  if (!sel) return;
  sel.innerHTML = '';
  for (let i = 0; i < circuit.qubits; i++) {
    let state = blochStates[i] || { theta: 0, phi: 0 };
    let label = state.theta < 0.1 ? '|0⟩' : state.theta > Math.PI - 0.1 ? '|1⟩' : 'sup';
    sel.innerHTML += `<option value="${i}">Qubit ${i} (${label})</option>`;
  }
  if (currentBlochQubit >= circuit.qubits) currentBlochQubit = circuit.qubits - 1;
  if (sel.value !== currentBlochQubit.toString()) sel.value = currentBlochQubit;
}

// ═══════════════════════════════════════════════════════════
// GENERACIÓN DE CÓDIGO — HÍBRIDO QISKIT + CIRQ
// ═══════════════════════════════════════════════════════════
function updateCodeFromCircuit() {
  if (isUpdatingFromCode) return;
  const qGates = circuit.gates.filter(g => (g.lib || getWireLib(g.q)) === 'qiskit');
  const cGates = circuit.gates.filter(g => (g.lib || getWireLib(g.q)) === 'cirq');
  let code;
  if (qGates.length > 0 && cGates.length > 0) {
    code = generateHybridCode();
  } else if (cGates.length > 0) {
    code = generateCirqCode(circuit.gates);
  } else {
    code = generateQiskitCode(circuit.gates);
  }
  const ta = document.getElementById('code-ta');
  if (ta && ta.value !== code) { ta.value = code; updateSyntaxHighlight(); }
}

// ============================================================
// FILTRADO ROBUSTO DE CÓDIGO (3 capas) — VERSIÓN CON PASS
// ============================================================
function robustPreprocess(code) {
    // ═══ CAPA 1: Limpiar Unicode ═══
    let out = '';
    for (let i = 0; i < code.length; i++) {
        const cp = code.codePointAt(i);
        if (cp > 127) {
            const latinMap = {
                'θ':'theta','λ':'lam','μ':'mu','π':'pi','σ':'sigma',
                'φ':'phi','ψ':'psi','ω':'omega',
                '₀':'0','₁':'1','₂':'2','₃':'3','₄':'4',
                '₅':'5','₆':'6','₇':'7','₈':'8','₉':'9',
                '⁰':'0','¹':'1','²':'2','³':'3','⁴':'4',
                '⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9',
                'á':'a','é':'e','í':'i','ó':'o','ú':'u',
                'Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','ñ':'n','Ñ':'N'
            };
            if (latinMap[code[i]]) { out += latinMap[code[i]]; continue; }
            out += '_';
            if (cp > 0xFFFF) i++;
        } else {
            out += code[i];
        }
    }
    code = out;

    // ═══ CAPA 2: Eliminar decoradores no estándar ═══
    code = code.replace(/^@(?!property|staticmethod|classmethod|abstractmethod)[^\n]+\n/gm, '');

    // ═══ CAPA 3: Sustituir líneas problemáticas por pass (preservando indentación) ═══
    const NON_ESSENTIAL = [
        // ── Qiskit no esencial ────────────────────────────────────
        /\bAerSimulator\s*\(/, /simulator\.run\b/, /\.result\(\)/, /get_counts\(/,
        /plot_histogram\(/, /StatevectorSimulator/, /BasicAer\b/, /Aer\.get_backend/,
        /\.draw\s*\(/, /matplotlib/, /plt\./, /pyplot/,
        /\btranspile\s*\(/, /\bpassmanager\b/i, /PassManager/,
        /^\s*print\s*\(/, /^\s*display\s*\(/, /^\s*show\s*\(/,
        /^\s*import\s+(?!numpy|qiskit|cirq|pennylane|qutip|scipy|sympy)/,
        /^\s*from\s+(?!qiskit|numpy|cirq|pennylane|qutip).*import/,
        /\bqc\.(depth|size|num_parameters|copy|control|inverse|repeat|power|definition|qasm|properties)\s*[(\s]/,
        // ── Cirq no esencial (simuladores / visualización) ────────
        /cirq\.Simulator\s*\(/, /cirq\.DensityMatrixSimulator\s*\(/,
        /\.simulate\s*\(/, /\.run\s*\(circuits?/, /simulate_moment/,
        /cirq\.plot_state_histogram/, /cirq\.vis\b/, /cirq\.to_json/,
        /circuit_cirq\.(moments|unitary|final_state|_json_dict|all_qubits|_num_qubits_)\b/,
        /cirq\.(to_qasm|from_json|read_json|qasm|diagrams)\b/
    ];

    const lines = code.split('\n');
    const result = [];
    
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();
        const indent = line.match(/^(\s*)/)[1];
        
        if (trimmed === '' || trimmed.startsWith('#')) {
            result.push(line);
            continue;
        }
        
        let isNonEssential = NON_ESSENTIAL.some(rx => rx.test(trimmed));
        
        if (isNonEssential) {
            const prevLine = result[result.length - 1]?.trim() || '';
            if (prevLine.endsWith(':')) {
                result.push(indent + 'pass  # omitido');
            } else {
                result.push(indent + 'pass  # omitido');
            }
            continue;
        }
        
        result.push(line);
    }
    
    return result.join('\n');
}

        // Transpilación
        'transpile','optimize','schedule','coupling_map','optimization_level',
        // Variables auxiliares de resultado
        'counts','circuit_result','measurement','probs','probabilities',
    ]);
    const CRIT = new Set([
        'h','x','y','z','s','t','sx','cx','cy','cz','ccx','swap',
        'rx','ry','rz','u','p','cp','measure','measure_all','barrier',
        'QuantumCircuit','QuantumRegister','ClassicalRegister',
        'num_qubits','qubits','clbits','data','append','compose',
    ]);
    if (UNNEC.has(attr)) return { classification:'unnecessary', attribute:attr, reason:'Módulo/método no estructural (clasificador local)' };
    if (CRIT.has(attr)) return { classification:'critical',   attribute:attr, reason:'Elemento estructural del circuito' };
    if (/get_counts|plot_histogram|matplotlib|pyplot|\.draw\(/.test(errText))
        return { classification:'unnecessary', attribute:attr, reason:'Error en código de visualización/simulación' };
    return null;
}

// ═══════════════════════════════════════════════════════════════════
function extractOffendingAttribute(errorText) {
    let match = errorText.match(/NameError: name ['"]([^'"]+)['"] is not defined/);
    if (match) return match[1];
    match = errorText.match(/has no attribute ['"]([^'"]+)['"]/);
    if (match) return match[1];
    match = errorText.match(/object has no attribute ['"]([^'"]+)['"]/);
    if (match) return match[1];
    if (errorText.includes('object is not subscriptable') || 
        errorText.includes('object is not iterable') ||
        errorText.includes('object is not callable')) {
        return 'unknown_attribute';
    }
    return null;
}

function _cleanCodeForServer(raw) {

        .replace(/^.*from\s+qiskit\.extensions.*$/gm, '# removed')
        .replace(/^.*from\s+qiskit\.tools.*$/gm, '# removed')
        .replace(/^.*from\s+qiskit\.providers\.ibmq.*$/gm, '# removed')
        .replace(/\bAer\.get_backend\s*\([^)]*\)/g, 'AerSimulator()')
        .replace(/\bexecute\s*\(\s*(\w+)\s*,\s*[^,)]+(?:,\s*shots\s*=\s*(\d+))?\s*\)/g,
            (m, qc, shots) => `AerSimulator().run(transpile(${qc}, AerSimulator()), shots=${shots || 1024})`)
        .replace(/[₀₁₂₃₄₅₆₇₈₉]/g, c => '₀₁₂₃₄₅₆₇₈₉'.indexOf(c))
        .replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g, c => '⁰¹²³⁴⁵⁶⁷⁸⁹'.indexOf(c));
}

function _parseTextDraw(text) {
    if (!text) return null;
    const lines = text.split('\n');
    const qubitLines = lines.filter(l => /^\s*(q_?\d+\s*:|q\[\d+\]\s*:)/.test(l));
    if (qubitLines.length === 0) return null;
    const gates = [];
    const symMap = {
        'H':'H','X':'X','Y':'Y','Z':'Z','S':'S','T':'T','SX':'SX',
        'RX':'RX','RY':'RY','RZ':'RZ','CX':'CX','CZ':'CZ','SWAP':'SWAP',
        'CCX':'CCX','M':'M','Rx':'RX','Ry':'RY','Rz':'RZ','Sx':'SX'
    };
    qubitLines.forEach((line, qi) => {
        const matches = [...line.matchAll(/┤\s*(\w+)\s*[├┤]/g)];
        matches.forEach(m => {
            const name = m[1].trim();
            const gid = symMap[name] || mapOpNameToGateId(name.toLowerCase());
            const def = findGateDef(gid);
            if (def && gates.length < MAX_GATES) {
                gates.push({ id: gid, q: qi, def, uid: nextId++ });
            }
        });
        if (/[░»╫]/.test(line) || /┤M[├┤]/.test(line)) {
            const def = findGateDef('M');
            if (def) gates.push({ id: 'M', q: qi, def, uid: nextId++ });
        }
    });
    const nonM = gates.filter(g => g.id !== 'M');
    const meas  = gates.filter(g => g.id === 'M');
    return { numQubits: qubitLines.length, gates: [...nonM, ...meas] };
}

    out.innerHTML += `<span class="inf">🔧 Corrector activo (${reason}) — ejecutando en servidor...</span>\n`;
    const cleanCode = _cleanCodeForServer(rawCode);
    const isHF = engineURL.includes('hf.space') || engineURL.includes('huggingface');
    try {
        const res = await fetchWithRetry(
            isHF ? engineURL + '/run/predict' : engineURL + '/run',
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: isHF
                    ? JSON.stringify({ data: [cleanCode], fn_index: 1 })
                    : JSON.stringify({ code: cleanCode, lib: curLib })
            }, 2, 20000);
        const raw = await res.json();
        let d = isHF ? (raw.data ? raw.data[0] : raw) : raw;
        if (typeof d === 'string') { try { d = JSON.parse(d); } catch(e) {} }
        if (!d?.success) {
            out.innerHTML += `<span class="er">⚠️ Servidor: ${escapeHtml((d?.output||'error').slice(0,120))}</span>\n`;
            return false;
        }
        _lastServerOutput = d.output || '';
        const parsed = _parseTextDraw(_lastServerOutput);
        if (parsed && parsed.gates.length > 0) {
            circuit.qubits = Math.min(parsed.numQubits, MAX_QUBITS);
            circuit.gates = parsed.gates;
            renderCircuit();
            updateCircuitInfo();
            if (d.bloch?.probabilities) updateBlochFromProbs(d.bloch.probabilities);
            out.innerHTML += `<span class="ok">✅ Corrector: ${parsed.numQubits} qubits · ${parsed.gates.filter(g=>g.id!=='M').length} puertas reconstruidas del servidor</span>\n`;
            notify(`🔧 ${parsed.gates.length} elementos del servidor`);
            return true;
        }
        // Servidor ejecutó OK pero no hay dibujo parseable — mostrar salida
        out.innerHTML += `<span class="ok">✅ Servidor OK:\n${escapeHtml(_lastServerOutput.slice(0, 300))}</span>\n`;
        if (d.bloch?.probabilities) updateBlochFromProbs(d.bloch.probabilities);
        return false;
    } catch(e) {
        out.innerHTML += `<span class="er">⚠️ Corrector: ${e.message}</span>\n`;
        return false;
    }
}

async function syncWithPyodide(retryCount = 0) {
    if (isUpdatingFromCircuit) return;
    isUpdatingFromCircuit = true;
    const rawCode = document.getElementById('code-ta').value;
    if (!rawCode.trim()) { isUpdatingFromCircuit = false; return; }
    const out = document.getElementById('out-body');
    out.innerHTML += '<span class="inf">🔄 Sincronizando código → circuito visual...</span>\n';
    try {
        const py = await initPyodide();
        const code = robustPreprocess(rawCode);
        py.globals.set('_pending_user_code', code);
        const result = await py.runPythonAsync(`
import json, traceback, re, sys, ast as _ast

_user_code = globals().get('_pending_user_code', '')
import random as _rand, math as _math, cmath as _cmath
import itertools as _itr, functools as _ft, collections as _col

_ns = {
    '__builtins__': __builtins__,
    'random': _rand, 'math': _math, 'cmath': _cmath,
    'itertools': _itr, 'functools': _ft, 'collections': _col,
    'pi': _math.pi, 'e': _math.e, 'inf': _math.inf,
}
try:
    import numpy as _np
    _ns['np'] = _np
    _ns['pi'] = _np.pi
    _ns['exp'] = _np.exp
    _ns['sin'] = _np.sin
    _ns['cos'] = _np.cos
    _ns['sqrt'] = _np.sqrt
except: pass

for _rname in ['q', 'qr', 'cr', 'c', 'anc', 'aux']:
    if _rname not in _ns:
        _ns[_rname] = QuantumRegister(2, _rname)

_error = None
_circuit = None
_num_qubits = 0
_data = []

def _sanitize(code):
    lines = code.splitlines()
    out = []
    for line in lines:
        safe = ''.join(c if (ord(c) < 128 or c in '\\n\\t') else '_' for c in line)
        out.append(safe)
    return '\\n'.join(out)

_clean_code = _sanitize(_user_code)

try:
    exec(compile(_clean_code, '<qcol>', 'exec'), _ns)
except SyntaxError as _se:
    _bad_line = getattr(_se, 'lineno', None)
    if _bad_line is not None:
        _patched = '\\n'.join(
            l if i+1 != _bad_line else '    pass  # syntax fixed'
            for i, l in enumerate(_clean_code.splitlines())
        )
        try:
            exec(compile(_patched, '<qcol_fixed>', 'exec'), _ns)
        except Exception as _e2:
            _error = str(_se)
    else:
        _error = str(_se)
except Exception as _e:
    _errors_linea = []
    _buf = []
    _lines_raw = _clean_code.splitlines(keepends=True)
    for _lnum, _line in enumerate(_lines_raw, 1):
        _buf.append(_line)
        _snippet = ''.join(_buf)
        try:
            _ast.parse(_snippet)
            try:
                exec(compile(_snippet, f'<block_{_lnum}>', 'exec'), _ns)
                _buf = []
            except Exception as _block_err:
                _errors_linea.append(f'L{_lnum}: {type(_block_err).__name__}: {_block_err}')
                _buf = []
        except SyntaxError:
            pass
    if _buf:
        try:
            exec(compile(''.join(_buf), '<block_final>', 'exec'), _ns)
        except:
            pass
    if _errors_linea:
        _error = 'Errores parciales: ' + '; '.join(_errors_linea[:3])

if _error is None:
    # ── Buscar circuito Qiskit ────────────────────────────
    for _cname in ['circuit','qc','circ','qcirc','c','circ1','qcircuit','qc1','main_circuit']:
        _obj = _ns.get(_cname)
        if _obj is not None and hasattr(_obj, 'data') and isinstance(_obj.data, list):
            _circuit = _obj
            break
    if _circuit is None:
        for _v in list(_ns.values()):
            if hasattr(_v, 'data') and hasattr(_v, 'num_qubits') and isinstance(getattr(_v,'data',[]), list):
                _circuit = _v
                break
    if _circuit is None:
        import re as _re
        _m = _re.search(r'QuantumCircuit\\s*\\((\\d+)', _clean_code)
        if _m:
            _num_qubits = int(_m.group(1))
    else:
        try:
            _nq = getattr(_circuit, 'num_qubits', 2)
            _num_qubits = int(_nq) if isinstance(_nq, (int, float)) else len(list(_nq)) if hasattr(_nq,'__iter__') else 2
        except:
            _num_qubits = 2
        try:
            _data = [op for op in _circuit.data if hasattr(op,'name') and hasattr(op,'qubits')]
        except:
            _data = []

    # ── Buscar circuito Cirq ─────────────────────────────
    _cirq_circuit = None
    for _cname in ['circuit_cirq','cirq_circuit','qc_cirq','c_cirq','circ_cirq']:
        _obj = _ns.get(_cname)
        if _obj is not None and hasattr(_obj, '_is_cirq_circuit'):
            _cirq_circuit = _obj
            break
    if _cirq_circuit is None:
        for _v in list(_ns.values()):
            if getattr(_v, '_is_cirq_circuit', False) and isinstance(getattr(_v,'data',[]), list):
                _cirq_circuit = _v
                break
    _cirq_data = []
    if _cirq_circuit is not None:
        try:
            _cirq_data = [op for op in _cirq_circuit.data if hasattr(op,'name') and hasattr(op,'qubits')]
        except: pass

    # Sin circuito de ningún tipo
    if _circuit is None and _cirq_circuit is None:
        _error = "No se encontró QuantumCircuit ni cirq.Circuit en el código."

def _qubit_index(q):
    """Extrae índice entero de un qubit Qiskit o Cirq."""
    if hasattr(q, 'col'): return int(q.col)
    if isinstance(q, int): return q
    try: return int(q)
    except: return 0

def _safe_gate(op):
    try:
        name   = str(op.name)
        qubits = [_qubit_index(q) for q in (op.qubits if hasattr(op.qubits,'__iter__') else [0])]
        global _num_qubits
        for _q in qubits:
            if isinstance(_q, int) and _q >= _num_qubits: _num_qubits = _q + 1
        params = []
        try: params = [float(p) for p in (op.params or [])]
        except: pass
        return [name, qubits, params]
    except: return None

_all = [g for g in (_safe_gate(op) for op in _data) if g is not None]
_gates = [g for g in _all if g[0] != 'measure'] + [g for g in _all if g[0] == 'measure']

_cirq_all = [g for g in (_safe_gate(op) for op in _cirq_data) if g is not None]
_cirq_gates = [g for g in _cirq_all if g[0] != 'measure'] + [g for g in _cirq_all if g[0] == 'measure']

_any_circuit = _circuit is not None or _cirq_circuit is not None or (_error is None and _num_qubits > 0)

json.dumps({
    "success":        _error is None,
    "error":          _error,
    "num_qubits":     max(1, int(_num_qubits)),
    "gates":          _gates,
    "cirq_gates":     _cirq_gates,
    "circuit_exists": _any_circuit
})
        `);
        const data = JSON.parse(result);
        if (data.success && data.circuit_exists) {
            _errorLine = -1;

            circuit.qubits = Math.min(data.num_qubits, MAX_QUBITS);
            const newGates = [];

            // ── Función helper para construir objetos gate ──────────
            function _buildGates(rawList, lib) {
                for (const gate of rawList) {
                    if (newGates.length >= MAX_GATES) break;
                    const gateId = mapOpNameToGateId(gate[0]);
                    const def = findGateDef(gateId);
                    if (!def) continue;
                    const qubits = gate[1];
                    const maxQ = Math.max(...qubits.filter(q => typeof q === 'number'));
                    if (!isNaN(maxQ) && maxQ >= circuit.qubits && maxQ < MAX_QUBITS)
                        circuit.qubits = maxQ + 1;
                    const uid = nextId++;
                    if (qubits.length === 1) {
                        newGates.push({ id: gateId, q: qubits[0], def, uid, lib });
                    } else if (qubits.length === 2) {
                        newGates.push({ id: gateId, q: Math.min(qubits[0],qubits[1]), q2: Math.max(qubits[0],qubits[1]), def, uid, lib });
                    } else if (qubits.length >= 3) {
                        const s = [...qubits].sort((a,b)=>a-b);
                        newGates.push({ id: gateId, q: s[0], q2: s[1], q3: s[2], def, uid, lib });
                    }
                }
            }

            _buildGates(data.gates      || [], 'qiskit');
            _buildGates(data.cirq_gates || [], 'cirq');

            // Mediciones al final
            const _nonM = newGates.filter(g => g.id !== 'M');
            const _meas  = newGates.filter(g => g.id === 'M');
            circuit.gates = [..._nonM, ..._meas];

            // Actualizar wireLibs según qué librería usa cada qubit
            initWireLibs();
            for (let i = 0; i < circuit.qubits; i++) {
                const wg = circuit.gates.filter(g => g.q === i || g.q2 === i || g.q3 === i);
                if (wg.length > 0) circuit.wireLibs[i] = wg[0].lib;
            }

            const _gCount = _nonM.length;
            const _mCount = _meas.length;
            const _cCount = (data.cirq_gates || []).filter(g => g[0] !== 'measure').length;
            const _qCount = _gCount - _cCount;

            renderCircuit();
            updateCircuitInfo();
            updateCodeFromCircuit();
            const _hybrid = _cCount > 0 && _qCount > 0 ? ' (híbrido)' : _cCount > 0 ? ' (Cirq)' : '';
            out.innerHTML += `<span class="ok">✅ Sincronizado — ${data.num_qubits} qubits · ${_gCount} puertas${_mCount > 0 ? ' · '+_mCount+' medic.' : ''}${_hybrid}</span>\n`;
            notify(`Circuito actualizado: ${_gCount} puertas`);
            updateSyntaxHighlight();
        } else {
            const errText = data.error || '';
            const offendingAttr = extractOffendingAttribute(errText);
            const mistralEnabled = localStorage.getItem('qcol_mistral_enabled') === 'true';
            
            const lineMatch = errText.match(/(?:line|línea|L)\s*(\d+)/i) ||
                              errText.match(/<(?:qcol|line|block)[^>]*>,\s*line\s*(\d+)/);
            _errorLine = lineMatch ? parseInt(lineMatch[1]) : -1;
            updateSyntaxHighlight();
            const lineHint = _errorLine > 0 ? `<span style="color:#ffd700;"> → Línea ${_errorLine}</span>` : '';
            
            if (offendingAttr && QCOL_IGNORED_ATTRS.has(offendingAttr)) {
                out.innerHTML += `<span class="inf">ℹ️ Atributo '${offendingAttr}' ya clasificado como innecesario. Reintentando...</span>${lineHint}\n`;
                isUpdatingFromCircuit = false;
                setTimeout(() => syncWithPyodide(), 500);
                return;
            }
            if (offendingAttr && retryCount === 0) {
                // Primero: clasificador local (instantáneo)
                const _local = classifyLocallyFirst(errText, offendingAttr);
                if (_local?.classification === 'unnecessary') {
                    await saveIgnoredAttrLocal(_local.attribute, _local.reason);
                    await injectIgnoredAttrsIntoPython(py);
                    out.innerHTML += `<span class="ok">⚡ '${escapeHtml(_local.attribute)}' ignorado (local). Reintentando...</span>${lineHint}\n`;
                    isUpdatingFromCircuit = false;
                    setTimeout(() => syncWithPyodide(), 300);
                    return;
                }
                // Solo si local no pudo decidir: consultar DeepSeek
                if (mistralEnabled && !_local) {
                    out.innerHTML += `<span class="inf">🧠 Clasificador local no pudo decidir — consultando DeepSeek...</span>${lineHint}\n`;
                    const errorPayload = {
                        error_type: errText.match(/^\w+Error/)?.[0] || 'Error',
                        error_msg: errText.slice(0, 400),
                        attribute_name: offendingAttr,
                        timestamp: new Date().toISOString(),
                        already_known: false
                    };
                    const classification = await callMistralClassifier(errorPayload);
                    if (classification && classification.classification === 'unnecessary') {
                        const attr = classification.attribute || offendingAttr;
                        await saveIgnoredAttrLocal(attr, classification.reason);
                        await injectIgnoredAttrsIntoPython(py);
                        out.innerHTML += `<span class="ok">✅ DeepSeek: '${escapeHtml(attr)}' innecesario. Reintentando...</span>${lineHint}\n`;
                        isUpdatingFromCircuit = false;
                        setTimeout(() => syncWithPyodide(), 500);
                        return;
                    } else {
                        out.innerHTML += `<span class="er">⚠️ DeepSeek: error crítico o sin clasificar.</span>${lineHint}\n`;
                    }
                }
            }
            out.innerHTML += `<span class="er">❌ Error en el código:${lineHint}<br>${escapeHtml(errText.slice(0,800))}</span>\n`;
            // Corrector: si el motor está disponible, intentar reconstruir
            if (engineOK && engineURL && retryCount === 0) {
                isUpdatingFromCircuit = false;
                await syncFromServer('pyodide-fallback');
                return;
            }
        }
    } catch (err) {
        out.innerHTML += `<span class="er">❌ Error interno: ${err.message}</span>\n`;
        if (engineOK && engineURL) setTimeout(() => syncFromServer('internal-error'), 800);
    } finally {
        isUpdatingFromCircuit = false;
    }
}

async function runServerCode() {
    const code = document.getElementById('code-ta').value.trim();
    if (!code) { notify('Escribe código primero'); return; }
    if (!engineOK || !engineURL) {
        notify('❌ No hay compilador configurado. Configura la URL en el panel Fundador.');
        const out = document.getElementById('out-body');
        out.innerHTML = `<span class="er">⚠️ No se ha configurado ningún compilador en la nube.\n\nVe al panel Fundador → 🤗 Compilador HuggingFace y guarda la URL de tu Space.</span>`;
        return;
    }
    running = true;
    const btn = document.getElementById('btn-run');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> EJECUTANDO';
    setRunSt('run', 'Ejecutando en servidor...');
    setTab('out');
    const t0 = Date.now();
    const out = document.getElementById('out-body');
    out.innerHTML = `<span class="inf">Enviando código al compilador cuántico (Qiskit 1.0+)...\n</span>`;

    const isHF = engineURL.includes('hf.space') || engineURL.includes('huggingface');
    try {
        let res, d;
        if (isHF) {
            res = await fetchWithRetry(engineURL + '/run/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: [code], fn_index: 0 })
            }, 3, 30000);
            const raw = await res.json();
            d = raw.data ? raw.data[0] : raw;
        } else {
            res = await fetchWithRetry(engineURL + '/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code, lib: curLib })
            }, 3, 30000);
            d = await res.json();
        }
        const el = ((Date.now() - t0) / 1000).toFixed(2);
        document.getElementById('out-elapsed').textContent = el + 's';
        if (d.success) {
            out.innerHTML = `<span class="inf">╔════════════════════════════╗\n║  Compilador · ${el}s\n╚════════════════════════════╝\n\n</span><span class="ok">${escapeHtml(d.output)}</span>`;
            if (d.bloch?.probabilities) updateBlochFromProbs(d.bloch.probabilities);
            setRunSt('idle', 'Listo');
            logMonitorRun({ success: true, lib: curLib, qubits: circuit.qubits, time: parseFloat(el) });
            // Validación cruzada: comparar circuito visual con salida del servidor
            _lastServerOutput = d.output || '';
            const _sp = _parseTextDraw(_lastServerOutput);
            if (_sp && _sp.gates.length > 0) {
                const _vg = circuit.gates.filter(g => g.id !== 'M').length;
                const _sg = _sp.gates.filter(g => g.id !== 'M').length;
                const _pct = _sg > 0 ? Math.abs(_vg - _sg) / _sg : 0;
                if (_pct > 0.15 || (circuit.gates.length === 0 && _sg > 0)) {
                    circuit.qubits = Math.min(_sp.numQubits, MAX_QUBITS);
                    circuit.gates = _sp.gates;
                    renderCircuit();
                    updateCircuitInfo();
                    out.innerHTML += `\n<span class="ok" style="font-size:.6rem;">🔧 Canvas corregido desde salida del servidor (${_vg}→${_sg} puertas)</span>`;
                }
            }
        } else {
            out.innerHTML += `<span class="er">${formatError(d.output, code)}</span>`;
            setRunSt('err', 'Error');
        }
    } catch (e) {
        out.innerHTML += `<span class="er">❌ ${e.name === 'AbortError' ? 'Tiempo agotado tras 3 intentos (30s c/u)' : e.message}</span>`;
        setRunSt('err', 'Error');
        engineOK = false;
        document.getElementById('compiler-status').textContent = '● SIN COMPILADOR';
        document.getElementById('compiler-status').classList.remove('active', 'waiting');
    }
    running = false;
    btn.disabled = false;
    btn.innerHTML = '<span>▶</span> EJECUTAR';
    out.scrollTop = out.scrollHeight;
}

async function runCode() {
    if (running) return;
    await runServerCode();
}

// RESALTADOR DE SINTAXIS Y UTILIDADES
// ═══════════════════════════════════════════════════════════
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function highlightSyntax(plainCode) {
    const lines = plainCode.split('\n');
    const resultLines = [];
    const rules = [
        { regex: /(#.*$)/g, color: '#6272a4' },
        { regex: /(".*?"|'.*?')/g, color: '#f1fa8c' },
        { regex: /\b(from|import|def|class|return|if|elif|else|for|while|in|not|and|or|True|False|None|as|print)\b/g, color: '#ff79c6' },
        { regex: /\b(QuantumCircuit|AerSimulator|np|pi)\b/g, color: '#8be9fd' },
        { regex: /\b(\d+)\b/g, color: '#bd93f9' }
    ];
    for (let line of lines) {
        let tokens = [];
        for (const rule of rules) {
            let match;
            rule.regex.lastIndex = 0;
            while ((match = rule.regex.exec(line)) !== null) {
                tokens.push({ start: match.index, end: match.index + match[0].length, color: rule.color, text: match[0] });
            }
        }
        tokens.sort((a, b) => a.start - b.start);
        const uniqueTokens = [];
        let lastEnd = -1;
        for (const token of tokens) {
            if (token.start >= lastEnd) { uniqueTokens.push(token); lastEnd = token.end; }
        }
        let htmlLine = '';
        let pos = 0;
        for (const token of uniqueTokens) {
            if (token.start > pos) htmlLine += escapeHtml(line.substring(pos, token.start));
            htmlLine += `<span style="color:${token.color};">${escapeHtml(token.text)}</span>`;
            pos = token.end;
        }
        if (pos < line.length) htmlLine += escapeHtml(line.substring(pos));
        resultLines.push(htmlLine);
    }
    return resultLines.join('\n');
}

function updateSyntaxHighlight() {
    const ta = document.getElementById('code-ta');
    const syn = document.getElementById('syn-lay');
    const lnums = document.getElementById('lnums');
    if (!ta || !syn) return;
    const plainCode = ta.value;
    const lines = plainCode.split('\n');
    
    if (lnums) {
        lnums.innerHTML = lines.map((_, i) => {
            const lineNum = i + 1;
            const isErr = lineNum === _errorLine;
            return `<div style="${isErr ? 
                'color:#ff4466;background:rgba(255,68,102,.15);border-right:2px solid #ff4466;margin-right:-2px;' : 
                ''}">${lineNum}</div>`;
        }).join('');
        lnums.scrollTop = ta.scrollTop;
    }
    
    const highlighted = highlightSyntax(plainCode);
    if (_errorLine > 0) {
        const hlLines = highlighted.split('\n');
        if (hlLines[_errorLine - 1] !== undefined) {
            hlLines[_errorLine - 1] = 
                `<span style="background:rgba(255,68,102,.12);display:block;margin:0 -.8rem;padding:0 .8rem;">${hlLines[_errorLine - 1]}</span>`;
        }
        syn.innerHTML = hlLines.join('\n') + '\n';
    } else {
        syn.innerHTML = highlighted + '\n';
    }
    syn.scrollTop = ta.scrollTop;
    syn.scrollLeft = ta.scrollLeft;
}

function onCodeEdit() { 
    const code = document.getElementById('code-ta').value;
    const gateCallCount = (code.match(/\bqc\.\w+\s*\(/g) || []).length;
    if (gateCallCount > MAX_GATES) {
        const lines = code.split('\n');
        let count = 0;
        let cutLine = lines.length;
        for (let i = 0; i < lines.length; i++) {
            if (/\bqc\.\w+\s*\(/.test(lines[i])) count++;
            if (count > MAX_GATES) { cutLine = i; break; }
        }
        const ta = document.getElementById('code-ta');
        ta.value = lines.slice(0, cutLine).join('\n');
        notify(`⛔ Límite de ${MAX_GATES} puertas en el código. Líneas extra eliminadas.`);
    }
    updateSyntaxHighlight(); 
    if (syncTimeout) clearTimeout(syncTimeout);
    syncTimeout = setTimeout(() => {
        if (pyodide !== null) {
            syncWithPyodide().catch(() => {});
        } else if (engineOK && engineURL) {
            syncFromServer('pyodide-not-loaded').catch(() => {});
        }
    }, 800);
    
    if (circuit.gates.length === 0) {
        clearTimeout(window._emptyCanvasTimeout);
        window._emptyCanvasTimeout = setTimeout(() => {
            const code = document.getElementById('code-ta').value.trim();
            if (code && circuit.gates.length === 0 && engineOK && engineURL) {
                syncFromServer('empty-canvas').catch(() => {});
            }
        }, 3000);
    }
}

function formatError(errText, code) {
    const lines = code ? code.split('\n') : [];
    let html = '';
    const lineMatch = errText.match(/line[^\d]*(\d+)/i) || errText.match(/l\u00EDnea[^\d]*(\d+)/i);
    const errLine = lineMatch ? parseInt(lineMatch[1]) : null;
    if (errLine && errLine > 0) highlightErrorLine(errLine);
    const typeMatch = errText.match(/(SyntaxError|NameError|TypeError|ValueError|ImportError|AttributeError|IndexError|KeyError|ZeroDivisionError|IndentationError)[:\s]/);
    const errType = typeMatch ? typeMatch[1] : 'Error';
    const explanations = {
        'SyntaxError': '💡 Error de sintaxis — revisa paréntesis, dos puntos o indentación.',
        'NameError': '💡 Variable o función no definida — ¿escribiste bien el nombre?',
        'TypeError': '💡 Tipo incorrecto — estás usando un tipo de dato que no corresponde.',
        'ValueError': '💡 Valor incorrecto — el valor no es válido para esta operación.',
        'ImportError': '💡 No se pudo importar — la librería no está disponible.',
        'IndentationError': '💡 Error de indentación — verifica los espacios al inicio de la línea.',
    };
    const explanation = explanations[errType] || '💡 Revisa el código en la línea indicada.';
    html += `❌ ${errType}` + (errLine ? ` en línea ${errLine}` : '') + '\n';
    if (errLine && lines[errLine - 1]) html += `\n<span class="err-line"><span class="err-arrow">→ L${errLine}:</span> ${escapeHtml(lines[errLine - 1])}</span>\n`;
    const msgLines = errText.split('\n').filter(l => l.trim());
    html += `<span class="err-msg">${escapeHtml(msgLines[msgLines.length - 1] || errText)}</span>\n\n<span class="wa">${explanation}</span>`;
    return html;
}

function highlightErrorLine(lineNum) {
    const ta = document.getElementById('code-ta');
    if (!ta) return;
    const lines = ta.value.split('\n');
    let pos = 0;
    for (let i = 0; i < lineNum - 1 && i < lines.length; i++) pos += lines[i].length + 1;
    ta.focus();
    ta.setSelectionRange(pos, pos + (lines[lineNum - 1] || '').length);
    const lineHeight = parseInt(getComputedStyle(ta).lineHeight) || 19;
    ta.scrollTop = (lineNum - 3) * lineHeight;
    updCur();
}

async function fetchWithRetry(url, options, retries = 3, delay = 30000) {
    let lastError;
    for (let attempt = 1; attempt <= retries; attempt++) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), delay);
            const res = await fetch(url, { ...options, signal: controller.signal });
            clearTimeout(timeoutId);
            if (res.ok) return res;
            lastError = new Error(`HTTP ${res.status}`);
            if (attempt < retries) {
                notify(`⏳ Intento ${attempt}/${retries} falló, reintentando en ${delay/1000}s...`);
                await new Promise(r => setTimeout(r, delay));
            }
        } catch (e) {
            lastError = e;
            if (attempt < retries) {
                notify(`⚠️ Timeout/Error (${e.message}) - Reintento ${attempt}/${retries}`);
                await new Promise(r => setTimeout(r, delay));
            }
        }
    }
    throw lastError;
}
