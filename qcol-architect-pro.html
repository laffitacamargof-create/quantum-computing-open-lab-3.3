<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL — Quantum Notebook</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0c1525;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;--bd3:#0d1e36;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;--or:#ffb86c;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cmt:#636e8a;--cl:#8be9fd;--qt:#ff9580;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── NOTIF ── */
.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

/* ── ACCESS DENIED ── */
.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}

/* ── TOPBAR ── */
.topbar{height:40px;display:flex;align-items:center;gap:.4rem;
  padding:0 .75rem;background:#07091200;background:linear-gradient(90deg,#07091299,#080d1899);
  backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,255,221,.14);flex-shrink:0;z-index:10;}
.btn-nav-back{display:flex;align-items:center;gap:.25rem;padding:.2rem .55rem;
  background:rgba(0,255,221,.07);border:1px solid rgba(0,255,221,.25);border-radius:5px;
  color:var(--cy);font-family:var(--orb);font-size:.46rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-nav-back:hover{background:rgba(0,255,221,.15);border-color:var(--cy);}
.tb-logo{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.tb-q{font-family:var(--orb);font-size:.7rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.44rem;color:var(--cy);letter-spacing:.06em;
  background:rgba(0,255,221,.1);border:1px solid rgba(0,255,221,.2);
  padding:.08rem .3rem;border-radius:3px;}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.08);flex-shrink:0;}
.nb-name-inp{background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:.68rem;color:var(--tx);
  min-width:60px;max-width:200px;padding:.1rem .3rem;border-radius:4px;}
.nb-name-inp:focus{background:rgba(255,255,255,.04);color:var(--cy);}
.nb-name-inp::placeholder{color:var(--mu);}
#expo-badge{display:none;padding:.14rem .4rem;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);border-radius:4px;
  font-family:var(--orb);font-size:.43rem;color:var(--gr);flex-shrink:0;letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.28rem;}
.eng-pill{padding:.17rem .44rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.2);color:var(--mu);}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.3);color:var(--gr);animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{opacity:1;}50%{opacity:.6;}}
.user-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.44rem;
  background:rgba(0,255,221,.07);border:1px solid rgba(0,255,221,.18);color:var(--cy);}
.admin-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.18);color:var(--yw);}

/* ── SECBAR ── */
.secbar{height:30px;display:flex;align-items:stretch;
  background:#080b14;border-bottom:1px solid var(--bd3);flex-shrink:0;padding:0 .45rem;gap:.08rem;}
.stab{display:flex;align-items:center;gap:.22rem;padding:0 .6rem;
  background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.44rem;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--cy);border-bottom-color:var(--cy);}
.stab:hover:not(.on){color:var(--tx2);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.22rem;padding:0 .15rem;}
.tbtn{display:flex;align-items:center;gap:.25rem;padding:.2rem .5rem;
  background:transparent;border:1px solid var(--bd2);border-radius:4px;
  color:var(--mu);font-family:var(--orb);font-size:.44rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--cy);color:var(--cy);background:rgba(0,136,255,.05);}
.tbtn.run{background:linear-gradient(135deg,#003388,var(--bl));border-color:var(--bl);color:#fff;}
.tbtn.run:hover{box-shadow:0 2px 8px rgba(0,136,255,.4);}
.tbtn.run-all{background:linear-gradient(135deg,#004400,#008833);border-color:#008833;color:#fff;}
.tbtn.pub{background:linear-gradient(135deg,#005555,var(--cy));border-color:var(--cy);color:#000;}
.tbtn.rst{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.25);color:var(--yw);}
.tbtn.rst:hover{background:rgba(255,215,0,.13);}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;min-height:0;}
#view-notebook{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.nb-scroll{flex:1;overflow-y:auto;padding:.6rem 0 2rem;}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── CELDA BASE ── */
.nb-cell{display:flex;margin:.22rem auto;
  width:min(940px,97%);position:relative;
  border-radius:8px;border:1px solid transparent;transition:border-color .15s,box-shadow .15s;}
.nb-cell:hover{border-color:rgba(0,255,221,.18);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.nb-cell.active{border-color:rgba(0,255,221,.45);box-shadow:0 2px 20px rgba(0,255,221,.06);}
.nb-cell.running{border-color:rgba(0,136,255,.5);box-shadow:0 0 18px rgba(0,136,255,.08);}
/* Celda Qiskit — borde izquierdo cian */
.nb-cell.qk-cell{border-left:3px solid rgba(0,255,221,.35);}
.nb-cell.qk-cell:hover{border-color:rgba(0,255,221,.35);border-left-color:rgba(0,255,221,.6);}
.nb-cell.qk-cell.active{border-color:rgba(0,255,221,.55);border-left-color:var(--cy);}

/* ── GUTTER ── */
.cell-gutter{width:48px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;padding:.5rem .2rem 0;gap:.25rem;}
.cell-num{font-family:var(--mono);font-size:.56rem;color:var(--mu2);min-width:20px;text-align:center;}
.cell-run-btn{width:23px;height:23px;border-radius:50%;background:transparent;
  border:1px solid var(--bd2);color:var(--mu);font-size:.62rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.nb-cell.active .cell-run-btn{border-color:var(--cy);color:var(--cy);}
.qk-cell .cell-run-btn{border-color:rgba(0,255,221,.3);color:var(--cy);}
.qk-cell.active .cell-run-btn{border-color:var(--cy);color:var(--cy);}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.12);}
.cell-run-btn.spinning{animation:sp .7s linear infinite;border-color:var(--gr);color:var(--gr);}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── BODY ── */
.cell-body{flex:1;display:flex;flex-direction:column;min-width:0;padding:.32rem 0;}
.cell-type-badge{display:inline-flex;align-items:center;gap:.22rem;
  font-family:var(--orb);font-size:.4rem;color:var(--mu);
  padding:.05rem 0 .22rem;margin-bottom:.06rem;letter-spacing:.04em;}
.ctb-code{color:rgba(0,170,255,.7);}
.ctb-qk{color:var(--cy);}
.ctb-md{color:rgba(0,255,136,.7);}

/* ── EDITOR ── */
.cell-code-area{position:relative;background:var(--bg2);
  border:1px solid var(--bd3);border-radius:6px;overflow:hidden;min-height:42px;
  transition:border-color .15s;}
.nb-cell.active .cell-code-area{border-color:rgba(0,255,221,.3);}
.qk-cell .cell-code-area{border-color:rgba(0,255,221,.15);background:#0a1018;}
.qk-cell.active .cell-code-area{border-color:rgba(0,255,221,.35);}
/* Línea con error */
.cell-linenos{width:32px;flex-shrink:0;padding:.55rem 0;
  background:rgba(0,0,0,.25);border-right:1px solid var(--bd3);
  font-family:var(--mono);font-size:.62rem;line-height:1.65;
  user-select:none;overflow:hidden;}
.qk-cell .cell-linenos{background:rgba(0,20,30,.4);}
.lineno{padding:0 .3rem;text-align:right;color:var(--mu2);line-height:1.65;font-size:.62rem;}
.lineno.error-line{
  background:rgba(255,68,102,.25);
  color:#ff4466;
  font-weight:700;
  border-right:2px solid #ff4466;
  border-left:2px solid rgba(255,68,102,.5);
}
/* Número de línea integrado */
.cell-code-wrap{display:flex;height:100%;}
.cell-code-inner{flex:1;position:relative;overflow:hidden;min-height:42px;}
.cell-syn-layer{position:absolute;inset:0;padding:.55rem .7rem;
  font-family:var(--mono);font-size:.7rem;line-height:1.65;
  pointer-events:none;z-index:1;overflow:hidden;white-space:pre;
  color:var(--tx2);background:transparent;tab-size:4;}
.cell-textarea{position:absolute;inset:0;
  background:transparent;color:transparent;caret-color:var(--cy);
  padding:.55rem .7rem;font-family:var(--mono);font-size:.7rem;
  border:none;outline:none;resize:none;line-height:1.65;
  z-index:2;white-space:pre;overflow:auto;tab-size:4;min-height:42px;
  letter-spacing:0; pointer-events:auto;}
.cell-textarea::-webkit-scrollbar{width:4px;height:4px;}
.cell-textarea::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── OUTPUT — terminal JupyterLab ── */
.cell-output-area{margin-top:.28rem;border-radius:6px;overflow:hidden;
  border:1px solid var(--bd3);background:#050810;}
.out-header{display:flex;align-items:center;gap:.4rem;padding:.25rem .65rem;
  background:rgba(0,0,0,.4);border-bottom:1px solid var(--bd3);font-family:var(--orb);font-size:.4rem;}
.out-header-ok{color:var(--gr);}
.out-header-err{color:var(--rd);}
/* Texto terminal */
.out-stdout{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;overflow-x:auto;color:#c8e0ff;background:#050810;
  max-height:400px;overflow-y:auto;}
.out-stdout::-webkit-scrollbar{width:4px;height:4px;}
.out-stdout::-webkit-scrollbar-thumb{background:var(--bd2);}
.out-stderr{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;color:#ff9999;background:rgba(255,60,60,.04);
  border-top:1px solid rgba(255,68,102,.15);}
/* Circuito texto — estilo visual mejorado */
.out-circuit-text{padding:.5rem .7rem;font-family:var(--mono);font-size:.65rem;line-height:1.7;
  white-space:pre;overflow-x:auto;color:var(--cl);background:#040d18;
  border-top:1px solid rgba(0,170,255,.1);}
.out-circuit-text::-webkit-scrollbar{height:4px;}
.out-circuit-text::-webkit-scrollbar-thumb{background:var(--bd2);}
/* Bloch sphere canvas por celda */
.out-bloch-wrap{padding:.55rem .7rem;background:#04080f;
  border-top:1px solid rgba(0,255,221,.08);display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-start;}
.bloch-item{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.bloch-item canvas{border-radius:50%;box-shadow:0 0 20px rgba(0,136,255,.15);}
.bloch-item-lbl{font-family:var(--mono);font-size:.52rem;color:var(--mu);}
/* Probabilidades */
.out-probs{padding:.55rem .7rem;background:#040c18;
  border-top:1px solid rgba(0,136,255,.1);}
.out-probs-title{font-family:var(--orb);font-size:.42rem;color:var(--mu);
  letter-spacing:.06em;margin-bottom:.4rem;}
.prob-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.2rem;
  font-family:var(--mono);font-size:.64rem;}
.prob-state{color:var(--cy);min-width:52px;font-weight:600;}
.prob-bar-bg{flex:1;height:9px;background:rgba(0,136,255,.08);
  border-radius:3px;overflow:hidden;border:1px solid rgba(0,136,255,.1);}
.prob-bar-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,rgba(0,136,255,.8),rgba(0,255,221,.8));}
.prob-pct{color:var(--tx2);min-width:40px;text-align:right;font-size:.62rem;}
.prob-count{color:var(--mu);min-width:45px;text-align:right;font-size:.58rem;}
/* Imagen matplotlib / gráficas */
.out-img{display:block;max-width:100%;border-radius:5px;
  margin:.4rem .6rem;box-shadow:0 4px 20px rgba(0,0,0,.5);}
/* Resultados tipo dict */
.out-dict{padding:.5rem .7rem;font-family:var(--mono);font-size:.66rem;line-height:1.6;
  color:var(--yw);background:#060c10;border-top:1px solid rgba(255,215,0,.08);
  white-space:pre-wrap;}

/* ── MARKDOWN ── */
.cell-md-rendered{padding:.55rem .7rem;font-size:.74rem;line-height:1.72;color:var(--tx);}
.cell-md-rendered h1{font-family:var(--orb);font-size:1.05rem;color:var(--bl2);
  margin:.55rem 0 .3rem;padding-bottom:.25rem;border-bottom:1px solid rgba(0,136,255,.2);}
.cell-md-rendered h2{font-family:var(--orb);font-size:.88rem;color:var(--bl2);margin:.45rem 0 .22rem;}
.cell-md-rendered h3{font-size:.78rem;color:var(--cy);margin:.35rem 0 .18rem;}
.cell-md-rendered p{margin-bottom:.48rem;}
.cell-md-rendered strong{color:var(--tx);font-weight:600;}
.cell-md-rendered em{color:var(--tx2);font-style:italic;}
.cell-md-rendered code{background:rgba(0,136,255,.1);padding:.08rem .25rem;
  border-radius:3px;font-family:var(--mono);color:var(--cy);font-size:.68rem;
  border:1px solid rgba(0,136,255,.15);}
.cell-md-rendered pre{background:#060d18;padding:.6rem;border-radius:6px;
  overflow-x:auto;margin:.4rem 0;border:1px solid var(--bd);}
.cell-md-rendered pre code{background:none;border:none;padding:0;color:var(--tx2);}
.cell-md-rendered blockquote{border-left:3px solid var(--bl);padding:.3rem .7rem;
  color:var(--tx2);margin:.4rem 0;background:rgba(0,136,255,.04);border-radius:0 5px 5px 0;}
.cell-md-rendered ul,.cell-md-rendered ol{padding-left:1.4rem;margin-bottom:.4rem;}
.cell-md-rendered li{margin-bottom:.14rem;}
.cell-md-rendered table{border-collapse:collapse;width:100%;margin:.4rem 0;font-size:.7rem;}
.cell-md-rendered th,.cell-md-rendered td{border:1px solid var(--bd2);padding:.28rem .5rem;}
.cell-md-rendered th{background:rgba(0,136,255,.08);color:var(--bl2);}
.cell-md-rendered img{max-width:100%;border-radius:5px;}
/* Math display */
.cell-md-rendered .MJX-TEX{color:var(--nm);}
/* Markdown editor split */
.md-split{display:flex;gap:.4rem;background:var(--bg2);
  border:1px solid var(--bd);border-radius:6px;min-height:130px;}
.md-editor-pane{flex:1;border-right:1px solid var(--bd);}
.md-preview-pane{flex:1;padding:.52rem;overflow-y:auto;max-height:360px;
  font-size:.71rem;line-height:1.65;color:var(--tx2);}
.md-preview-pane h1{font-family:var(--orb);font-size:.95rem;color:var(--bl2);}
.md-preview-pane h2{font-size:.82rem;color:var(--bl2);}
.md-preview-pane code{background:rgba(0,136,255,.1);padding:.08rem .25rem;
  border-radius:3px;font-family:var(--mono);color:var(--cy);font-size:.67rem;}
.md-preview-pane pre{background:var(--bg);padding:.5rem;border-radius:5px;overflow-x:auto;}
.md-preview-pane .hljs{background:transparent;}
.cell-md-split-area{width:100%;height:100%;background:var(--bg2);border:none;
  padding:.52rem;font-family:var(--mono);font-size:.68rem;
  line-height:1.65;color:var(--tx2);resize:none;outline:none;}

/* ── TOOLBAR ── */
.cell-toolbar{display:none;position:absolute;top:.25rem;right:.4rem;
  gap:.15rem;align-items:center;z-index:5;}
.nb-cell:hover .cell-toolbar,.nb-cell.active .cell-toolbar{display:flex;}
body.expo-mode .nb-cell .cell-toolbar{display:none!important;}
body.expo-mode .nb-cell.qk-cell:hover .cell-toolbar,
body.expo-mode .nb-cell.qk-cell.active .cell-toolbar{display:flex!important;}
body.expo-mode .nb-cell.qk-cell .cell-toolbar .ct-btn:not(.ct-run){display:none!important;}
.ct-btn{width:18px;height:18px;border-radius:3px;
  background:rgba(8,11,20,.9);border:1px solid var(--bd2);
  color:var(--mu);font-size:.5rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .14s;}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.ct-btn.danger:hover{border-color:var(--rd);color:var(--rd);}
/* Botón restaurar celda */
.cell-restore-btn{display:none;position:absolute;bottom:.25rem;right:.4rem;
  padding:.1rem .3rem;background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.22);border-radius:3px;
  color:var(--yw);font-family:var(--orb);font-size:.4rem;cursor:pointer;z-index:10;}
body.expo-mode .nb-cell.qk-cell .cell-restore-btn,
body.expo-mode .nb-cell[data-ctype="code"] .cell-restore-btn{display:block;}
.cell-restore-btn:hover{background:rgba(255,215,0,.14);}

/* ── ADD ROW ── */
.add-cell-row{width:min(940px,97%);margin:.03rem auto;height:14px;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;}
.add-cell-row:hover{opacity:1;}
body.expo-mode .add-cell-row{display:none;}
/* ── EXPO MODE: secbar completamente oculta ── */
body.expo-mode #secbar{display:none!important;}
body.expo-mode #btn-import{display:none!important;}
/* Solo queda btn-back en topbar, que va a proyectos */
.add-cell-line{flex:1;height:1px;background:rgba(0,255,221,.15);}
.add-cell-btns{display:flex;gap:.2rem;padding:0 .4rem;}
.add-btn{padding:.09rem .36rem;background:var(--bg);border:1px solid rgba(0,255,221,.25);
  border-radius:3px;color:var(--cy);font-family:var(--orb);font-size:.38rem;cursor:pointer;transition:all .14s;}
.add-btn:hover{background:rgba(0,255,221,.07);}
.nb-bottom{width:min(940px,97%);margin:.35rem auto 2rem;display:flex;gap:.4rem;}
body.expo-mode .nb-bottom{display:none;}
.nb-add-big{flex:1;padding:.48rem;background:transparent;
  border:1px dashed rgba(0,255,221,.18);border-radius:7px;
  color:rgba(0,255,221,.5);font-family:var(--orb);font-size:.48rem;cursor:pointer;
  transition:all .18s;text-align:center;}
.nb-add-big:hover{background:rgba(0,255,221,.05);border-color:rgba(0,255,221,.45);color:var(--cy);}

/* ── GESTIONAR ── */
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.manage-bar{display:flex;align-items:center;gap:.4rem;padding:.5rem .8rem;
  background:var(--p);border-bottom:1px solid var(--bd);flex-shrink:0;}
.manage-title-lbl{font-family:var(--orb);font-size:.62rem;color:var(--cy);}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:.75rem;padding:.9rem;overflow-y:auto;flex:1;}
.nb-grid::-webkit-scrollbar{width:5px;}

<script>
// ═══════════════════════════════════════════════════════════════
// QCOL QUANTUM NOTEBOOK v5.0 — Output completo + Expo mode
// ═══════════════════════════════════════════════════════════════
let curUser=null,engineURL='',engineOK=false,running=false;
let curView='notebook',cells=[],curCellId=null,execCounter=0;
let _initialized=false,lastSaveTime=Date.now(),debounceTimer=null,dragSrcId=null;
let _expositionMode=false,_originalCells=null;
let md=null;

function postCore(type,data={}){try{window.parent.postMessage({type,...data},'*');}catch(e){}}
function notify(msg,ms=2800){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genId(){return 'c'+Date.now()+Math.random().toString(36).slice(2,6);}

// ── NAVEGACIÓN ────────────────────────────────────────────────
function goBack(){
  if(_expositionMode){
    // En modo exposición: volver a proyectos sin deactivar (el core maneja el nav)
    postCore('QCOL_NAV',{screen:'projects'});
  } else {
    postCore('QCOL_NAV',{screen:'home'});
  }
}

// ── MODO EXPOSICIÓN ───────────────────────────────────────────
function activateExpositionMode(){
  _expositionMode=true;
  _originalCells=JSON.parse(JSON.stringify(cells));
  document.body.classList.add('expo-mode');
  // Ocultar expo-badge ya que la secbar entera se oculta
  document.getElementById('expo-badge').style.display='inline-flex';
  // Ocultar secbar completa — en expo solo se usa el botón ← ATRÁS del topbar
  const secbar=document.getElementById('secbar');
  if(secbar)secbar.style.display='none';
  // Ocultar botones individuales por si acaso
  ['btn-add-code','btn-add-qk','btn-add-md','btn-import',
   'btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  const rst=document.getElementById('btn-restore-all');if(rst)rst.style.display='';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=true;ni.style.opacity='.6';}
  // Cambiar texto del botón atrás para indicar que va a Proyectos
  const btnBack=document.getElementById('btn-back');
  if(btnBack){btnBack.textContent='← PROYECTOS';btnBack.title='Volver a Proyectos';}
  // Renderizar con _expositionMode=true para que buildCellEl genere HTML correcto
  renderCells();
  notify('👁 Modo exposición — lee el material y experimenta con el código');
}
function deactivateExpositionMode(){
  _expositionMode=false;_originalCells=null;
  document.body.classList.remove('expo-mode');
  document.getElementById('expo-badge').style.display='none';
  // Restaurar secbar
  const secbar=document.getElementById('secbar');
  if(secbar)secbar.style.display='flex';
  // Restaurar botones
  ['btn-add-code','btn-add-qk','btn-add-md','btn-import',
   'btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='';
  });
  const rst=document.getElementById('btn-restore-all');if(rst)rst.style.display='none';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=false;ni.style.opacity='';}
  // Restaurar texto del botón atrás
  const btnBack=document.getElementById('btn-back');
  if(btnBack){btnBack.textContent='← ATRÁS';btnBack.title='';}
  renderCells();
}
function restoreAllCells(){
  if(!_originalCells){notify('Sin datos originales');return;}
  if(!confirm('¿Restaurar todo el código a los valores originales?'))return;
  cells=JSON.parse(JSON.stringify(_originalCells)).map(c=>({...c,output:'',exec_count:null,mdEdit:false}));
  execCounter=0;renderCells();notify('↺ Código restaurado');
}
function restoreCell(id){
  if(!_originalCells)return;
  const idx=cells.findIndex(c=>c.id===id);if(idx<0)return;
  const orig=_originalCells[idx];if(!orig)return;
  cells[idx]={...orig,id:cells[idx].id,output:'',exec_count:null,mdEdit:false,errorLine:null};
  renderCells();notify('↺ Celda restaurada');
}

// ── MOTOR ─────────────────────────────────────────────────────
async function checkEngine(){
  if(!engineURL)return;
  const badge=document.getElementById('eng-badge');
  try{
    const r=await fetch(engineURL+'/run/predict',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:[''],fn_index:1}),
      signal:AbortSignal.timeout(12000)
    });
    if(r.ok){const j=await r.json();if(j&&j.data){engineOK=true;badge.textContent='● MOTOR ACTIVO';badge.className='eng-pill on';}else throw new Error();}
    else throw new Error('HTTP '+r.status);
  }catch(e){engineOK=false;badge.textContent='● SIN COMPILADOR';badge.className='eng-pill';}
}
function setEngineURL(url){engineURL=url;localStorage.setItem('qcol_colab_url',url);checkEngine();notify('🌐 Motor actualizado');}

// ── PREAMBLE QISKIT ───────────────────────────────────────────
const QISKIT_PREAMBLE=`from qiskit import QuantumCircuit, QuantumRegister, ClassicalRegister, transpile
from qiskit.quantum_info import Statevector, DensityMatrix, Operator
from qiskit.visualization import plot_histogram, plot_bloch_multivector, plot_state_city
try:
    from qiskit_aer import AerSimulator
    from qiskit_aer.primitives import Sampler, Estimator
except: AerSimulator=None
import numpy as np
from numpy import pi
import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import io, base64
`;

// ── PARSEAR RESPUESTA DEL SERVIDOR ────────────────────────────
function parseServerResponse(raw){
  // raw.data[0] puede ser string JSON o dict ya parseado
  let d=null;
  try{
    const item=raw?.data?.[0];
    d=(typeof item==='string')?JSON.parse(item):item;
  }catch(e){d={success:false,output:'Error al parsear respuesta del servidor'};}
  if(!d)d={success:false,output:'Respuesta vacía del servidor'};
  return d;
}

// ── RENDER DE OUTPUT COMPLETO ─────────────────────────────────
function renderOutput(outArea, d, elapsed, cellId){
  if(!outArea)return;
  const t0=elapsed?`${elapsed}s`:null;
  let html='';

  // Determinar si la celda es de tipo 'circuit' (ya tiene diagrama visual — no repetir)
  const cell = cellId ? cells.find(c=>c.id===cellId) : null;
  const isCellCircuit = cell && cell.type === 'circuit';

  // Extraer shots REALES del código de la celda (no asumir 1024)
  // Busca: shots=N en el código fuente (funciona para circuit, qiskit y code)
  function extractShots(sourceCode){
    if(!sourceCode) return null;
    // Patrones: shots=512, shots = 512, shots=1_024, shots=2048
    const m = sourceCode.match(/shots\s*=\s*([\d_]+)/);
    if(m) return parseInt(m[1].replace(/_/g,''));
    return null;
  }
  // Código fuente relevante (hiddenCode para circuit, code para las demás)
  const srcCode = cell ? (cell.hiddenCode || cell.code || '') : '';
  // También buscar en el output text por si el servidor reporta shots
  const shotsFromServer = d.bloch?.shots || d.shots || null;
  const shotsFromCode   = extractShots(srcCode);
  // Prioridad: servidor > código > 1024
  const realShots = shotsFromServer || shotsFromCode || 1024;

  // Cabecera
  const isOk=d.success!==false;
  const hdrCls=isOk?'out-header-ok':'out-header-err';
  const hdrIcon=isOk?'✅':'❌';
  html+=`<div class="out-header ${hdrCls}">${hdrIcon} ${isOk?'Ejecutado':'Error'}${t0?' · '+t0:''}</div>`;

  // ── STDOUT completo ──
  if(d.output&&d.output.trim()){
    const lines=d.output.split('\n');
    let circuitBlock=[];
    let textBlock=[];
    let inCircuit=false;
    for(const line of lines){
      const isCircLine=/[─┤├┼╫│┐┘└┌╥╨╩╦╣╠═║╗╚╔╝╞╡╟╢]/.test(line)||/q_?\d+\s*:/.test(line)||/c:\s*\d/.test(line)||/^\s*(q\[|c\[|cr\[|qr\[)/.test(line);
      if(isCircLine){
        if(!inCircuit&&textBlock.length){html+=buildTextOut(textBlock.join('\n'));textBlock=[];}
        inCircuit=true;
        circuitBlock.push(line);
      } else {
        if(inCircuit){
          // Para celdas circuit: NO mostrar el ASCII del circuito en output
          // (ya hay un diagrama visual en la celda)
          if(!isCellCircuit) html+=buildCircuitOut(circuitBlock.join('\n'));
          circuitBlock=[];inCircuit=false;
        }
        textBlock.push(line);
      }
    }
    if(inCircuit && !isCellCircuit) html+=buildCircuitOut(circuitBlock.join('\n'));
    if(textBlock.length&&textBlock.join('').trim()) html+=buildTextOut(textBlock.join('\n'));
  }

  // ── STDERR ──
  if(d.stderr&&d.stderr.trim()){
    html+=`<div class="out-stderr">${escH(d.stderr)}</div>`;
  }

  // ── PROBABILIDADES / COUNTS — con shots reales ──
  if(d.bloch&&d.bloch.probabilities){
    html+=buildProbsOut(d.bloch.probabilities, realShots, d.bloch.simulator||'AerSimulator');
    html+=buildHistogramOut(d.bloch.probabilities, realShots);
  }else if(d.counts){
    html+=buildProbsOut(d.counts, realShots, '');
    html+=buildHistogramOut(d.counts, realShots);
  }

  // ── ESFERA DE BLOCH ──
  if(d.bloch&&d.bloch.probabilities){
    html+=buildBlochOut(d.bloch.probabilities);
  }

  // ── IMAGEN matplotlib ──
  if(d.plot_png){
    html+=`<div style="padding:.3rem .5rem;background:#04080e;border-top:1px solid rgba(0,136,255,.08);">
      <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.2rem 0 .3rem;letter-spacing:.05em;">GRÁFICA MATPLOTLIB</div>
      <img class="out-img" src="data:image/png;base64,${d.plot_png}" alt="Gráfica">
    </div>`;
  }

  // ── IMAGEN extra (plot_svg como fallback) ──
  if(d.plot_svg){
    html+=`<div style="padding:.3rem .5rem;background:#04080e;border-top:1px solid rgba(0,136,255,.08);">
      <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.2rem 0 .3rem;">DIAGRAMA SVG</div>
      <div style="overflow-x:auto;">${d.plot_svg}</div>
    </div>`;
  }

  // ── ERROR detallado ──
  if(!isOk&&d.output){
    // Extraer línea de error
    const lineMatch = d.output.match(/[Ll]ine\s+(\d+)|línea\s+(\d+)/i);
    const errLine = lineMatch ? parseInt(lineMatch[1] || lineMatch[2]) : null;
    if (errLine && cellId) {
      const cell = cells.find(c => c.id === cellId);
      if (cell) cell.errorLine = errLine;
    }
    html+=buildErrorOut(d.output);
  }

  outArea.innerHTML=html||'<div class="out-stdout" style="color:var(--mu);">Sin salida</div>';
}

function buildTextOut(text){
  if(!text.trim())return'';
  // Detectar si es dict de resultados como {'00': 512, '11': 512}
  if(/^\{['"0-9a-zA-Z_,:\s]+\}$/.test(text.trim())){
    return`<div class="out-dict">${escH(text)}</div>`;
  }
  return`<div class="out-stdout">${escH(text)}</div>`;
}


// ── RENDERIZAR CIRCUITO DESDE ESTRUCTURA INTERNA DEL ARQUITECTO ──────────
// cell.circuitData = { qubits: N, gates: [{id, q, q2?, q3?, def:{bg,sym,code}}, ...] }
// Replica EXACTAMENTE el sistema de renderizado del Arquitecto Cuántico
function buildCircuitFromData(data){
  if(!data || !data.gates) return '';
  const {qubits: nQ, gates} = data;
  const ROW_HEIGHT=56, step=52;

  // Calcular profundidad (idéntico al arquitecto)
  const depth = new Array(nQ).fill(0);
  const placed = gates.map(g => {
    let col;
    if(g.q3!==undefined){ col=Math.max(depth[g.q]||0,depth[g.q2]||0,depth[g.q3]||0); depth[g.q]=col+1;depth[g.q2]=col+1;depth[g.q3]=col+1; }
    else if(g.q2!==undefined){ col=Math.max(depth[g.q]||0,depth[g.q2]||0); depth[g.q]=col+1;depth[g.q2]=col+1; }
    else { col=depth[g.q]||0; depth[g.q]=col+1; }
    return {...g, col};
  });

  const totalCols = Math.max(...depth, 1);
  const W = totalCols*step+90, H = nQ*ROW_HEIGHT;
  const qY = (q,topQ) => (q-topQ)*ROW_HEIGHT+ROW_HEIGHT/2;

  let html=`<div style="position:relative;min-width:${W}px;height:${H}px;">`;

  // Cables + etiquetas
  for(let q=0;q<nQ;q++){
    html+=`<div style="position:absolute;top:${q*ROW_HEIGHT}px;left:0;right:0;height:${ROW_HEIGHT}px;">
      <div style="position:absolute;left:0;top:50%;transform:translateY(-50%);
        width:50px;text-align:right;padding-right:6px;
        font-family:JetBrains Mono,monospace;font-size:11px;font-weight:600;color:#bd93f9;">q[${q}]</div>
      <div style="position:absolute;left:52px;right:0;top:50%;
        border-top:1.8px solid rgba(0,136,255,.22);"></div>
    </div>`;
  }

  // Puertas — SVG idéntico al arquitecto
  placed.forEach(g=>{
    const left=g.col*step+56;
    const clr=g.def?.bg||'#1a4a8a';
    const sym=g.def?.sym||g.id||'?';

    if(g.q3!==undefined){
      const qs=[g.q,g.q2,g.q3].sort((a,b)=>a-b);
      const topQ=qs[0], topY=topQ*ROW_HEIGHT;
      const svgH=(qs[2]-qs[0])*ROW_HEIGHT+ROW_HEIGHT;
      let svg='';
      if(g.id==='CCX'){
        svg=`<svg width="52" height="${svgH}" viewBox="0 0 52 ${svgH}">
          <line x1="26" y1="${qY(qs[0],topQ)}" x2="26" y2="${qY(qs[2],topQ)}" stroke="${clr}" stroke-width="2.5"/>
          <circle cx="26" cy="${qY(g.q,topQ)}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="26" cy="${qY(g.q2,topQ)}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="26" cy="${qY(g.q3,topQ)}" r="14" fill="none" stroke="${clr}" stroke-width="2.5"/>
          <line x1="18" y1="${qY(g.q3,topQ)}" x2="34" y2="${qY(g.q3,topQ)}" stroke="${clr}" stroke-width="2"/>
          <line x1="26" y1="${qY(g.q3,topQ)-10}" x2="26" y2="${qY(g.q3,topQ)+10}" stroke="${clr}" stroke-width="2"/>
        </svg>`;
      } else {
        svg=`<svg width="52" height="${svgH}" viewBox="0 0 52 ${svgH}">
          <line x1="26" y1="${qY(qs[0],topQ)}" x2="26" y2="${qY(qs[2],topQ)}" stroke="${clr}" stroke-width="2.5"/>
          <circle cx="26" cy="${qY(g.q,topQ)}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <line x1="16" y1="${qY(g.q2,topQ)-9}" x2="36" y2="${qY(g.q2,topQ)+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="${qY(g.q2,topQ)-9}" x2="16" y2="${qY(g.q2,topQ)+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="16" y1="${qY(g.q3,topQ)-9}" x2="36" y2="${qY(g.q3,topQ)+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="${qY(g.q3,topQ)-9}" x2="16" y2="${qY(g.q3,topQ)+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
        </svg>`;
      }
      html+=`<div style="position:absolute;left:${left}px;top:${topY}px;">${svg}</div>`;

    } else if(g.q2!==undefined){
      const topQ=Math.min(g.q,g.q2), botQ=Math.max(g.q,g.q2);
      const topY=topQ*ROW_HEIGHT, svgH=(botQ-topQ)*ROW_HEIGHT+ROW_HEIGHT;
      const cy1=qY(g.q,topQ), cy2=qY(g.q2,topQ);
      const ly1=Math.min(cy1,cy2), ly2=Math.max(cy1,cy2);
      let svg='';
      if(g.id==='CX'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}" stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${cy1}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="24" cy="${cy2}" r="14" fill="none" stroke="${clr}" stroke-width="2.5"/>
          <line x1="16" y1="${cy2}" x2="32" y2="${cy2}" stroke="${clr}" stroke-width="2"/>
          <line x1="24" y1="${cy2-10}" x2="24" y2="${cy2+10}" stroke="${clr}" stroke-width="2"/>
        </svg>`;
      } else if(g.id==='CZ'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}" stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${cy1}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="24" cy="${cy2}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
        </svg>`;
      } else if(g.id==='SWAP'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}" stroke="${clr}" stroke-width="2.5"/>
          <line x1="14" y1="${cy1-9}" x2="34" y2="${cy1+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="34" y1="${cy1-9}" x2="14" y2="${cy1+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="${cy2-9}" x2="34" y2="${cy2+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="34" y1="${cy2-9}" x2="14" y2="${cy2+9}" stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
        </svg>`;
      } else {
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}" stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${cy1}" r="8" fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <rect x="4" y="${cy2-19}" width="40" height="38" rx="6" fill="${clr}" stroke="rgba(255,255,255,.28)" stroke-width="1.4" fill-opacity=".85"/>
          <rect x="6" y="${cy2-17}" width="36" height="4" rx="4" fill="rgba(255,255,255,.18)"/>
          <text x="24" y="${cy2+4}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11" font-weight="bold" fill="white">${sym}</text>
        </svg>`;
      }
      html+=`<div style="position:absolute;left:${left}px;top:${topY}px;">${svg}</div>`;

    } else {
      // 1 qubit
      const yPos=g.q*ROW_HEIGHT;
      const display=sym.length>4?sym.slice(0,3):sym;
      const fs=display.length<=2?13:display.length===3?11:9;
      if(g.id==='M'){
        html+=`<div style="position:absolute;left:${left}px;top:${yPos+ROW_HEIGHT/2}px;transform:translateY(-50%);">
          <svg width="44" height="38" viewBox="0 0 44 38">
            <rect x="1" y="1" width="42" height="36" rx="6" fill="rgba(109,76,65,.3)" stroke="#6d4c41" stroke-width="1.8"/>
            <rect x="3" y="3" width="38" height="4" rx="4" fill="rgba(255,255,255,.12)"/>
            <path d="M 8 30 A 14 14 0 0 1 36 30" fill="none" stroke="#ff9580" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="22" y1="30" x2="32" y2="14" stroke="#ff9580" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="22" cy="30" r="2.5" fill="#ff9580"/>
          </svg>
        </div>`;
      } else {
        const gid=`gq_d_${g.col||0}_${g.q}`;
        html+=`<div style="position:absolute;left:${left}px;top:${yPos+ROW_HEIGHT/2}px;transform:translateY(-50%);">
          <svg width="44" height="38" viewBox="0 0 44 38">
            <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${clr}" stop-opacity=".95"/>
              <stop offset="100%" stop-color="${clr}" stop-opacity=".6"/>
            </linearGradient></defs>
            <rect x="1" y="1" width="42" height="36" rx="6" fill="url(#${gid})" stroke="rgba(255,255,255,.3)" stroke-width="1.4"/>
            <rect x="3" y="3" width="38" height="4" rx="4" fill="rgba(255,255,255,.2)"/>
            <text x="22" y="${19+fs/3}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="${fs}" font-weight="bold" fill="white">${escH(display)}</text>
          </svg>
        </div>`;
      }
    }
  });

  html+='</div>';
  return html;
}

function buildCircuitOut(text){
  if(!text.trim()) return '';

  const allLines = text.split('\n');
  const wirePat = /^\s*(q_?\d+|q\[\d+\]|qr\[\d+\])\s*:/;

  // ── PASO 1: Separar wire-lines e inter-wire lines ─────────────
  const wireInfo  = [];   // [{qi,idx,label,offset,line}]
  const interInfo = [];   // [{afterQi,idx,line}]
  let curQi = -1;
  allLines.forEach((line, idx) => {
    const m = line.match(wirePat);
    if(m){
      curQi++;
      wireInfo.push({qi:curQi, idx, label:m[1], offset:m[0].length, line});
    } else if(curQi >= 0){
      interInfo.push({afterQi:curQi, idx, line});
    }
  });
  const nQ = curQi + 1;

  if(nQ === 0){
    // Fallback ASCII coloreado
    let col = escH(text);
    col = col.replace(/(q_?\d+|q\[\d+\]|qr\[\d+\])\s*:/g,
      '<s style="color:#bd93f9;font-weight:700;font-style:normal">$1</s>:');
    col = col.replace(/┤\s*([A-Za-z0-9√Rπ/.+\-]+(?:\([^)]*\))?)\s*[├┤]/g,
      (m,g)=>`┤<s style="color:#00aaff;font-weight:700;font-style:normal"> ${g} </s>┤`);
    col = col.replace(/─(M)─/g,
      '─<s style="color:#ff9580;font-weight:700;font-style:normal">M</s>─');
    return `<div style="padding:.4rem .55rem;background:#020c18;border-top:1px solid rgba(0,136,255,.1);">
      <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.1rem 0 .3rem;">⚛ DIAGRAMA DEL CIRCUITO</div>
      <div class="out-circuit-text">${col}</div>
    </div>`;
  }

  const wireLabels = wireInfo.map(wi => wi.label);

  // ── PASO 2: Columnas con │ (conexión vertical confirmada) ─────
  // Qiskit dibuja │ entre qubits conectados, en la misma columna absoluta
  const vertCols = new Set();
  interInfo.forEach(il => {
    [...il.line].forEach((c, col) => {
      if(c === '│') vertCols.add(col);
    });
  });

  // ── PASO 3: Tokenizar con posición ABSOLUTA ───────────────────
  // (columna en la línea completa, incluyendo el label "q_0: ")
  function tokenizeWire(wi){
    const {line, offset} = wi;
    const content = line.slice(offset);
    const toks = [];

    // Cajas ┤NAME├ — posición absoluta del centro
    const BOX = /┤\s*((?:[^┤├\n])*?)\s*(?:├|┤)/g;
    let m;
    while((m = BOX.exec(content)) !== null){
      const absCol = offset + m.index + Math.floor(m[0].length / 2);
      const name = m[1].trim() || '?';
      toks.push({type:'box', name, col:absCol,
        absStart:offset+m.index, absEnd:offset+m.index+m[0].length});
    }

    // Símbolos de 1 carácter
    const SYM = /(■|█|●)|(⊕)|(╳|×)/g;
    while((m = SYM.exec(content)) !== null){
      const absCol = offset + m.index;
      // No añadir si está dentro de una caja
      if(toks.some(t => t.type==='box' && absCol>=t.absStart && absCol<t.absEnd)) continue;
      if(m[1])      toks.push({type:'ctrl', name:'■', col:absCol});
      else if(m[2]) toks.push({type:'tgt',  name:'⊕', col:absCol});
      else if(m[3]) toks.push({type:'swap', name:'╳', col:absCol});
    }

    // X SUELTO (bare X) — target de CX en Qiskit moderno
    // SOLO si esa columna tiene │ en alguna línea inter-wire (= está conectado)
    const BAREX = /(?:─)(X)(?:─)/g;
    while((m = BAREX.exec(content)) !== null){
      const absCol = offset + m.index + 1;
      if(vertCols.has(absCol) && !toks.some(t => Math.abs(t.col-absCol) < 2)){
        toks.push({type:'xtgt', name:'X', col:absCol});
      }
    }

    // M medidor aislado (─M─)
    const MEAS = /(?:─)(M)(?:─)/g;
    while((m = MEAS.exec(content)) !== null){
      const absCol = offset + m.index + 1;
      if(!toks.some(t => Math.abs(t.col-absCol) < 2)){
        toks.push({type:'meas', name:'M', col:absCol});
      }
    }

    return toks.sort((a,b) => a.col - b.col);
  }

  // Recopilar todos los tokens
  const allToks = [];
  wireInfo.forEach(wi => {
    tokenizeWire(wi).forEach(tok => allToks.push({qi:wi.qi, ...tok}));
  });
  allToks.sort((a,b) => a.col - b.col || a.qi - b.qi);

  // ── PASO 4: AGRUPAR por columna absoluta exacta ───────────────
  // Tokens de 1 char (■⊕╳X): agrupan por posición EXACTA
  // Cajas ┤NAME├: agrupan con tolerancia ±3 (ancho variable del nombre)
  const colMap = new Map();
  allToks.forEach(tok => {
    let key = tok.col;
    if(tok.type === 'box'){
      // Buscar clave existente dentro de ±3
      let best = null, bestDist = 4;
      for(const k of colMap.keys()){
        const d = Math.abs(k - key);
        if(d < bestDist){ bestDist = d; best = k; }
      }
      if(best !== null) key = best;
    }
    if(!colMap.has(key)) colMap.set(key, []);
    const col = colMap.get(key);
    if(!col.find(c => c.qi === tok.qi)) col.push(tok);
  });

  const columns = [...colMap.keys()].sort((a,b)=>a-b)
    .map(k => colMap.get(k).slice().sort((a,b)=>a.qi-b.qi));

  // ── PASO 5: IDENTIFICAR GATES ─────────────────────────────────
  const COLORS = {
    H:'#1a5fb4', X:'#c01c28', Y:'#7a3e99', Z:'#1c71d8',
    S:'#c64600', T:'#26a269', SX:'#c01c28', '√X':'#c01c28',
    RX:'#0077c2', RY:'#005f6a', RZ:'#5e35b1', P:'#5e35b1',
    U:'#6a1b9a', CX:'#007070', CZ:'#00695c', SWAP:'#1565c0',
    CCX:'#005f6a', CSW:'#283593', M:'#6d4c41',
    DEFAULT:'#1a4a8a'
  };
  const gc = n => COLORS[n.replace(/\s*\(.*\)/,'').trim().toUpperCase()] || COLORS.DEFAULT;

  const push1q = (s, ci) => {
    const name = s.name||'?';
    const isMeas = s.type==='meas' || ['M','MEAS'].includes(name.toUpperCase());
    const id = isMeas ? 'M' : name.toUpperCase().replace(/\s*\(.*\)/,'').replace(/[^A-Z0-9√]/g,'');
    gates.push({id, sym:name.length>4?name.slice(0,3):name,
      bg:gc(name), glow:gc(name), q:s.qi, col:ci, type:'1q', name});
  };

  const gates = [];

  columns.forEach((col, ci) => {
    const ctrl  = col.filter(s=>s.type==='ctrl');
    const tgt   = col.filter(s=>s.type==='tgt');
    const swap  = col.filter(s=>s.type==='swap');
    const xtgt  = col.filter(s=>s.type==='xtgt');  // bare X target
    const box   = col.filter(s=>s.type==='box');
    const meas  = col.filter(s=>s.type==='meas');

    const cqs = ctrl.map(s=>s.qi);
    const tqs = tgt .map(s=>s.qi);
    const sqs = swap.map(s=>s.qi);
    const xqs = xtgt.map(s=>s.qi);
    const bqs = box .map(s=>s.qi);
    const xbqs= box.filter(s=>s.name.toUpperCase()==='X').map(s=>s.qi);
    const zbqs= box.filter(s=>s.name.toUpperCase()==='Z').map(s=>s.qi);
    const mbqs= box.filter(s=>['M','MEAS'].includes(s.name.toUpperCase())).map(s=>s.qi);

    // ── 1 token → puerta de 1 qubit ──────────────────────────
    if(col.length === 1){ push1q(col[0], ci); return; }

    // ── Múltiples medidores → individuales ───────────────────
    if((meas.length > 0 || mbqs.length > 0) && cqs.length === 0){
      [...meas, ...box.filter(s=>['M','MEAS'].includes(s.name.toUpperCase()))]
        .forEach(s => gates.push({id:'M',sym:'M',bg:'#6d4c41',glow:'#6d4c41',
          q:s.qi,col:ci,type:'1q'}));
      box.filter(s=>!['M','MEAS'].includes(s.name.toUpperCase()))
        .forEach(s => push1q(s, ci));
      return;
    }

    // ══ TABLA COMPLETA DE REGLAS (todas las variantes de Qiskit) ═
    // CX: ■+⊕  (clásico)
    if(cqs.length===1 && tqs.length===1 && !sqs.length){
      const [cq,tq]=[cqs[0],tqs[0]];
      gates.push({id:'CX',sym:'CX',bg:'#007070',glow:'#007070',
        q:Math.min(cq,tq),q2:Math.max(cq,tq),ctrlQ:cq,tgtQ:tq,col:ci,type:'2q'}); return;
    }
    // CX: ■+X suelto  (Qiskit moderno con │)
    if(cqs.length===1 && xqs.length===1 && !sqs.length && !xbqs.length){
      const [cq,tq]=[cqs[0],xqs[0]];
      gates.push({id:'CX',sym:'CX',bg:'#007070',glow:'#007070',
        q:Math.min(cq,tq),q2:Math.max(cq,tq),ctrlQ:cq,tgtQ:tq,col:ci,type:'2q'}); return;
    }
    // CX: ■+┤X├  (Qiskit con caja)
    if(cqs.length===1 && xbqs.length===1 && !sqs.length){
      const [cq,tq]=[cqs[0],xbqs[0]];
      gates.push({id:'CX',sym:'CX',bg:'#007070',glow:'#007070',
        q:Math.min(cq,tq),q2:Math.max(cq,tq),ctrlQ:cq,tgtQ:tq,col:ci,type:'2q'}); return;
    }
    // CCX: ■+■+⊕  o  ■+■+X  o  ■+■+┤X├
    const allTgtQs = [...new Set([...tqs,...xqs,...xbqs])];
    if(cqs.length===2 && allTgtQs.length>=1){
      const qs=[...cqs,...allTgtQs].sort((a,b)=>a-b);
      const tq=allTgtQs[0];
      gates.push({id:'CCX',sym:'CCX',bg:'#005f6a',glow:'#005f6a',
        q:qs[0],q2:qs[1],q3:qs[2],
        ctrlQ1:cqs[0],ctrlQ2:cqs[1],tgtQ:tq,col:ci,type:'3q'}); return;
    }
    // CZ: ■+■  (dos controles exactos)
    if(cqs.length===2 && !tqs.length && !sqs.length && !bqs.length && !xqs.length){
      const [cq,tq]=cqs.slice().sort((a,b)=>a-b);
      gates.push({id:'CZ',sym:'CZ',bg:'#00695c',glow:'#00695c',
        q:cq,q2:tq,ctrlQ:cq,tgtQ:tq,col:ci,type:'2q'}); return;
    }
    // CZ: ■+┤Z├
    if(cqs.length===1 && zbqs.length>=1){
      const [cq,tq]=[cqs[0],zbqs[0]];
      gates.push({id:'CZ',sym:'CZ',bg:'#00695c',glow:'#00695c',
        q:Math.min(cq,tq),q2:Math.max(cq,tq),ctrlQ:cq,tgtQ:tq,col:ci,type:'2q'}); return;
    }
    // SWAP: ╳+╳
    if(sqs.length>=2 && !cqs.length){
      const [q1,q2]=sqs.slice().sort((a,b)=>a-b);
      gates.push({id:'SWAP',sym:'SW',bg:'#1565c0',glow:'#1565c0',
        q:q1,q2,ctrlQ:q1,tgtQ:q2,col:ci,type:'2q'}); return;
    }
    // CSWAP: ■+╳+╳
    if(cqs.length===1 && sqs.length>=2){
      const qs=[...cqs,...sqs].sort((a,b)=>a-b);
      const [sw1,sw2]=sqs.slice().sort((a,b)=>a-b);
      gates.push({id:'CSW',sym:'CSW',bg:'#283593',glow:'#283593',
        q:qs[0],q2:qs[1],q3:qs[2],
        ctrlQ1:cqs[0],swapQ1:sw1,swapQ2:sw2,col:ci,type:'3q'}); return;
    }
    // SWAP moderno: ┤X├+┤X├ sin control
    if(xbqs.length>=2 && !cqs.length){
      const [q1,q2]=xbqs.slice().sort((a,b)=>a-b);
      gates.push({id:'SWAP',sym:'SW',bg:'#1565c0',glow:'#1565c0',
        q:q1,q2,ctrlQ:q1,tgtQ:q2,col:ci,type:'2q'}); return;
    }
    // CSW moderno: ■+┤X├+┤X├
    if(cqs.length===1 && xbqs.length>=2){
      const qs=[...cqs,...xbqs].sort((a,b)=>a-b);
      const [sw1,sw2]=xbqs.slice().sort((a,b)=>a-b);
      gates.push({id:'CSW',sym:'CSW',bg:'#283593',glow:'#283593',
        q:qs[0],q2:qs[1],q3:qs[2],
        ctrlQ1:cqs[0],swapQ1:sw1,swapQ2:sw2,col:ci,type:'3q'}); return;
    }
    // Controlada genérica: ■ + caja con nombre
    if(cqs.length===1 && bqs.length>=1){
      const nonX=box.filter(s=>s.name.toUpperCase()!=='X');
      if(nonX.length>=1){
        const tq=nonX[0].qi, bname=nonX[0].name;
        const cq=cqs[0];
        const isZ=bname.toUpperCase()==='Z';
        gates.push({id:isZ?'CZ':'CG',sym:bname,
          bg:isZ?'#00695c':gc(bname),glow:isZ?'#00695c':gc(bname),
          q:Math.min(cq,tq),q2:Math.max(cq,tq),ctrlQ:cq,tgtQ:tq,
          col:ci,type:'2q',isCZ:isZ}); return;
      }
    }
    // Resto → puertas individuales
    col.forEach(s => push1q(s, ci));
  });

  // ── PASO 6: DEPTH — idéntico al arquitecto cuántico ──────────
  const depth = new Array(nQ).fill(0);
  const placed = gates.map(g => {
    let col;
    if(g.q3!==undefined){
      col=Math.max(depth[g.q]||0,depth[g.q2]||0,depth[g.q3]||0);
      depth[g.q]=col+1; depth[g.q2]=col+1; depth[g.q3]=col+1;
    } else if(g.q2!==undefined){
      col=Math.max(depth[g.q]||0,depth[g.q2]||0);
      depth[g.q]=col+1; depth[g.q2]=col+1;
    } else {
      col=depth[g.q]||0; depth[g.q]=col+1;
    }
    return {...g, col};
  });

  // ── PASO 7: RENDER — HTML+SVG idéntico al arquitecto ─────────
  const ROW_HEIGHT=56, step=52;
  const totalCols=Math.max(...depth, 1);
  const wireWidth=totalCols*step+90;
  const totalH=nQ*ROW_HEIGHT;
  const qY=(q,topQ)=>(q-topQ)*ROW_HEIGHT+ROW_HEIGHT/2;

  let html=`<div style="position:relative;min-width:${wireWidth}px;height:${totalH}px;">`;

  // Cables + etiquetas
  for(let q=0; q<nQ; q++){
    html+=`<div style="position:absolute;top:${q*ROW_HEIGHT}px;left:0;right:0;height:${ROW_HEIGHT}px;">
      <div style="position:absolute;left:0;top:50%;transform:translateY(-50%);
        width:50px;text-align:right;padding-right:6px;
        font-family:JetBrains Mono,monospace;font-size:11px;font-weight:600;color:#bd93f9;">
        ${escH(wireLabels[q]||`q[${q}]`)}
      </div>
      <div style="position:absolute;left:52px;right:0;top:50%;
        border-top:1.8px solid rgba(0,136,255,.22);"></div>
    </div>`;
  }

  placed.forEach(g => {
    const left=g.col*step+56;

    // ── 3 QUBITS ──────────────────────────────────────────────
    if(g.q3!==undefined){
      const qs=[g.q,g.q2,g.q3].sort((a,b)=>a-b);
      const topQ=qs[0], topY=topQ*ROW_HEIGHT;
      const svgH=(qs[2]-qs[0])*ROW_HEIGHT+ROW_HEIGHT;
      const clr=g.bg||'#005f6a';
      let svg='';

      if(g.id==='CCX'){
        const c1=g.ctrlQ1!==undefined?g.ctrlQ1:qs[0];
        const c2=g.ctrlQ2!==undefined?g.ctrlQ2:qs[1];
        const t =g.tgtQ  !==undefined?g.tgtQ  :qs[2];
        svg=`<svg width="52" height="${svgH}" viewBox="0 0 52 ${svgH}">
          <line x1="26" y1="${qY(qs[0],topQ)}" x2="26" y2="${qY(qs[2],topQ)}"
            stroke="${clr}" stroke-width="2.5"/>
          <circle cx="26" cy="${qY(c1,topQ)}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="26" cy="${qY(c2,topQ)}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="26" cy="${qY(t,topQ)}" r="14"
            fill="none" stroke="${clr}" stroke-width="2.5"/>
          <line x1="18" y1="${qY(t,topQ)}" x2="34" y2="${qY(t,topQ)}"
            stroke="${clr}" stroke-width="2"/>
          <line x1="26" y1="${qY(t,topQ)-10}" x2="26" y2="${qY(t,topQ)+10}"
            stroke="${clr}" stroke-width="2"/>
        </svg>`;
      } else {
        // CSWAP Fredkin: ■ ctrl + ╳ sw1 + ╳ sw2
        const ctrl=g.ctrlQ1!==undefined?g.ctrlQ1:qs[0];
        const sw1 =g.swapQ1!==undefined?g.swapQ1:(qs.find(q=>q!==ctrl)||qs[1]);
        const sw2 =g.swapQ2!==undefined?g.swapQ2:(qs.filter(q=>q!==ctrl).pop()||qs[2]);
        svg=`<svg width="52" height="${svgH}" viewBox="0 0 52 ${svgH}">
          <line x1="26" y1="${qY(qs[0],topQ)}" x2="26" y2="${qY(qs[2],topQ)}"
            stroke="${clr}" stroke-width="2.5"/>
          <circle cx="26" cy="${qY(ctrl,topQ)}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <line x1="16" y1="${qY(sw1,topQ)-9}" x2="36" y2="${qY(sw1,topQ)+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="${qY(sw1,topQ)-9}" x2="16" y2="${qY(sw1,topQ)+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="16" y1="${qY(sw2,topQ)-9}" x2="36" y2="${qY(sw2,topQ)+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="36" y1="${qY(sw2,topQ)-9}" x2="16" y2="${qY(sw2,topQ)+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
        </svg>`;
      }
      html+=`<div style="position:absolute;left:${left}px;top:${topY}px;">${svg}</div>`;

    // ── 2 QUBITS ──────────────────────────────────────────────
    } else if(g.q2!==undefined){
      const topQ=Math.min(g.q,g.q2), botQ=Math.max(g.q,g.q2);
      const topY=topQ*ROW_HEIGHT;
      const svgH=(botQ-topQ)*ROW_HEIGHT+ROW_HEIGHT;
      const clr=g.bg||'#007070';
      const ctrlQ=g.ctrlQ!==undefined?g.ctrlQ:topQ;
      const tgtQ =g.tgtQ !==undefined?g.tgtQ :botQ;
      const ctrlY=qY(ctrlQ,topQ), tgtY=qY(tgtQ,topQ);
      const ly1=Math.min(ctrlY,tgtY), ly2=Math.max(ctrlY,tgtY);
      let svg='';

      if(g.id==='CX'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}"
            stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${ctrlY}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="24" cy="${tgtY}" r="14"
            fill="none" stroke="${clr}" stroke-width="2.5"/>
          <line x1="16" y1="${tgtY}" x2="32" y2="${tgtY}"
            stroke="${clr}" stroke-width="2"/>
          <line x1="24" y1="${tgtY-10}" x2="24" y2="${tgtY+10}"
            stroke="${clr}" stroke-width="2"/>
        </svg>`;
      } else if(g.id==='CZ'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}"
            stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${ctrlY}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <circle cx="24" cy="${tgtY}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
        </svg>`;
      } else if(g.id==='SWAP'){
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}"
            stroke="${clr}" stroke-width="2.5"/>
          <line x1="14" y1="${ctrlY-9}" x2="34" y2="${ctrlY+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="34" y1="${ctrlY-9}" x2="14" y2="${ctrlY+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="14" y1="${tgtY-9}"  x2="34" y2="${tgtY+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="34" y1="${tgtY-9}"  x2="14" y2="${tgtY+9}"
            stroke="${clr}" stroke-width="2.5" stroke-linecap="round"/>
        </svg>`;
      } else {
        const sym=g.sym||g.id; const fs=sym.length<=2?13:sym.length===3?11:9;
        const boxY=tgtY-19;
        svg=`<svg width="48" height="${svgH}" viewBox="0 0 48 ${svgH}">
          <line x1="24" y1="${ly1}" x2="24" y2="${ly2}"
            stroke="${clr}" stroke-width="2.5"/>
          <circle cx="24" cy="${ctrlY}" r="8"
            fill="${clr}" stroke="rgba(255,255,255,.9)" stroke-width="1.5"/>
          <rect x="4" y="${boxY}" width="40" height="38" rx="6"
            fill="${clr}" stroke="rgba(255,255,255,.28)" stroke-width="1.4" fill-opacity=".85"/>
          <rect x="6" y="${boxY+2}" width="36" height="4" rx="4" fill="rgba(255,255,255,.18)"/>
          <text x="24" y="${tgtY+fs/3}" text-anchor="middle"
            font-family="JetBrains Mono,monospace"
            font-size="${fs}" font-weight="bold" fill="white">${escH(sym)}</text>
        </svg>`;
      }
      html+=`<div style="position:absolute;left:${left}px;top:${topY}px;">${svg}</div>`;

    // ── 1 QUBIT ────────────────────────────────────────────────
    } else {
      const yPos=g.q*ROW_HEIGHT, clr=g.bg||'#1a4a8a';
      const sym=g.sym||g.id||'?';
      const display=sym.length>4?sym.slice(0,3):sym;
      const fs=display.length<=2?13:display.length===3?11:9;

      if(g.id==='M'){
        html+=`<div style="position:absolute;left:${left}px;top:${yPos+ROW_HEIGHT/2}px;transform:translateY(-50%);">
          <svg width="44" height="38" viewBox="0 0 44 38">
            <rect x="1" y="1" width="42" height="36" rx="6"
              fill="rgba(109,76,65,.3)" stroke="#6d4c41" stroke-width="1.8"/>
            <rect x="3" y="3" width="38" height="4" rx="4" fill="rgba(255,255,255,.12)"/>
            <path d="M 8 30 A 14 14 0 0 1 36 30"
              fill="none" stroke="#ff9580" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="22" y1="30" x2="32" y2="14"
              stroke="#ff9580" stroke-width="1.6" stroke-linecap="round"/>

      } else {
        html+=`<div style="position:absolute;left:${left}px;top:${yPos+ROW_HEIGHT/2}px;transform:translateY(-50%);">
          <svg width="44" height="38" viewBox="0 0 44 38">
            <defs>
              <linearGradient id="gq${g.col}_${g.q}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="${clr}" stop-opacity=".95"/>
                <stop offset="100%" stop-color="${clr}" stop-opacity=".6"/>
              </linearGradient>
            </defs>
            <rect x="1" y="1" width="42" height="36" rx="6"
              fill="url(#gq${g.col}_${g.q})" stroke="rgba(255,255,255,.3)" stroke-width="1.4"/>

            <text x="22" y="${19+fs/3}" text-anchor="middle"
              font-family="JetBrains Mono,monospace"
              font-size="${fs}" font-weight="bold" fill="white">${escH(display)}</text>
          </svg>
        </div>`;
      }
    }
  });

  html+='</div>';
  return `<div style="padding:.45rem .55rem .7rem;background:#020c18;border-top:1px solid rgba(0,136,255,.1);overflow-x:auto;">
    <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.1rem 0 .42rem;letter-spacing:.06em;">⚛ CIRCUITO CUÁNTICO</div>
    ${html}

}


function buildProbsOut(probs,shots,sim){
  const entries=Object.entries(probs).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return'';
  const total=entries.reduce((s,[,v])=>s+v,0);

  // Detectar si los valores son counts directos o probabilidades
  // Si la suma total ≈ shots → son counts directos
  // Si la suma total ≈ 1.0  → son probabilidades
  const sumV = entries.reduce((s,[,v])=>s+v,0);
  const areCounts = sumV > 1.5; // counts directos si suma > 1.5

  // Calcular el total real de shots desde los datos (más preciso que el parámetro)
  const totalCounts = areCounts ? sumV : shots;
  const displayShots = areCounts ? Math.round(sumV) : shots;

  const rows=entries.map(([st,v])=>{
    const count  = areCounts ? Math.round(v) : Math.round(v*shots);
    const prob   = areCounts ? v/totalCounts : v;
    const pct    = (prob*100).toFixed(1);
    const fill   = Math.max(1, Math.round(prob*100));
    return`<div class="prob-row">
      <span class="prob-state">|${escH(st)}⟩</span>
      <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${fill}%"></div></div>
      <span class="prob-pct">${pct}%</span>
      <span class="prob-count">${count}/${displayShots}</span>
    </div>`;
  }).join('');
  return`<div class="out-probs">
    <div class="out-probs-title">RESULTADOS${sim?' · '+sim:''} · ${displayShots} shots</div>
    ${rows}
  </div>`;
}

function buildHistogramOut(probs, shots){
  // Ordenar estados de menor a mayor (orden binario natural)
  const entries=Object.entries(probs).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!entries.length) return '';

  // Detectar si son counts directos o probabilidades
  const sumV = entries.reduce((s,[,v])=>s+v,0);
  const areCounts = sumV > 1.5;

  // Calcular counts reales y total real de shots
  const totalReal  = areCounts ? Math.round(sumV) : shots;
  const countsData = entries.map(([st,v])=>({
    state: st,
    count: areCounts ? Math.round(v) : Math.round(v*shots),
    prob:  areCounts ? v/sumV : v
  }));
  const maxCount = Math.max(...countsData.map(d=>d.count), 1);

  const canvasId='hist-'+genId();
  setTimeout(()=>{
    const canvas=document.getElementById(canvasId);
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    // Ancho adaptativo: más barras → canvas más ancho
    const nBars = countsData.length;
    const barW  = Math.max(18, Math.min(44, Math.floor(520/nBars)-10));
    const barGap = Math.max(4, Math.min(10, Math.floor(80/nBars)));
    const padL=52, padR=16, padT=22, padB=42;
    const chartW = nBars*(barW+barGap)+barGap;
    const W = Math.min(700, padL+chartW+padR);
    const H = 210;
    const chartH = H-padT-padB;
    canvas.width=W; canvas.height=H;

    ctx.clearRect(0,0,W,H);
    // Fondo
    ctx.fillStyle='#050810'; ctx.fillRect(0,0,W,H);

    // Calcular ticks del eje Y en counts reales (no probabilidades)
    // Elegir un número "bonito" de ticks
    const nTicks=5;
    const tickStep = Math.ceil(maxCount/nTicks/10)*10 || 1;
    const yMax = tickStep*nTicks;

    // Grid horizontal + etiquetas eje Y (counts)
    ctx.font='9px JetBrains Mono,monospace';
    ctx.textAlign='right';
    for(let i=0;i<=nTicks;i++){
      const val = i*tickStep;
      const y   = padT+chartH*(1-val/yMax);
      ctx.strokeStyle='rgba(0,136,255,0.1)';
      ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
      ctx.fillStyle='rgba(0,180,255,0.55)';
      ctx.fillText(val>999?(val/1000).toFixed(1)+'k':val, padL-4, y+3);
    }

    // Barras con gradiente azul-cian (misma estética que el ecosistema)
    countsData.forEach((d,i)=>{
      const x    = padL+barGap+i*(barW+barGap);
      const bH   = Math.max(2,(d.count/yMax)*chartH);
      const y    = padT+chartH-bH;
      // Gradiente
      const grad = ctx.createLinearGradient(x,y+bH,x,y);
      grad.addColorStop(0,'rgba(0,100,220,.85)');
      grad.addColorStop(0.5,'rgba(0,160,255,.92)');
      grad.addColorStop(1,'rgba(0,220,255,1)');
      ctx.fillStyle=grad;
      if(ctx.roundRect) ctx.roundRect(x,y,barW,bH,3); else ctx.rect(x,y,barW,bH);
      ctx.fill();
      // Brillo superior
      ctx.fillStyle='rgba(0,255,255,0.45)';
      ctx.fillRect(x,y,barW,2);
      // Count encima de la barra
      ctx.fillStyle='#e2ecff';
      ctx.font='bold 8px JetBrains Mono,monospace';
      ctx.textAlign='center';
      const label = d.count>0?String(d.count):'0';
      ctx.fillText(label, x+barW/2, y-4);
      // Estado debajo
      ctx.fillStyle='rgba(140,190,255,0.8)';
      ctx.font='9px JetBrains Mono,monospace';
      // Rotar etiqueta si hay muchas barras
      if(nBars>8){
        ctx.save();
        ctx.translate(x+barW/2, padT+chartH+8);
        ctx.rotate(Math.PI/4);
        ctx.textAlign='left';
        ctx.fillText('|'+d.state+'⟩',0,0);
        ctx.restore();
      } else {
        ctx.textAlign='center';
        ctx.fillText('|'+d.state+'⟩', x+barW/2, padT+chartH+14);
        // Porcentaje
        ctx.fillStyle='rgba(100,150,200,0.6)';
        ctx.font='8px JetBrains Mono,monospace';
        ctx.fillText((d.prob*100).toFixed(1)+'%', x+barW/2, padT+chartH+25);
      }
    });

    // Ejes
    ctx.strokeStyle='rgba(0,136,255,0.35)';
    ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(padL,padT); ctx.lineTo(padL,padT+chartH); ctx.lineTo(W-padR,padT+chartH);
    ctx.stroke();

    // Etiqueta eje Y
    ctx.save();
    ctx.translate(12, padT+chartH/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle='rgba(0,136,255,0.5)';
    ctx.font='9px Orbitron,monospace';
    ctx.textAlign='center';
    ctx.fillText('CONTEOS', 0, 0);
    ctx.restore();

  }, 20);

  return `<div style="padding:.5rem .55rem .6rem;background:#040c18;border-top:1px solid rgba(0,136,255,.1);">
    <div style="font-family:var(--orb);font-size:.42rem;color:var(--mu);margin-bottom:.35rem;letter-spacing:.05em;">
      📊 HISTOGRAMA · ${totalReal} shots
    </div>
    <canvas id="${canvasId}" style="max-width:100%;height:auto;display:block;border-radius:6px;"></canvas>
  </div>`;
}

function buildBlochOut(probs){
  // Calcular estados de Bloch por qubit desde los counts/probs
  const qubits=Object.keys(probs)[0]?.length||0;
  if(qubits===0)return'';
  const total=Object.values(probs).reduce((s,v)=>s+v,0);
  const blochData=[];
  for(let qi=0;qi<Math.min(qubits,8);qi++){
    let p0=0;
    Object.entries(probs).forEach(([s,p])=>{
      const bit=s.length>qi?s[s.length-1-qi]:'0';
      if(bit==='0')p0+=(p>1?p/total:p);
    });
    const theta=2*Math.acos(Math.min(1,Math.sqrt(Math.max(0,p0))));
    blochData.push({qi,theta,p0:Math.min(1,p0)});
  }
    const spheres=blochData.map(({qi,theta,p0})=>{
    const cid='bloch-'+genId();
    const sz=blochData.length<=2?200:blochData.length<=4?160:130;
    setTimeout(()=>drawBlochSphere(cid,theta,qi),80);
    const p0pct=(p0*100).toFixed(0);
    const p1pct=((1-p0)*100).toFixed(0);
    return`<div class="bloch-item">
      <canvas id="${cid}" width="${sz}" height="${sz}" style="border-radius:50%;box-shadow:0 0 25px rgba(0,136,255,.2),0 0 50px rgba(0,136,255,.08);"></canvas>
      <div class="bloch-item-lbl">q[${qi}]&nbsp;|0⟩=${p0pct}%&nbsp;|1⟩=${p1pct}%</div>
    </div>`;
  }).join('');
  return`<div class="out-bloch-wrap">
    <div style="width:100%;font-family:var(--orb);font-size:.4rem;color:var(--mu);margin-bottom:.3rem;letter-spacing:.05em;">🌐 ESFERAS DE BLOCH</div>
    ${spheres}
  </div>`;
}

function drawBlochSphere(canvasId,theta,qi){
  const c=document.getElementById(canvasId);
  if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2;
  const r=Math.min(w,h)*0.40;
  ctx.clearRect(0,0,w,h);

  // Fondo con gradiente radial
  const bg=ctx.createRadialGradient(cx-r*.15,cy-r*.15,r*.05,cx,cy,r*1.15);
  bg.addColorStop(0,'#0d1e36');bg.addColorStop(.7,'#061020');bg.addColorStop(1,'#030810');
  ctx.beginPath();ctx.arc(cx,cy,r*1.05,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();

  // Círculo exterior (esfera)
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,170,255,.5)';ctx.lineWidth=1.8;ctx.stroke();

  // Meridiano ecuador (elipse horizontal)
  ctx.beginPath();ctx.ellipse(cx,cy,r,r*.3,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,170,255,.3)';ctx.lineWidth=1.2;ctx.stroke();

  // Paralelos (latitudes)
  [-0.7,-0.35,0.35,0.7].forEach(f=>{
    const ry=r*Math.sqrt(1-f*f);
    const py=cy+r*f*0.95;
    ctx.beginPath();ctx.ellipse(cx,py,ry,ry*.28,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,136,255,${f===0?0.25:0.1})`;ctx.lineWidth=.7;ctx.stroke();
  });

  // Meridiano vertical (elipse vertical)
  ctx.beginPath();ctx.ellipse(cx,cy,r*.25,r,0,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,170,255,.15)';ctx.lineWidth=.7;ctx.stroke();

  // Ejes con flechas
  function drawAxis(x1,y1,x2,y2,col,dashed=false){
    ctx.beginPath();
    if(dashed)ctx.setLineDash([3,4]);
    ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.stroke();
    ctx.setLineDash([]);
  }
  drawAxis(cx,cy,cx,cy-r*1.15,'rgba(0,200,255,.5)');
  drawAxis(cx,cy,cx,cy+r*1.05,'rgba(0,200,255,.2)',true);
  drawAxis(cx,cy,cx+r*1.05,cy,'rgba(0,200,255,.2)');
  drawAxis(cx,cy,cx-r*0.9,cy,'rgba(0,200,255,.12)',true);

  // Vector de estado
  const phi=0;
  const vx=r*Math.sin(theta)*Math.cos(phi);
  const vy=-r*Math.cos(theta);

  // Proyección sombra (en el ecuador)
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+vx,cy);
  ctx.strokeStyle='rgba(0,255,221,.15)';ctx.lineWidth=1;ctx.setLineDash([2,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(cx+vx,cy);ctx.lineTo(cx+vx,cy+vy);
  ctx.strokeStyle='rgba(0,255,221,.12)';ctx.lineWidth=1;ctx.setLineDash([2,4]);ctx.stroke();ctx.setLineDash([]);

  // Vector principal con gradiente luminoso
  const vg=ctx.createLinearGradient(cx,cy,cx+vx,cy+vy);
  vg.addColorStop(0,'rgba(0,255,221,.4)');vg.addColorStop(.6,'rgba(0,255,221,.9)');vg.addColorStop(1,'#ffffff');
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+vx,cy+vy);
  ctx.strokeStyle=vg;ctx.lineWidth=2.8;ctx.stroke();

  // Punta de flecha
  const ang=Math.atan2(vy,vx);const al=9;
  ctx.beginPath();
  ctx.moveTo(cx+vx,cy+vy);
  ctx.lineTo(cx+vx-al*Math.cos(ang-0.42),cy+vy-al*Math.sin(ang-0.42));
  ctx.lineTo(cx+vx-al*Math.cos(ang+0.42),cy+vy-al*Math.sin(ang+0.42));
  ctx.closePath();ctx.fillStyle='#00ffdd';ctx.fill();

  // Punto brillante en la punta
  const pdg=ctx.createRadialGradient(cx+vx,cy+vy,0,cx+vx,cy+vy,6);
  pdg.addColorStop(0,'#ffffff');pdg.addColorStop(.4,'#00ffdd');pdg.addColorStop(1,'rgba(0,255,221,0)');
  ctx.beginPath();ctx.arc(cx+vx,cy+vy,6,0,Math.PI*2);ctx.fillStyle=pdg;ctx.fill();

  // Etiquetas
  const fs=w>130?12:10;
  ctx.font=`bold ${fs}px JetBrains Mono,monospace`;
  ctx.fillStyle='rgba(180,220,255,.95)';ctx.textAlign='center';
  ctx.fillText('|0⟩',cx,cy-r-6);
  ctx.fillStyle='rgba(130,170,210,.7)';
  ctx.fillText('|1⟩',cx,cy+r+fs+2);
  ctx.fillStyle='rgba(0,200,255,.6)';ctx.textAlign='left';
  ctx.fillText('|+⟩',cx+r+4,cy+4);
}

function buildErrorOut(errText){
  if(!errText)return'';
  const lineMatch=errText.match(/[Ll]ine\s+(\d+)|línea\s+(\d+)/i);
  const lineNum=lineMatch?(lineMatch[1]||lineMatch[2]):'';
  const typeMatch=errText.match(/(SyntaxError|NameError|TypeError|ValueError|ImportError|AttributeError|IndentationError|KeyError|IndexError|ZeroDivisionError|ModuleNotFoundError)[:\s]/);
  const errType=typeMatch?typeMatch[1]:'Error';
  const tips={
    SyntaxError:'Revisa paréntesis, dos puntos o indentación.',
    NameError:'Variable o función no definida. ¿Hay un typo?',
    TypeError:'Tipo de dato incorrecto para la operación.',
    ImportError:'Librería no disponible en el servidor.',
    ModuleNotFoundError:'Módulo no instalado. Verifica el nombre.',
    IndentationError:'Error de indentación. Revisa los espacios.',
    AttributeError:'El objeto no tiene ese atributo/método.',
  };
  const tip=tips[errType]||'Revisa el código en la línea indicada.';
  return`<div class="out-stderr" style="padding:.5rem .7rem;">
    <div style="color:#ff9999;font-family:var(--orb);font-size:.46rem;margin-bottom:.3rem;">
      ${errType}${lineNum?' · Línea '+lineNum:''}
    </div>
    <div style="color:#ff7070;white-space:pre-wrap;">${escH(errText.split('\n').slice(-3).join('\n'))}</div>
    <div style="color:#ffb86c;font-family:var(--orb);font-size:.42rem;margin-top:.3rem;">💡 ${tip}</div>
  </div>`;
}

// ── EJECUCIÓN ─────────────────────────────────────────────────
async function runCell(id){
  if(!_expositionMode&&!requireAuth())return;
  if(running){notify('Ya hay una ejecución en curso');return;}
  const cell=cells.find(c=>c.id===id);
  if(!cell||cell.type==='markdown')return;
  syncCellCode(id);
  const isCircuit=cell.type==='circuit';
  const isQk=cell.type==='qiskit';
  // Para celdas circuit: ejecutar hiddenCode (el código generado por el arquitecto)
  const rawCode = isCircuit ? (cell.hiddenCode||'') : (isQk?(QISKIT_PREAMBLE+'\n'+cell.code.trim()):cell.code.trim());
  const code = isCircuit ? (QISKIT_PREAMBLE+'\n'+rawCode) : rawCode;
  if(!rawCode.trim()){notify('⚛ Celda sin código — ábrela en el Arquitecto Cuántico');return;}
  if(!code.trim())return;
  running=true;setSbRun(true);
  const rbtn=document.getElementById('rbtn-'+id);
  if(rbtn)rbtn.classList.add('spinning');
  const outArea=document.getElementById('out-'+id);
  if(outArea)outArea.innerHTML='<div class="out-stdout" style="color:var(--mu);">⚙️ Ejecutando…</div>';
  const t0=Date.now();
  try{
    if(engineOK&&engineURL){
      const resp=await fetch(engineURL+'/run/predict',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({data:[code],fn_index:1}),
        signal:AbortSignal.timeout(90000)
      });
      const raw=await resp.json();
      const d=parseServerResponse(raw);
      execCounter++;cell.exec_count=execCounter;
      const elapsed=((Date.now()-t0)/1000).toFixed(2);
      renderOutput(outArea,d,elapsed,id);
      setSbRun(false,'✅ '+elapsed+'s');
    } else {
      execCounter++;cell.exec_count=execCounter;
      if(outArea)outArea.innerHTML='<div class="out-stdout" style="color:var(--mu);">⚡ Sin motor — configura la URL del compilador en el panel Fundador</div>';
      setSbRun(false,'Sin motor');
    }
  }catch(e){
    const isTO=e.name==='AbortError'||e.name==='TimeoutError';
    if(outArea)outArea.innerHTML=`<div class="out-stderr">❌ ${escH(isTO?'Tiempo agotado (90s) — circuito muy complejo':e.message)}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;
  if(rbtn)rbtn.classList.remove('spinning');
  renderCellNum(id);
  // Forzar re-render para mostrar errorLine si existe
  if(cell.errorLine) renderCells();
}
function renderCellNum(id){const cell=cells.find(c=>c.id===id);if(!cell)return;const el=document.querySelector(`[data-id="${id}"] .cell-num`);if(el)el.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';}
async function runCurCell(){if(curCellId)await runCell(curCellId);}
async function runAll(){for(const cell of cells){const hasCode=(cell.type==='circuit'?(cell.hiddenCode||'').trim():cell.code.trim());if(cell.type!=='markdown'&&hasCode){await runCell(cell.id);await new Promise(r=>setTimeout(r,200));}}}
function setSbRun(r,msg='',st=''){const dot=document.getElementById('sb-dot');const txt=document.getElementById('sb-txt');if(dot)dot.className='sb-dot '+(r?'sb-run':st==='err'?'sb-err':'sb-idle');if(txt&&msg)txt.textContent=msg;}
function updateStatus(){const el=document.getElementById('sb-cells-info');if(el)el.textContent=cells.length+' celdas';}

function saveCurrentNb(showNotify=true){
  if(_expositionMode)return;
  if(!curUser)return;
  cells.forEach(c=>{
    const ta=document.getElementById('ta-'+c.id);
    const mta=document.getElementById('mta-'+c.id);
    if(ta)c.code=ta.value;
    if(mta)c.code=mta.value;
    // hiddenCode y circuitData ya están en el objeto cell — no necesitan sync del DOM
  });
  const name=document.getElementById('nb-name-inp').value||'Sin título';
  const key='qcol_nbs_'+(curUser.username||'dev');
  const nbs=JSON.parse(localStorage.getItem(key)||'[]');
  const existing=nbs.findIndex(n=>n.name===name);
  const entry={name,cells:JSON.parse(JSON.stringify(cells)),saved:new Date().toISOString()};
  if(existing>=0)nbs[existing]=entry;else nbs.unshift(entry);
  localStorage.setItem(key,JSON.stringify(nbs.slice(0,50)));
  lastSaveTime=Date.now();
  const ss=document.getElementById('sb-save-status');
  if(ss)ss.textContent='💾 Guardado';
  setTimeout(()=>{const s=document.getElementById('sb-save-status');if(s)s.textContent='✓';},2500);
  if(showNotify)notify('💾 Guardado: '+name);
}
function downloadNb(){
  if(_expositionMode){notify('👁 Modo exposición — descarga desactivada');return;}
  const name=document.getElementById('nb-name-inp').value||'qcol_notebook';
  cells.forEach(c=>{
    const ta=document.getElementById('ta-'+c.id);
    const mta=document.getElementById('mta-'+c.id);
    if(ta)c.code=ta.value;
    if(mta)c.code=mta.value;
    // hiddenCode y circuitData ya están en el objeto cell — no necesitan sync del DOM
  });
  const nb={nbformat:4,nbformat_minor:5,
    metadata:{name,kernelspec:{display_name:'Python 3',language:'python',name:'python3'}},
    cells:cells.map(c=>{
      const isCircuit = c.type==='circuit';
      const tags = c.type==='qiskit'?['qiskit-cell']:isCircuit?['circuit-cell']:[];
      const source = isCircuit ? [c.hiddenCode||'# Celda de circuito visual (editar en el Arquitecto Cuántico)'] : [c.code];
      const meta = {tags};
      if(isCircuit){ meta.hidden_code=c.hiddenCode||''; meta.circuit_data=c.circuitData||null; }
      return {cell_type:c.type==='markdown'?'markdown':'code', source, metadata:meta, outputs:[], execution_count:c.exec_count};
    })};
  const blob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name.replace(/\.ipynb$/,'')+'.ipynb';a.click();
  notify('📥 '+a.download);
}
setInterval(()=>{if(!_expositionMode&&curUser&&cells.length>0){const mins=Math.floor((Date.now()-lastSaveTime)/60000);const ss=document.getElementById('sb-save-status');if(ss)ss.textContent=mins>0?`⏱️ hace ${mins}min`:'✓';}},60000);
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCurrentNb(true);}
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='Enter'){e.preventDefault();runAll();}
});

function newNotebook(){if(!confirm('¿Crear nuevo notebook?'))return;cells=[];execCounter=0;curCellId=null;document.getElementById('nb-name-inp').value='Nuevo Notebook';addCellAt(-1,'code');notify('✅ Nuevo notebook');}
function importNb(){document.getElementById('import-file').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const nb=JSON.parse(ev.target.result);
      cells=[];execCounter=0;
      const name=nb.metadata?.name||file.name.replace('.ipynb','');
      document.getElementById('nb-name-inp').value=name;
      (nb.cells||[]).forEach(c=>{
        const src=Array.isArray(c.source)?c.source.join(''):c.source||'';
        const tags=c.metadata?.tags||[];
        const type=c.cell_type==='markdown'?'markdown':
          (tags.includes('qiskit-cell')?'qiskit':
          (tags.includes('circuit-cell')?'circuit':'code'));
        const hiddenCode = c.metadata?.hidden_code || '';
        const circuitData = c.metadata?.circuit_data || null;
        cells.push({id:genId(),type,code:src,output:'',exec_count:null,
          mdEdit:false,errorLine:null,hiddenCode,circuitData});
      });
      if(cells.length===0)addCellAt(-1,'code');
      else{renderCells();focusCell(cells[0].id);}
      setView('notebook');notify(`✅ Importado: ${name}`);
    }catch(err){notify('❌ Error: '+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}

function deleteNb(name){if(!confirm('¿Eliminar "'+name+'"?'))return;const key='qcol_nbs_'+(curUser?.username||'dev');localStorage.setItem(key,JSON.stringify(getSavedNbs().filter(n=>n.name!==name)));refreshNbs();notify('🗑 Eliminado');}
