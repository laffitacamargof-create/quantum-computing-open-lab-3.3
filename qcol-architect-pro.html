<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL — Arquitecto Profesional</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0c1525;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;--bd3:#0d1e36;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;--or:#ffb86c;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cmt:#636e8a;--cl:#8be9fd;--qt:#ff9580;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── NOTIF ── */
.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

/* ── ACCESS DENIED ── */
.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}

/* ── TOPBAR ── */
.topbar{height:40px;display:flex;align-items:center;gap:.4rem;
  padding:0 .75rem;background:#07091200;background:linear-gradient(90deg,#07091299,#080d1899);
  backdrop-filter:blur(8px);border-bottom:1px solid rgba(189,147,249,.14);flex-shrink:0;z-index:10;}
.btn-nav-back{display:flex;align-items:center;gap:.25rem;padding:.2rem .55rem;
  background:rgba(189,147,249,.07);border:1px solid rgba(189,147,249,.25);border-radius:5px;
  color:var(--pu);font-family:var(--orb);font-size:.46rem;cursor:pointer;transition:all .15s;flex-shrink:0;}
.btn-nav-back:hover{background:rgba(189,147,249,.15);border-color:var(--pu);}
.tb-logo{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.tb-q{font-family:var(--orb);font-size:.7rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.44rem;color:var(--pu);letter-spacing:.06em;
  background:rgba(189,147,249,.1);border:1px solid rgba(189,147,249,.2);
  padding:.08rem .3rem;border-radius:3px;}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.08);flex-shrink:0;}
.nb-name-inp{background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:.68rem;color:var(--tx);
  min-width:60px;max-width:200px;padding:.1rem .3rem;border-radius:4px;}
.nb-name-inp:focus{background:rgba(255,255,255,.04);color:var(--cy);}
.nb-name-inp::placeholder{color:var(--mu);}
#expo-badge{display:none;padding:.14rem .4rem;
  background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.3);border-radius:4px;
  font-family:var(--orb);font-size:.43rem;color:var(--gr);flex-shrink:0;letter-spacing:.05em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.28rem;}
.engine-url-input{background:rgba(0,0,0,.4);border:1px solid var(--bd2);border-radius:5px;
  padding:.17rem .42rem;font-family:var(--mono);font-size:.52rem;color:var(--tx2);width:155px;outline:none;}
.engine-url-input:focus{border-color:var(--bl2);}
.eng-pill{padding:.17rem .44rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.2);color:var(--mu);}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.3);color:var(--gr);animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{opacity:1;}50%{opacity:.6;}}
.user-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.44rem;
  background:rgba(189,147,249,.07);border:1px solid rgba(189,147,249,.18);color:var(--pu);}
.admin-pill{padding:.17rem .42rem;border-radius:10px;font-family:var(--orb);font-size:.42rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.18);color:var(--yw);}

/* ── SECBAR ── */
.secbar{height:30px;display:flex;align-items:stretch;
  background:#080b14;border-bottom:1px solid var(--bd3);flex-shrink:0;padding:0 .45rem;gap:.08rem;}
.stab{display:flex;align-items:center;gap:.22rem;padding:0 .6rem;
  background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.44rem;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;}
.stab.on{color:var(--pu);border-bottom-color:var(--pu);}
.stab:hover:not(.on){color:var(--tx2);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.22rem;padding:0 .15rem;}
.tbtn{display:flex;align-items:center;gap:.25rem;padding:.2rem .5rem;
  background:transparent;border:1px solid var(--bd2);border-radius:4px;
  color:var(--mu);font-family:var(--orb);font-size:.44rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbtn:hover{border-color:var(--bl2);color:var(--bl2);background:rgba(0,136,255,.05);}
.tbtn.run{background:linear-gradient(135deg,#003388,var(--bl));border-color:var(--bl);color:#fff;}
.tbtn.run:hover{box-shadow:0 2px 8px rgba(0,136,255,.4);}
.tbtn.run-all{background:linear-gradient(135deg,#004400,#008833);border-color:#008833;color:#fff;}
.tbtn.pub{background:linear-gradient(135deg,#3a0075,var(--pu));border-color:var(--pu);color:#fff;}
.tbtn.rst{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.25);color:var(--yw);}
.tbtn.rst:hover{background:rgba(255,215,0,.13);}

/* ── MAIN ── */
.main{flex:1;overflow:hidden;display:flex;min-height:0;}
#view-notebook{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.nb-scroll{flex:1;overflow-y:auto;padding:.6rem 0 2rem;}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── CELDA BASE ── */
.nb-cell{display:flex;margin:.22rem auto;
  width:min(940px,97%);position:relative;
  border-radius:8px;border:1px solid transparent;transition:border-color .15s,box-shadow .15s;}
.nb-cell:hover{border-color:rgba(189,147,249,.18);box-shadow:0 2px 12px rgba(0,0,0,.3);}
.nb-cell.active{border-color:rgba(189,147,249,.45);box-shadow:0 2px 20px rgba(189,147,249,.06);}
.nb-cell.running{border-color:rgba(0,136,255,.5);box-shadow:0 0 18px rgba(0,136,255,.08);}
/* Celda Qiskit — borde izquierdo cian */
.nb-cell.qk-cell{border-left:3px solid rgba(0,255,221,.35);}
.nb-cell.qk-cell:hover{border-color:rgba(0,255,221,.35);border-left-color:rgba(0,255,221,.6);}
.nb-cell.qk-cell.active{border-color:rgba(0,255,221,.55);border-left-color:var(--cy);}

/* ── GUTTER ── */
.cell-gutter{width:48px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;padding:.5rem .2rem 0;gap:.25rem;}
.cell-num{font-family:var(--mono);font-size:.56rem;color:var(--mu2);min-width:20px;text-align:center;}
.cell-run-btn{width:23px;height:23px;border-radius:50%;background:transparent;
  border:1px solid var(--bd2);color:var(--mu);font-size:.62rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.nb-cell.active .cell-run-btn{border-color:var(--bl2);color:var(--bl2);}
.qk-cell .cell-run-btn{border-color:rgba(0,255,221,.3);color:var(--cy);}
.qk-cell.active .cell-run-btn{border-color:var(--cy);color:var(--cy);}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.12);}
.cell-run-btn.spinning{animation:sp .7s linear infinite;border-color:var(--gr);color:var(--gr);}
@keyframes sp{to{transform:rotate(360deg);}}

/* ── BODY ── */
.cell-body{flex:1;display:flex;flex-direction:column;min-width:0;padding:.32rem 0;}
.cell-type-badge{display:inline-flex;align-items:center;gap:.22rem;
  font-family:var(--orb);font-size:.4rem;color:var(--mu);
  padding:.05rem 0 .22rem;margin-bottom:.06rem;letter-spacing:.04em;}
.ctb-code{color:rgba(0,170,255,.7);}
.ctb-qk{color:var(--cy);}
.ctb-md{color:rgba(0,255,136,.7);}

/* ── EDITOR ── */
.cell-code-area{position:relative;background:var(--bg2);
  border:1px solid var(--bd3);border-radius:6px;overflow:hidden;min-height:42px;
  transition:border-color .15s;}
.nb-cell.active .cell-code-area{border-color:rgba(189,147,249,.3);}
.qk-cell .cell-code-area{border-color:rgba(0,255,221,.15);background:#0a1018;}
.qk-cell.active .cell-code-area{border-color:rgba(0,255,221,.35);}
/* Número de línea integrado */
.cell-code-wrap{display:flex;height:100%;}
.cell-linenos{width:32px;flex-shrink:0;padding:.55rem .3rem;
  background:rgba(0,0,0,.25);border-right:1px solid var(--bd3);
  font-family:var(--mono);font-size:.62rem;line-height:1.65;
  color:var(--mu2);text-align:right;user-select:none;overflow:hidden;}
.qk-cell .cell-linenos{background:rgba(0,20,30,.4);}
.cell-code-inner{flex:1;position:relative;overflow:hidden;min-height:42px;}
.cell-syn-layer{position:absolute;inset:0;padding:.55rem .7rem;
  font-family:var(--mono);font-size:.7rem;line-height:1.65;
  pointer-events:none;z-index:1;overflow:hidden;white-space:pre;
  color:var(--tx2);background:transparent;tab-size:4;}
.cell-textarea{position:absolute;inset:0;
  background:transparent;color:transparent;caret-color:var(--cy);
  padding:.55rem .7rem;font-family:var(--mono);font-size:.7rem;
  border:none;outline:none;resize:none;line-height:1.65;
  z-index:2;white-space:pre;overflow:auto;tab-size:4;min-height:42px;
  letter-spacing:0;}
.cell-textarea::-webkit-scrollbar{width:4px;height:4px;}
.cell-textarea::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}

/* ── OUTPUT — terminal JupyterLab ── */
.cell-output-area{margin-top:.28rem;border-radius:6px;overflow:hidden;
  border:1px solid var(--bd3);background:#050810;}
.out-header{display:flex;align-items:center;gap:.4rem;padding:.25rem .65rem;
  background:rgba(0,0,0,.4);border-bottom:1px solid var(--bd3);font-family:var(--orb);font-size:.4rem;}
.out-header-ok{color:var(--gr);}
.out-header-err{color:var(--rd);}
/* Texto terminal */
.out-stdout{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;overflow-x:auto;color:#c8e0ff;background:#050810;
  max-height:400px;overflow-y:auto;}
.out-stdout::-webkit-scrollbar{width:4px;height:4px;}
.out-stdout::-webkit-scrollbar-thumb{background:var(--bd2);}
.out-stderr{padding:.5rem .7rem;font-family:var(--mono);font-size:.67rem;line-height:1.62;
  white-space:pre-wrap;color:#ff9999;background:rgba(255,60,60,.04);
  border-top:1px solid rgba(255,68,102,.15);}
/* Circuito texto — estilo visual mejorado */
.out-circuit-text{padding:.5rem .7rem;font-family:var(--mono);font-size:.65rem;line-height:1.7;
  white-space:pre;overflow-x:auto;color:var(--cl);background:#040d18;
  border-top:1px solid rgba(0,170,255,.1);}
.out-circuit-text::-webkit-scrollbar{height:4px;}
.out-circuit-text::-webkit-scrollbar-thumb{background:var(--bd2);}
/* Bloch sphere canvas por celda */
.out-bloch-wrap{padding:.55rem .7rem;background:#04080f;
  border-top:1px solid rgba(0,255,221,.08);display:flex;flex-wrap:wrap;gap:.6rem;align-items:flex-start;}
.bloch-item{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
.bloch-item canvas{border-radius:50%;box-shadow:0 0 20px rgba(0,136,255,.15);}
.bloch-item-lbl{font-family:var(--mono);font-size:.52rem;color:var(--mu);}
/* Probabilidades */
.out-probs{padding:.55rem .7rem;background:#040c18;
  border-top:1px solid rgba(0,136,255,.1);}
.out-probs-title{font-family:var(--orb);font-size:.42rem;color:var(--mu);
  letter-spacing:.06em;margin-bottom:.4rem;}
.prob-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.2rem;
  font-family:var(--mono);font-size:.64rem;}
.prob-state{color:var(--cy);min-width:52px;font-weight:600;}
.prob-bar-bg{flex:1;height:9px;background:rgba(0,136,255,.08);
  border-radius:3px;overflow:hidden;border:1px solid rgba(0,136,255,.1);}
.prob-bar-fill{height:100%;border-radius:3px;
  background:linear-gradient(90deg,rgba(0,136,255,.8),rgba(0,255,221,.8));}
.prob-pct{color:var(--tx2);min-width:40px;text-align:right;font-size:.62rem;}
.prob-count{color:var(--mu);min-width:45px;text-align:right;font-size:.58rem;}
/* Imagen matplotlib / gráficas */
.out-img{display:block;max-width:100%;border-radius:5px;
  margin:.4rem .6rem;box-shadow:0 4px 20px rgba(0,0,0,.5);}
/* Resultados tipo dict */
.out-dict{padding:.5rem .7rem;font-family:var(--mono);font-size:.66rem;line-height:1.6;
  color:var(--yw);background:#060c10;border-top:1px solid rgba(255,215,0,.08);
  white-space:pre-wrap;}

/* ── MARKDOWN ── */
.cell-md-rendered{padding:.55rem .7rem;font-size:.74rem;line-height:1.72;color:var(--tx);}
.cell-md-rendered h1{font-family:var(--orb);font-size:1.05rem;color:var(--bl2);
  margin:.55rem 0 .3rem;padding-bottom:.25rem;border-bottom:1px solid rgba(0,136,255,.2);}
.cell-md-rendered h2{font-family:var(--orb);font-size:.88rem;color:var(--bl2);margin:.45rem 0 .22rem;}
.cell-md-rendered h3{font-size:.78rem;color:var(--cy);margin:.35rem 0 .18rem;}
.cell-md-rendered p{margin-bottom:.48rem;}
.cell-md-rendered strong{color:var(--tx);font-weight:600;}
.cell-md-rendered em{color:var(--tx2);font-style:italic;}
.cell-md-rendered code{background:rgba(0,136,255,.1);padding:.08rem .25rem;
  border-radius:3px;font-family:var(--mono);color:var(--cy);font-size:.68rem;
  border:1px solid rgba(0,136,255,.15);}
.cell-md-rendered pre{background:#060d18;padding:.6rem;border-radius:6px;
  overflow-x:auto;margin:.4rem 0;border:1px solid var(--bd);}
.cell-md-rendered pre code{background:none;border:none;padding:0;color:var(--tx2);}
.cell-md-rendered blockquote{border-left:3px solid var(--bl);padding:.3rem .7rem;
  color:var(--tx2);margin:.4rem 0;background:rgba(0,136,255,.04);border-radius:0 5px 5px 0;}
.cell-md-rendered ul,.cell-md-rendered ol{padding-left:1.4rem;margin-bottom:.4rem;}
.cell-md-rendered li{margin-bottom:.14rem;}
.cell-md-rendered table{border-collapse:collapse;width:100%;margin:.4rem 0;font-size:.7rem;}
.cell-md-rendered th,.cell-md-rendered td{border:1px solid var(--bd2);padding:.28rem .5rem;}
.cell-md-rendered th{background:rgba(0,136,255,.08);color:var(--bl2);}
.cell-md-rendered img{max-width:100%;border-radius:5px;}
/* Math display */
.cell-md-rendered .MJX-TEX{color:var(--nm);}
/* Markdown editor split */
.md-split{display:flex;gap:.4rem;background:var(--bg2);
  border:1px solid var(--bd);border-radius:6px;min-height:130px;}
.md-editor-pane{flex:1;border-right:1px solid var(--bd);}
.md-preview-pane{flex:1;padding:.52rem;overflow-y:auto;max-height:360px;
  font-size:.71rem;line-height:1.65;color:var(--tx2);}
.md-preview-pane h1{font-family:var(--orb);font-size:.95rem;color:var(--bl2);}
.md-preview-pane h2{font-size:.82rem;color:var(--bl2);}
.md-preview-pane code{background:rgba(0,136,255,.1);padding:.08rem .25rem;
  border-radius:3px;font-family:var(--mono);color:var(--cy);font-size:.67rem;}
.md-preview-pane pre{background:var(--bg);padding:.5rem;border-radius:5px;overflow-x:auto;}
.md-preview-pane .hljs{background:transparent;}
.cell-md-split-area{width:100%;height:100%;background:var(--bg2);border:none;
  padding:.52rem;font-family:var(--mono);font-size:.68rem;
  line-height:1.65;color:var(--tx2);resize:none;outline:none;}

/* ── TOOLBAR ── */
.cell-toolbar{display:none;position:absolute;top:.25rem;right:.4rem;
  gap:.15rem;align-items:center;z-index:5;}
.nb-cell:hover .cell-toolbar,.nb-cell.active .cell-toolbar{display:flex;}
body.expo-mode .nb-cell .cell-toolbar{display:none!important;}
body.expo-mode .nb-cell.qk-cell:hover .cell-toolbar,
body.expo-mode .nb-cell.qk-cell.active .cell-toolbar{display:flex!important;}
body.expo-mode .nb-cell.qk-cell .cell-toolbar .ct-btn:not(.ct-run){display:none!important;}
.ct-btn{width:18px;height:18px;border-radius:3px;
  background:rgba(8,11,20,.9);border:1px solid var(--bd2);
  color:var(--mu);font-size:.5rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .14s;}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.ct-btn.danger:hover{border-color:var(--rd);color:var(--rd);}
/* Botón restaurar celda */
.cell-restore-btn{display:none;position:absolute;bottom:.25rem;right:.4rem;
  padding:.1rem .3rem;background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.22);border-radius:3px;
  color:var(--yw);font-family:var(--orb);font-size:.4rem;cursor:pointer;z-index:5;}
body.expo-mode .nb-cell.qk-cell .cell-restore-btn,
body.expo-mode .nb-cell[data-ctype="code"] .cell-restore-btn{display:block;}
.cell-restore-btn:hover{background:rgba(255,215,0,.14);}

/* ── ADD ROW ── */
.add-cell-row{width:min(940px,97%);margin:.03rem auto;height:14px;
  display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;}
.add-cell-row:hover{opacity:1;}
body.expo-mode .add-cell-row{display:none;}
.add-cell-line{flex:1;height:1px;background:rgba(189,147,249,.15);}
.add-cell-btns{display:flex;gap:.2rem;padding:0 .4rem;}
.add-btn{padding:.09rem .36rem;background:var(--bg);border:1px solid rgba(189,147,249,.25);
  border-radius:3px;color:var(--pu);font-family:var(--orb);font-size:.38rem;cursor:pointer;transition:all .14s;}
.add-btn:hover{background:rgba(189,147,249,.07);}
.nb-bottom{width:min(940px,97%);margin:.35rem auto 2rem;display:flex;gap:.4rem;}
body.expo-mode .nb-bottom{display:none;}
.nb-add-big{flex:1;padding:.48rem;background:transparent;
  border:1px dashed rgba(189,147,249,.18);border-radius:7px;
  color:rgba(189,147,249,.5);font-family:var(--orb);font-size:.48rem;cursor:pointer;
  transition:all .18s;text-align:center;}
.nb-add-big:hover{background:rgba(189,147,249,.05);border-color:rgba(189,147,249,.45);color:var(--pu);}

/* ── GESTIONAR ── */
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.manage-bar{display:flex;align-items:center;gap:.4rem;padding:.5rem .8rem;
  background:var(--p);border-bottom:1px solid var(--bd);flex-shrink:0;}
.manage-title-lbl{font-family:var(--orb);font-size:.62rem;color:var(--pu);}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:.75rem;padding:.9rem;overflow-y:auto;flex:1;}
.nb-grid::-webkit-scrollbar{width:5px;}
.nb-grid::-webkit-scrollbar-thumb{background:var(--bd2);}
.nb-card{background:var(--p);border:1px solid var(--bd);border-radius:9px;overflow:hidden;transition:all .22s;}

<script>
// ═══════════════════════════════════════════════════════════════
// QCOL ARQUITECTO PROFESIONAL v4.1 — Output completo + Expo mode
// ═══════════════════════════════════════════════════════════════
let curUser=null,engineURL='',engineOK=false,running=false;
let curView='notebook',cells=[],curCellId=null,execCounter=0;
let _initialized=false,lastSaveTime=Date.now(),debounceTimer=null,dragSrcId=null;
let _expositionMode=false,_originalCells=null;
let md=null;

function postCore(type,data={}){try{window.parent.postMessage({type,...data},'*');}catch(e){}}
function notify(msg,ms=2800){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genId(){return 'c'+Date.now()+Math.random().toString(36).slice(2,6);}

// ── NAVEGACIÓN ────────────────────────────────────────────────
function goBack(){
  if(_expositionMode){
    deactivateExpositionMode();
    postCore('QCOL_NAV',{screen:'projects'});
  } else {
    postCore('QCOL_NAV',{screen:'home'});
  }
}

// ── MODO EXPOSICIÓN ───────────────────────────────────────────
function activateExpositionMode(){
  _expositionMode=true;
  _originalCells=JSON.parse(JSON.stringify(cells));
  document.body.classList.add('expo-mode');
  document.getElementById('expo-badge').style.display='inline-flex';
  ['btn-add-code','btn-add-qk','btn-add-md','btn-import','btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  const rst=document.getElementById('btn-restore-all');if(rst)rst.style.display='';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=true;ni.style.opacity='.6';}
  notify('👁 Modo exposición — ejecuta y experimenta libremente');
}
function deactivateExpositionMode(){
  _expositionMode=false;_originalCells=null;
  document.body.classList.remove('expo-mode');
  document.getElementById('expo-badge').style.display='none';
  ['btn-add-code','btn-add-qk','btn-add-md','btn-import','btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='';
  });
  const rst=document.getElementById('btn-restore-all');if(rst)rst.style.display='none';
  const ni=document.getElementById('nb-name-inp');if(ni){ni.readOnly=false;ni.style.opacity='';}
}
function restoreAllCells(){
  if(!_originalCells){notify('Sin datos originales');return;}
  if(!confirm('¿Restaurar todo el código a los valores originales?'))return;
  cells=JSON.parse(JSON.stringify(_originalCells)).map(c=>({...c,output:'',exec_count:null,mdEdit:false}));
  execCounter=0;renderCells();notify('↺ Código restaurado');
}
function restoreCell(id){
  if(!_originalCells)return;
  const idx=cells.findIndex(c=>c.id===id);if(idx<0)return;
  const orig=_originalCells[idx];if(!orig)return;
  cells[idx]={...orig,id:cells[idx].id,output:'',exec_count:null,mdEdit:false};
  renderCells();notify('↺ Celda restaurada');
}

// ── MOTOR ─────────────────────────────────────────────────────
async function checkEngine(){
  if(!engineURL)return;
  const badge=document.getElementById('eng-badge');
  try{
    const r=await fetch(engineURL+'/run/predict',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:[''],fn_index:1}),
      signal:AbortSignal.timeout(12000)
    });
    if(r.ok){const j=await r.json();if(j&&j.data){engineOK=true;badge.textContent='● MOTOR ACTIVO';badge.className='eng-pill on';}else throw new Error();}
    else throw new Error('HTTP '+r.status);
  }catch(e){engineOK=false;badge.textContent='● SIN COMPILADOR';badge.className='eng-pill';}
}
function setEngineURL(url){engineURL=url;localStorage.setItem('qcol_colab_url',url);checkEngine();notify('🌐 Motor actualizado');}

// ── PREAMBLE QISKIT ───────────────────────────────────────────
const QISKIT_PREAMBLE=`from qiskit import QuantumCircuit, QuantumRegister, ClassicalRegister, transpile
from qiskit.quantum_info import Statevector, DensityMatrix, Operator
from qiskit.visualization import plot_histogram, plot_bloch_multivector, plot_state_city
try:
    from qiskit_aer import AerSimulator
    from qiskit_aer.primitives import Sampler, Estimator
except: AerSimulator=None
import numpy as np
from numpy import pi
import matplotlib
matplotlib.use('Agg')
import matplotlib.pyplot as plt
import io, base64
`;

// ── PARSEAR RESPUESTA DEL SERVIDOR ────────────────────────────
function parseServerResponse(raw){
  // raw.data[0] puede ser string JSON o dict ya parseado
  let d=null;
  try{
    const item=raw?.data?.[0];
    d=(typeof item==='string')?JSON.parse(item):item;
  }catch(e){d={success:false,output:'Error al parsear respuesta del servidor'};}
  if(!d)d={success:false,output:'Respuesta vacía del servidor'};
  return d;
}

// ── RENDER DE OUTPUT COMPLETO ─────────────────────────────────
function renderOutput(outArea, d, elapsed){
  if(!outArea)return;
  const t0=elapsed?`${elapsed}s`:null;
  let html='';

  // Cabecera
  const isOk=d.success!==false;
  const hdrCls=isOk?'out-header-ok':'out-header-err';
  const hdrIcon=isOk?'✅':'❌';
  html+=`<div class="out-header ${hdrCls}">${hdrIcon} ${isOk?'Ejecutado':'Error'}${t0?' · '+t0:''}</div>`;

  // ── STDOUT completo ──
  if(d.output&&d.output.trim()){
    // Detectar si la salida contiene un diagrama de circuito (líneas con ─, │, ┤, ├, etc.)
    const lines=d.output.split('\n');
    let circuitBlock=[];
    let textBlock=[];
    let inCircuit=false;
    for(const line of lines){
      const isCircLine=/[─┤├┼╫│┐┘└┌╥╨╩╦╣╠═║╗╚╔╝╞╡╟╢]/.test(line)||/q_?\d+\s*:/.test(line)||/c:\s*\d/.test(line)||/^\s*(q\[|c\[|cr\[|qr\[)/.test(line);
      if(isCircLine){if(!inCircuit&&textBlock.length){html+=buildTextOut(textBlock.join('\n'));textBlock=[];}inCircuit=true;circuitBlock.push(line);}
      else{if(inCircuit){html+=buildCircuitOut(circuitBlock.join('\n'));circuitBlock=[];inCircuit=false;}textBlock.push(line);}
    }
    if(inCircuit)html+=buildCircuitOut(circuitBlock.join('\n'));
    if(textBlock.length&&textBlock.join('').trim())html+=buildTextOut(textBlock.join('\n'));
  }

  // ── STDERR ──
  if(d.stderr&&d.stderr.trim()){
    html+=`<div class="out-stderr">${escH(d.stderr)}</div>`;
  }

  // ── PROBABILIDADES / COUNTS ──
  if(d.bloch&&d.bloch.probabilities){
    html+=buildProbsOut(d.bloch.probabilities,d.bloch.shots||1024,d.bloch.simulator||'AerSimulator');
  }else if(d.counts){
    html+=buildProbsOut(d.counts,d.bloch?.shots||1024,'');
  }

  // ── ESFERA DE BLOCH ──
  if(d.bloch&&d.bloch.probabilities){
    html+=buildBlochOut(d.bloch.probabilities);
  }

  // ── IMAGEN matplotlib ──
  if(d.plot_png){
    html+=`<div style="padding:.3rem .5rem;background:#04080e;border-top:1px solid rgba(0,136,255,.08);">
      <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.2rem 0 .3rem;letter-spacing:.05em;">GRÁFICA MATPLOTLIB</div>
      <img class="out-img" src="data:image/png;base64,${d.plot_png}" alt="Gráfica">
    </div>`;
  }

  // ── IMAGEN extra (plot_svg como fallback) ──
  if(d.plot_svg){
    html+=`<div style="padding:.3rem .5rem;background:#04080e;border-top:1px solid rgba(0,136,255,.08);">
      <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.2rem 0 .3rem;">DIAGRAMA SVG</div>
      <div style="overflow-x:auto;">${d.plot_svg}</div>
    </div>`;
  }

  // ── ERROR detallado ──
  if(!isOk&&d.output){
    html+=buildErrorOut(d.output);
  }

  outArea.innerHTML=html||'<div class="out-stdout" style="color:var(--mu);">Sin salida</div>';
}

function buildTextOut(text){
  if(!text.trim())return'';
  // Detectar si es dict de resultados como {'00': 512, '11': 512}
  if(/^\{['"0-9a-zA-Z_,:\s]+\}$/.test(text.trim())){
    return`<div class="out-dict">${escH(text)}</div>`;
  }
  return`<div class="out-stdout">${escH(text)}</div>`;
}

function buildCircuitOut(text){
  if(!text.trim())return'';
  // Colorear el diagrama ASCII del circuito
  let colored=escH(text);
  colored=colored.replace(/([HXYZSTshxyzts])\s*(?=─|├|┤|\s)/g,'<span style="color:#00aaff;font-weight:700">$1</span>');
  colored=colored.replace(/(cx|cy|cz|ch|rx|ry|rz|ccx|mcx)\s*(?=[\s─])/gi,'<span style="color:#00ffdd;font-weight:700">$1</span>');
  colored=colored.replace(/(M)\s*(?=[─├┤])/g,'<span style="color:#ff9580;font-weight:700">$1</span>');
  colored=colored.replace(/(q_?\d+|q\[\d+\]|c\[\d+\]|qr\[\d+\]|cr\[\d+\])\s*:/g,'<span style="color:#bd93f9">$1</span>:');
  colored=colored.replace(/(c:\s*\d+\/)/g,'<span style="color:#636e8a">$1</span>');
  return`<div style="padding:.4rem 0 .3rem .5rem;background:#020c18;border-top:1px solid rgba(0,136,255,.1);">
    <div style="font-family:var(--orb);font-size:.4rem;color:var(--mu);padding:.1rem .2rem .25rem;letter-spacing:.05em;">⚛ DIAGRAMA DEL CIRCUITO</div>
    <div class="out-circuit-text">${colored}</div>
  </div>`;
}

function buildProbsOut(probs,shots,sim){
  const entries=Object.entries(probs).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return'';
  const total=entries.reduce((s,[,v])=>s+v,0);
  const rows=entries.map(([st,v])=>{
    // v puede ser count (int) o probability (float)
    const isCount=v>1;
    const prob=isCount?v/total:v;
    const count=isCount?v:Math.round(v*shots);
    const pct=(prob*100).toFixed(1);
    const fill=Math.round(prob*100);
    return`<div class="prob-row">
      <span class="prob-state">|${escH(st)}⟩</span>
      <div class="prob-bar-bg"><div class="prob-bar-fill" style="width:${fill}%"></div></div>
      <span class="prob-pct">${pct}%</span>
      <span class="prob-count">${count}/${shots}</span>
    </div>`;
  }).join('');
  return`<div class="out-probs">
    <div class="out-probs-title">RESULTADOS${sim?' · '+sim:''} · ${shots} shots</div>
    ${rows}
  </div>`;
}

function buildBlochOut(probs){
  // Calcular estados de Bloch por qubit desde los counts/probs
  const qubits=Object.keys(probs)[0]?.length||0;
  if(qubits===0)return'';
  const total=Object.values(probs).reduce((s,v)=>s+v,0);
  const blochData=[];
  for(let qi=0;qi<Math.min(qubits,8);qi++){
    let p0=0;
    Object.entries(probs).forEach(([s,p])=>{
      const bit=s.length>qi?s[s.length-1-qi]:'0';
      if(bit==='0')p0+=(p>1?p/total:p);
    });
    const theta=2*Math.acos(Math.min(1,Math.sqrt(Math.max(0,p0))));
    blochData.push({qi,theta,p0:Math.min(1,p0)});
  }
  const spheres=blochData.map(({qi,theta,p0})=>{
    const cid='bloch-'+genId();
    setTimeout(()=>drawBlochSphere(cid,theta,qi),50);
    return`<div class="bloch-item">
      <canvas id="${cid}" width="90" height="90"></canvas>
      <div class="bloch-item-lbl">q[${qi}] P₀=${(p0*100).toFixed(0)}%</div>
    </div>`;
  }).join('');
  return`<div class="out-bloch-wrap">
    <div style="width:100%;font-family:var(--orb);font-size:.4rem;color:var(--mu);margin-bottom:.3rem;letter-spacing:.05em;">🌐 ESFERAS DE BLOCH</div>
    ${spheres}
  </div>`;
}

function drawBlochSphere(canvasId,theta,qi){
  const c=document.getElementById(canvasId);
  if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*0.38;
  ctx.clearRect(0,0,w,h);
  // Fondo
  const bg=ctx.createRadialGradient(cx,cy-r*.2,r*.1,cx,cy,r);
  bg.addColorStop(0,'#0d1a2e');bg.addColorStop(1,'#040810');
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  // Esfera exterior
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(0,136,255,.35)';ctx.lineWidth=1.2;ctx.stroke();
  // Elipses de latitud
  [.3,.6,.9].forEach(f=>{
    ctx.beginPath();ctx.ellipse(cx,cy,r*f,r*f*.3,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,136,255,${.08+f*.04})`;ctx.lineWidth=.7;ctx.stroke();
  });
  // Ejes
  ctx.strokeStyle='rgba(0,200,255,.18)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(cx-r*1.05,cy);ctx.lineTo(cx+r*1.05,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-r*1.05);ctx.lineTo(cx,cy+r*1.05);ctx.stroke();
  // Vector de estado
  const x=r*Math.sin(theta)*Math.cos(0);
  const y=-r*Math.cos(theta);
  const grad=ctx.createLinearGradient(cx,cy,cx+x,cy+y);
  grad.addColorStop(0,'rgba(0,255,221,.3)');
  grad.addColorStop(1,'rgba(0,255,221,1)');
  ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+x,cy+y);
  ctx.strokeStyle=grad;ctx.lineWidth=2.2;ctx.stroke();
  // Punto del estado
  ctx.beginPath();ctx.arc(cx+x,cy+y,5,0,Math.PI*2);
  const dotGrad=ctx.createRadialGradient(cx+x,cy+y,0,cx+x,cy+y,5);
  dotGrad.addColorStop(0,'#ffffff');dotGrad.addColorStop(1,'#00ffdd');
  ctx.fillStyle=dotGrad;ctx.fill();
  // Etiquetas
  ctx.font='bold 9px JetBrains Mono,monospace';ctx.fillStyle='rgba(138,160,196,.8)';
  ctx.fillText('|0⟩',cx+3,cy-r-3);ctx.fillText('|1⟩',cx+3,cy+r+11);
}

function buildErrorOut(errText){
  if(!errText)return'';
  const lineMatch=errText.match(/[Ll]ine\s+(\d+)|línea\s+(\d+)/i);
  const lineNum=lineMatch?(lineMatch[1]||lineMatch[2]):'';
  const typeMatch=errText.match(/(SyntaxError|NameError|TypeError|ValueError|ImportError|AttributeError|IndentationError|KeyError|IndexError|ZeroDivisionError|ModuleNotFoundError)[:\s]/);
  const errType=typeMatch?typeMatch[1]:'Error';
  const tips={
    SyntaxError:'Revisa paréntesis, dos puntos o indentación.',
    NameError:'Variable o función no definida. ¿Hay un typo?',
    TypeError:'Tipo de dato incorrecto para la operación.',
    ImportError:'Librería no disponible en el servidor.',
    ModuleNotFoundError:'Módulo no instalado. Verifica el nombre.',
    IndentationError:'Error de indentación. Revisa los espacios.',
    AttributeError:'El objeto no tiene ese atributo/método.',
  };
  const tip=tips[errType]||'Revisa el código en la línea indicada.';
  return`<div class="out-stderr" style="padding:.5rem .7rem;">
    <div style="color:#ff9999;font-family:var(--orb);font-size:.46rem;margin-bottom:.3rem;">
      ${errType}${lineNum?' · Línea '+lineNum:''}
    </div>
    <div style="color:#ff7070;white-space:pre-wrap;">${escH(errText.split('\n').slice(-3).join('\n'))}</div>
    <div style="color:#ffb86c;font-family:var(--orb);font-size:.42rem;margin-top:.3rem;">💡 ${tip}</div>
  </div>`;
}

async function runCell(id){
  if(!_expositionMode&&!requireAuth())return;
  if(running){notify('Ya hay una ejecución en curso');return;}
  const cell=cells.find(c=>c.id===id);
  if(!cell||cell.type==='markdown')return;
  syncCellCode(id);
  const isQk=cell.type==='qiskit';
  const code=isQk?(QISKIT_PREAMBLE+'\n'+cell.code.trim()):cell.code.trim();
  if(!code.trim())return;
  running=true;setSbRun(true);
  const rbtn=document.getElementById('rbtn-'+id);
  if(rbtn)rbtn.classList.add('spinning');
  const outArea=document.getElementById('out-'+id);
  if(outArea)outArea.innerHTML='<div class="out-stdout" style="color:var(--mu);">⚙️ Ejecutando…</div>';
  const t0=Date.now();
  try{
    if(engineOK&&engineURL){
      const resp=await fetch(engineURL+'/run/predict',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({data:[code],fn_index:1}),
        signal:AbortSignal.timeout(90000)
      });
      const raw=await resp.json();
      const d=parseServerResponse(raw);
      execCounter++;cell.exec_count=execCounter;
      const elapsed=((Date.now()-t0)/1000).toFixed(2);
      renderOutput(outArea,d,elapsed);
      setSbRun(false,'✅ '+elapsed+'s');
    } else {
      execCounter++;cell.exec_count=execCounter;
      if(outArea)outArea.innerHTML='<div class="out-stdout" style="color:var(--mu);">⚡ Sin motor — configura la URL del compilador en la barra superior</div>';
      setSbRun(false,'Sin motor');
    }
  }catch(e){
    const isTO=e.name==='AbortError'||e.name==='TimeoutError';
    if(outArea)outArea.innerHTML=`<div class="out-stderr">❌ ${escH(isTO?'Tiempo agotado (90s) — circuito muy complejo':e.message)}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;
  if(rbtn)rbtn.classList.remove('spinning');
  renderCellNum(id);
}
function renderCellNum(id){const cell=cells.find(c=>c.id===id);if(!cell)return;const el=document.querySelector(`[data-id="${id}"] .cell-num`);if(el)el.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';}

// Clases Qiskit para coloreo especial
const QK_CLASSES=new Set(['QuantumCircuit','QuantumRegister','ClassicalRegister','AerSimulator','Statevector','DensityMatrix','Operator','Sampler','Estimator','transpile','plot_histogram','plot_bloch_multivector','plot_state_city']);
const BUILTINS=new Set(['print','len','range','int','float','str','list','dict','set','tuple','type','isinstance','enumerate','zip','map','filter','sum','max','min','abs','round','sorted','reversed','open','input','format','repr','hash','id','callable','hasattr','getattr','setattr','delattr','super','property','classmethod','staticmethod','object']);

function highlight(code,isQk=false){
  const KW=['import','from','as','def','class','return','if','else','elif','for','while','in','not','and','or','True','False','None','with','try','except','finally','lambda','pass','break','continue','yield','raise','del','global','assert','is','async','await'];
  let h=escH(code);
  // Comentarios primero (más prioritario)
  h=h.replace(/(#[^\n]*)/g,'<span class="cmt">$1</span>');
  // Strings multilinea
  h=h.replace(/("""[\s\S]*?"""|'''[\s\S]*?''')/g,'<span class="st">$1</span>');
  // Strings normales
  h=h.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,(m)=>m.includes('class="')?m:`<span class="st">${m}</span>`);
  // Números
  h=h.replace(/\b(\d+\.?\d*(?:[eEjJ][+-]?\d+)?)\b/g,(m)=>m.includes('class="')?m:`<span class="nm">${m}</span>`);
  // Keywords
  KW.forEach(k=>{const re=new RegExp(`\\b(${k})\\b`,'g');h=h.replace(re,(m,w)=>m.includes('class="')?m:`<span class="kw">${w}</span>`);});
  // Clases Qiskit (cian brillante)
  if(isQk){QK_CLASSES.forEach(k=>{const re=new RegExp(`\\b(${k})\\b`,'g');h=h.replace(re,(m,w)=>m.includes('class="')?m:`<span class="qt">${w}</span>`);});}
  // Builtins
  BUILTINS.forEach(k=>{const re=new RegExp(`\\b(${k})\\b(?=\\s*\\()`, 'g');h=h.replace(re,(m,w)=>m.includes('class="')?m:`<span class="blt">${w}</span>`);});
  // Funciones
  h=h.replace(/\b([A-Za-z_][A-Za-z0-9_]*)\s*(?=\()/g,(m,fn)=>m.includes('class="')?m:`<span class="fn">${fn}</span>`);
  // Decoradores
  h=h.replace(/(@[A-Za-z_][A-Za-z0-9_.]*)/g,(m)=>m.includes('class="')?m:`<span class="kw">${m}</span>`);
  return h;
}

function buildLinenos(code){
  const n=code.split('\n').length;
  return Array.from({length:n},(_,i)=>i+1).join('\n');
}

function buildCellEl(cell,i){
  const el=document.createElement('div');
  const isQk=cell.type==='qiskit';
  const isCode=cell.type==='code'||isQk;
  el.className='nb-cell'+(curCellId===cell.id?' active':'')+(isQk?' qk-cell':'');
  el.dataset.id=cell.id;
  el.dataset.ctype=cell.type;
  el.draggable=!_expositionMode;
  el.onclick=()=>focusCell(cell.id);
  el.ondragstart=e=>{if(_expositionMode)return;dragSrcId=cell.id;e.dataTransfer.setData('text/plain',cell.id);};
  el.ondragend=()=>{dragSrcId=null;document.querySelectorAll('.nb-cell').forEach(c=>c.classList.remove('drag-over'));};
  el.ondragover=e=>{e.preventDefault();if(dragSrcId&&dragSrcId!==cell.id){el.classList.add('drag-over');}};
  el.ondragleave=()=>el.classList.remove('drag-over');
  el.ondrop=e=>{e.preventDefault();el.classList.remove('drag-over');if(!dragSrcId||dragSrcId===cell.id)return;const si=cells.findIndex(c=>c.id===dragSrcId);const di=cells.findIndex(c=>c.id===cell.id);if(si<0||di<0)return;const[m]=cells.splice(si,1);cells.splice(di,0,m);renderCells();focusCell(dragSrcId);notify('↕ Celda movida');};

  const execLbl=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';

  // Toolbar
  const toolbar=_expositionMode
    ?`<div class="cell-toolbar">${isCode?`<button class="ct-btn ct-run" onclick="event.stopPropagation();runCell('${cell.id}')" title="Ejecutar">▶</button>`:''}
      </div>`
    :`<div class="cell-toolbar">
        <button class="ct-btn" onclick="event.stopPropagation();moveCellUp('${cell.id}')" title="Subir">↑</button>
        <button class="ct-btn" onclick="event.stopPropagation();moveCellDown('${cell.id}')" title="Bajar">↓</button>
        <button class="ct-btn" onclick="event.stopPropagation();changeCellType('${cell.id}')" title="Cambiar tipo">${isCode?'Md':'{ }'}</button>
        <button class="ct-btn danger" onclick="event.stopPropagation();deleteCell('${cell.id}')" title="Eliminar">✕</button>
      </div>`;

  if(isCode){
    const badge=isQk
      ?`<span style="color:rgba(0,255,221,.8)">⚛</span> Qiskit · <span style="color:var(--mu)">QuantumCircuit · AerSimulator · NumPy · Matplotlib incluidos</span>`
      :`<span style="color:rgba(0,170,255,.7)">{}</span> Python`;
    const badgeCls=isQk?'ctb-qk':'ctb-code';
    const hl=highlight(cell.code||'',isQk);
    const lnos=buildLinenos(cell.code||'');
    const restoreBtn=_expositionMode?`<button class="cell-restore-btn" onclick="event.stopPropagation();restoreCell('${cell.id}')">↺ Original</button>`:'';
    const outContent=cell.output?`<div class="out-stdout">${escH(cell.output)}</div>`:'';
    el.innerHTML=`${toolbar}
      <div class="cell-gutter">
        <div class="cell-num">${execLbl}</div>
        <button class="cell-run-btn" id="rbtn-${cell.id}" onclick="event.stopPropagation();runCell('${cell.id}')">▶</button>
      </div>
      <div class="cell-body">
        <div class="cell-type-badge ${badgeCls}">${badge}</div>
        <div class="cell-code-area" id="area-${cell.id}">
          <div class="cell-code-wrap">
            <div class="cell-linenos" id="lnos-${cell.id}">${lnos}</div>
            <div class="cell-code-inner">
              <div class="cell-syn-layer" id="syn-${cell.id}">${hl}
</div>
              <textarea class="cell-textarea" id="ta-${cell.id}" spellcheck="false"
                oninput="onCellInput('${cell.id}')"
                onkeydown="onCellKeydown(event,'${cell.id}')"
                onfocus="focusCell('${cell.id}')"
                onscroll="syncScroll('${cell.id}')"
              >${escH(cell.code||'')}</textarea>
            </div>
          </div>
        </div>
        <div class="cell-output-area" id="out-${cell.id}">${outContent}</div>
        ${restoreBtn}
      </div>`;
  } else {
    // Markdown
    if(cell.mdEdit&&!_expositionMode){
      el.innerHTML=`${toolbar}
        <div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div>
        <div class="cell-body">
          <div class="cell-type-badge ctb-md">✦ Markdown / LaTeX</div>
          <div class="md-split">
            <div class="md-editor-pane">
              <textarea class="cell-md-split-area" id="mta-${cell.id}"
                placeholder="# Título&#10;LaTeX inline: $E=mc^2$&#10;LaTeX bloque: $$\\hat{H}\\psi=E\\psi$$"
                oninput="syncCellCode('${cell.id}');renderMdPreview('${cell.id}')"
                onkeydown="onMdKeydown(event,'${cell.id}')"
                rows="7">${escH(cell.code||'')}</textarea>
            </div>
            <div class="md-preview-pane cell-md-rendered" id="mdprev-${cell.id}"></div>
          </div>
        </div>`;
      setTimeout(()=>renderMdPreview(cell.id),10);
    } else {
      const dbl=_expositionMode?'':` ondblclick="editMd('${cell.id}')" title="Doble clic para editar"`;
      el.innerHTML=`${toolbar}
        <div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div>
        <div class="cell-body">
          <div class="cell-type-badge ctb-md">✦ Markdown${_expositionMode?'':' — doble clic para editar'}</div>
          <div class="cell-md-rendered" id="mren-${cell.id}" ${dbl}>${renderMdFull(cell.code||'')}</div>
        </div>`;
      setTimeout(()=>{
        const div=document.getElementById('mren-'+cell.id);
        if(div&&window.MathJax)MathJax.typesetPromise([div]).catch(()=>{});
      },50);
    }
  }
  setTimeout(()=>{const ta=document.getElementById('ta-'+cell.id);if(ta)autoResize(ta);},0);
  return el;
}

// ── EDITOR HANDLERS ────────────────────────────────────────────
function syncScroll(id){
  const ta=document.getElementById('ta-'+id);
  const syn=document.getElementById('syn-'+id);
  const lnos=document.getElementById('lnos-'+id);
  if(ta&&syn){syn.scrollTop=ta.scrollTop;syn.scrollLeft=ta.scrollLeft;}
  if(ta&&lnos)lnos.scrollTop=ta.scrollTop;
}
function onCellInput(id){
  const ta=document.getElementById('ta-'+id);
  const syn=document.getElementById('syn-'+id);
  const lnos=document.getElementById('lnos-'+id);
  if(ta&&syn){
    const cell=cells.find(c=>c.id===id);
    if(cell)cell.code=ta.value;
    const isQk=cell?.type==='qiskit';
    syn.innerHTML=highlight(ta.value,isQk)+'\n';
    if(lnos)lnos.textContent=buildLinenos(ta.value);
    autoResize(ta);
    syn.scrollTop=ta.scrollTop;syn.scrollLeft=ta.scrollLeft;
    if(lnos)lnos.scrollTop=ta.scrollTop;
  }
  if(!_expositionMode){
    if(debounceTimer)clearTimeout(debounceTimer);
    debounceTimer=setTimeout(()=>{if(curUser&&cells.length)saveCurrentNb(false);},3000);
  }
}
function autoResize(ta){
  ta.style.height='auto';
  const h=Math.max(42,ta.scrollHeight);
  ta.style.height=h+'px';
  const area=ta.closest('.cell-code-area');if(area)area.style.height=h+'px';
  const inner=ta.closest('.cell-code-inner');if(inner)inner.style.height=h+'px';
  const syn=document.getElementById('syn-'+ta.id.replace('ta-',''));if(syn)syn.style.height=h+'px';
  const lnos=document.getElementById('lnos-'+ta.id.replace('ta-',''));if(lnos)lnos.style.height=h+'px';
}
function onCellKeydown(e,id){
  const ta=document.getElementById('ta-'+id);
  if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.substring(0,s)+'    '+ta.value.substring(en);ta.selectionStart=ta.selectionEnd=s+4;onCellInput(id);return;}
  if(e.shiftKey&&e.key==='Enter'){e.preventDefault();runCell(id);const idx=cells.findIndex(c=>c.id===id);if(idx<cells.length-1)focusCell(cells[idx+1].id);else if(!_expositionMode)addCellAt(-1,'code');return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCell(id);}
}
function onMdKeydown(e,id){
  if(e.key==='Escape'){syncCellCode(id);const cell=cells.find(c=>c.id===id);if(cell){cell.mdEdit=false;renderCells();}}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();syncCellCode(id);const cell=cells.find(c=>c.id===id);if(cell){cell.mdEdit=false;renderCells();}const idx=cells.findIndex(c=>c.id===id);if(idx<cells.length-1)focusCell(cells[idx+1].id);}
}

// ── SHOW UI ────────────────────────────────────────────────────
function showUI(user){
  const role=user?.role||'guest';
  const alreadyOK=_initialized&&(curUser?.role==='admin'||curUser?.role==='founder');
  const sameUser=alreadyOK&&curUser?.username===user?.username;
  if(sameUser)return;
  _initialized=true;curUser=user;
  if(role!=='admin'&&role!=='founder'&&!_expositionMode){
    document.getElementById('access-denied').classList.add('show');
    ['topbar','secbar','main-area','statusbar'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
    return;
  }
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
  if(user&&(role==='admin'||role==='founder')){
    const pill=document.getElementById('user-pill');
    if(pill)pill.textContent=(role==='founder'?'👑 ':'🔑 ')+(user.name||'—').split(' ')[0];
    const ap=document.getElementById('admin-pill');if(ap)ap.style.display='';
  }
  const stored=localStorage.getItem('qcol_colab_url')||'';
  if(stored){engineURL=stored;const inp=document.getElementById('engine-url-input');if(inp)inp.value=stored;checkEngine();}
  if(role==='admin'||role==='founder')refreshNbs();
  if(cells.length===0&&!_expositionMode)addCellAt(-1,'qiskit');
}

// ── MENSAJES DEL CORE ─────────────────────────────────────────
window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='QCOL_USER'||d.type==='QCOL_USER_UPDATE'){
    const role=d.user?.role||'guest';
    if(role==='admin'||role==='founder')showUI(d.user);
    else if(!d.user){_initialized=false;showUI(null);}
  }
  if(d.type==='QCOL_CONFIG_UPDATED'){const url=localStorage.getItem('qcol_colab_url');if(url){engineURL=url;checkEngine();}}
  if(d.type==='QCOL_LOAD_NB'&&d.nb){
    const isExpo=!!d.expositionMode;
    if(!isExpo&&!requireAuth())return;
    const nb=d.nb;
    document.getElementById('nb-name-inp').value=nb.title||nb.name||'Sin título';
    if(nb.cells&&nb.cells.length>0){
      cells=nb.cells.map(c=>({...c,id:genId(),output:'',exec_count:null,mdEdit:false}));
    } else cells=[];
    if(isExpo){
      _initialized=true;
      curUser=curUser||{name:'Invitado',role:'guest'};
      document.getElementById('access-denied').classList.remove('show');
      ['topbar','secbar','main-area','statusbar'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
    }
    renderCells();
    if(cells[0])focusCell(cells[0].id);
    setView('notebook');
    if(isExpo)activateExpositionMode();
    else deactivateExpositionMode();
    notify((isExpo?'👁 ':'📂 ')+'Cargado: '+(nb.title||nb.name||'Notebook'));
  }
});

// Pedir usuario
postCore('QCOL_GET_USER');
setTimeout(()=>{if(!_initialized){try{const s=localStorage.getItem('qcol_cur_user');if(s)showUI(JSON.parse(s));}catch(e){}}},700);
setTimeout(()=>{if(!_initialized){document.getElementById('access-denied').classList.add('show');document.getElementById('topbar').style.display='flex';_initialized=true;}},3000);
window.addEventListener('message',e=>{const d=e.data||{};if(d.type==='QCOL_USER_UPDATE'){const role=d.user?.role||'guest';if(role==='admin'||role==='founder'){_initialized=false;showUI(d.user);}}});

function requireAuth(){const role=curUser?.role||'guest';if(role!=='admin'&&role!=='founder'&&!_expositionMode){notify('❌ Requiere cuenta Admin o Founder');postCore('QCOL_LOGIN');return false;}return true;}

// Init
function initEngine(){const s=localStorage.getItem('qcol_colab_url');if(s){engineURL=s;const inp=document.getElementById('engine-url-input');if(inp)inp.value=s;checkEngine();}}
initEngine();
setTimeout(()=>initMarkdown(),400);
</script>
