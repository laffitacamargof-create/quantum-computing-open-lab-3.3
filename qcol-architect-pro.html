<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL — Arquitecto Profesional (Notebook IDE)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- CodeMirror 6 CSS y temas -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@codemirror/view@6.0.0/dist/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@codemirror/theme-one-dark@6.0.0/dist/index.css">

<!-- Importmap para módulos ES -->
<script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://cdn.skypack.dev/@codemirror/state",
      "@codemirror/view": "https://cdn.skypack.dev/@codemirror/view",
      "@codemirror/commands": "https://cdn.skypack.dev/@codemirror/commands",
      "@codemirror/language": "https://cdn.skypack.dev/@codemirror/language",
      "@codemirror/lang-python": "https://cdn.skypack.dev/@codemirror/lang-python",
      "@codemirror/lang-markdown": "https://cdn.skypack.dev/@codemirror/lang-markdown",
      "@codemirror/autocomplete": "https://cdn.skypack.dev/@codemirror/autocomplete",
      "@codemirror/basic-setup": "https://cdn.skypack.dev/@codemirror/basic-setup",
      "@lezer/common": "https://cdn.skypack.dev/@lezer/common",
      "@lezer/python": "https://cdn.skypack.dev/@lezer/python"
    }
  }
</script>

<!-- Markdown y resaltado -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>

<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0d1220;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cm:#636e8a;--cl:#8be9fd;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
  --cell-run:#0088ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── NOTIF ── */
.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

/* ── ACCESS DENIED ── */
.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;
  text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}
.btn-back{padding:.48rem 1.1rem;background:linear-gradient(135deg,#003388,var(--bl));
  border:none;border-radius:8px;color:#fff;font-family:var(--orb);font-size:.65rem;cursor:pointer;}

/* ── TOP BAR ── */
.topbar{
  height:38px;display:flex;align-items:center;gap:.5rem;
  padding:0 .8rem;background:#080b14;
  border-bottom:1px solid rgba(189,147,249,.18);flex-shrink:0;
  position:relative;z-index:10;
}
.tb-logo{display:flex;align-items:center;gap:.35rem;margin-right:.5rem;}
.tb-q{font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.48rem;color:var(--pu);letter-spacing:.06em;}
.tb-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.nb-name-inp{
  background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:.72rem;color:var(--tx);
  min-width:80px;max-width:220px;padding:.1rem .3rem;
  border-radius:4px;cursor:text;
}
.nb-name-inp:focus{background:rgba(255,255,255,.05);color:var(--cy);}
.nb-name-inp::placeholder{color:var(--mu);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;}
.tbtn{
  display:flex;align-items:center;gap:.3rem;
  padding:.25rem .6rem;background:transparent;
  border:1px solid var(--bd2);border-radius:5px;
  color:var(--mu);font-family:var(--orb);font-size:.48rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tbtn:hover{border-color:var(--bl2);color:var(--bl2);background:rgba(0,136,255,.06);}
.tbtn.run{background:linear-gradient(135deg,#003388,var(--bl));border-color:var(--bl);color:#fff;}
.tbtn.run:hover{box-shadow:0 2px 10px rgba(0,136,255,.4);}
.tbtn.run-all{background:linear-gradient(135deg,#004400,#00aa44);border-color:#00aa44;color:#fff;}
.tbtn.pub{background:linear-gradient(135deg,#3a0075,var(--pu));border-color:var(--pu);color:#fff;}
.eng-pill{
  padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.25);color:var(--mu);
}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.35);color:var(--gr);
  animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{border-color:rgba(0,255,136,.35);}50%{border-color:rgba(0,255,136,.8);}}
.user-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.46rem;
  background:rgba(189,147,249,.08);border:1px solid rgba(189,147,249,.2);color:var(--pu);}
.admin-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);color:var(--yw);}

/* ── SECONDARY BAR ── */
.secbar{
  height:32px;display:flex;align-items:stretch;
  background:#080b14;border-bottom:1px solid var(--bd);flex-shrink:0;
  padding:0 .5rem;gap:.1rem;
}
.stab{
  display:flex;align-items:center;gap:.3rem;padding:0 .75rem;
  background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.48rem;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;
}
.stab.on{color:var(--pu);border-bottom-color:var(--pu);}
.stab:hover:not(.on){color:var(--tx2);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;padding:0 .3rem;}

/* ── MAIN AREA ── */
.main{flex:1;overflow:hidden;display:flex;min-height:0;}

/* ── NOTEBOOK VIEW ── */
#view-notebook{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);
}
.nb-scroll{
  flex:1;overflow-y:auto;padding:.8rem 0;
}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* ── CELDA ── */
.nb-cell{
  display:flex;margin:.2rem auto;
  width:min(900px,96%);
  position:relative;
  border-radius:8px;
  border:1px solid transparent;
  transition:border-color .15s;
}
.nb-cell:hover{border-color:rgba(189,147,249,.15);}
.nb-cell.active{border-color:rgba(189,147,249,.4);}
.nb-cell.running{border-color:rgba(0,136,255,.5);}

.cell-gutter{
  width:52px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;padding:.6rem .3rem 0;
  gap:.3rem;
}
.cell-num{
  font-family:var(--mono);font-size:.6rem;color:var(--mu);
  min-width:22px;text-align:center;
}
.cell-run-btn{
  width:26px;height:26px;border-radius:50%;
  background:transparent;border:1px solid var(--bd2);
  color:var(--mu);font-size:.7rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.nb-cell.active .cell-run-btn{border-color:var(--bl2);color:var(--bl2);}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.1);}
.cell-run-btn.spinning{border-color:var(--gr);color:var(--gr);animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

.cell-body{
  flex:1;display:flex;flex-direction:column;
  min-width:0;padding:.4rem 0;
}

.cell-type-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  font-family:var(--orb);font-size:.44rem;color:var(--mu);
  padding:.08rem 0 .3rem;margin-bottom:.1rem;
}
.ctb-code{color:var(--bl2);}
.ctb-md{color:var(--gr);}

/* Editor CodeMirror */
.cm-editor {
  border-radius: 6px;
  border: 1px solid var(--bd);
  background: var(--bg2);
  font-family: var(--mono);
  font-size: 0.75rem;
}
.cm-editor.cm-focused {
  border-color: var(--bl2);
}
.cm-gutters {
  background: var(--bg3);
  border-right: 1px solid var(--bd);
  color: var(--mu);
}
.cm-activeLineGutter {
  background: var(--p2);
}

/* Output area */
.cell-output-area {
  margin-top: .35rem;
  background: #060a10;
  border: 1px solid var(--bd);
  border-radius: 6px;
  font-family: var(--mono);
  overflow: hidden;
}
.out-text {
  font-family: var(--mono);
  font-size: 0.75rem;
  white-space: pre-wrap;
  background: #0a0e1a;
  border-left: 3px solid #00ffdd;
  padding: 0.6rem 0.8rem;
  margin: 0;
}
.out-err { border-left-color: #ff4466; color: #ff8899; }
.out-inf { border-left-color: #bd93f9; color: #bd93f9; }
.out-circuit-img, .out-bloch, .out-hist {
  display: block;
  max-width: 100%;
  background: #0a0e1a;
  border: 1px solid var(--bd);
  border-radius: 8px;
  margin-top: 8px;
  box-shadow: 0 0 6px rgba(0, 136, 255, 0.2);
}

/* Markdown rendered */
.cell-md-rendered{
  padding:.5rem .8rem;font-size:.78rem;line-height:1.75;color:var(--tx);
  cursor:pointer;background:var(--bg2);border-radius:6px;
  border:1px solid var(--bd);
}
.cell-md-rendered h1{font-family:var(--orb);font-size:1rem;color:var(--bl2);margin-bottom:.5rem;}
.cell-md-rendered h2{font-family:var(--orb);font-size:.85rem;color:var(--bl2);margin-bottom:.4rem;}
.cell-md-rendered code{background:rgba(0,136,255,.1);padding:.1rem .3rem;border-radius:3px;font-family:var(--mono);font-size:.7rem;color:var(--cy);}
.cell-md-rendered pre{background:var(--bg);padding:.5rem;border-radius:5px;overflow-x:auto;}
.cell-md-rendered .hljs{background:transparent;}
.cell-md-rendered img{max-width:100%;}

/* Toolbar celda */
.cell-toolbar{
  display:none;position:absolute;top:.3rem;right:.5rem;
  gap:.2rem;align-items:center;z-index:5;
}
.nb-cell:hover .cell-toolbar,
.nb-cell.active .cell-toolbar{display:flex;}
.ct-btn{
  width:20px;height:20px;border-radius:4px;
  background:rgba(10,14,26,.85);border:1px solid var(--bd2);
  color:var(--mu);font-size:.55rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.ct-btn.danger:hover{border-color:var(--rd);color:var(--rd);}

/* Add cell between */
.add-cell-row{
  width:min(900px,96%);margin:.05rem auto;height:18px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.add-cell-row:hover{opacity:1;}
.add-cell-line{flex:1;height:1px;background:rgba(189,147,249,.2);}
.add-cell-btns{display:flex;gap:.25rem;padding:0 .5rem;}
.add-btn{
  padding:.12rem .45rem;background:var(--bg);border:1px solid rgba(189,147,249,.3);
  border-radius:4px;color:var(--pu);font-family:var(--orb);font-size:.42rem;
  cursor:pointer;transition:all .15s;
}
.add-btn:hover{background:rgba(189,147,249,.08);}

.nb-bottom{
  width:min(900px,96%);margin:.5rem auto 2rem;
  display:flex;gap:.5rem;
}
.nb-add-big{
  flex:1;padding:.55rem;background:transparent;
  border:1px dashed rgba(189,147,249,.2);border-radius:8px;
  color:var(--pu);font-family:var(--orb);font-size:.52rem;
  cursor:pointer;transition:all .2s;text-align:center;
}
.nb-add-big:hover{background:rgba(189,147,249,.06);border-color:rgba(189,147,249,.5);}

/* Manage notebooks */
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.manage-bar{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;
  background:var(--p);border-bottom:1px solid var(--bd);flex-shrink:0;}
.manage-title-lbl{font-family:var(--orb);font-size:.68rem;color:var(--pu);}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:.85rem;padding:1.1rem;overflow-y:auto;flex:1;}
.nb-card{background:var(--p);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.nb-card-hdr{padding:.65rem .9rem;background:#080b14;border-bottom:1px solid rgba(189,147,249,.15);display:flex;justify-content:space-between;}
.nb-card-title{font-family:var(--orb);font-size:.65rem;color:var(--tx);}
.nb-card-badge{font-family:var(--orb);font-size:.44rem;padding:.1rem .32rem;border-radius:4px;background:rgba(189,147,249,.1);border:1px solid rgba(189,147,249,.25);color:var(--pu);}
.nb-card-body{padding:.85rem;}
.nb-card-meta{font-family:var(--mono);font-size:.56rem;color:var(--mu2);margin-bottom:.6rem;}
.nb-card-actions{display:flex;gap:.3rem;}
.btn-edit-nb,.btn-pub-nb,.btn-del-nb{padding:.42rem;background:rgba(189,147,249,.1);border:1px solid rgba(189,147,249,.25);border-radius:6px;color:var(--pu);font-family:var(--orb);font-size:.52rem;cursor:pointer;}
.btn-del-nb{background:rgba(255,68,102,.07);border-color:rgba(255,68,102,.18);color:#ff8899;}

/* Status bar */
.statusbar{
  height:22px;display:flex;align-items:center;gap:.65rem;
  padding:0 .85rem;background:#060a10;border-top:1px solid var(--bd);
  font-family:var(--mono);font-size:.52rem;color:var(--mu);flex-shrink:0;
}
.sb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sb-idle{background:var(--mu);}
.sb-run{background:var(--gr);animation:puls 1.5s infinite;}
.sb-err{background:var(--rd);}
.sb-right{margin-left:auto;display:flex;gap:.65rem;}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--p);border:1px solid rgba(189,147,249,.35);border-radius:12px;padding:1.5rem;width:min(480px,92vw);}
.modal-title{font-family:var(--orb);font-size:.82rem;color:var(--pu);margin-bottom:1rem;}
.fg{margin-bottom:.7rem;}
.fl{font-family:var(--orb);font-size:.5rem;color:var(--mu);display:block;margin-bottom:.2rem;}
.fi{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--bd2);border-radius:7px;padding:.45rem .72rem;color:var(--tx);font-family:var(--mono);font-size:.72rem;outline:none;}
.btn-row{display:flex;gap:.4rem;margin-top:.65rem;}
.btn-pri{padding:.4rem .9rem;background:linear-gradient(135deg,#4a0a8a,var(--pu));border:none;border-radius:6px;color:#fff;font-family:var(--orb);font-size:.56rem;cursor:pointer;}
.btn-cancel{padding:.4rem .85rem;background:transparent;border:1px solid var(--bd2);border-radius:7px;color:var(--mu);font-family:var(--orb);font-size:.54rem;cursor:pointer;}

/* Drag & drop */
.nb-cell.drag-over{border-color:var(--cy)!important;box-shadow:0 0 0 2px rgba(0,255,221,.2);}
.nb-cell[draggable]{cursor:grab;}
.nb-cell[draggable]:active{cursor:grabbing;}

@media(max-width:700px){
  .nb-cell{width:98%;}
  .cell-gutter{width:36px;}
  .tbtn span{display:none;}
}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="access-denied" id="access-denied">
  <div class="denied-icon">🔒</div>
  <div class="denied-title">ACCESO RESTRINGIDO</div>
  <div class="denied-desc">Arquitecto Profesional es exclusivo para<br>
    <strong style="color:var(--pu);">Administradores</strong> y el
    <strong style="color:var(--yw);">Fundador</strong>.
  </div>
  <button class="btn-back" onclick="postCore('QCOL_NAV',{screen:'home'})">← Volver al menú</button>
</div>

<div class="topbar" id="topbar" style="display:none;">
  <div class="tb-logo">
    <span class="tb-q">Q</span><span style="font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--bl2);">COL</span>
    <span class="tb-pro">PRO</span>
  </div>
  <div class="tb-sep"></div>
  <input class="nb-name-inp" id="nb-name-inp" placeholder="Sin título" value="Nuevo Notebook">
  <div class="tb-right">
    <div class="eng-pill" id="eng-badge">● SIN COMPILADOR</div>
    <div class="admin-pill" id="admin-pill" style="display:none;">ADMIN+</div>
    <div class="user-pill" id="user-pill">—</div>
  </div>
</div>

<div class="secbar" id="secbar" style="display:none;">
  <button class="stab on" id="stab-1" onclick="setView('notebook')">📝 NOTEBOOK</button>
  <button class="stab" id="stab-2" onclick="setView('manage')">📂 MIS NOTEBOOKS</button>
  <div class="secbar-right">
    <button class="tbtn" onclick="addCellAt(-1,'code')">＋ Código</button>
    <button class="tbtn" onclick="addCellAt(-1,'markdown')">＋ Texto</button>
    <button class="tbtn" onclick="addCellAt(-1,'qiskit')">⚛️ Qiskit</button>
    <button class="tbtn" onclick="importNb()">📂 Abrir .ipynb</button>
    <input type="file" id="import-file" style="display:none;" accept=".ipynb" onchange="handleImport(event)">
    <button class="tbtn" onclick="downloadNb()">📥 .ipynb</button>
    <button class="tbtn pub" onclick="showPublish()">📤 PUBLICAR</button>
    <div style="width:1px;height:18px;background:var(--bd);margin:0 .1rem;"></div>
    <button class="tbtn run" onclick="runCurCell()">▶ EJECUTAR</button>
    <button class="tbtn run-all" onclick="runAll()">▶▶ TODO</button>
  </div>
</div>

<div class="main" id="main-area" style="display:none;">
  <div id="view-notebook" style="display:flex;">
    <div class="nb-scroll" id="nb-scroll">
      <div class="nb-bottom">
        <button class="nb-add-big" onclick="addCellAt(-1,'code')">＋ Código</button>
        <button class="nb-add-big" onclick="addCellAt(-1,'markdown')">＋ Texto</button>
        <button class="nb-add-big" onclick="addCellAt(-1,'qiskit')">⚛️ Qiskit</button>
      </div>
    </div>
  </div>
  <div id="view-manage">
    <div class="manage-wrap">
      <div class="manage-bar">
        <div class="manage-title-lbl">📂 MIS NOTEBOOKS</div>
        <button class="tbtn" style="margin-left:auto;" onclick="refreshNbs()">🔄 Actualizar</button>
        <button class="tbtn pub" onclick="newNotebook();setView('notebook')">＋ NUEVO</button>
      </div>
      <div class="nb-grid" id="nb-grid"></div>
    </div>
  </div>
</div>

<div class="statusbar" id="statusbar" style="display:none;">
  <div class="sb-dot sb-idle" id="sb-dot"></div>
  <span id="sb-txt">Listo</span>
  <span>Python · <span id="sb-lib">Qiskit</span></span>
  <div class="sb-right">
    <span id="sb-cells-info">0 celdas</span>
    <span id="sb-cur">Ln 1, Col 1</span>
  </div>
</div>

<div class="modal-ov" id="pub-modal">
  <div class="modal">
    <div class="modal-title">📤 Publicar Notebook</div>
    <div class="fg"><label class="fl">TÍTULO</label><input class="fi" id="pub-title"></div>
    <div class="fg"><label class="fl">DESCRIPCIÓN</label><textarea class="fi" id="pub-desc"></textarea></div>
    <div class="fg"><label class="fl">TAGS</label><input class="fi" id="pub-tags"></div>
    <div class="btn-row"><button class="btn-pri" onclick="publishNb()">📤 Publicar</button><button class="btn-cancel" onclick="closePublish()">Cancelar</button></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// QCOL ARQUITECTO PROFESIONAL — NOTEBOOK IDE CON CODEMIRROR 6 Y CELDAS QISKIT
// ═══════════════════════════════════════════════════════════════════════════

// --- Variables globales ---
let STANDALONE = window.parent === window;
let curUser = null;
let engineURL = '', engineOK = false, running = false;
let curView = 'notebook';
let cells = [];
let curCellId = null;
let execCounter = 0;
let _initialized = false;
let debounceTimer = null;
let cmEditors = new Map(); // Almacenar instancias de CodeMirror

// --- Utilidades ---
function postCore(type, data={}){ try{ window.parent.postMessage({type,...data},'*'); }catch(e){} }
function notify(msg,ms=2800){ const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }
function escH(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function genId(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,6); }

// --- Autenticación ---
function requireAuth(){
  const role = curUser?.role||'guest';
  if(role!=='admin'&&role!=='founder'){
    notify('❌ Requiere cuenta Admin o Founder');
    postCore('QCOL_LOGIN');
    return false;
  }
  return true;
}

// --- Mostrar UI (solo admin/founder) ---
function showUI(user){
  const newRole = user?.role || 'guest';
  const isUpgrade = _initialized && (newRole==='founder'||newRole==='admin') && (curUser?.role!=='founder' && curUser?.role!=='admin');
  if(_initialized && !isUpgrade) return;
  _initialized = true;
  curUser = user;
  if(newRole !== 'admin' && newRole !== 'founder'){
    document.getElementById('access-denied').classList.add('show');
    document.getElementById('topbar').style.display='none';
    document.getElementById('secbar').style.display='none';
    document.getElementById('main-area').style.display='none';
    document.getElementById('statusbar').style.display='none';
    return;
  }
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>document.getElementById(id).style.display='flex');
  document.getElementById('user-pill').textContent = (curUser.name||'—').split(' ')[0];
  document.getElementById('admin-pill').style.display='';
  engineURL = localStorage.getItem('qcol_colab_url')||'';
  if(engineURL) checkEngine();
  refreshNbs();
  if(cells.length===0) addCellAt(-1,'code');
}

window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='QCOL_USER') showUI(d.user);
  if(d.type==='QCOL_CONFIG_UPDATED'){ engineURL=localStorage.getItem('qcol_colab_url')||''; if(engineURL) checkEngine(); }
  if(d.type==='QCOL_LOAD_NB' && d.nb){
    if(!requireAuth()) return;
    const nb = d.nb;
    document.getElementById('nb-name-inp').value = nb.title||'Sin título';
    if(nb.cells && nb.cells.length>0){
      cells = nb.cells.map(c=>({...c, id:genId(), output:'', exec_count:null, mdEdit:false}));
      renderCells();
      if(cells[0]) focusCell(cells[0].id);
    } else { cells=[]; addCellAt(-1,'code'); }
    setView('notebook');
    notify('📂 Cargado: '+nb.title);
  }
});
postCore('QCOL_GET_USER');
setTimeout(()=>{ if(!_initialized){ const stored=localStorage.getItem('qcol_cur_user'); if(stored) showUI(JSON.parse(stored)); } },2000);

// --- Compilador (motor) ---
async function checkEngine(){
  if(!engineURL) return;
  const badge=document.getElementById('eng-badge');
  try{
    const res=await fetch(engineURL+'/health',{signal:AbortSignal.timeout(5000)});
    if(res.ok){
      engineOK=true;
      badge.textContent='● COMPILADOR ACTIVO';
      badge.className='eng-pill on';
    } else throw new Error();
  }catch(e){
    engineOK=false;
    badge.textContent='● SIN COMPILADOR';
    badge.className='eng-pill';
  }
}

// --- Vistas ---
function setView(v){
  curView=v;
  document.getElementById('view-notebook').style.display=v==='notebook'?'flex':'none';
  document.getElementById('view-manage').style.display=v==='manage'?'flex':'none';
  document.getElementById('stab-1').classList.toggle('on',v==='notebook');
  document.getElementById('stab-2').classList.toggle('on',v==='manage');
  if(v==='manage') refreshNbs();
}

// --- Gestión de celdas ---
function addCellAt(afterIdx, type='code'){
  let defaultCode = '';
  if(type === 'qiskit') defaultCode = 'qc = QuantumCircuit(2)\nqc.h(0)\nqc.cx(0,1)';
  else if(type === 'markdown') defaultCode = '# Título\n\nEscribe **Markdown** y $LaTeX$';
  const cell = {id:genId(), type, code:defaultCode, output:'', exec_count:null, mdEdit:false};
  if(afterIdx===-1||afterIdx>=cells.length) cells.push(cell);
  else cells.splice(afterIdx+1,0,cell);
  renderCells();
  focusCell(cell.id);
  updateStatus();
}

function deleteCell(id){
  if(cells.length<=1){ notify('Debes tener al menos 1 celda'); return; }
  cells=cells.filter(c=>c.id!==id);
  if(curCellId===id) curCellId=cells[0]?.id||null;
  renderCells();
  updateStatus();
}
function moveCellUp(id){
  const i=cells.findIndex(c=>c.id===id);
  if(i<=0) return;
  [cells[i-1],cells[i]]=[cells[i],cells[i-1]];
  renderCells(); focusCell(id);
}
function moveCellDown(id){
  const i=cells.findIndex(c=>c.id===id);
  if(i<0||i>=cells.length-1) return;
  [cells[i],cells[i+1]]=[cells[i+1],cells[i]];
  renderCells(); focusCell(id);
}
function focusCell(id){
  curCellId=id;
  document.querySelectorAll('.nb-cell').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
}
function updateStatus(){
  document.getElementById('sb-cells-info').textContent=cells.length+' celdas';
}

// --- Sincronizar código desde CodeMirror ---
function syncCellCode(id){
  const cell=cells.find(c=>c.id===id);
  if(!cell) return;
  const editor=cmEditors.get(id);
  if(editor) cell.code=editor.state.doc.toString();
  else{
    const ta=document.getElementById('ta-'+id);
    if(ta) cell.code=ta.value;
  }
}

// --- Inicializar CodeMirror 6 ---
async function initCodeMirror(cellId, initialCode, mode, onUpdate){
  const { EditorState, EditorView, basicSetup } = await import('@codemirror/basic-setup');
  const { python } = await import('@codemirror/lang-python');
  const { markdown } = await import('@codemirror/lang-markdown');
  const { oneDark } = await import('https://cdn.skypack.dev/@codemirror/theme-one-dark');
  const { keymap } = await import('@codemirror/view');
  const qcolTheme = EditorView.theme({
    "&": { backgroundColor: "#0a0e1a", color: "#e2ecff" },
    ".cm-content": { fontFamily: "'JetBrains Mono', monospace", fontSize: "0.75rem", caretColor: "#00ffdd" },
    ".cm-cursor": { borderLeftColor: "#00ffdd" },
    ".cm-gutters": { backgroundColor: "#080b14", borderRight: "1px solid #1e3058", color: "#4a6a9a" },
    ".cm-activeLineGutter": { backgroundColor: "#1a2540" },
    ".cm-activeLine": { backgroundColor: "#0d1220" },
    ".cm-keyword": { color: "#ff79c6" },
    ".cm-def": { color: "#50fa7b" },
    ".cm-number": { color: "#bd93f9" },
    ".cm-string": { color: "#f1fa8c" },
    ".cm-comment": { color: "#636e8a", fontStyle: "italic" },
    ".cm-operator": { color: "#ff79c6" }
  }, { dark: true });
  const runCellKeymap = keymap.of({
    key: "Shift-Enter",
    run: (view) => {
      const cellId = view.dom.closest('.nb-cell')?.dataset?.id;
      if(cellId){
        const cell=cells.find(c=>c.id===cellId);
        if(cell.type==='qiskit') runQiskitCell(cellId);
        else runCell(cellId);
      }
      return true;
    }
  });
  const extensions = [
    basicSetup,
    oneDark,
    qcolTheme,
    runCellKeymap,
    mode==='python' ? python() : markdown(),
    EditorView.updateListener.of((update)=>{
      if(update.docChanged && onUpdate) onUpdate(update.state.doc.toString());
    })
  ];
  const state = EditorState.create({ doc: initialCode, extensions });
  const parent = document.getElementById(`cm-${cellId}`);
  if(!parent) return null;
  const view = new EditorView({ state, parent });
  cmEditors.set(cellId, view);
  return view;
}

// --- Renderizado de celdas ---
function renderCells(){
  const scroll=document.getElementById('nb-scroll');
  const bottom=scroll.querySelector('.nb-bottom');
  scroll.querySelectorAll('.nb-cell,.add-cell-row').forEach(el=>el.remove());
  cells.forEach((cell,i)=>{
    const row=buildAddRow(i-1);
    scroll.insertBefore(row,bottom);
    const el=buildCellEl(cell,i);
    scroll.insertBefore(el,bottom);
  });
  const row=buildAddRow(cells.length-1);
  scroll.insertBefore(row,bottom);
  if(curCellId) focusCell(curCellId);
  updateStatus();
}

function buildAddRow(afterIdx){
  const row=document.createElement('div'); row.className='add-cell-row';
  row.innerHTML=`<div class="add-cell-line"></div><div class="add-cell-btns"><button class="add-btn" onclick="addCellAt(${afterIdx},'code')">＋ Código</button><button class="add-btn" onclick="addCellAt(${afterIdx},'markdown')">＋ Texto</button><button class="add-btn" onclick="addCellAt(${afterIdx},'qiskit')">⚛️ Qiskit</button></div><div class="add-cell-line"></div>`;
  return row;
}

function buildCellEl(cell,i){
  const el=document.createElement('div');
  el.className='nb-cell'+(curCellId===cell.id?' active':'');
  el.dataset.id=cell.id;
  el.draggable=true;
  el.onclick=()=>focusCell(cell.id);
  // Drag & drop de celdas
  el.ondragstart=e=>{ e.dataTransfer.setData('text/plain',cell.id); e.dataTransfer.effectAllowed='move'; };
  el.ondragover=e=>e.preventDefault();
  el.ondrop=e=>{
    e.preventDefault();
    const srcId=e.dataTransfer.getData('text/plain');
    if(!srcId||srcId===cell.id) return;
    const srcIdx=cells.findIndex(c=>c.id===srcId);
    const dstIdx=cells.findIndex(c=>c.id===cell.id);
    if(srcIdx<0||dstIdx<0) return;
    const [moved]=cells.splice(srcIdx,1);
    cells.splice(dstIdx,0,moved);
    renderCells();
    focusCell(srcId);
    notify('↕ Celda movida');
  };
  const execLbl=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';
  const toolbar=`<div class="cell-toolbar"><button class="ct-btn" onclick="event.stopPropagation();moveCellUp('${cell.id}')">↑</button><button class="ct-btn" onclick="event.stopPropagation();moveCellDown('${cell.id}')">↓</button><button class="ct-btn" onclick="event.stopPropagation();changeCellType('${cell.id}')">${cell.type==='code'||cell.type==='qiskit'?'Md':'{ }'}</button><button class="ct-btn danger" onclick="event.stopPropagation();deleteCell('${cell.id}')">✕</button></div>`;
  
  if(cell.type==='code' || cell.type==='qiskit'){
    const badgeLabel = cell.type==='qiskit' ? '⚛️ Qiskit' : '{ } Python';
    const badgeColor = cell.type==='qiskit' ? 'var(--gr)' : 'var(--bl2)';
    const runFunc = cell.type==='qiskit' ? 'runQiskitCell' : 'runCell';
    el.innerHTML = `${toolbar}
      <div class="cell-gutter"><div class="cell-num">${execLbl}</div><button class="cell-run-btn" id="rbtn-${cell.id}" onclick="event.stopPropagation();${runFunc}('${cell.id}')">▶</button></div>
      <div class="cell-body"><div class="cell-type-badge" style="color:${badgeColor}">${badgeLabel}</div><div id="cm-${cell.id}" style="min-height:80px;"></div><div class="cell-output-area" id="out-area-${cell.id}"></div></div>`;
    setTimeout(async ()=>{
      await initCodeMirror(cell.id, cell.code||'', 'python', (newCode)=>{
        cell.code = newCode;
        if(debounceTimer) clearTimeout(debounceTimer);
        debounceTimer = setTimeout(()=>saveCurrentNb(), 3000);
      });
    },10);
  }
  else if(cell.type==='markdown'){
    if(cell.mdEdit){
      el.innerHTML = `${toolbar}
        <div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div>
        <div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown / LaTeX</div>
        <div id="cm-${cell.id}" style="min-height:150px;"></div>
        <div class="cell-md-preview" id="md-preview-${cell.id}" style="margin-top:8px; padding:8px; background:var(--bg2); border-radius:6px;"></div></div>`;
      setTimeout(async ()=>{
        await initCodeMirror(cell.id, cell.code||'', 'markdown', async (newCode)=>{
          cell.code = newCode;
          await renderMdPreview(cell.id);
          if(debounceTimer) clearTimeout(debounceTimer);
          debounceTimer = setTimeout(()=>saveCurrentNb(), 3000);
        });
        await renderMdPreview(cell.id);
      },10);
    } else {
      el.innerHTML = `${toolbar}
        <div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div>
        <div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown</div>
        <div class="cell-md-rendered" id="mren-${cell.id}" ondblclick="editMd('${cell.id}')">${renderMdSimple(cell.code||'')}</div></div>`;
    }
  }
  return el;
}

async function renderMdPreview(cellId){
  const cell=cells.find(c=>c.id===cellId);
  if(!cell || cell.type!=='markdown') return;
  const previewDiv=document.getElementById(`md-preview-${cellId}`);
  if(!previewDiv) return;
  const html = marked.parse(cell.code || '');
  previewDiv.innerHTML = html;
  if(window.MathJax) await MathJax.typesetPromise([previewDiv]);
  if(window.hljs) previewDiv.querySelectorAll('pre code').forEach(block=>hljs.highlightElement(block));
}
function renderMdSimple(text){
  let html=escH(text);
  html=html.replace(/^### (.+)/gm,'<h3>$1</h3>').replace(/^## (.+)/gm,'<h2>$1</h2>').replace(/^# (.+)/gm,'<h1>$1</h1>');
  html=html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>');
  return html;
}
function editMd(id){ const cell=cells.find(c=>c.id===id); if(cell){ cell.mdEdit=true; renderCells(); focusCell(id); } }
function changeCellType(id){
  const cell=cells.find(c=>c.id===id);
  if(!cell) return;
  if(cell.type==='code') cell.type='markdown';
  else if(cell.type==='markdown') cell.type='code';
  else if(cell.type==='qiskit') cell.type='markdown';
  else cell.type='code';
  cell.mdEdit=true;
  renderCells();
  focusCell(id);
}

// --- Ejecución de celdas normales (Python) ---
async function runCell(id){
  if(!requireAuth()) return;
  if(running){ notify('Ya hay una ejecución en curso'); return; }
  const cell=cells.find(c=>c.id===id);
  if(!cell || (cell.type!=='code' && cell.type!=='qiskit')) return;
  syncCellCode(id);
  const code=cell.code.trim();
  if(!code) return;
  running=true;
  setSbRun(true);
  const rbtn=document.getElementById('rbtn-'+id);
  if(rbtn) rbtn.classList.add('spinning');
  const outArea=document.getElementById(`out-area-${id}`);
  outArea.innerHTML='<div class="out-text out-inf">⚙️ Ejecutando...</div>';
  try{
    if(engineOK && engineURL){
      const isHF=engineURL.includes('hf.space')||engineURL.includes('huggingface');
      let result;
      if(isHF){
        const res=await fetch(engineURL+'/run/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[code]}),signal:AbortSignal.timeout(90000)});
        const raw=await res.json();
        result=raw.data?raw.data[0]:raw;
      } else {
        const res=await fetch(engineURL+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code}),signal:AbortSignal.timeout(60000)});
        result=await res.json();
      }
      execCounter++;
      cell.exec_count=execCounter;
      outArea.innerHTML='';
      if(result.success){
        if(result.output) outArea.appendChild(createTextDiv(result.output));
        if(result.bloch?.probabilities){
          let html='<div class="out-text out-inf">📊 Probabilidades:</div>';
          Object.entries(result.bloch.probabilities).forEach(([s,p])=>{
            html+=`<div class="out-text">|${s}⟩: ${(p*100).toFixed(1)}%</div>`;
          });
          outArea.innerHTML+=html;
        }
        if(result.bloch?.counts){
          let html='<div class="out-text out-inf">🔬 Mediciones:</div>';
          Object.entries(result.bloch.counts).forEach(([s,c])=>{
            html+=`<div class="out-text">|${s}⟩: ${c}</div>`;
          });
          outArea.innerHTML+=html;
        }
      } else {
        outArea.appendChild(createTextDiv(result.output||'Error', 'err'));
      }
      setSbRun(false,'✅ Completado');
    } else {
      await new Promise(r=>setTimeout(r,600));
      execCounter++;
      cell.exec_count=execCounter;
      outArea.innerHTML=`<div class="out-text out-inf">⚡ Simulación local · Conecta un compilador</div>`;
      setSbRun(false,'Simulación local');
    }
  } catch(e){
    outArea.innerHTML=`<div class="out-text out-err">❌ ${e.message}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;
  if(rbtn) rbtn.classList.remove('spinning');
  renderCellNum(id);
}

// --- Celda Qiskit especial (sin imports, visualizaciones automáticas) ---
async function runQiskitCell(id){
  if(!requireAuth()) return;
  if(running){ notify('Ya hay una ejecución en curso'); return; }
  const cell=cells.find(c=>c.id===id);
  if(!cell || cell.type!=='qiskit') return;
  syncCellCode(id);
  let userCode=cell.code.trim();
  if(!userCode) return;
  if(!userCode.includes('QuantumCircuit(')){
    let nQubits=2;
    const match=userCode.match(/\.([a-z]+)\((\d+)/);
    if(match) nQubits=Math.max(parseInt(match[2])+1,2);
    userCode=`qc = QuantumCircuit(${nQubits})\n`+userCode;
  }
  if(!userCode.includes('.measure') && !userCode.includes('measure_all')) userCode+='\nqc.measure_all()';
  const preamble=`from qiskit import QuantumCircuit, transpile\nfrom qiskit_aer import AerSimulator\nfrom qiskit.visualization import plot_histogram, plot_bloch_multivector\nimport matplotlib.pyplot as plt\nimport numpy as np\nimport io, base64\n`;
  const postamble=`
_circuit_img = None; _bloch_imgs = []; _hist_img = None
buf = io.BytesIO(); qc.draw('mpl').savefig(buf, format='png'); buf.seek(0); _circuit_img = base64.b64encode(buf.read()).decode()
try:
    sim = AerSimulator(); qc.save_statevector(); job = sim.run(qc, shots=1); state = job.result().get_statevector()
    fig = plot_bloch_multivector(state); buf = io.BytesIO(); fig.savefig(buf, format='png'); plt.close(fig); buf.seek(0); _bloch_imgs = [base64.b64encode(buf.read()).decode()]
except: pass
if any(inst.operation.name == 'measure' for inst in qc.data):
    sim = AerSimulator(); qc_meas = qc.copy()
    if not any(inst.operation.name == 'measure' for inst in qc_meas.data): qc_meas.measure_all()
    transpiled = transpile(qc_meas, sim); job = sim.run(transpiled, shots=1024); counts = job.result().get_counts()
    fig = plot_histogram(counts); buf = io.BytesIO(); fig.savefig(buf, format='png'); plt.close(fig); buf.seek(0); _hist_img = base64.b64encode(buf.read()).decode()
__result = {"circuit_image": _circuit_img, "bloch_images": _bloch_imgs, "histogram_image": _hist_img}
`;
  const fullCode = preamble + userCode + postamble;
  running=true;
  setSbRun(true);
  const rbtn=document.getElementById('rbtn-'+id);
  if(rbtn) rbtn.classList.add('spinning');
  const outArea=document.getElementById(`out-area-${id}`);
  outArea.innerHTML='<div class="out-text out-inf">⚛️ Generando circuito cuántico...</div>';
  try{
    if(engineOK && engineURL){
      const isHF=engineURL.includes('hf.space')||engineURL.includes('huggingface');
      let resp;
      if(isHF){
        const res=await fetch(engineURL+'/run/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:[fullCode]}),signal:AbortSignal.timeout(90000)});
        const raw=await res.json();
        resp=raw.data?raw.data[0]:raw;
      } else {
        const res=await fetch(engineURL+'/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:fullCode}),signal:AbortSignal.timeout(90000)});
        resp=await res.json();
      }
      execCounter++;
      cell.exec_count=execCounter;
      outArea.innerHTML='';
      if(resp.circuit_image) outArea.appendChild(createImage(resp.circuit_image,'out-circuit-img'));
      if(resp.bloch_images) resp.bloch_images.forEach(b64=>outArea.appendChild(createImage(b64,'out-bloch')));
      if(resp.histogram_image) outArea.appendChild(createImage(resp.histogram_image,'out-hist'));
      if(outArea.children.length===0) outArea.innerHTML='<div class="out-text">✅ Circuito ejecutado (sin salida)</div>';
      setSbRun(false,'✅ Circuito listo');
    } else {
      await new Promise(r=>setTimeout(r,600));
      execCounter++;
      cell.exec_count=execCounter;
      outArea.innerHTML=`<div class="out-text out-inf">⚡ Simulación local · Conecta un compilador para visualizaciones reales</div>`;
      setSbRun(false,'Simulación local');
    }
  } catch(e){
    outArea.innerHTML=`<div class="out-text out-err">❌ ${e.message}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;
  if(rbtn) rbtn.classList.remove('spinning');
  renderCellNum(id);
}

function createTextDiv(text, type=''){
  const div=document.createElement('div');
  div.className=`out-text ${type==='err'?'out-err':''}`;
  div.textContent=text;
  return div;
}
function createImage(b64, className){
  const img=document.createElement('img');
  img.src='data:image/png;base64,'+b64;
  img.className=className;
  img.style.maxWidth='100%';
  img.style.marginTop='8px';
  return img;
}
function renderCellNum(id){
  const cell=cells.find(c=>c.id===id);
  if(!cell) return;
  const numEl=document.querySelector(`[data-id="${id}"] .cell-num`);
  if(numEl) numEl.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';
}
async function runCurCell(){ if(curCellId){ const cell=cells.find(c=>c.id===curCellId); if(cell.type==='qiskit') await runQiskitCell(curCellId); else await runCell(curCellId); } }
async function runAll(){ for(const cell of cells){ if(cell.type==='code'||cell.type==='qiskit'){ if(cell.type==='qiskit') await runQiskitCell(cell.id); else await runCell(cell.id); await new Promise(r=>setTimeout(r,200)); } } }
function setSbRun(running,msg='',state=''){
  const dot=document.getElementById('sb-dot');
  const txt=document.getElementById('sb-txt');
  if(dot) dot.className='sb-dot '+(running?'sb-run':state==='err'?'sb-err':'sb-idle');
  if(txt&&msg) txt.textContent=msg;
}

// --- Guardar y cargar notebooks ---
function saveCurrentNb(){
  if(!curUser) return;
  cells.forEach(c=>syncCellCode(c.id));
  const name=document.getElementById('nb-name-inp').value||'Sin título';
  const key='qcol_nbs_'+(curUser.username||'dev');
  const nbs=JSON.parse(localStorage.getItem(key)||'[]');
  const existing=nbs.findIndex(n=>n.name===name);
  const entry={name, cells:JSON.parse(JSON.stringify(cells)), saved:new Date().toISOString()};
  if(existing>=0) nbs[existing]=entry; else nbs.unshift(entry);
  localStorage.setItem(key,JSON.stringify(nbs.slice(0,50)));
  notify('💾 Guardado: '+name);
}
function newNotebook(){
  if(!confirm('¿Crear nuevo notebook? Se perderá el actual.')) return;
  cells=[]; execCounter=0; curCellId=null;
  document.getElementById('nb-name-inp').value='Nuevo Notebook';
  addCellAt(-1,'code');
  notify('✅ Nuevo notebook');
}
function importNb(){ document.getElementById('import-file').click(); }
function handleImport(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const nb=JSON.parse(ev.target.result);
      cells=[]; execCounter=0;
      document.getElementById('nb-name-inp').value=nb.metadata?.name||file.name.replace('.ipynb','');
      (nb.cells||[]).forEach(c=>{
        const src=Array.isArray(c.source)?c.source.join(''):c.source||'';
        const type=c.cell_type==='markdown'?'markdown':(src.includes('QuantumCircuit')?'qiskit':'code');
        cells.push({id:genId(), type, code:src, output:'', exec_count:null, mdEdit:false});
      });
      if(cells.length===0) addCellAt(-1,'code');
      else { renderCells(); focusCell(cells[0].id); }
      setView('notebook');
      notify(`✅ Importado: ${cells.length} celdas`);
    }catch(err){ notify('❌ Error: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}
function downloadNb(){
  const name=document.getElementById('nb-name-inp').value||'qcol_notebook';
  cells.forEach(c=>syncCellCode(c.id));
  const nb={nbformat:4,nbformat_minor:5,metadata:{name,kernelspec:{display_name:'Python 3',language:'python',name:'python3'},qcol:{lib:'qiskit',author:curUser?.name||''}},cells:cells.map(c=>({cell_type:c.type==='markdown'?'markdown':'code',source:[c.code],metadata:{},outputs:[],execution_count:c.exec_count}))};
  const blob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name.replace(/\.ipynb$/,'')+'.ipynb'; a.click();
  notify('📥 '+a.download);
}
function getSavedNbs(){ if(!curUser) return []; const key='qcol_nbs_'+(curUser.username||'dev'); return JSON.parse(localStorage.getItem(key)||'[]'); }
function loadNb(name){
  const nbs=getSavedNbs();
  const nb=nbs.find(n=>n.name===name);
  if(!nb) return;
  cells=nb.cells.map(c=>({...c, mdEdit:false}));
  document.getElementById('nb-name-inp').value=nb.name;
  renderCells();
  if(cells[0]) focusCell(cells[0].id);
  setView('notebook');
  notify('📂 Cargado: '+nb.name);
}
function deleteNb(name){
  if(!confirm('¿Eliminar "'+name+'"?')) return;
  const key='qcol_nbs_'+(curUser?.username||'dev');
  const nbs=getSavedNbs().filter(n=>n.name!==name);
  localStorage.setItem(key,JSON.stringify(nbs));
  refreshNbs();
  notify('🗑 Eliminado: '+name);
}
function refreshNbs(){
  const grid=document.getElementById('nb-grid');
  if(!grid) return;
  const nbs=getSavedNbs();
  if(nbs.length===0){ grid.innerHTML='<div class="nb-empty-state"><div class="nb-empty-icon">📓</div><div class="nb-empty-ttl">Sin notebooks guardados</div></div>'; return; }
  grid.innerHTML=nbs.map(nb=>`
    <div class="nb-card"><div class="nb-card-hdr"><div class="nb-card-title">${escH(nb.name)}</div><div class="nb-card-badge">${nb.cells?.length||0} celdas</div></div>
    <div class="nb-card-body"><div class="nb-card-meta">${new Date(nb.saved).toLocaleDateString()}</div>
    <div class="nb-card-actions"><button class="btn-edit-nb" onclick="loadNb('${escH(nb.name)}')">📝 Editar</button><button class="btn-pub-nb" onclick="loadNb('${escH(nb.name)}');showPublish()">📤 Publicar</button><button class="btn-del-nb" onclick="deleteNb('${escH(nb.name)}')">🗑</button></div></div></div>`).join('');
}
function showPublish(){ document.getElementById('pub-title').value=document.getElementById('nb-name-inp').value; document.getElementById('pub-modal').classList.add('open'); }
function closePublish(){ document.getElementById('pub-modal').classList.remove('open'); }
function publishNb(){
  if(!requireAuth()) return;
  saveCurrentNb();
  const name=document.getElementById('nb-name-inp').value||'Sin título';
  const desc=document.getElementById('pub-desc').value.trim();
  const tags=document.getElementById('pub-tags').value.trim();
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  const projs=JSON.parse(localStorage.getItem('qcol_projs')||'[]');
  const existing=projs.findIndex(p=>p.id===id);
  const entry={id,title:name,type:'nb',desc,tags,size:cells.length,time:Math.max(5,cells.length*2),added:new Date().toLocaleDateString(),author:curUser?.name||'Admin',cells:JSON.parse(JSON.stringify(cells))};
  if(existing>=0) projs[existing]=entry; else projs.unshift(entry);
  localStorage.setItem('qcol_projs',JSON.stringify(projs));
  postCore('QCOL_SAVE',{key:'qcol_projs',val:projs});
  downloadNb();
  closePublish();
  notify('✅ Publicado en Proyectos: '+name);
}
setInterval(()=>{ if(curUser&&cells.length>0) saveCurrentNb(); },60000);
document.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key==='s'){ e.preventDefault(); saveCurrentNb(); } if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='Enter'){ e.preventDefault(); runAll(); } });
</script>
