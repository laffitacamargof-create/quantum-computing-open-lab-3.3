<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCOL — Arquitecto Profesional (JupyterLab Local)</title>
<!-- Fuentes -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;600&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- CodeMirror 5 (editor profesional) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/comment/comment.min.js"></script>
<!-- Markdown + MathJax -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
<!-- Highlight.js para código en markdown -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/dist/highlight.min.js"></script>
<style>
:root{
  --bg:#0a0e1a;--bg2:#0d1117;--bg3:#0d1220;
  --p:#111827;--p2:#1a2540;
  --bd:#1e3058;--bd2:#254070;
  --bl:#0088ff;--bl2:#00aaff;--cy:#00ffdd;
  --gr:#00ff88;--yw:#ffd700;--rd:#ff4466;--pu:#bd93f9;
  --tx:#e2ecff;--tx2:#aabcda;--mu:#4a6a9a;--mu2:#2a3a5a;
  --kw:#ff79c6;--fn:#50fa7b;--st:#f1fa8c;--nm:#bd93f9;--cm:#636e8a;--cl:#8be9fd;
  --orb:'Orbitron',monospace;--mono:'JetBrains Mono',monospace;--ex:'Exo 2',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ex);}
body{display:flex;flex-direction:column;overflow:hidden;}

/* Notificaciones */
.notif{position:fixed;top:.7rem;right:.7rem;z-index:9999;padding:.5rem .9rem;
  background:rgba(10,14,26,.97);border:1px solid var(--cy);border-radius:8px;
  font-family:var(--orb);font-size:.58rem;color:var(--cy);
  transform:translateX(130%);transition:transform .3s;pointer-events:none;}
.notif.show{transform:translateX(0);}

/* Access denied */
.access-denied{display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;z-index:100;
  text-align:center;gap:1.2rem;}
.access-denied.show{display:flex;}
.denied-icon{font-size:3rem;opacity:.4;}
.denied-title{font-family:var(--orb);font-size:1rem;color:var(--rd);}
.denied-desc{font-size:.75rem;color:var(--mu);max-width:340px;line-height:1.7;}
.btn-back{padding:.48rem 1.1rem;background:linear-gradient(135deg,#003388,var(--bl));
  border:none;border-radius:8px;color:#fff;font-family:var(--orb);font-size:.65rem;cursor:pointer;}

/* Top bar simplificada (sin input de URL) */
.topbar{
  height:38px;display:flex;align-items:center;gap:.5rem;
  padding:0 .8rem;background:#080b14;
  border-bottom:1px solid rgba(189,147,249,.18);flex-shrink:0;
}
.tb-logo{display:flex;align-items:center;gap:.35rem;margin-right:.5rem;}
.tb-q{font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--cy);}
.tb-pro{font-family:var(--orb);font-size:.48rem;color:var(--pu);letter-spacing:.06em;}
.tb-sep{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.nb-name-inp{
  background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:.72rem;color:var(--tx);
  min-width:80px;max-width:220px;padding:.1rem .3rem;
  border-radius:4px;cursor:text;
}
.nb-name-inp:focus{background:rgba(255,255,255,.05);color:var(--cy);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;}
.eng-pill{
  padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(74,106,154,.1);border:1px solid rgba(74,106,154,.25);color:var(--mu);
}
.eng-pill.on{background:rgba(0,255,136,.07);border-color:rgba(0,255,136,.35);color:var(--gr);
  animation:puls 2.5s infinite;}
@keyframes puls{0%,100%{border-color:rgba(0,255,136,.35);}50%{border-color:rgba(0,255,136,.8);}}
.user-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.46rem;
  background:rgba(189,147,249,.08);border:1px solid rgba(189,147,249,.2);color:var(--pu);}
.admin-pill{padding:.2rem .5rem;border-radius:12px;font-family:var(--orb);font-size:.44rem;
  background:rgba(255,215,0,.06);border:1px solid rgba(255,215,0,.2);color:var(--yw);}

/* Secondary bar */
.secbar{
  height:32px;display:flex;align-items:stretch;
  background:#080b14;border-bottom:1px solid var(--bd);flex-shrink:0;
  padding:0 .5rem;gap:.1rem;
}
.stab{
  display:flex;align-items:center;gap:.3rem;padding:0 .75rem;
  background:transparent;border:none;color:var(--mu);
  font-family:var(--orb);font-size:.48rem;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;
}
.stab.on{color:var(--pu);border-bottom-color:var(--pu);}
.secbar-right{margin-left:auto;display:flex;align-items:center;gap:.3rem;}

/* Main area */
.main{flex:1;overflow:hidden;display:flex;min-height:0;}
#view-notebook{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.nb-scroll{flex:1;overflow-y:auto;padding:.8rem 0;}
.nb-scroll::-webkit-scrollbar{width:5px;}
.nb-scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}

/* Celda */
.nb-cell{
  display:flex;margin:.2rem auto;
  width:min(900px,96%);
  position:relative;
  border-radius:8px;
  border:1px solid transparent;
  transition:border-color .15s;
}
.nb-cell:hover{border-color:rgba(189,147,249,.15);}
.nb-cell.active{border-color:rgba(189,147,249,.4);}
.cell-gutter{
  width:52px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;padding:.6rem .3rem 0;
  gap:.3rem;
}
.cell-num{
  font-family:var(--mono);font-size:.6rem;color:var(--mu);
  min-width:22px;text-align:center;
}
.cell-run-btn{
  width:26px;height:26px;border-radius:50%;
  background:transparent;border:1px solid var(--bd2);
  color:var(--mu);font-size:.7rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.nb-cell.active .cell-run-btn{border-color:var(--bl2);color:var(--bl2);}
.cell-run-btn:hover{background:rgba(0,136,255,.15);border-color:var(--bl);color:var(--bl2);transform:scale(1.1);}
.cell-run-btn.spinning{border-color:var(--gr);color:var(--gr);animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

.cell-body{flex:1;display:flex;flex-direction:column;min-width:0;padding:.4rem 0;}
.cell-type-badge{display:inline-flex;align-items:center;gap:.3rem;font-family:var(--orb);font-size:.44rem;color:var(--mu);padding:.08rem 0 .3rem;}
.ctb-code{color:var(--bl2);}
.ctb-md{color:var(--gr);}

.cell-code-area{
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:6px;
  overflow:hidden;
  min-height:48px;
}
.nb-cell.active .cell-code-area{border-color:rgba(189,147,249,.35);}
/* CodeMirror personalización */
.CodeMirror {
  height: auto;
  font-family: var(--mono);
  font-size: .72rem;
  background: var(--bg2);
  color: var(--tx2);
}
.cell-output-area{
  margin-top:.35rem;
  background:#060a10;
  border:1px solid var(--bd);
  border-radius:6px;
  font-family:var(--mono);
  overflow:hidden;
}
.out-text{
  padding:.55rem .8rem;
  font-size:.68rem;
  line-height:1.65;
  white-space:pre-wrap;
  max-height:280px;
  overflow-y:auto;
  border-bottom:1px solid var(--bd);
  margin:0;
}
.out-err{color:var(--rd);}
.out-html{ padding: .5rem; }
.out-plot{ max-width:100%; display:block; margin: .5rem auto; background:#0a0e1a; }
.out-circuit{ width:100%; background:#0a0e1a; margin: .5rem 0; }

/* Markdown split */
.md-split{
  display:flex;
  gap:.5rem;
  background:var(--bg2);
  border:1px solid var(--bd);
  border-radius:6px;
  min-height:150px;
}
.md-editor-pane{
  flex:1;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--bd);
}
.md-preview-pane{
  flex:1;
  padding:.6rem;
  overflow-y:auto;
  max-height:400px;
  font-size:.75rem;
  line-height:1.6;
  color:var(--tx2);
}
.md-preview-pane h1{font-family:var(--orb);font-size:1rem;color:var(--bl2);}
.md-preview-pane code{background:rgba(0,136,255,.1);padding:.1rem .3rem;border-radius:3px;font-family:var(--mono);color:var(--cy);}
.md-preview-pane pre{background:var(--bg);padding:.5rem;border-radius:5px;overflow-x:auto;}
.cell-md-split-area{
  width:100%;
  background:var(--bg2);
  border:none;
  padding:.6rem;
  font-family:var(--mono);
  font-size:.72rem;
  line-height:1.65;
  color:var(--tx2);
  resize:vertical;
  outline:none;
}

.cell-toolbar{
  display:none;position:absolute;top:.3rem;right:.5rem;
  gap:.2rem;align-items:center;z-index:5;
}
.nb-cell:hover .cell-toolbar,
.nb-cell.active .cell-toolbar{display:flex;}
.ct-btn{
  width:20px;height:20px;border-radius:4px;
  background:rgba(10,14,26,.85);border:1px solid var(--bd2);
  color:var(--mu);font-size:.55rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.ct-btn:hover{border-color:var(--bl2);color:var(--bl2);}
.ct-btn.danger:hover{border-color:var(--rd);color:var(--rd);}

.add-cell-row{
  width:min(900px,96%);margin:.05rem auto;height:18px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.add-cell-row:hover{opacity:1;}
.add-cell-line{flex:1;height:1px;background:rgba(189,147,249,.2);}
.add-cell-btns{display:flex;gap:.25rem;padding:0 .5rem;}
.add-btn{
  padding:.12rem .45rem;background:var(--bg);border:1px solid rgba(189,147,249,.3);
  border-radius:4px;color:var(--pu);font-family:var(--orb);font-size:.42rem;
  cursor:pointer;
}
.add-btn:hover{background:rgba(189,147,249,.08);}

.nb-bottom{
  width:min(900px,96%);margin:.5rem auto 2rem;
  display:flex;gap:.5rem;
}
.nb-add-big{
  flex:1;padding:.55rem;background:transparent;
  border:1px dashed rgba(189,147,249,.2);border-radius:8px;
  color:var(--pu);font-family:var(--orb);font-size:.52rem;
  cursor:pointer;text-align:center;
}
.nb-add-big:hover{background:rgba(189,147,249,.06);border-color:rgba(189,147,249,.5);}
.empty-notebook-msg{
  width:min(900px,96%); margin: 2rem auto; text-align: center;
  padding: 2rem; background: rgba(0,0,0,0.3); border-radius: 12px;
  color: var(--mu); font-family: var(--orb); font-size: .7rem;
}
.empty-notebook-msg button{ margin-top: 1rem; }

/* Manage notebooks */
#view-manage{display:none;flex:1;flex-direction:column;overflow:hidden;}
.manage-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.manage-bar{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;
  background:var(--p);border-bottom:1px solid var(--bd);flex-shrink:0;}
.nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:.85rem;padding:1.1rem;overflow-y:auto;flex:1;}
.nb-card{background:var(--p);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.nb-card:hover{border-color:rgba(189,147,249,.4);}
.nb-card-hdr{padding:.65rem .9rem;background:#080b14;border-bottom:1px solid rgba(189,147,249,.15);
  display:flex;align-items:center;justify-content:space-between;}
.nb-card-title{font-family:var(--orb);font-size:.65rem;color:var(--tx);}
.nb-card-actions{display:flex;gap:.3rem; margin-top: .5rem;}
.btn-edit-nb,.btn-pub-nb,.btn-del-nb{
  padding:.42rem; background:rgba(189,147,249,.1);
  border:1px solid rgba(189,147,249,.25);border-radius:6px;
  color:var(--pu);font-family:var(--orb);font-size:.52rem;cursor:pointer;
}
.btn-pub-nb{background:rgba(0,136,255,.1);border-color:rgba(0,136,255,.3);color:var(--bl2);}
.btn-del-nb{background:rgba(255,68,102,.07);border-color:rgba(255,68,102,.18);color:#ff8899;}

/* Status bar */
.statusbar{
  height:22px;display:flex;align-items:center;gap:.65rem;
  padding:0 .85rem;background:#060a10;border-top:1px solid var(--bd);
  font-family:var(--mono);font-size:.52rem;color:var(--mu);flex-shrink:0;
}
.sb-dot{width:5px;height:5px;border-radius:50%;}
.sb-idle{background:var(--mu);}
.sb-run{background:var(--gr);animation:puls 1.5s infinite;}
.sb-err{background:var(--rd);}
.sb-right{margin-left:auto;display:flex;gap:.65rem;}

/* Modal */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--p);border:1px solid rgba(189,147,249,.35);border-radius:12px;padding:1.5rem;width:min(480px,92vw);}
.modal-title{font-family:var(--orb);font-size:.82rem;color:var(--pu);margin-bottom:1rem;}
.fg{margin-bottom:.7rem;}
.fl{font-family:var(--orb);font-size:.5rem;color:var(--mu);display:block;margin-bottom:.2rem;}
.fi{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--bd2);border-radius:7px;padding:.45rem .72rem;color:var(--tx);font-family:var(--mono);font-size:.72rem;outline:none;}
.btn-row{display:flex;gap:.4rem;margin-top:.65rem;}
.btn-pri{padding:.4rem .9rem;background:linear-gradient(135deg,#4a0a8a,var(--pu));border:none;border-radius:6px;color:#fff;cursor:pointer;}
.btn-cancel{padding:.4rem .85rem;background:transparent;border:1px solid var(--bd2);border-radius:7px;color:var(--mu);cursor:pointer;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="access-denied" id="access-denied"><div class="denied-icon">🔒</div><div class="denied-title">ACCESO RESTRINGIDO</div><div class="denied-desc">Arquitecto Profesional es exclusivo para<br><strong>Administradores</strong> y el <strong>Fundador</strong>.</div><button class="btn-back" onclick="postCore('QCOL_NAV',{screen:'home'})">← Volver al menú</button></div>

<div class="topbar" id="topbar" style="display:none;">
  <div class="tb-logo"><span class="tb-q">Q</span><span style="font-family:var(--orb);font-size:.72rem;font-weight:900;color:var(--bl2);">COL</span><span class="tb-pro">PRO</span></div>
  <div class="tb-sep"></div>
  <input class="nb-name-inp" id="nb-name-inp" placeholder="Sin título" value="Nuevo Notebook">
  <div class="tb-right">
    <div class="eng-pill" id="eng-badge">● SIN COMPILADOR</div>
    <div class="admin-pill" id="admin-pill" style="display:none;">ADMIN+</div>
    <div class="user-pill" id="user-pill">—</div>
  </div>
</div>

<div class="secbar" id="secbar" style="display:none;">
  <button class="stab on" id="stab-1" onclick="setView('notebook')">📝 NOTEBOOK</button>
  <button class="stab" id="stab-2" onclick="setView('manage')">📂 MIS NOTEBOOKS</button>
  <div class="secbar-right">
    <button class="tbtn" onclick="addCellAt(-1,'code')" style="background:transparent; border:1px solid var(--bd2); border-radius:5px; padding:.25rem .6rem; color:var(--mu); font-family:var(--orb); font-size:.48rem; cursor:pointer;">＋ Código</button>
    <button class="tbtn" onclick="addCellAt(-1,'markdown')" style="background:transparent; border:1px solid var(--bd2); border-radius:5px; padding:.25rem .6rem; color:var(--mu); font-family:var(--orb); font-size:.48rem; cursor:pointer;">＋ Texto</button>
    <button class="tbtn" onclick="importNb()" style="background:transparent; border:1px solid var(--bd2); border-radius:5px; padding:.25rem .6rem; color:var(--mu);">📂 Abrir .ipynb</button>
    <input type="file" id="import-file" style="display:none;" accept=".ipynb" onchange="handleImport(event)">
    <button class="tbtn" onclick="downloadNb()" style="background:transparent; border:1px solid var(--bd2); border-radius:5px; padding:.25rem .6rem; color:var(--mu);">📥 .ipynb</button>
    <button class="tbtn" onclick="saveCurrentNb(true)" style="background:transparent; border:1px solid var(--bd2); border-radius:5px; padding:.25rem .6rem; color:var(--mu);">💾 GUARDAR</button>
    <button class="tbtn pub" onclick="showPublish()" style="background:linear-gradient(135deg,#3a0075,var(--pu)); border-color:var(--pu); color:#fff; padding:.25rem .6rem;">📤 PUBLICAR</button>
    <button class="tbtn run" onclick="runCurCell()" style="background:linear-gradient(135deg,#003388,var(--bl)); border-color:var(--bl); color:#fff;">▶ EJECUTAR</button>
    <button class="tbtn run-all" onclick="runAll()" style="background:linear-gradient(135deg,#004400,#00aa44); border-color:#00aa44; color:#fff;">▶▶ TODO</button>
  </div>
</div>

<div class="main" id="main-area" style="display:none;">
  <div id="view-notebook" style="display:flex;"><div class="nb-scroll" id="nb-scroll"></div></div>
  <div id="view-manage"><div class="manage-wrap"><div class="manage-bar"><div class="manage-title-lbl">📂 MIS NOTEBOOKS</div><button class="tbtn" style="margin-left:auto;" onclick="refreshNbs()">🔄 Actualizar</button><button class="tbtn pub" onclick="newNotebook();setView('notebook')">＋ NUEVO</button></div><div class="nb-grid" id="nb-grid"></div></div></div>
</div>

<div class="statusbar" id="statusbar" style="display:none;"><div class="sb-dot sb-idle" id="sb-dot"></div><span id="sb-txt">Listo</span><span>Python · Qiskit</span><div class="sb-right"><span id="sb-cells-info">0 celdas</span><span id="sb-save-status">─</span></div></div>

<div class="modal-ov" id="pub-modal"><div class="modal"><div class="modal-title">📤 Publicar a GitHub</div><div class="fg"><label class="fl">TÍTULO</label><input class="fi" id="pub-title" placeholder="Nombre del notebook"></div><div class="fg"><label class="fl">DESCRIPCIÓN</label><textarea class="fi" id="pub-desc" placeholder="Breve descripción..."></textarea></div><div class="fg"><label class="fl">TOKEN PERSONAL DE GITHUB</label><input class="fi" id="github-token" type="password" placeholder="ghp_xxxxxxxxxxxx"></div><div class="fg"><label class="fl">REPOSITORIO (usuario/repo)</label><input class="fi" id="github-repo" value="tuusuario/qcol-notebooks"></div><div class="btn-row"><button class="btn-pri" onclick="publishNb()">📤 Publicar en GitHub</button><button class="btn-cancel" onclick="closePublish()">Cancelar</button></div></div></div>

<script>
// ------------------------------------------------------------
// QCOL ARCHITECT PRO — Mejoras completas (JupyterLab-like)
// ------------------------------------------------------------
let STANDALONE = window.parent === window;
let curUser = null;
let engineURL = '', engineOK = false, running = false;
let curView = 'notebook';
let cells = [];
let curCellId = null;
let execCounter = 0;
let _initialized = false;
let lastSaveTime = Date.now();
let debounceTimer = null;

// Undo/Redo stacks
let undoStack = [];
let redoStack = [];
let isUndoRedo = false;

function postCore(type, data={}){ try{ window.parent.postMessage({type,...data},'*'); }catch(e){} }
function notify(msg,ms=2800){ const el=document.getElementById('notif'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),ms); }

// Motor: obtener URL desde mensaje o localStorage
async function checkEngine(){
  if(!engineURL) return;
  const badge=document.getElementById('eng-badge');
  try{
    const resp=await fetch(engineURL+'/run/predict',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:['print("test")'], fn_index:1}),
      signal:AbortSignal.timeout(8000)
    });
    if(resp.ok){ engineOK=true; badge.textContent='● MOTOR ACTIVO'; badge.className='eng-pill on'; }
    else throw new Error();
  }catch(e){ engineOK=false; badge.textContent='● SIN COMPILADOR'; badge.className='eng-pill'; }
}

function setEngineURL(url){ engineURL=url; localStorage.setItem('qcol_colab_url',url); checkEngine(); notify('🌐 Motor actualizado'); }

// Guardar estado para undo (llamar en cada modificación)
function pushUndo() {
  if (isUndoRedo) return;
  undoStack.push(JSON.parse(JSON.stringify(cells)));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}
function undo() {
  if (undoStack.length === 0) return;
  isUndoRedo = true;
  redoStack.push(JSON.parse(JSON.stringify(cells)));
  cells = undoStack.pop();
  renderCells();
  isUndoRedo = false;
  notify('↩️ Deshecho');
}
function redo() {
  if (redoStack.length === 0) return;
  isUndoRedo = true;
  undoStack.push(JSON.parse(JSON.stringify(cells)));
  cells = redoStack.pop();
  renderCells();
  isUndoRedo = false;
  notify('↪️ Rehecho');
}

// Gestión de celdas
function genId(){ return 'c'+Date.now()+Math.random().toString(36).slice(2,6); }
function addCellAt(afterIdx, type='code'){
  pushUndo();
  const cell={id:genId(),type,code:'',output:'',exec_count:null,mdEdit:false};
  if(afterIdx===-1 || afterIdx>=cells.length) cells.push(cell);
  else cells.splice(afterIdx+1,0,cell);
  renderCells();
  focusCell(cell.id);
  updateStatus();
}
function deleteCell(id){
  if(cells.length===1 && cells[0].code.trim()==='' && cells[0].type==='code'){
    cells = []; // permitir 0 celdas
  } else {
    const idx = cells.findIndex(c=>c.id===id);
    if(idx!==-1) cells.splice(idx,1);
  }
  pushUndo();
  if(cells.length===0) curCellId=null;
  else if(curCellId===id) curCellId=cells[0]?.id||null;
  renderCells();
  updateStatus();
}
function moveCellUp(id){ const i=cells.findIndex(c=>c.id===id); if(i<=0) return; pushUndo(); [cells[i-1],cells[i]]=[cells[i],cells[i-1]]; renderCells(); focusCell(id); }
function moveCellDown(id){ const i=cells.findIndex(c=>c.id===id); if(i<0||i>=cells.length-1) return; pushUndo(); [cells[i],cells[i+1]]=[cells[i+1],cells[i]]; renderCells(); focusCell(id); }
function changeCellType(id){ const cell=cells.find(c=>c.id===id); if(!cell) return; pushUndo(); cell.type=cell.type==='code'?'markdown':'code'; cell.mdEdit=true; renderCells(); focusCell(id); }
function focusCell(id){ curCellId=id; document.querySelectorAll('.nb-cell').forEach(el=>{ el.classList.toggle('active',el.dataset.id===id); }); const cmDiv=document.querySelector(`#area-${id} .CodeMirror`); if(cmDiv) cmDiv.CodeMirror?.focus(); }

// Markdown con marked + MathJax
async function renderMdPreview(cellId){
  const cell=cells.find(c=>c.id===cellId);
  if(!cell || cell.type!=='markdown') return;
  const previewDiv=document.getElementById(`md-preview-${cellId}`);
  if(!previewDiv) return;
  const src=cell.code||'';
  const html = marked.parse(src);
  previewDiv.innerHTML=html;
  if(window.hljs) previewDiv.querySelectorAll('pre code').forEach(block=>hljs.highlightElement(block));
  if(window.MathJax) await MathJax.typesetPromise([previewDiv]);
}
function editMd(id){ const cell=cells.find(c=>c.id===id); if(cell){ cell.mdEdit=true; renderCells(); focusCell(id); } }

// Renderizado principal
function renderCells(){
  const scroll=document.getElementById('nb-scroll');
  if(!scroll) return;
  scroll.innerHTML='';
  if(cells.length===0){
    const emptyDiv=document.createElement('div');
    emptyDiv.className='empty-notebook-msg';
    emptyDiv.innerHTML='📓 No hay celdas. <button class="nb-add-big" style="display:inline-block; width:auto; margin-left:1rem;" onclick="addCellAt(-1,\'code\')">＋ Añadir primera celda</button>';
    scroll.appendChild(emptyDiv);
    updateStatus();
    return;
  }
  cells.forEach((cell,i)=>{
    const beforeRow=buildAddRow(i-1);
    scroll.appendChild(beforeRow);
    const el=buildCellEl(cell,i);
    scroll.appendChild(el);
  });
  const lastRow=buildAddRow(cells.length-1);
  scroll.appendChild(lastRow);
  if(curCellId) focusCell(curCellId);
  updateStatus();
}
function buildAddRow(afterIdx){
  const row=document.createElement('div'); row.className='add-cell-row';
  row.innerHTML=`<div class="add-cell-line"></div><div class="add-cell-btns"><button class="add-btn" onclick="addCellAt(${afterIdx},'code')">＋ Código</button><button class="add-btn" onclick="addCellAt(${afterIdx},'markdown')">＋ Texto</button></div><div class="add-cell-line"></div>`;
  return row;
}
function buildCellEl(cell,i){
  const el=document.createElement('div');
  el.className='nb-cell'+(curCellId===cell.id?' active':'');
  el.dataset.id=cell.id;
  el.draggable=true;
  el.onclick=()=>focusCell(cell.id);
  el.ondragstart=e=>{ e.dataTransfer.setData('text/plain',cell.id); };
  el.ondrop=e=>{ e.preventDefault(); const srcId=e.dataTransfer.getData('text/plain'); if(srcId && srcId!==cell.id){ const srcIdx=cells.findIndex(c=>c.id===srcId); const dstIdx=cells.findIndex(c=>c.id===cell.id); if(srcIdx>=0 && dstIdx>=0){ pushUndo(); const [moved]=cells.splice(srcIdx,1); cells.splice(dstIdx,0,moved); renderCells(); focusCell(srcId); notify('↕ Movido'); } } };
  el.ondragover=e=>e.preventDefault();
  const isCode=cell.type==='code';
  const execLbl=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]';
  const toolbar=`<div class="cell-toolbar"><button class="ct-btn" onclick="event.stopPropagation();moveCellUp('${cell.id}')">↑</button><button class="ct-btn" onclick="event.stopPropagation();moveCellDown('${cell.id}')">↓</button><button class="ct-btn" onclick="event.stopPropagation();changeCellType('${cell.id}')">${isCode?'Md':'{ }'}</button><button class="ct-btn danger" onclick="event.stopPropagation();deleteCell('${cell.id}')">✕</button></div>`;
  if(isCode){
    el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num">${execLbl}</div><button class="cell-run-btn" id="rbtn-${cell.id}" onclick="event.stopPropagation();runCell('${cell.id}')">▶</button></div><div class="cell-body"><div class="cell-type-badge ctb-code">{ } Python</div><div class="cell-code-area" id="area-${cell.id}"></div><div class="cell-output-area" id="output-area-${cell.id}"></div></div>`;
    setTimeout(()=>{
      const container=document.getElementById(`area-${cell.id}`);
      if(container && !container.cm){
        const cm = CodeMirror(container, {
          value: cell.code || '',
          mode: 'python',
          theme: 'dracula',
          lineNumbers: true,
          indentUnit: 4,
          tabSize: 4,
          autoCloseBrackets: true,
          matchBrackets: true,
          extraKeys: {
            'Shift-Enter': ()=>{ runCell(cell.id); },
            'Ctrl-Enter': ()=>{ runCell(cell.id); },
            'Tab': (cm)=>cm.execCommand('insertSoftTab'),
            'Ctrl-S': ()=>saveCurrentNb(true),
            'Ctrl-Z': ()=>undo(),
            'Ctrl-Y': ()=>redo(),
            'Ctrl-Shift-Z': ()=>redo()
          }
        });
        cm.on('change', ()=>{
          cell.code = cm.getValue();
          autoSaveDebounced();
          // no pushUndo aquí porque sería demasiado frecuente, se llama en acciones específicas
        });
        container.cm = cm;
        if(curCellId===cell.id) cm.focus();
      }
    }, 10);
  } else {
    if(cell.mdEdit){
      el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div><div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown / LaTeX</div><div class="md-split"><div class="md-editor-pane"><textarea class="cell-md-split-area" id="mta-${cell.id}" placeholder="# Título&#10;Escribe Markdown o LaTeX: $E=mc^2$" oninput="syncMdCell('${cell.id}')" rows="6">${escapeHtml(cell.code||'')}</textarea></div><div class="md-preview-pane" id="md-preview-${cell.id}"></div></div></div>`;
      setTimeout(()=>{ renderMdPreview(cell.id); }, 10);
    } else {
      el.innerHTML=`${toolbar}<div class="cell-gutter"><div class="cell-num" style="color:var(--gr)">Md</div></div><div class="cell-body"><div class="cell-type-badge ctb-md">✦ Markdown</div><div class="cell-md-rendered" id="mren-${cell.id}" ondblclick="editMd('${cell.id}')">${marked.parse(cell.code||'')}</div></div>`;
      if(window.MathJax) setTimeout(()=>MathJax.typesetPromise([el]), 50);
    }
  }
  return el;
}
function syncMdCell(id){
  const cell=cells.find(c=>c.id===id);
  if(!cell) return;
  const ta=document.getElementById(`mta-${id}`);
  if(ta){ cell.code=ta.value; renderMdPreview(id); autoSaveDebounced(); }
}
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoSaveDebounced(){ if(debounceTimer) clearTimeout(debounceTimer); debounceTimer=setTimeout(()=>{ if(curUser && cells.length) saveCurrentNb(false); }, 2000); }

// Ejecución con salida rica (stdout, stderr, imágenes)
async function runCell(id){
  if(!requireAuth()) return;
  if(running){ notify('Ya hay una ejecución en curso'); return; }
  const cell=cells.find(c=>c.id===id);
  if(!cell || cell.type!=='code') return;
  // sincronizar desde CodeMirror
  const cmDiv=document.getElementById(`area-${id}`);
  if(cmDiv && cmDiv.cm) cell.code = cmDiv.cm.getValue();
  const code=cell.code.trim();
  if(!code) return;
  running=true;
  setSbRun(true);
  const rbtn=document.getElementById(`rbtn-${id}`);
  if(rbtn) rbtn.classList.add('spinning');
  const outArea=document.getElementById(`output-area-${id}`);
  if(outArea) outArea.innerHTML='<div class="out-text">⚙️ Ejecutando...</div>';
  try{
    if(engineOK && engineURL){
      const resp=await fetch(engineURL+'/run/predict',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({data:[code], fn_index:1}),
        signal:AbortSignal.timeout(90000)
      });
      const raw=await resp.json();
      const payload = raw.data?.[0] || {};
      execCounter++;
      cell.exec_count=execCounter;
      let outHtml='';
      if(payload.stdout) outHtml+=`<div class="out-text">${escapeHtml(payload.stdout)}</div>`;
      if(payload.stderr) outHtml+=`<div class="out-text out-err">${escapeHtml(payload.stderr)}</div>`;
      if(payload.images && payload.images.length){
        payload.images.forEach(img64=>{ outHtml+=`<img src="data:image/png;base64,${img64}" class="out-plot">`; });
      }
      if(payload.plot_png){
        outHtml+=`<img src="data:image/png;base64,${payload.plot_png}" class="out-plot">`;
      }
      if(payload.circuit && payload.circuit.probabilities){
        const canvasId=`circuit-canvas-${id}`;
        outHtml+=`<canvas id="${canvasId}" class="out-circuit"></canvas>`;
        outArea.innerHTML=outHtml;
        drawCircuitBars(document.getElementById(canvasId), payload.circuit.probabilities);
      } else if(outHtml){
        outArea.innerHTML=outHtml;
      } else {
        outArea.innerHTML=`<div class="out-text">✅ Ejecutado (sin salida)</div>`;
      }
      setSbRun(false,'✅ Completado');
    } else {
      outArea.innerHTML=`<div class="out-text">⚠️ Motor no configurado. Usa postMessage o configura localStorage "qcol_colab_url".</div>`;
      setSbRun(false,'Sin motor');
    }
  } catch(e){
    outArea.innerHTML=`<div class="out-text out-err">❌ ${e.message}</div>`;
    setSbRun(false,'❌ Error','err');
  }
  running=false;
  if(rbtn) rbtn.classList.remove('spinning');
  renderCellNum(id);
}
function renderCellNum(id){ const cell=cells.find(c=>c.id===id); if(!cell) return; const numEl=document.querySelector(`[data-id="${id}"] .cell-num`); if(numEl) numEl.textContent=cell.exec_count!==null?`[${cell.exec_count}]`:'[ ]'; }
function drawCircuitBars(canvas, probs){ if(!canvas||!probs) return; const states=Object.keys(probs), vals=Object.values(probs); const h=Math.max(120, states.length*32); canvas.width=600; canvas.height=h; const ctx=canvas.getContext('2d'); ctx.fillStyle='#090d18'; ctx.fillRect(0,0,canvas.width,canvas.height); const maxP=Math.max(...vals,0.01); let y=20; states.forEach((st,i)=>{ const len=Math.max(2, (vals[i]/maxP)*(canvas.width-200)); ctx.fillStyle='#0088ff'; ctx.fillRect(120,y,len,20); ctx.fillStyle='#e2ecff'; ctx.font='12px monospace'; ctx.fillText(st, 50, y+16); ctx.fillStyle='#00ffdd'; ctx.fillText((vals[i]*100).toFixed(1)+'%', 130+len+8, y+16); y+=32; }); }
async function runCurCell(){ if(curCellId) await runCell(curCellId); }
async function runAll(){ for(const cell of cells) if(cell.type==='code' && cell.code.trim()){ await runCell(cell.id); await new Promise(r=>setTimeout(r,150)); } }
function setSbRun(running,msg='',state=''){ const dot=document.getElementById('sb-dot'); const txt=document.getElementById('sb-txt'); if(dot) dot.className='sb-dot '+(running?'sb-run':state==='err'?'sb-err':'sb-idle'); if(txt&&msg) txt.textContent=msg; }
function updateStatus(){ const el=document.getElementById('sb-cells-info'); if(el) el.textContent=cells.length+' celdas'; }

// Guardado, carga, gestión notebooks
function saveCurrentNb(showNotify=true){
  if(!curUser) return;
  cells.forEach(cell=>{
    const cmDiv=document.getElementById(`area-${cell.id}`);
    if(cmDiv && cmDiv.cm) cell.code = cmDiv.cm.getValue();
    const mta=document.getElementById(`mta-${cell.id}`);
    if(mta) cell.code=mta.value;
  });
  const name=document.getElementById('nb-name-inp').value||'Sin título';
  const key='qcol_nbs_'+(curUser.username||'dev');
  const nbs=JSON.parse(localStorage.getItem(key)||'[]');
  const existing=nbs.findIndex(n=>n.name===name);
  const entry={name,cells:JSON.parse(JSON.stringify(cells)),saved:new Date().toISOString()};
  if(existing>=0) nbs[existing]=entry; else nbs.unshift(entry);
  localStorage.setItem(key,JSON.stringify(nbs.slice(0,50)));
  lastSaveTime=Date.now();
  const saveSpan=document.getElementById('sb-save-status');
  if(saveSpan) saveSpan.textContent='💾 Guardado';
  setTimeout(()=>{ if(saveSpan) saveSpan.textContent='✓'; },2000);
  if(showNotify) notify('💾 Guardado: '+name);
}
function newNotebook(){
  if(cells.length>0 && !confirm('¿Guardar el notebook actual antes de crear uno nuevo?')) return;
  saveCurrentNb(true);
  pushUndo();
  cells=[]; execCounter=0; curCellId=null;
  document.getElementById('nb-name-inp').value='Nuevo Notebook';
  addCellAt(-1,'code');
  notify('✅ Nuevo notebook');
}
function loadNb(name){
  if(cells.length>0 && !confirm('¿Guardar el actual antes de cargar?')) return;
  saveCurrentNb(false);
  const nbs=JSON.parse(localStorage.getItem('qcol_nbs_'+(curUser.username||'dev'))||'[]');
  const nb=nbs.find(n=>n.name===name);
  if(!nb) return;
  cells=nb.cells.map(c=>({...c,mdEdit:false}));
  document.getElementById('nb-name-inp').value=nb.name;
  renderCells();
  if(cells[0]) focusCell(cells[0].id);
  setView('notebook');
  notify('📂 Cargado: '+nb.name);
}
function deleteNb(name){
  if(!confirm('¿Eliminar "'+name+'"?')) return;
  const key='qcol_nbs_'+(curUser?.username||'dev');
  let nbs=JSON.parse(localStorage.getItem(key)||'[]');
  nbs=nbs.filter(n=>n.name!==name);
  localStorage.setItem(key,JSON.stringify(nbs));
  refreshNbs();
  notify('🗑 Eliminado: '+name);
}
function refreshNbs(){
  const grid=document.getElementById('nb-grid');
  if(!grid) return;
  const nbs=JSON.parse(localStorage.getItem('qcol_nbs_'+(curUser?.username||'dev'))||'[]');
  if(nbs.length===0){ grid.innerHTML=`<div class="nb-empty-state"><div class="nb-empty-icon">📓</div><div class="nb-empty-ttl">Sin notebooks guardados</div></div>`; return; }
  grid.innerHTML=nbs.map(nb=>`<div class="nb-card"><div class="nb-card-hdr"><div class="nb-card-title">${escapeHtml(nb.name)}</div><div class="nb-card-badge">${nb.cells?.length||0} celdas</div></div><div class="nb-card-body"><div class="nb-card-meta">${new Date(nb.saved).toLocaleDateString()}</div><div class="nb-card-actions"><button class="btn-edit-nb" onclick="loadNb('${escapeHtml(nb.name)}')">📝 Editar</button><button class="btn-pub-nb" onclick="loadNb('${escapeHtml(nb.name)}');showPublish()">📤 Publicar</button><button class="btn-del-nb" onclick="deleteNb('${escapeHtml(nb.name)}')">🗑</button></div></div></div>`).join('');
}
function importNb(){ document.getElementById('import-file').click(); }
function handleImport(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const nb=JSON.parse(ev.target.result);
      cells=[];
      execCounter=0;
      const name=nb.metadata?.name||file.name.replace('.ipynb','');
      document.getElementById('nb-name-inp').value=name;
      (nb.cells||[]).forEach(c=>{
        const src=Array.isArray(c.source)?c.source.join(''):c.source||'';
        const type=c.cell_type==='markdown'?'markdown':'code';
        const cell={id:genId(),type,code:src,output:'',exec_count:null,mdEdit:false};
        if(c.outputs && c.outputs.length){
          let outHtml='';
          c.outputs.forEach(out=>{
            if(out.text) outHtml+=`<div class="out-text">${escapeHtml(out.text)}</div>`;
            if(out.data && out.data['image/png']) outHtml+=`<img src="data:image/png;base64,${out.data['image/png']}" class="out-plot">`;
          });
          cell.output=outHtml;
        }
        cells.push(cell);
      });
      if(cells.length===0) addCellAt(-1,'code');
      renderCells();
      if(cells[0]) focusCell(cells[0].id);
      setView('notebook');
      notify(`✅ Importado: ${name} (${cells.length} celdas)`);
    }catch(err){ notify('❌ Error .ipynb: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}
function downloadNb(){
  const name=document.getElementById('nb-name-inp').value||'qcol_notebook';
  cells.forEach(cell=>{
    const cmDiv=document.getElementById(`area-${cell.id}`);
    if(cmDiv && cmDiv.cm) cell.code=cmDiv.cm.getValue();
  });
  const nb={nbformat:4,nbformat_minor:5,metadata:{name,kernelspec:{display_name:'Python 3',language:'python',name:'python3'}},cells:cells.map(c=>({cell_type:c.type==='markdown'?'markdown':'code',source:[c.code],metadata:{},outputs:[],execution_count:c.exec_count}))};
  const blob=new Blob([JSON.stringify(nb,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name.replace(/\.ipynb$/,'')+'.ipynb'; a.click(); notify('📥 '+a.download);
}
function showPublish(){ document.getElementById('pub-title').value=document.getElementById('nb-name-inp').value||''; document.getElementById('pub-modal').classList.add('open'); }
function closePublish(){ document.getElementById('pub-modal').classList.remove('open'); }
async function publishNb(){
  if(!requireAuth()) return;
  saveCurrentNb(false);
  const name=document.getElementById('pub-title').value.trim();
  if(!name){ notify('Escribe un título'); return; }
  const token=document.getElementById('github-token').value.trim();
  const repo=document.getElementById('github-repo').value.trim();
  if(!token || !repo){ notify('Token y repositorio necesarios'); return; }
  const contentBase64=btoa(unescape(encodeURIComponent(JSON.stringify({cells:cells.map(c=>({cell_type:c.type==='markdown'?'markdown':'code',source:[c.code]}))},null,2))));
  const path=`notebooks/${name.replace(/[^a-z0-9]/gi,'_')}.ipynb`;
  try{
    const resp=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:'PUT',
      headers:{'Authorization':`Bearer ${token}`, 'Content-Type':'application/json'},
      body:JSON.stringify({message:`Add notebook ${name}`, content:contentBase64, branch:'main'})
    });
    if(resp.ok){ notify('✅ Publicado en GitHub'); closePublish(); }
    else{ const err=await resp.json(); notify('❌ Error GitHub: '+err.message); }
  }catch(e){ notify('❌ Falló conexión: '+e.message); }
}

// UI y eventos
function showUI(user){
  const role=user?.role||'guest';
  const isUpgrade=_initialized && (role==='founder'||role==='admin') && (curUser?.role!=='founder' && curUser?.role!=='admin');
  if(_initialized && !isUpgrade) return;
  _initialized=true;
  curUser=user;
  if(role!=='admin' && role!=='founder'){
    document.getElementById('access-denied').classList.add('show');
    ['topbar','secbar','main-area','statusbar'].forEach(id=>{ document.getElementById(id).style.display='none'; });
    return;
  }
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>{ document.getElementById(id).style.display='flex'; });
  document.getElementById('user-pill').textContent=(curUser.name||'—').split(' ')[0];
  document.getElementById('admin-pill').style.display='';
  const storedURL=localStorage.getItem('qcol_colab_url')||'';
  if(storedURL){ engineURL=storedURL; checkEngine(); }
  refreshNbs();
  if(cells.length===0) addCellAt(-1,'code');
}
function setView(v){ curView=v; document.getElementById('view-notebook').style.display=v==='notebook'?'flex':'none'; document.getElementById('view-manage').style.display=v==='manage'?'flex':'none'; document.getElementById('stab-1').classList.toggle('on',v==='notebook'); document.getElementById('stab-2').classList.toggle('on',v==='manage'); if(v==='manage') refreshNbs(); }
function requireAuth(){ const role=curUser?.role||'guest'; if(role!=='admin'&&role!=='founder'){ notify('❌ Requiere Admin/Founder'); postCore('QCOL_LOGIN'); return false; } return true; }

window.addEventListener('message',e=>{
  const d=e.data||{};
  if(d.type==='QCOL_USER') showUI(d.user);
  if(d.type==='QCOL_CONFIG_UPDATED' && d.engineUrl){ engineURL=d.engineUrl; localStorage.setItem('qcol_colab_url',engineURL); checkEngine(); }
  if(d.type==='QCOL_LOAD_NB' && d.nb){
    if(!requireAuth()) return;
    cells=d.nb.cells.map(c=>({...c,mdEdit:false}));
    document.getElementById('nb-name-inp').value=d.nb.title||'Sin título';
    renderCells();
    setView('notebook');
  }
});
postCore('QCOL_GET_USER');
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey) && e.key==='s'){ e.preventDefault(); saveCurrentNb(true); }
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  if(((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='Z') || ((e.ctrlKey||e.metaKey) && e.key==='y')){ e.preventDefault(); redo(); }
});
initEngine();
function initEngine(){ const stored=localStorage.getItem('qcol_colab_url'); if(stored){ engineURL=stored; checkEngine(); } }
setTimeout(()=>{ if(!_initialized) showUI(null); }, 2000);
</script>
