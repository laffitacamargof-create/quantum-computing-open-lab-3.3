function addCellAt(afterIdx,type='code'){
  if(_expositionMode)return;
  const defaultQk=`# Celda Qiskit — imports automáticos: qc, AerSimulator, np, pi, plt
qc = QuantumCircuit(2, 2)
qc.h(0)
qc.cx(0, 1)
qc.measure([0,1],[0,1])

# Dibujar circuito
print(qc.draw(output='text'))

# Ejecutar
sim = AerSimulator()
result = sim.run(transpile(qc, sim), shots=1024).result()
counts = result.get_counts()
print("\\nResultados:", counts)
`;
  const cell={id:genId(),type,code:type==='qiskit'?defaultQk:'',output:'',exec_count:null,mdEdit:false,errorLine:null,hiddenCode:'',circuitData:null};
  if(afterIdx===-1||afterIdx>=cells.length)cells.push(cell);
  else cells.splice(afterIdx+1,0,cell);
  renderCells();focusCell(cell.id);updateStatus();
}
function deleteCell(id){if(_expositionMode)return;if(cells.length<=1){notify('Debes tener al menos 1 celda');return;}cells=cells.filter(c=>c.id!==id);if(curCellId===id)curCellId=cells[0]?.id||null;renderCells();updateStatus();}
function moveCellUp(id){const i=cells.findIndex(c=>c.id===id);if(i<=0)return;[cells[i-1],cells[i]]=[cells[i],cells[i-1]];renderCells();focusCell(id);}
function moveCellDown(id){const i=cells.findIndex(c=>c.id===id);if(i<0||i>=cells.length-1)return;[cells[i],cells[i+1]]=[cells[i+1],cells[i]];renderCells();focusCell(id);}
function syncCellCode(id){const cell=cells.find(c=>c.id===id);if(!cell)return;const ta=document.getElementById('ta-'+id);const mta=document.getElementById('mta-'+id);if(ta)cell.code=ta.value;if(mta)cell.code=mta.value;}
function focusCell(id){curCellId=id;document.querySelectorAll('.nb-cell').forEach(el=>{el.classList.toggle('active',el.dataset.id===id);});const ta=document.getElementById('ta-'+id)||document.getElementById('mta-'+id);if(ta)ta.focus();}
function changeCellType(id){if(_expositionMode)return;const cell=cells.find(c=>c.id===id);if(!cell)return;cell.type=cell.type==='code'||cell.type==='qiskit'?'markdown':'code';cell.mdEdit=true;renderCells();focusCell(id);}

// ── RENDER CELDAS ─────────────────────────────────────────────
function renderCells(){
  const scroll=document.getElementById('nb-scroll');
  const bottom=scroll.querySelector('.nb-bottom');
  scroll.querySelectorAll('.nb-cell,.add-cell-row').forEach(el=>el.remove());
  cells.forEach((cell,i)=>{
    scroll.insertBefore(buildAddRow(i-1),bottom);
    scroll.insertBefore(buildCellEl(cell,i),bottom);
  });
  scroll.insertBefore(buildAddRow(cells.length-1),bottom);
  if(curCellId)focusCell(curCellId);
  updateStatus();
}
function buildAddRow(idx){

// highlight y buildLinenos definidos abajo

// ── HIGHLIGHT — tokenizador seguro, nunca inyecta class= en el textarea ──
function highlight(code, isQk=false){
  // Trabaja sobre el texto RAW, nunca sobre HTML ya procesado
  // Cada token se procesa una sola vez, sin riesgo de doble-wrap
  const KW=new Set(['import','from','as','def','class','return','if','else','elif',
    'for','while','in','not','and','or','True','False','None','with','try','except',
    'finally','lambda','pass','break','continue','yield','raise','del','global',
    'assert','is','async','await','nonlocal']);
  const BUILTIN=new Set(['print','len','range','int','float','str','list','dict',
    'set','tuple','type','isinstance','enumerate','zip','map','filter','sum','max',
    'min','abs','round','sorted','reversed','open','input','format','repr',
    'hasattr','getattr','setattr','super','object','vars','dir','eval','exec']);
  const QK=new Set(['QuantumCircuit','QuantumRegister','ClassicalRegister',
    'AerSimulator','Statevector','DensityMatrix','Operator','Sampler','Estimator',
    'transpile','plot_histogram','plot_bloch_multivector','plot_state_city',
    'UnitaryGate','SparsePauliOp','Parameter','ParameterVector']);

  // Regex de tokenización — grupos mutuamente excluyentes
  const RE=/(#[^\n]*)|("""[\s\S]*?"""|'''[\s\S]*?''')|("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|\b(\d+(?:\.\d+)?(?:[eEjJ][+-]?\d+)?)\b|(@[A-Za-z_][A-Za-z0-9_.]*)|([A-Za-z_]\w*)/g;

  let out='', last=0, m;
  RE.lastIndex=0;
  while((m=RE.exec(code))!==null){
    // texto plano entre tokens → escapar y añadir
    if(m.index>last) out+=esc(code.slice(last,m.index));
    const [tok,cmt,strT,strS,num,dec,word]=m;
    if     (cmt !==undefined) out+=`<s class="cmt">${esc(cmt)}</s>`;
    else if(strT!==undefined) out+=`<s class="st">${esc(strT)}</s>`;
    else if(strS!==undefined) out+=`<s class="st">${esc(strS)}</s>`;
    else if(num !==undefined) out+=`<s class="nm">${esc(num)}</s>`;
    else if(dec !==undefined) out+=`<s class="kw">${esc(dec)}</s>`;
    else if(word!==undefined){
      const next=code[m.index+word.length];
      if     (KW.has(word))               out+=`<s class="kw">${word}</s>`;
      else if(isQk&&QK.has(word))         out+=`<s class="qt">${word}</s>`;
      else if(BUILTIN.has(word)&&next==='(') out+=`<s class="blt">${word}</s>`;
      else if(next==='(')                 out+=`<s class="fn">${word}</s>`;
      else                                out+=esc(word);
    }
    last=m.index+tok.length;
  }
  if(last<code.length) out+=esc(code.slice(last));
  return out;
  // Helper inline — no usa escH para no añadir dependencia circular
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
}

function buildLinenos(code, errorLine){
  const lines=code.split('\n');
  return lines.map((_,i)=>{
    const ln=i+1;
    const isErr=(errorLine===ln);
    return `<div class="lineno ${isErr?'error-line':''}">${ln}</div>`;
  }).join('');
}

// ── EDITOR HANDLERS ────────────────────────────────────────────
function syncScroll(id){
  const ta=document.getElementById('ta-'+id);
  const syn=document.getElementById('syn-'+id);
  const lnos=document.getElementById('lnos-'+id);
  if(ta&&syn){syn.scrollTop=ta.scrollTop;syn.scrollLeft=ta.scrollLeft;}
  if(ta&&lnos)lnos.scrollTop=ta.scrollTop;
}
function onCellInput(id){
  const ta=document.getElementById('ta-'+id);
  const syn=document.getElementById('syn-'+id);
  const lnos=document.getElementById('lnos-'+id);
  if(ta&&syn){
    const cell=cells.find(c=>c.id===id);
    if(cell){
      cell.code=ta.value;
      cell.errorLine=null; // limpiar error al editar
    }
    const isQk=cell?.type==='qiskit';
    syn.innerHTML=highlight(ta.value,isQk)+'\n';
    if(lnos)lnos.innerHTML=buildLinenos(ta.value, cell?.errorLine);
    autoResize(ta);
    syn.scrollTop=ta.scrollTop;syn.scrollLeft=ta.scrollLeft;
    if(lnos)lnos.scrollTop=ta.scrollTop;
  }
  if(!_expositionMode){
    if(debounceTimer)clearTimeout(debounceTimer);
    debounceTimer=setTimeout(()=>{if(curUser&&cells.length)saveCurrentNb(false);},3000);
  }
}
function autoResize(ta){
  ta.style.height='auto';
  const h=Math.max(42,ta.scrollHeight);
  ta.style.height=h+'px';
  const area=ta.closest('.cell-code-area');if(area)area.style.height=h+'px';
  const inner=ta.closest('.cell-code-inner');if(inner)inner.style.height=h+'px';
  const syn=document.getElementById('syn-'+ta.id.replace('ta-',''));if(syn)syn.style.height=h+'px';
  const lnos=document.getElementById('lnos-'+ta.id.replace('ta-',''));if(lnos)lnos.style.height=h+'px';
}
function onCellKeydown(e,id){
  const ta=document.getElementById('ta-'+id);
  if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.substring(0,s)+'    '+ta.value.substring(en);ta.selectionStart=ta.selectionEnd=s+4;onCellInput(id);return;}
  if(e.shiftKey&&e.key==='Enter'){e.preventDefault();runCell(id);const idx=cells.findIndex(c=>c.id===id);if(idx<cells.length-1)focusCell(cells[idx+1].id);else if(!_expositionMode)addCellAt(-1,'code');return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runCell(id);}
  // Navegación entre celdas
  if(e.ctrlKey&&e.key==='ArrowUp'){
    e.preventDefault();
    const idx=cells.findIndex(c=>c.id===id);
    if(idx>0)focusCell(cells[idx-1].id);
    return;
  }
  if(e.ctrlKey&&e.key==='ArrowDown'){
    e.preventDefault();
    const idx=cells.findIndex(c=>c.id===id);
    if(idx<cells.length-1)focusCell(cells[idx+1].id);
    return;
  }
  if(e.key==='Escape'){
    e.preventDefault();
    ta.blur();
    document.querySelector(`.nb-cell[data-id="${id}"]`)?.focus();
    return;
  }
}
function onMdKeydown(e,id){
  if(e.key==='Escape'){syncCellCode(id);const cell=cells.find(c=>c.id===id);if(cell){cell.mdEdit=false;renderCells();}}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();syncCellCode(id);const cell=cells.find(c=>c.id===id);if(cell){cell.mdEdit=false;renderCells();}const idx=cells.findIndex(c=>c.id===id);if(idx<cells.length-1)focusCell(cells[idx+1].id);}
}

// Navegación global con flechas cuando no se edita
window.addEventListener('keydown', e => {
  if (!curCellId) return;
  if (document.activeElement.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    const idx = cells.findIndex(c => c.id === curCellId);
    if (idx > 0) focusCell(cells[idx-1].id);
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    const idx = cells.findIndex(c => c.id === curCellId);
    if (idx < cells.length - 1) focusCell(cells[idx+1].id);
  } else if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const ta = document.getElementById('ta-'+curCellId) || document.getElementById('mta-'+curCellId);
    if (ta) ta.focus();
  }
});

// ── SHOW UI ────────────────────────────────────────────────────
function showUI(user){
  const role=user?.role||'guest';
  const sameUser=_initialized&&curUser?.username===user?.username;
  if(sameUser)return;
  _initialized=true;curUser=user;
  // Quantum Notebook abierto a todos los roles
  document.getElementById('access-denied').classList.remove('show');
  ['topbar','secbar','main-area','statusbar'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex';});
  if(user){
    const pill=document.getElementById('user-pill');
    const roleIcon = role==='founder'?'👑':role==='admin'?'🔑':role==='user'?'👤':'👁';
    if(pill)pill.textContent=roleIcon+' '+(user.name||'—').split(' ')[0];
    const ap=document.getElementById('admin-pill');
    if(ap)ap.style.display=(role==='admin'||role==='founder')?'':'none';
  }
  const stored=localStorage.getItem('qcol_colab_url')||'';
  if(stored){engineURL=stored;checkEngine();}
  refreshNbs();
  if(cells.length===0&&!_expositionMode)addCellAt(-1,'qiskit');
}

// ── MENSAJES DEL CORE ─────────────────────────────────────────
window.addEventListener('message',e=>{
  const d=e.data||{};

  // Usuario
  if(d.type==='QCOL_USER'||d.type==='QCOL_USER_UPDATE'){
    // Aceptar cualquier rol
    if(d.user) showUI(d.user);
    else { _initialized=false; showUI({name:'Invitado',role:'guest'}); }
  }
  if(d.type==='QCOL_CONFIG_UPDATED'){
    const url=localStorage.getItem('qcol_colab_url');
    if(url){ engineURL=url; checkEngine(); }
  }

  // ── RETORNO DEL ARQUITECTO CUÁNTICO ─────────────────────────
  // El Arquitecto envía el código + estructura cuando el usuario presiona Atrás
  if(d.type === 'QCOL_CIRCUIT_RETURN'){
    const cellId = d.cellId || _editingCellId;
    const cell   = cells.find(c => c.id === cellId);
    if(cell && cell.type === 'circuit'){
      cell.hiddenCode  = d.code        || '';   // código Qiskit — se ejecuta, no se muestra
      cell.circuitData = d.circuitData || null; // {qubits,gates} — para dibujar el diagrama
      cell.output      = '';
      cell.exec_count  = null;
      cell.errorLine   = null;
      _editingCellId   = null;
      renderCells();
      if(cellId) focusCell(cellId);
      notify('⚛ Circuito guardado en la celda');
      saveCurrentNb(false);
    } else if(d.code && !cellId){
      // Fallback: si no hay celda circuit activa, ignorar silenciosamente
      console.warn('QCOL_CIRCUIT_RETURN sin celda circuit destino');
    }
    return;
  }

  // Notebook desde Proyectos — soporta ambos tipos de mensaje
  const isOpenExpo = d.type==='QCOL_OPEN_NB_EXPOSITION';
  const isLoadNb   = (d.type==='QCOL_LOAD_NB') && d.nb;

  if(isOpenExpo || isLoadNb){
    const nb     = d.nb;
    const isExpo = isOpenExpo || !!d.expositionMode;

    if(!nb){ notify('❌ Notebook sin datos'); return; }
    // En modo exposición cualquier usuario puede ver
    if(!isExpo && !requireAuth()) return;

    // Cargar celdas
    document.getElementById('nb-name-inp').value = nb.title||nb.name||'Sin título';
    cells = (nb.cells && nb.cells.length > 0)
      ? nb.cells.map(c=>({...c, id:genId(), output:'', exec_count:null, mdEdit:false, errorLine:null}))
      : [];

    // Mostrar UI para invitados en modo expo
    if(isExpo){
      _initialized = true;
      curUser = curUser || {name:'Invitado', role:'guest'};
      document.getElementById('access-denied').classList.remove('show');
      ['topbar','secbar','main-area','statusbar'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.style.display='flex';
      });
    }

    setView('notebook');

    // Orden importante: primero establecer _expositionMode, luego renderCells
    // para que buildCellEl genere el HTML correcto desde el primer render
    if(isExpo){
      // Seteamos el flag ANTES de renderizar
      _expositionMode = true;
      _originalCells  = JSON.parse(JSON.stringify(cells));
      document.body.classList.add('expo-mode');
      // Botones
      document.getElementById('expo-badge').style.display='inline-flex';
      ['btn-add-code','btn-add-qk','btn-add-md','btn-import',
       'btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.style.display='none';
      });
      const rst=document.getElementById('btn-restore-all'); if(rst) rst.style.display='';
      const ni=document.getElementById('nb-name-inp');
      if(ni){ ni.readOnly=true; ni.style.opacity='.6'; }
      // Ocultar secbar directamente con JS (doble seguridad además del CSS)
      const sb=document.getElementById('secbar');if(sb)sb.style.display='none';
      // Cambiar texto del botón atrás
      const bb=document.getElementById('btn-back');
      if(bb){bb.textContent='← PROYECTOS';bb.title='Volver a Proyectos';}
      // Ahora renderizamos — buildCellEl verá _expositionMode=true
      renderCells();
      if(cells[0]) focusCell(cells[0].id);
      notify('👁 Modo exposición — lee el material y experimenta con el código');
    } else {
      // Modo normal
      _expositionMode = false;
      document.body.classList.remove('expo-mode');
      document.getElementById('expo-badge').style.display='none';
      ['btn-add-code','btn-add-qk','btn-add-md','btn-import',
       'btn-download','btn-save','btn-publish','stab-2'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.style.display='';
      });
      const rst=document.getElementById('btn-restore-all'); if(rst) rst.style.display='none';
      const ni=document.getElementById('nb-name-inp');
      if(ni){ ni.readOnly=false; ni.style.opacity=''; }
      renderCells();
      if(cells[0]) focusCell(cells[0].id);
      notify('📂 Cargado: '+(nb.title||nb.name||'Notebook'));
    }
  }
});

// Escuchar cambios en localStorage (cuando Fundador cambia URL)
window.addEventListener('storage',e=>{
  if(e.key==='qcol_colab_url'&&e.newValue){
    engineURL=e.newValue;
    checkEngine();
  }
});

// Pedir usuario
postCore('QCOL_GET_USER');
setTimeout(()=>{if(!_initialized){try{const s=localStorage.getItem('qcol_cur_user');if(s)showUI(JSON.parse(s));}catch(e){}}},700);
setTimeout(()=>{if(!_initialized){showUI({name:'Invitado',role:'guest'});}},1500);
window.addEventListener('message',e=>{const d=e.data||{};if(d.type==='QCOL_USER_UPDATE'&&d.user){_initialized=false;showUI(d.user);}});

function requireAuth(){return true;} // Quantum Notebook abierto a todos

// Init
function initEngine(){const s=localStorage.getItem('qcol_colab_url');if(s){engineURL=s;checkEngine();}}
initEngine();
setTimeout(()=>initMarkdown(),400);
</script>
